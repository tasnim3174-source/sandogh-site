<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سیستم حسابداری صندوق اتحاد</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
<style>
:root{--bg-gradient:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);--card-bg:rgba(255,255,255,.95);--text-primary:#2d3748;--text-secondary:#4a5568;--text-muted:#718096;--text-light:#a0aec0;--border-color:rgba(226,232,240,.5);--input-bg:#fff;--input-border:#e2e8f0;--hover-bg:rgba(102,126,234,.05);--section-bg:linear-gradient(135deg,rgba(247,250,252,.8),rgba(237,242,247,.8));--info-bg:linear-gradient(135deg,rgba(66,153,225,.1),rgba(66,153,225,.05));--shadow:0 25px 50px rgba(0,0,0,.25);--clock-bg:linear-gradient(135deg,#667eea,#764ba2);--clock-text:#fff;--datetime-bg:rgba(102,126,234,.1);--datetime-text:#2d3748;--datetime-label:#718096;--welcome-text:#667eea;--menu-text:#4a5568;--menu-hover:rgba(102,126,234,.1);--table-header:linear-gradient(135deg,#2d3748,#1a202c);--table-text:#2d3748;--table-hover:rgba(102,126,234,.05);--warning-bg:#fff5f5;--warning-border:#feb2b2;--warning-text:#c53030;--help-bg:#fff;--help-border:#e2e8f0;--help-text:#4a5568;--help-title:#667eea;--support-card-bg:#fff;--support-card-border:#e2e8f0;--support-label:#718096;--support-value:#2d3748;--coin-display-bg:linear-gradient(135deg,#ecc94b,#d69e2e);--coin-text:#fff;--shop-card-bg:#fff;--shop-card-border:#e2e8f0;--shop-title:#2d3748;--shop-desc:#4a5568;--modal-bg:#fff;--modal-text:#2d3748;--receipt-bg:linear-gradient(135deg,rgba(72,187,120,.05),rgba(56,161,105,.05));--receipt-border:#48bb78;--receipt-text:#2d3748;--receipt-label:#718096;--coming-soon-bg:linear-gradient(135deg,rgba(102,126,234,.08),rgba(118,75,162,.05));--coming-soon-border:#667eea;--coming-soon-title:#2d3748;--coming-soon-text:#718096;--coming-soon-icon:#667eea;--stat-card-bg:#fff;--stat-card-border:#e2e8f0;--stat-value:#2d3748;--stat-label:#718096;--bar-chart-bg:#fff;--bar-chart-border:#e2e8f0;--calendar-event-bg:#fff;--calendar-event-border:#667eea;--calendar-event-title:#2d3748;--calendar-event-desc:#4a5568;--calendar-event-date:#718096;--history-item-bg:#fff;--history-item-border:#667eea;--history-product:#2d3748;--history-date:#a0aec0;--history-code:#667eea;--password-dots-bg:#edf2f7;--copy-btn-bg:rgba(102,126,234,.1);--copy-btn-text:#667eea;--copy-btn-hover:rgba(102,126,234,.2);--filter-bar-bg:rgba(247,250,252,.8);--theme-switcher-bg:rgba(255,255,255,.95);--theme-switcher-border:#e2e8f0;--theme-btn-bg:transparent;--theme-btn-text:#4a5568;--theme-btn-active-bg:linear-gradient(135deg,#667eea,#764ba2);--theme-btn-active-text:#fff;--login-help-bg:rgba(66,153,225,.05);--login-help-border:#4299e1;--login-help-text:#2c5282;--hamburger-bg:#667eea;--hamburger-text:#fff;--mobile-menu-bg:rgba(255,255,255,.98);--mobile-menu-shadow:0 10px 30px rgba(0,0,0,.2)}
[data-theme="dark"]{--bg-gradient:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);--card-bg:rgba(26,26,46,.95);--text-primary:#fbbf24;--text-secondary:#f59e0b;--text-muted:#d97706;--text-light:#b45309;--border-color:rgba(251,191,36,.2);--input-bg:#1e1e3f;--input-border:#fbbf24;--hover-bg:rgba(251,191,36,.1);--section-bg:linear-gradient(135deg,rgba(30,30,63,.8),rgba(26,26,46,.8));--info-bg:linear-gradient(135deg,rgba(251,191,36,.15),rgba(245,158,11,.1));--shadow:0 25px 50px rgba(0,0,0,.5);--clock-bg:linear-gradient(135deg,#f59e0b,#d97706);--clock-text:#fff;--datetime-bg:rgba(251,191,36,.15);--datetime-text:#fbbf24;--datetime-label:#f59e0b;--welcome-text:#fbbf24;--menu-text:#fbbf24;--menu-hover:rgba(251,191,36,.15);--table-header:linear-gradient(135deg,#1e1e3f,#16213e);--table-text:#fbbf24;--table-hover:rgba(251,191,36,.1);--warning-bg:rgba(239,68,68,.1);--warning-border:#ef4444;--warning-text:#fca5a5;--help-bg:#1e1e3f;--help-border:#fbbf24;--help-text:#fbbf24;--help-title:#fbbf24;--support-card-bg:#1e1e3f;--support-card-border:#fbbf24;--support-label:#f59e0b;--support-value:#fbbf24;--coin-display-bg:linear-gradient(135deg,#f59e0b,#d97706);--coin-text:#fff;--shop-card-bg:#1e1e3f;--shop-card-border:#fbbf24;--shop-title:#fbbf24;--shop-desc:#f59e0b;--modal-bg:#1e1e3f;--modal-text:#fbbf24;--receipt-bg:linear-gradient(135deg,rgba(251,191,36,.1),rgba(245,158,11,.05));--receipt-border:#fbbf24;--receipt-text:#fbbf24;--receipt-label:#f59e0b;--coming-soon-bg:linear-gradient(135deg,rgba(251,191,36,.1),rgba(245,158,11,.05));--coming-soon-border:#fbbf24;--coming-soon-title:#fbbf24;--coming-soon-text:#f59e0b;--coming-soon-icon:#fbbf24;--stat-card-bg:#1e1e3f;--stat-card-border:#fbbf24;--stat-value:#fbbf24;--stat-label:#f59e0b;--bar-chart-bg:#1e1e3f;--bar-chart-border:#fbbf24;--calendar-event-bg:#1e1e3f;--calendar-event-border:#fbbf24;--calendar-event-title:#fbbf24;--calendar-event-desc:#f59e0b;--calendar-event-date:#d97706;--history-item-bg:#1e1e3f;--history-item-border:#fbbf24;--history-product:#fbbf24;--history-date:#d97706;--history-code:#fbbf24;--password-dots-bg:#16213e;--copy-btn-bg:rgba(251,191,36,.2);--copy-btn-text:#fbbf24;--copy-btn-hover:rgba(251,191,36,.3);--filter-bar-bg:rgba(30,30,63,.8);--theme-switcher-bg:rgba(30,30,63,.95);--theme-switcher-border:#fbbf24;--theme-btn-bg:transparent;--theme-btn-text:#fbbf24;--theme-btn-active-bg:linear-gradient(135deg,#f59e0b,#d97706);--theme-btn-active-text:#fff;--login-help-bg:rgba(251,191,36,.1);--login-help-border:#fbbf24;--login-help-text:#fbbf24;--hamburger-bg:#f59e0b;--hamburger-text:#1a1a2e;--mobile-menu-bg:rgba(26,26,46,.98);--mobile-menu-shadow:0 10px 30px rgba(0,0,0,.5)}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Vazirmatn',Tahoma,system-ui,sans-serif}
body{background:var(--bg-gradient);min-height:100vh;padding:20px;transition:background .3s ease;color:var(--text-primary)}
.container{max-width:1600px;margin:0 auto}
.login-page,.app-page{background:var(--card-bg);border-radius:32px;padding:40px;box-shadow:var(--shadow);transition:all .3s ease}
.hidden{display:none!important}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:16px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Vazirmatn',Tahoma,sans-serif;transition:all .3s}
[data-theme="dark"] .btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(0,0,0,.2)}
.btn-small{padding:8px 16px;font-size:.85rem;border-radius:20px;border:none;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px;font-family:'Vazirmatn',Tahoma,sans-serif;transition:all .3s}
.btn-small:hover{transform:translateY(-1px)}
.success-btn{background:linear-gradient(135deg,#48bb78,#38a169);color:#fff}
.danger-btn{background:linear-gradient(135deg,#f56565,#e53e3e);color:#fff}
.edit-btn{background:linear-gradient(135deg,#ed8936,#dd6b20);color:#fff}
.info-btn{background:linear-gradient(135deg,#4299e1,#3182ce);color:#fff}
[data-theme="dark"] .success-btn{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a2e}
[data-theme="dark"] .info-btn{background:linear-gradient(135deg,#fbbf24,#d97706);color:#1a1a2e}
.app-layout{display:flex;gap:25px;margin-top:25px}
.vertical-menu{width:240px;background:var(--card-bg);border-radius:24px;padding:25px 15px;flex-shrink:0;max-height:calc(100vh - 200px);overflow-y:auto;transition:all .3s}
.vertical-menu .menu-item{display:flex;align-items:center;gap:12px;padding:14px 18px;margin:6px 0;border-radius:16px;color:var(--menu-text);font-weight:600;cursor:pointer;transition:all .2s}
.vertical-menu .menu-item:hover{background:var(--menu-hover)}
.vertical-menu .menu-item.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
[data-theme="dark"] .vertical-menu .menu-item.active{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e}
.content-area{flex:1;background:var(--card-bg);border-radius:24px;padding:30px;min-height:600px;overflow-y:auto;transition:all .3s}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:.9rem}
th,td{padding:12px 15px;text-align:right;border-bottom:1px solid var(--border-color);color:var(--table-text)}
th{background:var(--table-header);font-weight:700;color:#fff;position:sticky;top:0;z-index:10}
tbody tr:hover{background:var(--table-hover)}
.input-group{margin-bottom:25px;position:relative}
.input-group label{display:block;margin-bottom:8px;font-weight:600;color:var(--text-secondary)}
.input-group input,.input-group select,.input-group textarea{width:100%;padding:14px;border:2px solid var(--input-border);border-radius:16px;font-size:1rem;background:var(--input-bg);color:var(--text-primary);font-family:'Vazirmatn',Tahoma,sans-serif;transition:all .3s}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
[data-theme="dark"] .input-group input:focus,[data-theme="dark"] .input-group select:focus{border-color:#fbbf24;box-shadow:0 0 0 3px rgba(251,191,36,.2)}
.toggle-password{position:absolute;left:14px;top:42px;background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--text-muted);transition:color .3s}
.toggle-password:hover{color:#667eea}
[data-theme="dark"] .toggle-password:hover{color:#fbbf24}
.error-msg{color:#e53e3e;text-align:center;margin-top:20px;padding:12px;background:rgba(229,62,62,.1);border-radius:12px}
.info-box{background:var(--info-bg);border-right:5px solid #4299e1;padding:16px 20px;margin-bottom:25px;border-radius:16px;font-weight:600;display:flex;align-items:center;gap:10px;color:var(--text-primary);transition:all .3s}
[data-theme="dark"] .info-box{border-right-color:#fbbf24}
.dashboard-section{background:var(--section-bg);border-radius:20px;padding:25px;margin-bottom:25px;border-right:5px solid #667eea;color:var(--text-primary);transition:all .3s}
[data-theme="dark"] .dashboard-section{border-right-color:#fbbf24}
.dashboard-section h3{color:var(--text-primary);margin-bottom:15px;display:flex;align-items:center;gap:10px}
.filter-bar{display:flex;gap:12px;margin-bottom:25px;flex-wrap:wrap;background:var(--filter-bar-bg);padding:15px;border-radius:16px}
.filter-bar input,.filter-bar select{padding:10px 15px;border:2px solid var(--input-border);border-radius:12px;background:var(--input-bg);color:var(--text-primary);font-family:'Vazirmatn',Tahoma,sans-serif}
.filter-bar input{flex:1}
.header-bar{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;padding:20px 30px;border-radius:24px;margin-bottom:25px;background:var(--card-bg);transition:all .3s}
.datetime-display{display:flex;gap:15px;flex-wrap:wrap}
.datetime-card{display:flex;align-items:center;gap:12px;padding:12px 20px;border-radius:16px;background:var(--datetime-bg);transition:all .3s}
.datetime-card i{font-size:1.5rem;color:#667eea}
[data-theme="dark"] .datetime-card i{color:#fbbf24}
.datetime-card .dt-label{font-size:.75rem;color:var(--datetime-label)}
.datetime-card .dt-value{font-size:1.1rem;font-weight:700;color:var(--datetime-text)}
.clock-card{background:var(--clock-bg);color:var(--clock-text);padding:15px 25px;border-radius:20px;display:flex;align-items:center;gap:15px;box-shadow:0 5px 15px rgba(102,126,234,.3);transition:all .3s}
[data-theme="dark"] .clock-card{box-shadow:0 5px 15px rgba(251,191,36,.3)}
.clock-card .clock-time{font-size:1.8rem;font-weight:700;font-family:'Vazirmatn',monospace;letter-spacing:2px;text-shadow:0 2px 4px rgba(0,0,0,.2)}
.header-actions{display:flex;gap:15px;align-items:center}
.coin-badge{display:flex;align-items:center;gap:8px;padding:10px 18px;background:linear-gradient(135deg,#ecc94b,#d69e2e);color:#fff;border-radius:20px;font-weight:700}
.search-box{margin-bottom:20px;display:flex;gap:12px;align-items:center;background:var(--filter-bar-bg);padding:12px 18px;border-radius:16px}
.search-box input{flex:1;padding:10px 15px;border:2px solid var(--input-border);border-radius:12px;background:var(--input-bg);color:var(--text-primary);font-family:'Vazirmatn',Tahoma,sans-serif}
.table-wrapper{overflow-x:auto;max-height:600px;overflow-y:auto;border:2px solid var(--border-color);border-radius:16px;background:var(--input-bg)}
.password-dots{font-family:monospace;font-size:1.2rem;cursor:pointer;background:var(--password-dots-bg);padding:6px 12px;border-radius:12px;display:inline-flex;align-items:center;gap:8px;color:var(--text-primary)}
.warning-box{background:var(--warning-bg);border:2px solid var(--warning-border);border-radius:16px;padding:18px 20px;color:var(--warning-text);display:flex;align-items:center;gap:12px;margin-top:15px;transition:all .3s}
.warning-box.inactive{background:var(--warning-bg);border-color:#e53e3e}
.warning-box.savings{background:#fffff0;border-color:#d69e2e;color:#975a16}
[data-theme="dark"] .warning-box.savings{background:rgba(251,191,36,.1);color:#fbbf24;border-color:#fbbf24}
.warning-box.loan{background:var(--warning-bg);border-color:#e53e3e;color:var(--warning-text)}
.warning-box.loan-critical{background:#fed7d7;border-color:#c53030;color:#742a2a}
[data-theme="dark"] .warning-box.loan-critical{background:rgba(239,68,68,.15);color:#fca5a5;border-color:#ef4444}
.loan-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.loan-info-item{background:var(--input-bg);padding:12px 15px;border-radius:12px;border:2px solid var(--input-border);transition:all .3s}
.loan-info-label{font-size:.8rem;color:var(--text-muted);margin-bottom:5px}
.loan-info-value{font-size:1rem;font-weight:700;color:var(--text-primary)}
.coin-display{background:var(--coin-display-bg);color:var(--coin-text);padding:12px 20px;border-radius:14px;text-align:center;margin-bottom:20px;box-shadow:0 3px 12px rgba(236,201,75,.3);display:inline-flex;align-items:center;gap:10px;transition:all .3s}
.coin-display .coin-amount{font-size:1.4rem;font-weight:700}
.coin-display .coin-label{font-size:.85rem;opacity:.95}
.coin-history-item{background:var(--input-bg);border-radius:12px;padding:15px;margin-bottom:10px;border-right:4px solid #667eea;display:flex;justify-content:space-between;align-items:center;transition:all .3s}
[data-theme="dark"] .coin-history-item{border-right-color:#fbbf24}
.coin-history-item.positive{border-right-color:#48bb78}
.coin-history-item.negative{border-right-color:#e53e3e}
[data-theme="dark"] .coin-history-item.positive{border-right-color:#fbbf24}
.coin-amount-badge{background:linear-gradient(135deg,#ecc94b,#d69e2e);color:#fff;padding:6px 14px;border-radius:20px;font-weight:700}
.coin-rules-box{background:var(--info-bg);border-radius:16px;padding:20px;margin-bottom:20px;transition:all .3s}
.coin-rule-item{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:var(--input-bg);border-radius:12px;margin-bottom:8px;color:var(--text-primary);transition:all .3s}
.coin-rule-item.achieved{background:rgba(72,187,120,.1);border-right:3px solid #48bb78}
[data-theme="dark"] .coin-rule-item.achieved{background:rgba(251,191,36,.15);border-right-color:#fbbf24}
.coin-rule-item.not-achieved{background:rgba(229,62,62,.05);border-right:3px solid #e53e3e}
.coin-rule-item.locked{background:rgba(160,174,192,.1);border-right:3px solid #a0aec0;opacity:.6}
.profile-info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;padding:10px}
.profile-info-item{display:flex;align-items:center;gap:12px;background:var(--input-bg);padding:14px 16px;border-radius:14px;border:1px solid var(--input-border);transition:all .3s}
.profile-info-item i{font-size:1.4rem;color:#667eea;width:30px;text-align:center}
[data-theme="dark"] .profile-info-item i{color:#fbbf24}
.profile-info-item .info-content{flex:1}
.profile-info-item .info-label{font-weight:600;color:var(--text-muted);font-size:.8rem;margin-bottom:3px}
.profile-info-item .info-value{font-weight:700;color:var(--text-primary);font-size:1rem}
.last-login-box{background:var(--info-bg);border-right:4px solid #4299e1;padding:14px 18px;border-radius:14px;margin-top:15px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;transition:all .3s}
[data-theme="dark"] .last-login-box{border-right-color:#fbbf24}
.last-login-box i{font-size:1.3rem;color:#4299e1}
[data-theme="dark"] .last-login-box i{color:#fbbf24}
.last-login-box .ll-label{font-size:.8rem;color:var(--text-muted)}
.last-login-box .ll-value{font-weight:700;color:var(--text-primary);font-size:1rem}
.last-tx-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.last-tx-item{background:var(--input-bg);padding:12px 15px;border-radius:12px;border:2px solid var(--input-border);transition:all .3s}
.last-tx-label{font-size:.8rem;color:var(--text-muted);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.last-tx-value{font-size:1rem;font-weight:700;color:var(--text-primary)}
.sms-status-icon{font-size:1.3rem;font-weight:700}
.account-status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-weight:700;font-size:.9rem}
.account-status-badge.active{background:rgba(72,187,120,.15);color:#22543d}
[data-theme="dark"] .account-status-badge.active{background:rgba(251,191,36,.2);color:#fbbf24}
.account-status-badge.inactive{background:rgba(229,62,62,.15);color:#9b2c2c}
[data-theme="dark"] .account-status-badge.inactive{background:rgba(239,68,68,.2);color:#fca5a5}
.coming-soon-box{background:var(--coming-soon-bg);border:2px dashed var(--coming-soon-border);border-radius:24px;padding:60px 40px;text-align:center;margin:40px auto;max-width:500px;transition:all .3s}
.coming-soon-box i{font-size:5rem;color:var(--coming-soon-icon);margin-bottom:20px}
.coming-soon-box h2{color:var(--coming-soon-title);margin-bottom:15px;font-size:1.8rem}
.coming-soon-box p{color:var(--coming-soon-text);font-size:1.1rem;line-height:1.8}
.installment-select{width:100%;padding:12px;border:2px solid var(--input-border);border-radius:12px;font-size:1rem;margin-bottom:15px;background:var(--input-bg);color:var(--text-primary);font-family:'Vazirmatn',Tahoma,sans-serif}
.calendar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
.calendar-event{background:var(--calendar-event-bg);border-radius:14px;padding:15px;border-right:4px solid var(--calendar-event-border);box-shadow:0 2px 8px rgba(0,0,0,.05);transition:all .3s}
.calendar-event.birthday{border-right-color:#ecc94b}
.calendar-event.installment{border-right-color:#48bb78}
[data-theme="dark"] .calendar-event.installment{border-right-color:#fbbf24}
.calendar-event.occasion{border-right-color:#ed8936}
.calendar-event .event-date{font-size:.85rem;color:var(--calendar-event-date);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.calendar-event .event-title{font-weight:700;color:var(--calendar-event-title);margin-bottom:5px}
.calendar-event .event-desc{font-size:.9rem;color:var(--calendar-event-desc)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:25px}
.stat-card{background:var(--stat-card-bg);border-radius:16px;padding:20px;border:2px solid var(--stat-card-border);text-align:center;transition:all .3s}
.stat-card .stat-icon{font-size:2rem;margin-bottom:10px}
.stat-card .stat-value{font-size:1.8rem;font-weight:700;color:var(--stat-value)}
.stat-card .stat-label{font-size:.85rem;color:var(--stat-label);margin-top:5px}
.stat-card.blue{border-color:#4299e1}.stat-card.blue .stat-icon{color:#4299e1}
[data-theme="dark"] .stat-card.blue{border-color:#fbbf24}.stat-card.blue .stat-icon{color:#fbbf24}
.stat-card.green{border-color:#48bb78}.stat-card.green .stat-icon{color:#48bb78}
[data-theme="dark"] .stat-card.green{border-color:#fbbf24}.stat-card.green .stat-icon{color:#fbbf24}
.stat-card.red{border-color:#e53e3e}.stat-card.red .stat-icon{color:#e53e3e}

<script>
(function(){"use strict";
const $=(s,p=document)=>p.querySelector(s);
const $$=(s,p=document)=>p.querySelectorAll(s);

const ThemeManager = {
    init() { const saved = localStorage.getItem('sandogh_theme') || 'auto'; this.apply(saved); },
    apply(theme) {
        if (theme === 'auto') {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
        } else {
            document.documentElement.setAttribute('data-theme', theme);
        }
        localStorage.setItem('sandogh_theme', theme);
        this.current = theme;
    },
    get() { return this.current || localStorage.getItem('sandogh_theme') || 'auto'; }
};

const DATA_URL = 'https://raw.githubusercontent.com/tasnim3174-source/sandogh-site/main/data.xlsx';
const SPECIAL_USERS = [];

const U={
    norm(s){if(s===null||s===undefined||s==='')return'';return String(s).toLowerCase().replace(/[\s\-_]/g,'');},
    fmtNum(n){return new Intl.NumberFormat('fa-IR').format(n);},
    toJalali(g){const d=new Date(g),gy=d.getFullYear(),gm=d.getMonth()+1,gd=d.getDate(),gdm=[0,31,59,90,120,151,181,212,243,273,304,334];let gy2=gm>2?gy+1:gy,days=355666+365*gy+~~((gy2+3)/4)-~~((gy2+99)/100)+~~((gy2+399)/400)+gd+gdm[gm-1],jy=-1595+33*~~(days/12053);days%=12053;jy+=4*~~(days/1461);days%=1461;if(days>365){jy+=~~((days-1)/365);days=(days-1)%365;}const jm=days<186?1+~~(days/31):7+~~((days-186)/30),jd=1+(days<186?days%31:(days-186)%30);return`${jy}/${String(jm).padStart(2,'0')}/${String(jd).padStart(2,'0')}`;},
    toJalaliParts(g){const d=new Date(g),gy=d.getFullYear(),gm=d.getMonth()+1,gd=d.getDate(),gdm=[0,31,59,90,120,151,181,212,243,273,304,334];let gy2=gm>2?gy+1:gy,days=355666+365*gy+~~((gy2+3)/4)-~~((gy2+99)/100)+~~((gy2+399)/400)+gd+gdm[gm-1],jy=-1595+33*~~(days/12053);days%=12053;jy+=4*~~(days/1461);days%=1461;if(days>365){jy+=~~((days-1)/365);days=(days-1)%365;}const jm=days<186?1+~~(days/31):7+~~((days-186)/30),jd=1+(days<186?days%31:(days-186)%30);return{year:jy,month:jm,day:jd};},
    now(){const n=new Date();return`${this.toJalali(n)} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;},
    parseNum(v){if(v==null||v==='')return 0;if(typeof v==='number')return v;let s=String(v).replace(/[,\s]/g,'');return isNaN(parseFloat(s))?0:parseFloat(s);},
    fmtDate(s){if(!s) return '---';const str = String(s).trim();if(str.includes('/') && str.length === 10) return str;if(str.includes('-') && str.length === 10) return str.replace(/-/g, '/');const c = str.replace(/\D/g, '');if(c.length === 8) return `${c.slice(0,4)}/${c.slice(4,6)}/${c.slice(6,8)}`;if(c.length === 6) return `${c.slice(0,4)}/${c.slice(4,6)}`;return str;},
    esc(s){if(s===null||s===undefined)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;},
    findCol(names,headers){
        for(const n of names){
            const nn=n.toLowerCase().replace(/[_\s\-]/g,'');
            for(const h of headers){
                const hh=h.toLowerCase().replace(/[_\s\-]/g,'');
                if(hh===nn) return h;
            }
        }
        for(const n of names){
            const nn=n.toLowerCase().replace(/[_\s\-]/g,'');
            if(nn.length < 3) continue;
            for(const h of headers){
                const hh=h.toLowerCase().replace(/[_\s\-]/g,'');
                if(hh.includes(nn)) return h;
            }
        }
        return null;
    },
    // ✅ تابع parseBool اصلاح شده - پشتیبانی از -1 و 1
    parseBool(v){
        if(v===null||v===undefined||v==='')return false;
        // بررسی عددی
        if(typeof v === 'number') return v === 1 || v === -1;
        const s=String(v).trim().toLowerCase();
        // ✅ -1 و 1 هر دو فعال
        if(s === '1' || s === '-1') return true;
        if(s === '0') return false;
        // بررسی متنی
        return['true','yes','فعال','بله','✓','✅','on'].includes(s);
    },
    getJalaliMonth(){const now=new Date();const gy=now.getFullYear(),gm=now.getMonth()+1,gd=now.getDate();const gdm=[0,31,59,90,120,151,181,212,243,273,304,334];let gy2=gm>2?gy+1:gy;let days=355666+365*gy+~~((gy2+3)/4)-~~((gy2+99)/100)+~~((gy2+399)/400)+gd+gdm[gm-1];let jy=-1595+33*~~(days/12053);days%=12053;jy+=4*~~(days/1461);days%=1461;if(days>365){jy+=~~((days-1)/365);days=(days-1)%365;}const jm=days<186?1+~~(days/31):7+~~((days-186)/30);const jd=1+(days<186?days%31:(days-186)%30);return {year:jy,month:jm,day:jd,str:`${jy}/${String(jm).padStart(2,'0')}/${String(jd).padStart(2,'0')}`};},
    calcMembershipDuration(openDate){if(!openDate) return '---';const parts = openDate.split('/');if(parts.length !== 3) return openDate;const openYear = parseInt(parts[0]);const openMonth = parseInt(parts[1]);const openDay = parseInt(parts[2]);const today = U.toJalaliParts(new Date());let years = today.year - openYear;let months = today.month - openMonth;let days = today.day - openDay;if(days < 0){ months--; const prevMonth = today.month - 1; const daysInPrevMonth = prevMonth <= 6 ? 31 : (prevMonth <= 11 ? 30 : 29); days += daysInPrevMonth; }if(months < 0){ years--; months += 12; }let result = '';if(years > 0) result += `${years} سال`;if(months > 0) result += (result ? ' و ' : '') + `${months} ماه`;if(days > 0) result += (result ? ' و ' : '') + `${days} روز`;return result || 'کمتر از یک روز';},
    generateOrderCode(accountNumber) {const timestamp = Date.now().toString().slice(-6);const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');return `ORD-${accountNumber}-${timestamp}${random}`;}
};

let SUPPORT_INFO = {phone: '',accountNumber: '',cardNumber: '',shebaNumber: '',itaaAddress: '@ethads',websiteAddress: ''};

class DynamicDataManager {
    constructor() {
        this.coins = this.load('coins', {});
        this.coinHistory = this.load('coinHistory', {});
        this.calculatedTxIds = this.load('calculatedTxIds', []);
        this.monthlyCalculated = this.load('monthlyCalculated', '');
        this.shopPurchases = this.load('shopPurchases', []);
    }
    load(key, defaultVal) {try { return JSON.parse(localStorage.getItem('sandogh_' + key)) || defaultVal; } catch { return defaultVal; }}
    save(key, data) { localStorage.setItem('sandogh_' + key, JSON.stringify(data)); }
    addCoins(memberId, amount, reason, detail) {
        if (!this.coins[memberId]) this.coins[memberId] = 0;
        if (!this.coinHistory[memberId]) this.coinHistory[memberId] = [];
        this.coins[memberId] += amount;
        this.coinHistory[memberId].push({ date: U.now(), amount: amount, reason: reason, detail: detail || '' });
        this.save('coins', this.coins);
        this.save('coinHistory', this.coinHistory);
    }
    deductCoins(memberId, amount, reason, detail) {
        if (!this.coins[memberId]) this.coins[memberId] = 0;
        if (!this.coinHistory[memberId]) this.coinHistory[memberId] = [];
        this.coins[memberId] -= amount;
        this.coinHistory[memberId].push({ date: U.now(), amount: -amount, reason: reason, detail: detail || '' });
        this.save('coins', this.coins);
        this.save('coinHistory', this.coinHistory);
    }
    getTotalCoins(memberId) { return this.coins[memberId] || 0; }
    getHistory(memberId) { return this.coinHistory[memberId] || []; }
    isTxCalculated(txId) { return this.calculatedTxIds.includes(String(txId)); }
    markTxCalculated(txId) {if (!this.calculatedTxIds.includes(String(txId))) {this.calculatedTxIds.push(String(txId));this.save('calculatedTxIds', this.calculatedTxIds);}}
    isMonthlyCalculated() {const jalali = U.getJalaliMonth();return this.monthlyCalculated === `${jalali.year}-${jalali.month}`;}
    markMonthlyCalculated() {const jalali = U.getJalaliMonth();this.monthlyCalculated = `${jalali.year}-${jalali.month}`;this.save('monthlyCalculated', this.monthlyCalculated);}
    addShopPurchase(purchase) {this.shopPurchases.push(purchase);this.save('shopPurchases', this.shopPurchases);}
    getMemberPurchases(memberId) {return this.shopPurchases.filter(p => String(p.memberId) === String(memberId));}
    getAllPurchases() { return this.shopPurchases; }
    exportToExcel(members) {
        const wb = XLSX.utils.book_new();
        const coinData = members.map(m => ({memberId: m.id, firstName: m.firstName, lastName: m.lastName,accountNumber: m.accountNumber, totalCoins: this.getTotalCoins(m.id),history: JSON.stringify(this.getHistory(m.id))}));
        const ws1 = XLSX.utils.json_to_sheet(coinData);
        XLSX.utils.book_append_sheet(wb, ws1, 'Coins');
        const purchaseData = this.shopPurchases.map(p => ({'کد سفارش': p.orderCode,'شناسه عضو': p.memberId,'نام عضو': p.memberName,'شماره حساب': p.accountNumber,'شناسه محصول': p.productId,'نام محصول': p.productName,'تعداد سکه': p.price,'تاریخ خرید': p.date,'وضعیت': p.delivered ? 'تحویل شده' : 'در انتظار تحویل'}));
        const ws2 = XLSX.utils.json_to_sheet(purchaseData);
        XLSX.utils.book_append_sheet(wb, ws2, 'ShopPurchases');
        XLSX.writeFile(wb, 'coins_backup_' + new Date().toISOString().slice(0,10) + '.xlsx');
    }
    importFromExcel(file, callback) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                if (wb.Sheets['Coins']) {
                    const data = XLSX.utils.sheet_to_json(wb.Sheets['Coins']);
                    this.coins = {}; this.coinHistory = {};
                    data.forEach(row => {this.coins[row.memberId] = row.totalCoins || 0;try { this.coinHistory[row.memberId] = JSON.parse(row.history || '[]'); } catch { this.coinHistory[row.memberId] = []; }});
                    this.save('coins', this.coins);
                    this.save('coinHistory', this.coinHistory);
                    callback(true);
                } else { callback(false); }
            } catch (error) { callback(false); }
        };
        reader.readAsArrayBuffer(file);
    }
}

function calculateCoins(member, transactions, ddm) {
    const jalali = U.getJalaliMonth();
    if (!ddm.isMonthlyCalculated()) {
        if (U.parseNum(member.loanBalance) !== 0 && U.parseNum(member.paidInstallments) > 0)ddm.addCoins(member.id, 2, 'پرداخت به موقع قسط', `ماه ${jalali.month}/${jalali.year}`);
        if (U.parseNum(member.overdueInstallments) === 0 && U.parseNum(member.loanBalance) !== 0)ddm.addCoins(member.id, 3, 'بدون قسط معوقه', `ماه ${jalali.month}/${jalali.year}`);
        if (U.parseNum(member.balance) > U.parseNum(member.monthlySalary))ddm.addCoins(member.id, 2, 'موجودی بالاتر از مقرری', `ماه ${jalali.month}/${jalali.year}`);
        const savings = U.parseNum(member.savingsStatus);const mojodi = U.parseNum(member.currentMonthBalance);const extraSavings = savings - mojodi;
        if (extraSavings > 3000000) {const bonusCoins = Math.floor(extraSavings / 3000000) * 2;ddm.addCoins(member.id, bonusCoins, 'پس‌انداز بالا', `${U.fmtNum(extraSavings)} ریال اضافه`);}
        ddm.markMonthlyCalculated();
    }
    if (member.active && member.birthDateShamsi) {
        const birthParts = member.birthDateShamsi.split('/');
        if (birthParts.length === 3) {
            const birthMonth = parseInt(birthParts[1]);const birthDay = parseInt(birthParts[2]);
            if (birthMonth === jalali.month && birthDay === jalali.day) {
                if (!ddm.coinHistory[member.id]?.find(h => h.reason === 'تولد مبارک' && h.detail.includes(jalali.year)))ddm.addCoins(member.id, 5, 'تولد مبارک', jalali.str);
            }
        }
    }
    if (member.openDate) {
        const openParts = member.openDate.split('/');
        if (openParts.length === 3) {
            const openMonth = parseInt(openParts[1]);const openDay = parseInt(openParts[2]);
            if (openMonth === jalali.month && openDay === jalali.day) {
                const alreadyGiven = ddm.coinHistory[member.id]?.find(h => h.reason === 'هدیه سالانه حساب فعال' && h.detail.includes(jalali.year));
                if (!alreadyGiven) {
                    if (member.active) {ddm.addCoins(member.id, 5, 'هدیه سالانه حساب فعال', jalali.str);}
                    else {if (!ddm.coinHistory[member.id]) ddm.coinHistory[member.id] = [];ddm.coinHistory[member.id].push({ date: U.now(), amount: 0, reason: 'محرومیت - حساب غیرفعال', detail: jalali.str });ddm.save('coinHistory', ddm.coinHistory);}
                }
            }
        }
    }
    const memberTxns = transactions.filter(t => String(t._memberId) === String(member.id) || String(t['شماره حساب']) === String(member.accountNumber));
    memberTxns.forEach(tx => {
        if (ddm.isTxCalculated(tx._transactionId)) return;
        const txDate = tx['تاریخ تراکنش'] || '';const txParts = txDate.split('/');let isCurrentMonth = false;
        if (txParts.length === 3) {const txYear = parseInt(txParts[0]);const txMonth = parseInt(txParts[1]);if (txYear === jalali.year && txMonth === jalali.month) isCurrentMonth = true;}
        if (isCurrentMonth) {
            if (tx.smsStatus && tx.smsStatus.general)ddm.addCoins(member.id, 3, 'پیامک واریز فعال', `فیش ${tx['شماره فیش'] || tx['ID']}`);
            if (tx.smsStatus && !tx.smsStatus.overdue)ddm.addCoins(member.id, 2, 'بدون پیامک اخطار', `فیش ${tx['شماره فیش'] || tx['ID']}`);
            ddm.markTxCalculated(tx._transactionId);
        }
    });
}

    bindMenu() {

                $$('.menu-item').forEach(e => e.classList.remove('active'));
                el.classList.add('active');
                this.switchTab(this.tab);
                if (window.innerWidth <= 768) {
                    this.mobileMenuOpen = false;
                    const menu = $('#verticalMenu');
                    if (menu) menu.classList.add('collapsed');
                }
            };
        });
        $('#logoutBtn').onclick = () => this.doLogout();
        const toggleBtn = $('#mobileMenuToggle');
        if (toggleBtn) {
            toggleBtn.onclick = () => {
                this.mobileMenuOpen = !this.mobileMenuOpen;

                if (menu) {
                    if (this.mobileMenuOpen) { menu.classList.remove('collapsed'); toggleBtn.innerHTML = '<i class="fas fa-times"></i> بستن منو'; }
                    else { menu.classList.add('collapsed'); toggleBtn.innerHTML = '<i class="fas fa-bars"></i> منوی اصلی'; }
                }
            };
        }
    }

    renderDashboardForMember(mid, c) {
        const m = this.dm.members.find(mem => mem.id === mid);
        if (!m) { c.innerHTML = '<div style="text-align:center;padding:40px"><i class="fas fa-exclamation-circle" style="font-size:3rem;color:#e53e3e"></i><p style="margin-top:15px">اطلاعات یافت نشد</p></div>'; return; }
        const allTransactions = this.allTransactions || [];
        const txns = allTransactions.filter(function(t) {return String(t._memberId) === String(mid) || String(t['شماره حساب']) === String(m.accountNumber);}).sort(function(a, b) {return (parseInt(b._transactionId) || 0) - (parseInt(a._transactionId) || 0);});
        const latestTx = txns.length ? txns[0] : null;

    render_shop(c) {
        const isAdmin = this.currentUser.role === 'admin';

        const userCoins = member ? this.ddm.getTotalCoins(member.id) : 0;

        if (SHOP_PRODUCTS.length === 0) {h += `<div class="dashboard-section" style="text-align:center;padding:40px"><i class="fas fa-box-open" style="font-size:4rem;color:var(--text-light);margin-bottom:15px"></i><h3 style="color:var(--text-primary);margin-bottom:10px">فروشگاه خالی است</h3><p style="color:var(--text-muted)">هیچ محصولی در فروشگاه موجود نیست. لطفاً شیت Shop را در فایل اکسل اضافه کنید.</p></div>`;c.innerHTML = h;return;}
        const categories = [...new Set(SHOP_PRODUCTS.map(p => p.category).filter(cat => cat))];
        h += `<div class="shop-filter-bar"><input type="text" id="shopSearch" placeholder="جستجوی محصول..."><select id="shopCategoryFilter"><option value="">همه دسته‌ها</option>${categories.map(cat => `<option value="${U.esc(cat)}">${U.esc(cat)}</option>`).join('')}</select><select id="shopSortFilter"><option value="default">مرتب‌سازی: پیش‌فرض</option><option value="price-asc">قیمت: کم به زیاد</option><option value="price-desc">قیمت: زیاد به کم</option><option value="stock-desc">موجودی: زیاد به کم</option></select></div><div class="shop-grid" id="shopGrid"></div>`;
        c.innerHTML = h;
        const renderProducts = () => {
            const search = $('#shopSearch', c)?.value.trim().toLowerCase() || '';
            const category = $('#shopCategoryFilter', c)?.value || '';
            const sort = $('#shopSortFilter', c)?.value || 'default';
            let products = [...SHOP_PRODUCTS];
            if (search) {products = products.filter(p => p.name.toLowerCase().includes(search) || p.description.toLowerCase().includes(search) || p.shenaseh.toLowerCase().includes(search));}
            if (category) {products = products.filter(p => p.category === category);}
            if (sort === 'price-asc') products.sort((a, b) => a.price - b.price);
            else if (sort === 'price-desc') products.sort((a, b) => b.price - a.price);

    }
    
    buyProduct(shenaseh) {
        const product = SHOP_PRODUCTS.find(p => p.shenaseh === shenaseh);
        if (!product) { alert('❌ محصول یافت نشد'); return; }
        const member = this.dm.members.find(m => m.id === this.currentUser.memberId);
        if (!member) { alert('❌ خطا در شناسایی کاربر'); return; }
        const userCoins = this.ddm.getTotalCoins(member.id);
        if (userCoins < product.price) {alert(`❌ سکه کافی ندارید!\n\nسکه‌های شما: ${userCoins}\nقیمت محصول: ${product.price}\n\nسکه مورد نیاز: ${product.price - userCoins}`);return;}
        if (product.stock <= 0) {alert('❌ این محصول ناموجود است');return;}
        if (!confirm(`آیا از خرید "${product.name}" با ${product.price} سکه مطمئن هستید؟\n\nسکه‌های فعلی شما: ${userCoins}\nسکه‌های پس از خرید: ${userCoins - product.price}`)) {return;}
        const orderCode = U.generateOrderCode(member.accountNumber);
        const purchase = {orderCode: orderCode,productId: product.shenaseh,productName: product.name,productDescription: product.description,price: product.price,memberId: member.id,memberName: `${member.firstName} ${member.lastName || ''}`.trim(),accountNumber: member.accountNumber,date: U.now(),delivered: false};
        this.ddm.deductCoins(member.id, product.price, 'خرید از فروشگاه', `${product.name} (${orderCode})`);
        this.ddm.addShopPurchase(purchase);
        this.showPurchaseReceipt(purchase);
    }

font-size:.85rem;line-height:1.6;white-space:pre-wrap;direction:rtl;text-align:right;color:var(--text-primary)">${U.esc(messageText)}</div></div><div class="modal-actions"><button class="btn-small success-btn" id="copyMsgBtn"><i class="fas fa-copy"></i> کپی پیام</button><button class="btn-small info-btn" id="downloadReceiptBtn"><i class="fas fa-download"></i> دانلود رسید</button>${SUPPORT_INFO.itaaAddress ? `<a href="https://eitaa.com/${SUPPORT_INFO.itaaAddress.replace('@', '')}" target="_blank" class="btn-small edit-btn" style="text-decoration:none"><i class="fas fa-paper-plane"></i> ارسال در ایتا</a>` : ''}<button class="btn-small danger-btn" id="closeModalBtn"><i class="fas fa-times"></i> بستن</button></div></div>`;

        });

    render_shopAdmin(c) {
        if (this.currentUser.role !== 'admin') {c.innerHTML = '<div style="text-align:center;padding:40px"><i class="fas fa-lock" style="font-size:3rem;color:#e53e3e"></i><p style="margin-top:15px">دسترسی فقط برای مدیر</p></div>';return;}
        const allPurchases = this.ddm.getAllPurchases();
        let h = `<div class="info-box"><i class="fas fa-clipboard-check"></i> سفارشات فروشگاه</div>`;
        if (allPurchases.length === 0) {h += `<div class="dashboard-section" style="text-align:center;padding:40px"><i class="fas fa-inbox" style="font-size:4rem;color:var(--text-light);margin-bottom:15px"></i><h3 style="color:var(--text-primary);margin-bottom:10px">هنوز سفارشی ثبت نشده است</h3></div>`;c.innerHTML = h;return;}
        const pendingCount = allPurchases.filter(p => !p.delivered).length;
        const deliveredCount = allPurchases.filter(p => p.delivered).length;
        const totalRevenue = allPurchases.reduce((sum, p) => sum + p.price, 0);
        h += `<div class="stats-grid"><div class="stat-card blue"><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="stat-value">${U.fmtNum(allPurchases.length)}</div><div class="stat-label">کل سفارشات</div></div><div class="stat-card yellow"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-value">${U.fmtNum(pendingCount)}</div><div class="stat-label">در انتظار تحویل</div></div><div class="stat-card green"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-value">${U.fmtNum(deliveredCount)}</div><div class="stat-label">تحویل شده</div></div><div class="stat-card purple"><div class="stat-icon"><i class="fas fa-coins"></i></div><div class="stat-value">${U.fmtNum(totalRevenue)}</div><div class="stat-label">درآمد کل (سکه)</div></div></div>`;
        h += `<div class="shop-filter-bar"><input type="text" id="adminSearch" placeholder="جستجو بر اساس نام، شماره حساب، کد سفارش..."><select id="adminStatusFilter"><option value="">همه سفارشات</option><option value="pending">در انتظار تحویل</option><option value="delivered">تحویل شده</option></select><button class="btn-small info-btn" id="downloadAllOrders"><i class="fas fa-download"></i> دانلود همه سفارشات</button></div><div id="adminOrdersList"></div>`;
        c.innerHTML = h;
        const renderOrders = () => {
            const search = $('#adminSearch', c)?.value.trim().toLowerCase() || '';
            const status = $('#adminStatusFilter', c)?.value || '';
            let orders = [...allPurchases].reverse();
            if (search) {orders = orders.filter(o => o.memberName.toLowerCase().includes(search) || o.accountNumber.toLowerCase().includes(search) || o.orderCode.toLowerCase().includes(search) || o.productName.toLowerCase().includes(search));}
            if (status === 'pending') orders = orders.filter(o => !o.delivered);
            else if (status === 'delivered') orders = orders.filter(o => o.delivered);
            const list = $('#adminOrdersList', c);
            if (!list) return;
            if (orders.length === 0) {list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-light)"><i class="fas fa-search" style="font-size:3rem;margin-bottom:15px"></i><p>هیچ سفارشی یافت نشد</p></div>';return;}
            list.innerHTML = `<div class="dashboard-section"><div class="table-wrapper"><table><thead><tr><th>کد سفارش</th><th>نام خریدار</th><th>شماره حساب</th><th>محصول</th><th>سکه</th><th>تاریخ</th><th>وضعیت</th><th>عملیات</th></tr></thead><tbody>${orders.map(o => {const statusBadge = o.delivered ? `<span class="account-status-badge active">تحویل شده</span>` : `<span class="account-status-badge inactive">در انتظار</span>`;return `<tr><td style="font-family:monospace;font-size:.8rem">${U.esc(o.orderCode)}</td><td>${U.esc(o.memberName)}</td><td>${U.esc(o.accountNumber)}</td><td>${U.esc(o.productName)}</td><td style="font-weight:700;color:#d69e2e">${U.fmtNum(o.price)}</td><td style="font-size:.85rem">${U.esc(o.date)}</td><td>${statusBadge}</td><td>${o.delivered ? `<button class="btn-small edit-btn" onclick="window.app.toggleDelivery('${o.orderCode}')"><i class="fas fa-undo"></i> بازگردانی</button>` : `<button class="btn-small success-btn" onclick="window.app.toggleDelivery('${o.orderCode}')"><i class="fas fa-check"></i> تحویل شد</button>`}</td></tr>`;}).join('')}</tbody></table></div></div>`;
        };
        setTimeout(() => {
            $('#adminSearch', c).oninput = renderOrders;
            $('#adminStatusFilter', c).onchange = renderOrders;
            $('#downloadAllOrders', c).onclick = () => {
                const wb = XLSX.utils.book_new();
                const data = allPurchases.map(p => ({'کد سفارش': p.orderCode,'نام خریدار': p.memberName,'شماره حساب': p.accountNumber,'شناسه محصول': p.productId,'نام محصول': p.productName,'توضیحات': p.productDescription,'تعداد سکه': p.price,'تاریخ خرید': p.date,'وضعیت': p.delivered ? 'تحویل شده' : 'در انتظار تحویل'}));
                const ws = XLSX.utils.json_to_sheet(data);
                XLSX.utils.book_append_sheet(wb, ws, 'سفارشات');
                XLSX.writeFile(wb, 'سفارشات_فروشگاه_' + new Date().toISOString().slice(0,10) + '.xlsx');
            };
            renderOrders();
        }, 50);
    }

        h += `<div class="dashboard-section"><h3><i class="fas fa-chart-bar"></i> نمودار وضعیت اعضا</h3><div class="bar-chart"><div class="bar-item"><div class="bar-value">${activeMembers}</div><div class="bar" style="height:${Math.max((activeMembers/totalMembers)*100, 5)}%;background:linear-gradient(180deg,#48bb78,#38a169)"></div><div class="bar-label">فعال</div></div><div class="bar-item"><div class="bar-value">${inactiveMembers}</div><div class="bar" style="height:${Math.max((inactiveMembers/totalMembers)*100, 5)}%;background:linear-gradient(180deg,#e53e3e,#c53030)"></div><div class="bar-label">غیرفعال</div></div><div class="bar-item"><div class="bar-value">${totalOverdue}</div><div class="bar" style="height:${Math.max((totalOverdue/totalMembers)*100, 5)}%;background:linear-gradient(180deg,#ed8936,#dd6b20)"></div><div class="bar-label">معوقه</div></div></div></div>`;

    render_coinHistory(c) {
        const isAdmin = this.currentUser.role === 'admin';
        let h = `<div class="info-box"><i class="fas fa-history"></i> تاریخچه کامل سکه</div><div class="dashboard-section"><h3><i class="fas fa-filter"></i> فیلتر</h3><div class="date-filter"><label style="font-weight:600">از تاریخ:</label><input type="text" id="filterFrom" placeholder="1403/01/01" style="width:120px"><label style="font-weight:600">تا تاریخ:</label><input type="text" id="filterTo" placeholder="1403/12/29" style="width:120px">${isAdmin ? `<label style="font-weight:600">عضو:</label><select id="filterMember" style="padding:10px;border:2px solid var(--input-border);border-radius:12px;min-width:200px;background:var(--input-bg);color:var(--text-primary)"><option value="">همه اعضا</option>${this.dm.members.map(m => `<option value="${m.id}">${U.esc(m.firstName)} ${U.esc(m.lastName)} - ${U.esc(m.accountNumber)}</option>`).join('')}</select>` : ''}<label style="font-weight:600">دلیل:</label><select id="filterReason" style="padding:10px;border:2px solid var(--input-border);border-radius:12px;background:var(--input-bg);color:var(--text-primary)"><option value="">همه</option><option value="پرداخت به موقع قسط">پرداخت به موقع قسط</option><option value="بدون قسط معوقه">بدون قسط معوقه</option><option value="موجودی بالاتر از مقرری">موجودی بالاتر از مقرری</option><option value="پس‌انداز بالا">پس‌انداز بالا</option><option value="تولد مبارک">تولد مبارک</option><option value="هدیه سالانه حساب فعال">هدیه سالانه حساب فعال</option><option value="پیامک واریز فعال">پیامک واریز فعال</option><option value="بدون پیامک اخطار">بدون پیامک اخطار</option><option value="محرومیت - حساب غیرفعال">محرومیت - حساب غیرفعال</option><option value="خرید از فروشگاه">خرید از فروشگاه</option></select><button class="btn-small success-btn" id="applyFilter"><i class="fas fa-filter"></i> اعمال فیلتر</button><button class="btn-small edit-btn" id="clearFilter"><i class="fas fa-times"></i> پاک کردن</button></div></div><div id="coinHistoryContent"></div>`;
        c.innerHTML = h;
        const renderHistory = () => {
            const from = $('#filterFrom', c)?.value.trim() || '';
            const to = $('#filterTo', c)?.value.trim() || '';
            const memberId = $('#filterMember', c)?.value || '';
            const reason = $('#filterReason', c)?.value || '';
            let allHistory = [];
            if (isAdmin) {
                this.dm.members.forEach(m => {
                    if (memberId && String(m.id) !== memberId) return;
                    const history = this.ddm.getHistory(m.id);
                    history.forEach(h => { allHistory.push({ ...h, memberId: m.id, memberName: `${m.firstName} ${m.lastName}`, accountNumber: m.accountNumber }); });
                });
            } else {
                const member = this.dm.members.find(m => m.id === this.currentUser.memberId);
                if (member) {
                    const history = this.ddm.getHistory(member.id);
                    history.forEach(h => { allHistory.push({ ...h, memberId: member.id, memberName: `${member.firstName} ${member.lastName}`, accountNumber: member.accountNumber }); });
                }
            }
            if (from) allHistory = allHistory.filter(h => h.date >= from);
            if (to) allHistory = allHistory.filter(h => h.date <= to + ' 23:59');
            if (reason) allHistory = allHistory.filter(h => h.reason === reason);
            allHistory.sort((a, b) => b.date.localeCompare(a.date));
            const content = $('#coinHistoryContent', c);
            if (!content) return;
            if (allHistory.length === 0) { content.innerHTML = '<div class="dashboard-section"><p style="text-align:center;color:var(--text-light);padding:30px">هیچ رکوردی یافت نشد</p></div>'; return; }
            let tableHtml = `<div class="dashboard-section"><h3><i class="fas fa-list"></i> نتایج (${allHistory.length} رکورد)</h3><div class="table-wrapper"><table><thead><tr>${isAdmin ? '<th>نام عضو</th><th>شماره حساب</th>' : ''}<th>تاریخ</th><th>دلیل</th><th>جزئیات</th><th>مقدار</th></tr></thead><tbody>`;
            allHistory.forEach(h => {
                const isPositive = h.amount > 0;const isZero = h.amount === 0;const isNegative = h.amount < 0;
                const displayAmount = isZero ? 'محروم' : (isNegative ? h.amount : '+' + h.amount);
                const color = isZero ? '#e53e3e' : (isNegative ? '#e53e3e' : '#48bb78');
                tableHtml += `<tr>${isAdmin ? `<td>${U.esc(h.memberName)}</td><td>${U.esc(h.accountNumber)}</td>` : ''}<td>${U.esc(h.date)}</td><td>${U.esc(h.reason)}</td><td>${U.esc(h.detail)}</td><td style="font-weight:700;color:${color}">${displayAmount}</td></tr>`;
            });
            tableHtml += `</tbody></table></div></div>`;
            const totalEarned = allHistory.reduce((sum, h) => sum + h.amount, 0);
            tableHtml += `<div class="dashboard-section" style="background:rgba(72,187,120,.1);border-right-color:#48bb78"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:700;color:var(--text-primary);font-size:1.1rem">مجموع سکه‌های این دوره:</span><span style="font-size:1.5rem;font-weight:700;color:${totalEarned >= 0 ? '#48bb78' : '#e53e3e'}">${totalEarned >= 0 ? '+' : ''}${U.fmtNum(totalEarned)} سکه</span></div></div>`;
            content.innerHTML = tableHtml;
        };
        setTimeout(() => {
            $('#applyFilter', c).onclick = renderHistory;
            $('#clearFilter', c).onclick = () => { $('#filterFrom', c).value = ''; $('#filterTo', c).value = ''; if ($('#filterMember', c)) $('#filterMember', c).value = ''; $('#filterReason', c).value = ''; renderHistory(); };
            renderHistory();
        }, 100);
    }

            if (SUPPORT_INFO.cardNumber) { h += `<div class="support-card"><div class="support-icon card"><i class="fas fa-credit-card"></i></div><div class="support-content"><div class="support-label">شماره کارت</div><div class="support-value">${U.esc(SUPPORT_INFO.cardNumber)}</div><button class="copy-btn" data-copy="${U.esc(SUPPORT_INFO.cardNumber)}"><i class="fas fa-copy"></i> کپی</button></div></div>`; }
            if (SUPPORT_INFO.shebaNumber) { h += `<div class="support-card"><div class="support-icon sheba"><i class="fas fa-file-invoice"></i></div><div class="support-content"><div class="support-label">شماره شبا</div><div class="support-value">${U.esc(SUPPORT_INFO.shebaNumber)}</div><button class="copy-btn" data-copy="${U.esc(SUPPORT_INFO.shebaNumber)}"><i class="fas fa-copy"></i> کپی</button></div></div>`; }
            if (SUPPORT_INFO.itaaAddress) { h += `<div class="support-card"><div class="support-icon itaa"><i class="fas fa-comment-dots"></i></div><div class="support-content"><div class="support-label">آدرس ایتا</div><div class="support-value fa">${U.esc(SUPPORT_INFO.itaaAddress)}</div><button class="copy-btn" data-copy="${U.esc(SUPPORT_INFO.itaaAddress)}"><i class="fas fa-copy"></i> کپی</button></div></div>`; }
            if (SUPPORT_INFO.websiteAddress) { h += `<div class="support-card"><div class="support-icon web"><i class="fas fa-globe"></i></div><div class="support-content"><div class="support-label">آدرس سایت</div><div class="support-value">${U.esc(SUPPORT_INFO.websiteAddress)}</div><button class="copy-btn" data-copy="${U.esc(SUPPORT_INFO.websiteAddress)}"><i class="fas fa-copy"></i> کپی</button><a href="${U.esc(SUPPORT_INFO.websiteAddress)}" target="_blank" class="btn-small info-btn" style="margin-top:5px;text-decoration:none"><i class="fas fa-external-link-alt"></i> باز کردن</a></div></div>`; }
            h += `</div>`;
        }
        h += `<div class="dashboard-section" style="margin-top:25px;border-right-color:#ecc94b"><h3><i class="fas fa-lightbulb" style="color:#ecc94b"></i> نکات مهم</h3><ul style="padding-right:20px;line-height:2;color:var(--text-primary)"><li>برای واریز وجه به صندوق، از شماره حساب، کارت یا شبای بالا استفاده کنید</li><li>پس از واریز، حتماً رسید را نزد خود نگه دارید و واریزی خود را از طریق پیامک به حسابداری صندوق اطلاع داده و سکه دریافت کنید</li><li>در صورت بروز هرگونه مشکل، با شماره تلفن صندوق تماس بگیرید</li></ul></div>`;
        c.innerHTML = h;
        setTimeout(() => {
            c.querySelectorAll('.copy-btn').forEach(btn => {
                btn.onclick = () => {
                    const text = btn.getAttribute('data-copy');
                    const textarea = document.createElement('textarea');textarea.value = text;textarea.style.position = 'fixed';textarea.style.opacity = '0';document.body.appendChild(textarea);textarea.select();
                    try {document.execCommand('copy');const originalHtml = btn.innerHTML;btn.innerHTML = '<i class="fas fa-check"></i> کپی شد';btn.classList.add('copied');setTimeout(() => { btn.innerHTML = originalHtml; btn.classList.remove('copied'); }, 2000);} catch (err) {alert('خطا در کپی');}
                    document.body.removeChild(textarea);
                };
            });
        }, 100);
    }
    
    render_coins(c) {
        const isAdmin = this.currentUser.role === 'admin';
        if (isAdmin) {
            let h = `<div class="info-box"><i class="fas fa-coins"></i> سکه‌های همه اعضا</div><div class="table-wrapper"><table><thead><tr><th>نام</th><th>شماره حساب</th><th>سکه کل</th><th>تعداد تراکنش سکه</th></tr></thead><tbody>`;
            this.dm.members.forEach(m => { const history = this.ddm.getHistory(m.id); h += `<tr><td>${U.esc(m.firstName)} ${U.esc(m.lastName)}</td><td>${U.esc(m.accountNumber)}</td><td><span class="coin-amount-badge">${this.ddm.getTotalCoins(m.id)}</span></td><td>${history.length}</td></tr>`; });
            h += `</tbody></table></div>`;
            c.innerHTML = h;
        } else {
            const member = this.dm.members.find(m => m.id === this.currentUser.memberId);
            if (member) {
                const totalCoins = this.ddm.getTotalCoins(member.id);
                const history = this.ddm.getHistory(member.id);
                c.innerHTML = `<div class="coin-display"><i class="fas fa-coins" style="font-size:1.3rem"></i><div><div class="coin-label">سکه‌های شما</div><div class="coin-amount">${totalCoins}</div></div></div><div class="dashboard-section"><h3><i class="fas fa-history"></i> تاریخچه سکه‌ها</h3>${history.length === 0 ? '<p style="text-align:center;color:var(--text-light);padding:20px">هنوز سکه‌ای دریافت نکرده‌اید</p>' : history.slice().reverse().map(h => { const isPositive = h.amount > 0; const isZero = h.amount === 0; const isNegative = h.amount < 0; const displayAmount = isZero ? 'محروم' : (isNegative ? h.amount : '+' + h.amount); const color = isZero ? '#e53e3e' : (isNegative ? '#e53e3e' : '#48bb78'); const cls = isNegative ? 'negative' : (isPositive ? 'positive' : 'negative'); return `<div class="coin-history-item ${cls}"><div><div style="font-weight:700;color:var(--text-primary)">${U.esc(h.reason)}</div><div style="font-size:.85rem;color:var(--text-muted)">${U.esc(h.detail)}</div><div style="font-size:.75rem;color:var(--text-light);margin-top:3px">${U.esc(h.date)}</div></div><div style="color:${color};font-weight:700;font-size:1.2rem">${displayAmount}</div></div>`; }).join('')}</div>`;
            }
        }
    }
    
    render_coinRules(c) {
        const member = this.currentUser.role === 'admin' ? null : this.dm.members.find(m => m.id === this.currentUser.memberId);
        const isActive = member ? member.active !== false : true;
        c.innerHTML = `<div class="info-box"><i class="fas fa-list-check"></i> قوانین کسب سکه</div><div class="coin-rules-box"><h3 style="margin-bottom:15px;color:var(--text-primary)">قوانین ماهانه:</h3>${this.renderRuleItem('پرداخت به موقع قسط', 2, member ? (U.parseNum(member.loanBalance) !== 0 && U.parseNum(member.paidInstallments) > 0) : null)}${this.renderRuleItem('بدون قسط معوقه', 3, member ? (U.parseNum(member.overdueInstallments) === 0 && U.parseNum(member.loanBalance) !== 0) : null)}${this.renderRuleItem('موجودی بالاتر از مقرری', 2, member ? (U.parseNum(member.balance) > U.parseNum(member.monthlySalary)) : null)}${this.renderRuleItem('پس‌انداز بالا (2 سکه به ازای هر 3,000,000 ریال)', 2, member ? (U.parseNum(member.savingsStatus) - U.parseNum(member.currentMonthBalance) > 3000000) : null)}</div><div class="coin-rules-box"><h3 style="margin-bottom:15px;color:var(--text-primary)">قوانین سالانه:</h3>${this.renderRuleItem('تولد مبارک (5 سکه)', 5, member ? (member.active && member.birthDateShamsi && this.isBirthdayToday(member.birthDateShamsi)) : null)}${this.renderRuleItem('هدیه سالانه حساب فعال (5 سکه)', 5, member ? (isActive && member.openDate && this.isOpeningDayToday(member.openDate)) : null)}${!isActive ? `<div class="coin-rule-item locked"><div style="display:flex;align-items:center;gap:10px"><i class="fas fa-lock" style="color:#a0aec0"></i><span>محرومیت - حساب غیرفعال (0 سکه)</span></div><span style="color:#a0aec0">0</span></div>` : ''}</div><div class="coin-rules-box"><h3 style="margin-bottom:15px;color:var(--text-primary)">قوانین هر واریزی:</h3>${this.renderRuleItem('پیامک واریز فعال', 3, null)}${this.renderRuleItem('بدون پیامک اخطار', 2, null)}</div>`;
    }
    
    renderRuleItem(name, coins, achieved) {
        let cls = 'coin-rule-item';let icon = '';
        if (achieved === true) { cls += ' achieved'; icon = '<i class="fas fa-check-circle" style="color:#48bb78"></i>'; }
        else if (achieved === false) { cls += ' not-achieved'; icon = '<i class="fas fa-times-circle" style="color:#e53e3e"></i>'; }
        else { icon = '<i class="fas fa-info-circle" style="color:#4299e1"></i>'; }
        return `<div class="${cls}"><div style="display:flex;align-items:center;gap:10px">${icon}<span style="color:var(--text-primary)">${name}</span></div><span class="coin-amount-badge">+${coins}</span></div>`;
    }
    
    isBirthdayToday(birthDate) { const jalali = U.getJalaliMonth(); const parts = birthDate.split('/'); if (parts.length !== 3) return false; return parseInt(parts[1]) === jalali.month && parseInt(parts[2]) === jalali.day; }
    isOpeningDayToday(openDate) { const jalali = U.getJalaliMonth(); const parts = openDate.split('/'); if (parts.length !== 3) return false; return parseInt(parts[1]) === jalali.month && parseInt(parts[2]) === jalali.day; }
    
    render_members(c) {
        let h = `<div class="info-box"><i class="fas fa-users"></i> مدیریت اعضا - تعداد: ${this.dm.members.length}</div><div class="table-wrapper"><table><thead><tr><th>نام</th><th>شماره حساب</th><th>تلفن</th><th>موجودی</th><th>سکه</th><th>وضعیت</th></tr></thead><tbody>`;
        this.dm.members.forEach(m => {
            const statusBadge = m.active !== false ? `<span class="account-status-badge active">فعال</span>` : `<span class="account-status-badge inactive">غیرفعال</span>`;
            h += `<tr><td>${U.esc(m.firstName||'')}</td><td>${U.esc(m.accountNumber||'')}</td><td>${U.esc(m.phone1||'')}</td><td>${U.fmtNum(m.balance||0)}</td><td><span class="coin-amount-badge">${this.ddm.getTotalCoins(m.id)}</span></td><td>${statusBadge}</td></tr>`;
        });
        h += `</tbody></table></div>`;
        c.innerHTML = h;
    }
    
    render_backup(c) { c.innerHTML = `<div class="info-box"><i class="fas fa-download"></i> پشتیبان‌گیری سکه‌ها</div><div class="dashboard-section"><h3>دانلود فایل اکسل سکه‌ها</h3><p>فایل اکسل شامل سکه‌ها، تاریخچه و خریدهای فروشگاه را دانلود کنید.</p><button class="btn-small success-btn" onclick="window.app.downloadBackup()"><i class="fas fa-download"></i> دانلود فایل اکسل</button></div><div class="dashboard-section"><h3>آپلود فایل پشتیبان</h3><p>فایل اکسل پشتیبان را آپلود کنید تا سکه‌ها بازیابی شوند.</p><input type="file" id="backupFile" accept=".xlsx,.xls" style="margin-bottom:10px"><button class="btn-small info-btn" onclick="window.app.uploadBackup()"><i class="fas fa-upload"></i> آپلود فایل پشتیبان</button></div>`; }
    
    render_help(c) {
        const isAdmin = this.currentUser.role === 'admin';
        let h = `<div class="info-box"><i class="fas fa-question-circle"></i> راهنمای استفاده از سیستم</div><div class="help-section"><h4><i class="fas fa-info-circle"></i> درباره سیستم</h4><p>سیستم حسابداری صندوق اتحاد یک برنامه تحت وب برای مدیریت حساب‌های اعضا، وام‌ها، اقساط، سکه‌های تشویقی و فروشگاه است.</p></div><div class="help-section"><h4><i class="fas fa-sign-in-alt"></i> ورود به سیستم</h4>${isAdmin ? `<ul><li><strong>مدیر:</strong> نام کاربری: admin | رمز عبور: admin123</li><li><strong>اعضا:</strong> با شماره حساب خود وارد شوند (رمز عبور = شماره حساب)</li></ul>` : `<ul><li><strong>اعضا:</strong> با شماره حساب خود وارد شوید</li><li><strong>رمز عبور:</strong> رمز عبور شما همان شماره حساب شماست (در صورت تغییر، از رمز جدید استفاده کنید)</li><li>در صورت فراموشی رمز، با حسابداری صندوق تماس بگیرید</li></ul>`}</div><div class="help-section"><h4><i class="fas fa-store"></i> فروشگاه</h4><ul><li>محصولات فروشگاه با سکه خریداری می‌شوند</li><li>پس از خرید، یک رسید و پیام آماده برای ارسال به مدیر نمایش داده می‌شود</li><li>پیام را کپی کرده و در ایتا برای مدیر صندوق ارسال کنید</li><li>پس از تحویل محصول توسط مدیر، وضعیت سفارش به "تحویل شده" تغییر می‌کند</li></ul></div><div class="help-section"><h4><i class="fas fa-coins"></i> قوانین سکه</h4><ul><li><strong>پرداخت به موقع قسط:</strong> 2 سکه در ماه</li><li><strong>بدون قسط معوقه:</strong> 3 سکه در ماه</li><li><strong>موجودی بالاتر از مقرری:</strong> 2 سکه در ماه</li><li><strong>پس‌انداز بالا:</strong> 2 سکه به ازای هر 3,000,000 ریال اضافه</li><li><strong>تولد مبارک:</strong> 5 سکه در سال (فقط حساب فعال)</li><li><strong>هدیه سالانه حساب فعال:</strong> 5 سکه در سالروز افتتاح (فقط حساب فعال)</li><li><strong>حساب غیرفعال:</strong> محروم از دریافت سکه سالانه</li><li><strong>پیامک واریز فعال:</strong> 3 سکه به ازای هر واریزی</li><li><strong>بدون پیامک اخطار:</strong> 2 سکه به ازای هر واریزی</li></ul></div><div class="help-section"><h4><i class="fas fa-palette"></i> تم‌های برنامه</h4><ul><li><strong>روز:</strong> تم روشن با رنگ‌های آبی و بنفش</li><li><strong>شب:</strong> تم تاریک با رنگ‌های طلایی، زرد و نارنجی</li><li><strong>خودکار:</strong> بر اساس تنظیمات دستگاه شما تغییر می‌کند (پیش‌فرض)</li></ul></div><div class="help-section"><h4><i class="fas fa-chart-line"></i> بخش‌های اصلی</h4><ul><li><strong>پروفایل:</strong> مشاهده اطلاعات شخصی، سکه‌ها، آخرین ورود</li><li><strong>صورتحساب:</strong> مشاهده تراکنش‌ها، وام، اقساط پرداخت شده</li><li><strong>فروشگاه:</strong> خرید محصولات با سکه</li><li><strong>خریدهای من:</strong> مشاهده تاریخچه خریدها (اعضا)</li><li><strong>سفارشات فروشگاه:</strong> مدیریت تحویل سفارشات (مدیر)</li><li><strong>سکه‌ها:</strong> مشاهده سکه‌های خود و تاریخچه</li><li><strong>قوانین سکه:</strong> مشاهده قوانین و وضعیت فعلی</li><li><strong>تاریخچه سکه:</strong> گزارش کامل با فیلتر تاریخ و دلیل</li><li><strong>وضعیت سامانه پیامکی:</strong> مشاهده وضعیت سامانه‌های پیامکی</li><li><strong>پشتیبانی:</strong> اطلاعات تماس با صندوق</li>${isAdmin ? `<li><strong>تقویم رویدادها:</strong> تولدها، سررسید اقساط، مناسبت‌ها</li><li><strong>گزارش‌های آماری:</strong> آمار کلی صندوق</li><li><strong>مدیریت اعضا:</strong> مشاهده و ویرایش اطلاعات اعضا</li><li><strong>پشتیبان‌گیری:</strong> دانلود/آپلود فایل اکسل سکه‌ها</li>` : ''}</ul></div><div class="help-section"><h4><i class="fas fa-shield-alt"></i> نکات امنیتی</h4><ul><li>رمز عبور خود را در اختیار دیگران قرار ندهید</li><li>پس از اتمام کار، از سیستم خارج شوید</li><li>اطلاعات حساب شما محرمانه است</li><li>از مرورگرهای به‌روز استفاده کنید</li></ul></div><div class="help-section"><h4><i class="fas fa-headset"></i> پشتیبانی</h4><p>در صورت بروز مشکل یا سوال، از بخش <strong>پشتیبانی</strong> اطلاعات تماس با صندوق را مشاهده کنید.</p></div>`;
        c.innerHTML = h;
    }
    
    search(inputId, tableSelector, container) {
        container = container || document;
        const input = $(inputId, container);
        if (!input) return;
        const clearBtn = $(inputId + '_cl', container);
        const filter = function() {
            const q = input.value.trim().toLowerCase();
            const tb = container.querySelector(tableSelector);
            if (!tb || !tb.querySelector('tbody')) return;
            tb.querySelector('tbody').querySelectorAll('tr').forEach(function(r) {
                if (!q || r.textContent.trim().toLowerCase().includes(q)) r.style.display = '';
                else r.style.display = 'none';
            });
        };
        input.oninput = filter;
        if (clearBtn) clearBtn.onclick = function() { input.value = ''; filter(); input.focus(); };
        setTimeout(filter, 50);
    }
    
    startClock() {
        if (this.ci) clearInterval(this.ci);
        const tick = function() {
            const n = new Date();
            const h = String(n.getHours()).padStart(2, '0');
            const m = String(n.getMinutes()).padStart(2, '0');
            const s = String(n.getSeconds()).padStart(2, '0');
            const cl = $('#clockDisplay');
            if (cl) cl.innerHTML = `${h}:${m}<span style="font-size:1rem;opacity:.8">:${s}</span>`;
            const pd = $('#persianDate');
            if (pd) pd.textContent = U.toJalali(n);
            const gd = $('#gregorianDate');
            if (gd) gd.textContent = `${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')}`;
        };
        tick();
        this.ci = setInterval(tick, 1000);
    }
    
    doLogin() {
        const un = $('#loginUsername').value.trim();
        const pw = $('#loginPassword').value.trim();
        const user = this.dm.users.find(u => u.username === un && u.password === pw);
        if (user) { 
            this.currentUser = user;
            if (user.memberId) {
                localStorage.setItem('sandogh_lastLogin_' + user.memberId, U.now());
                const currentCount = parseInt(localStorage.getItem('sandogh_loginCount_' + user.memberId) || '0');
                localStorage.setItem('sandogh_loginCount_' + user.memberId, String(currentCount + 1));
            }
            this.render(); 
        } else { $('#loginError').textContent = 'نام کاربری یا رمز عبور اشتباه است'; }
    }
    
    doLogout() { this.currentUser = null; this.render(); }
    
    saveProfile(mid) {
        const m = this.dm.members.find(mem => mem.id === mid);
        if (!m) return;
        const ui = this.dm.users.find(u => u.memberId === mid);
        const data = {
            firstName: $(`#pf_firstName_${mid}`) ? $(`#pf_firstName_${mid}`).value.trim() : '',
            accountNumber: $(`#pf_accountNumber_${mid}`) ? $(`#pf_accountNumber_${mid}`).value.trim() : '',
            openDate: $(`#pf_openDate_${mid}`) ? $(`#pf_openDate_${mid}`).value.trim() : '',
            birthDate: $(`#pf_birthDate_${mid}`) ? $(`#pf_birthDate_${mid}`).value.trim() : '',
            phone1: $(`#pf_phone1_${mid}`) ? $(`#pf_phone1_${mid}`).value.trim() : '',
            phone2: $(`#pf_phone2_${mid}`) ? $(`#pf_phone2_${mid}`).value.trim() : ''
        };
        if (!data.firstName || !data.accountNumber) { alert('نام و شماره حساب الزامی هستند'); return; }
        if (ui) {ui.username = $(`#pfu_${mid}`) ? $(`#pfu_${mid}`).value.trim() : '';ui.password = $(`#pfp_${mid}`) ? $(`#pfp_${mid}`).value.trim() : '';}
        Object.assign(m, data);
        alert('✅ اطلاعات ذخیره شد');
        this.render();
    }
    
    downloadBackup() { this.ddm.exportToExcel(this.dm.members); alert('✅ فایل پشتیبان دانلود شد'); }
    
    uploadBackup() {
        const file = $('#backupFile').files[0];
        if (!file) { alert('فایلی انتخاب نشده است'); return; }
        this.ddm.importFromExcel(file, (success) => {
            if (success) { alert('✅ فایل پشتیبان آپلود شد'); this.switchTab('coins'); }
            else { alert('❌ خطا در آپلود فایل'); }
        });
    }
}

ThemeManager.init();
window.app = new App();
})();
</script>
