<script>

const JSONBIN_API_KEY = '$2a$10$94Aa.jIBYMCsIyVJkgblD.41bpzRmDO0h0i9EC/R2V5puDYzcdy56';

const U={
  norm(s){if(!s)return'';const m={'ا':'a','آ':'a','ب':'b','پ':'p','ت':'t','ث':'s','ج':'j','چ':'ch','ح':'h','خ':'kh','د':'d','ذ':'z','ر':'r','ز':'z','ژ':'zh','س':'s','ش':'sh','ص':'s','ض':'z','ط':'t','ظ':'z','ع':'a','غ':'gh','ف':'f','ق':'gh','ک':'k','گ':'g','ل':'l','م':'m','ن':'n','و':'v','ه':'h','ی':'y','ئ':'y'};return[...s].map(c=>m[c]||c).join('').toLowerCase();},
  fmtNum(n){return new Intl.NumberFormat('fa-IR').format(n);},
  toJalali(g){const d=new Date(g),gy=d.getFullYear(),gm=d.getMonth()+1,gd=d.getDate(),gdm=[0,31,59,90,120,151,181,212,243,273,304,334];let gy2=gm>2?gy+1:gy,days=355666+365*gy+~~((gy2+3)/4)-~~((gy2+99)/100)+~~((gy2+399)/400)+gd+gdm[gm-1],jy=-1595+33*~~(days/12053);days%=12053;jy+=4*~~(days/1461);days%=1461;if(days>365){jy+=~~((days-1)/365);days=(days-1)%365;}const jm=days<186?1+~~(days/31):7+~~((days-186)/30),jd=1+(days<186?days%31:(days-186)%30);return`${jy}/${String(jm).padStart(2,'0')}/${String(jd).padStart(2,'0')}`;},

  parseNum(v){if(v==null||v==='')return 0;if(typeof v==='number')return v;let s=String(v).replace(/[,\u066C\u200C\s]/g,'');const p='۰۱۲۳۴۵۶۷۸۹',e='0123456789';for(let i=0;i<10;i++)s=s.replaceAll(p[i],e[i]);return isNaN(parseFloat(s))?0:parseFloat(s);},

  getMembershipDuration(openDateStr){
    if(!openDateStr)return'---';const parts=openDateStr.split('/');if(parts.length!==3)return'---';
    const jy=parseInt(parts[0]),jm=parseInt(parts[1]),jd=parseInt(parts[2]);

    if(dm<0){dm+=12;dy--;}if(dy<0)return'---';
    let result='';if(dy>0)result+=`${dy} سال `;if(dm>0)result+=`${dm} ماه `;if(dd>0)result+=`${dd} روز`;
    return result.trim()||'کمتر از یک روز';
  }
};

function findInRaw(raw, keys){
  if(!raw) return undefined;
  for(const k of Object.keys(raw)){
    const nk = k.toLowerCase().replace(/[_\s\-]/g, '');
    for(const q of keys){
      if(nk === q.toLowerCase().replace(/[_\s\-]/g, '')) return raw[k];
    }
  }
  return undefined;
}

      showSync('⚠️ خطا در همگام‌سازی');
    }

  async syncToJSONBin(){
    if(this.syncing) return;
    this.syncing=true;
    try{
      const coins={},coinHistory={},usernameEditUnlocked={},coinBenefits={};
      this.members.forEach(m=>{
        coins[m.id]=m.coins||0;
        coinHistory[m.id]=m.coinHistory||[];
        usernameEditUnlocked[m.id]=m.usernameEditUnlocked||false;
        coinBenefits[m.id]=m.coinBenefits||{};
      });
      const data={
        coins:coins,
        coinHistory:coinHistory,
        coinRequests:this.coinRequests,
        messages:this.messages,
        announcements:this.announcements,
        polls:this.polls,
        support:this.support,
        logo:this.logo,
        coinRewards:this.coinRewards,
        usernameEditUnlocked:usernameEditUnlocked,
        coinBenefits:coinBenefits
      };
      await fetch(JSONBIN_URL,{
        method:'PUT',
        headers:{
          'Content-Type':'application/json',
          'X-Master-Key':JSONBIN_API_KEY
        },
        body:JSON.stringify(data)
      });
      console.log('✅ داده‌ها در JSONBin ذخیره شدند');
      showSync('✅ ذخیره شد');
    }catch(e){
      console.error('❌ خطا در ذخیره:',e);
      showSync('⚠️ خطا در ذخیره');
    }finally{
      this.syncing=false;
    }
  }

  spendCoin(mid,amount,reason,desc=''){
    const m=this.gMember(mid);
    if(!m) return {s:false,m:'عضو یافت نشد'};
    if((m.coins||0) < amount) return {s:false,m:'سکه کافی نیست'};
    m.coins = (m.coins||0) - amount;
    if(!m.coinHistory) m.coinHistory=[];
    m.coinHistory.push({date:U.now(),amount:-amount,reason,description:desc,balance:m.coins});
    this.syncToJSONBin();
    return {s:true};
  }
  
  applyCoinRules(m){
    if(!m)return;const t=new Date(),ts=t.toDateString(),mk=`${t.getFullYear()}-${t.getMonth()}`;let ch=false;
    const add=(a,r,d)=>{this.addCoin(m.id,a,r,d);ch=true;};
    if(m.coinDailyLogin!==ts){add(2,'ورود روزانه','ورود به برنامه');m.coinDailyLogin=ts;}
    if(m.birthDate&&!m.birthdaySetCoinsClaimed){add(2,'ثبت تاریخ تولد','ثبت تاریخ تولد');m.birthdaySetCoinsClaimed=true;}
    if(m.birthDate){const p=m.birthDate.split('/');if(p.length===3){const bm=parseInt(p[1]),bd=parseInt(p[2]);if(t.getMonth()+1===bm&&t.getDate()===bd&&m.lastBirthdayCoinYear!==t.getFullYear()){add(5,'تولد','تولد مبارک!');m.lastBirthdayCoinYear=t.getFullYear();}}}
    if(m.coinDashboardVisit!==ts){add(2,'بازدید صورتحساب','مشاهده صورتحساب');m.coinDashboardVisit=ts;}
    if(m.coinMessageToAdmin!==ts){add(1,'ارسال پیام به مدیر','ارسال پیام به مدیر');m.coinMessageToAdmin=ts;}
    if(m.coinPollParticipation!==ts){add(3,'شرکت در نظرسنجی','پاسخ به نظرسنجی');m.coinPollParticipation=ts;}
    if(m.coinMonthly!==mk){let e=false;if((m.loanBalance||0)<=0&&(m.overdueInstallments||0)<=0){add(1,'بدون بدهی','بدون بدهی و اقساط معوقه');e=true;}if((m.balance||0)>=0&&(m.savingsStatus||0)>=0){add(1,'بدون کسری','بدون کسری موجودی');e=true;}if(e)m.coinMonthly=mk;}
    if(m.openDate){const p=m.openDate.split('/');if(p.length===3){const om=parseInt(p[1]),od=parseInt(p[2]);if(t.getMonth()+1===om&&t.getDate()===od&&m.lastOpeningCoinYear!==t.getFullYear()){add(5,'سالروز افتتاح حساب',`سالروز ${t.getFullYear()}`);m.lastOpeningCoinYear=t.getFullYear();}}}
    return ch;
  }

class Auth{
  constructor(dm){this.dm=dm;this.user=null;this.pending=null;}
  login(un,pw){const u=this.dm.users.find(x=>U.norm(x.username)===U.norm(un));if(!u)return{s:false,m:'نام کاربری یا رمز عبور اشتباه است'};if(u.password!==pw)return{s:false,m:'نام کاربری یا رمز عبور اشتباه است'};if(pw==='1234'&&u.role!=='admin'){this.pending=u;return{s:true,fc:true};}this.user=u;if(u.memberId){this.dm.incLogin(u.memberId);const m=this.dm.gMember(u.memberId);if(m)this.dm.applyCoinRules(m);}return{s:true,fc:false};}
  changeForced(np){const u=this.pending;if(!u)return{s:false,m:'خطا'};u.password=np;this.user=u;this.pending=null;return{s:true};}
  logout(){this.user=null;this.pending=null;}
  isAdmin(){return this.user?.role==='admin';}
  isSpecial(){return this.user?.role==='special';}
  isSupervisor(){if(this.isAdmin())return true;if(this.user?.memberId){const m=this.dm.gMember(this.user.memberId);return m&&(m.sessionActive||(m.smsStatus&&m.smsStatus.council));}return false;}
  isLoggedIn(){return!!this.user;}
}

>حساب:</b> ${U.esc(m.accountNumber)}</div><div><b>تاریخ افتتاح:</b> ${U.fmtDate(m.openDate)}</div><div><b>تلفن:</b> ${U.esc(m.phone1)}</div><div><b>سکه:</b> ${m.coins||0}</div><div><b>ورود:</b> ${m.loginCount||0}</div></div></div>`;}}
  render_dashboard(c){if(this.app.auth.isAdmin()){c.innerHTML='<p>دسترسی غیرمجاز</p>';return;}const m=this.app.dm.gMember(this.app.auth.user.memberId);if(!m){c.innerHTML='<p>خطا</p>';return;}this.app.dm.applyCoinRules(m);const txns=[...(m.transactions||[])].sort((a,b)=>(parseInt(b.transactionId)||0)-(parseInt(a.transactionId)||0));const ah=txns.length&&txns[0].allHeaders?txns[0].allHeaders:['شماره حساب','تاریخ تراکنش','مبلغ تراکنش','مقرری ماهانه'];const lt=txns[0];let bal=m.balance,ss=m.savingsStatus,ms=m.monthlySalary;if(lt?.rawData){const b=U.parseNum(findInRaw(lt.rawData,['موجودی','balance']));if(!isNaN(b))bal=b;const s=findInRaw(lt.rawData,['وضعیت پس انداز']);if(s!==undefined)ss=U.parseNum(s);const mg=U.parseNum(findInRaw(lt.rawData,['mogmo','مقرری ماهانه']));if(!isNaN(mg))ms=mg;}let h=`<div class="dashboard-section"><h3><i class="fas fa-info-circle"></i> اطلاعات</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px"><div><b>حساب:</b> ${U.esc(m.accountNumber)}</div><div><b>عضویت:</b> ${U.getMembershipDuration(m.openDate)}</div><div><b>تراکنش:</b> ${txns.length}</div><div><b>وضعیت:</b> ${m.statusActive?'✅ فعال':'❌ غیرفعال'}</div></div></div><div class="dashboard-section"><h3>موجودی</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div style="padding:12px;background:rgba(102,126,234,.1);border-radius:10px"><b>موجودی:</b> ${U.fmtNum(bal)}</div><div style="padding:12px;background:rgba(72,187,120,.1);border-radius:10px"><b>پس‌انداز:</b> ${U.fmtNum(ss)}</div></div></div>`;h+='<div class="dashboard-section"><h3>صورت‌حساب</h3><div class="filter-bar"><input id="mes" placeholder="جستجو..."><button class="btn-small info-btn" id="downloadExcel"><i class="fas fa-download"></i> دانلود</button><button class="btn-small edit-btn" id="printPDF"><i class="fas fa-print"></i> چاپ</button></div><div class="table-wrapper"><table id="met"><thead class="excel-header"><tr>'+ah.map(x=>'<th>'+U.esc(x)+'</th>').join('')+'</tr></thead><tbody>'+txns.map(t=>'<tr>'+ah.map(hd=>{let v=t.rawData?.[hd]??'';return'<td>'+U.esc(String(v))+'</td>';}).join('')+'</tr>').join('')+'</tbody></table></div></div>';c.innerHTML=h;$('#mes',c).oninput=function(){const q=this.value.toLowerCase();$('#met',c).querySelectorAll('tbody tr').forEach(r=>{r.style.display=!q||r.textContent.toLowerCase().includes(q)?'':'none';});};$('#downloadExcel',c).onclick=()=>{const ws=XLSX.utils.json_to_sheet(txns.map(t=>{const row={};ah.forEach(h=>{row[h]=t.rawData?.[h]??'';});return row;}));const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'صورت');XLSX.writeFile(wb,'صورت.xlsx');};$('#printPDF',c).onclick=()=>window.print();}

  render_messenger(c){const self=this,ia=this.app.auth.isAdmin(),has=ia||this.app.auth.isSpecial()||this.app.auth.isSupervisor();let h='<div class="info-box"><i class="fas fa-envelope"></i> پیامرسان</div>';if(ia){const pr=this.app.dm.coinRequests.filter(r=>r.status==='pending');h+=`<div class="messenger-section-title title-coin-requests">درخواست‌ها (${pr.length})</div>`;pr.forEach(req=>{const mem=this.app.dm.gMember(req.memberId);h+=`<div class="msg-item msg-coin-request"><b>${U.esc(req.rewardTitle)}</b> - ${U.esc(mem?.firstName||'')} (${req.cost} سکه)<div style="margin-top:8px"><button class="btn-small success-btn approve-req-btn" data-reqid="${req.id}">تأیید</button> <button class="btn-small danger-btn reject-req-btn" data-reqid="${req.id}">رد</button></div></div>`;});}if(!ia)h+='<div style="margin-bottom:10px"><textarea id="mtai" placeholder="پیام به مدیر..." style="width:100%;padding:8px;border:2px solid #e2e8f0;border-radius:10px;min-height:50px"></textarea><button class="btn-small success-btn" id="sta" style="margin-top:5px">ارسال</button></div>';const msgs=this.app.dm.messages.filter(m=>m.type==='member_to_admin');msgs.sort((a,b)=>(a.timestamp||'').localeCompare(b.timestamp||''));msgs.forEach(m=>{h+=`<div class="msg-item msg-to-admin"><div class="msg-header"><span>${U.esc(m.senderName)}</span><span>${U.esc(m.timestamp)}</span></div>${U.esc(m.message)}${has?` <button class="btn-small danger-btn" style="font-size:.7rem" onclick="window.app.delMsg('${m.id}')">حذف</button>`:''}</div>`;});c.innerHTML=h;$('#sta',c)&&($('#sta',c).onclick=()=>this.app.sendToAdmin());setTimeout(()=>{c.querySelectorAll('.approve-req-btn').forEach(b=>{b.onclick=()=>this.app.approveCoinRequest(b.dataset.reqid);});c.querySelectorAll('.reject-req-btn').forEach(b=>{b.onclick=()=>this.app.rejectCoinRequest(b.dataset.reqid);});},20);}

  render_sms(c){const m=this.app.dm.gMember(this.app.auth.user?.memberId);if(!m){c.innerHTML='<p>خطا</p>';return;}const s=m.smsStatus||{};const items=[{k:'general',l:'کلی'},{k:'council',l:'شورا'},{k:'birthday',l:'تولد'},{k:'newsletter',l:'خبرنامه'}];c.innerHTML='<div class="info-box"><i class="fas fa-sms"></i> پیامکی</div><div class="sms-status-grid">'+items.map(i=>'<div class="sms-status-item"><span>'+i.l+'</span><span class="'+(s[i.k]?'status-active':'status-inactive')+'">'+(s[i.k]?'فعال':'غیرفعال')+'</span></div>').join('')+'</div>';}

class App{
  constructor(){this.dm=new DM();this.auth=new Auth(this.dm);this.ui=new UI(this);this.init();}
  async init(){this.loadTheme();await this.dm.loadFromGitHub();await this.dm.syncAllFrom();this.dm.loaded=true;this.ui.render();setInterval(()=>{if(this.auth.isLoggedIn())this.dm.syncAllFrom().then(()=>this.ui.render());},30000);}
  loadTheme(){this.setTheme(localStorage.getItem('theme')||'day');}
  setTheme(t){document.body.classList.remove('theme-night');if(t==='night')document.body.classList.add('theme-night');localStorage.setItem('theme',t);$$('.theme-btn').forEach(b=>{b.classList.toggle('active',b.dataset.theme===t);});}
  doLogin(){const un=$('#loginUsername').value.trim(),pw=$('#loginPassword').value.trim(),ed=$('#loginError');ed.textContent='';if(!un||!pw){ed.textContent='نام کاربری و رمز را وارد کنید';return;}const r=this.auth.login(un,pw);if(!r.s){ed.textContent=r.m;return;}this.ui.render();}
  doForgot(){const un=$('#loginUsername').value.trim();if(!un)return;const u=this.dm.users.find(x=>U.norm(x.username)===U.norm(un));if(u){u.password='1234';$('#forgotSuccess').textContent='رمز به 1234 تغییر یافت';}}
  doForceChange(){const np=$('#newPasswordForce').value.trim(),cp=$('#confirmPasswordForce').value.trim();if(np!==cp)return;this.auth.changeForced(np);this.ui.render();}
  doLogout(){this.auth.logout();localStorage.removeItem('activeTab');this.ui.render();}
  addCoin(){const mid=parseInt($('#cms').value),amt=parseInt($('#cai').value);if(!amt)return;this.dm.addCoin(mid,amt,'مدیر');alert('اضافه شد');this.ui.switchTab('coins');}
  buyReward(rid){const r=this.dm.coinRewards.find(x=>x.id===rid),m=this.dm.gMember(this.auth.user.memberId);if(!r||!m)return;if((m.coins||0)<r.cost){alert('سکه کافی نیست');return;}const s=this.dm.spendCoin(m.id,r.cost,'خرید: '+r.title);if(!s.s)return;m.usedCoins=(m.usedCoins||0)+r.cost;this.dm.addCoinRequest({memberId:m.id,rewardTitle:r.title,rewardType:r.type,cost:r.cost,details:{}});alert('درخواست ثبت شد');this.ui.switchTab('coins');}
  approveCoinRequest(id){this.dm.updateRequestStatus(id,'approved');alert('تأیید شد');this.ui.render_messenger($('#dynamicContent'));}
  rejectCoinRequest(id){const r=this.dm.coinRequests.find(x=>x.id===id);if(r){const m=this.dm.gMember(r.memberId);if(m)this.dm.addCoin(m.id,r.cost,'بازگشت');}this.dm.updateRequestStatus(id,'rejected');alert('رد شد');this.ui.render_messenger($('#dynamicContent'));}
  sendAdminMsgFromPublic(txt){this.dm.addMsg({id:'m_'+Date.now(),senderId:this.auth.user.id,senderName:this.auth.isAdmin()?'مدیر':'شورا',senderRole:this.auth.isAdmin()?'admin':'special',message:txt,timestamp:U.now(),type:'admin_to_members',parentId:null});this.ui.renderPublicMessages();}
  sendToAdmin(){const i=$('#mtai');if(!i?.value.trim())return;const m=this.dm.gMember(this.auth.user.memberId);this.dm.addMsg({id:'m_'+Date.now(),senderId:this.auth.user.id,senderName:m?m.firstName:'',senderRole:'member',message:i.value.trim(),timestamp:U.now(),type:'member_to_admin',parentId:null});i.value='';this.ui.switchTab('messenger');}
  delMsg(id){if(confirm('حذف؟')){this.dm.delMsg(id);this.ui.render();}}
  sendAnn(){const t=$('#ant')?.value,c=$('#anc')?.value;if(!t||!c)return;this.dm.addAnn({id:'a_'+Date.now(),title:t,content:c,timestamp:U.now(),sender:'مدیر'});this.ui.switchTab('cultural');}
  saveProf(mid){const m=this.dm.gMember(mid);if(!m)return;m.firstName=$('#pf_firstName_'+mid)?.value||m.firstName;m.lastName=$('#pf_lastName_'+mid)?.value||m.lastName;m.fullName=m.firstName+' '+m.lastName;const ui=this.dm.gUserByMid(mid);if(ui){ui.username=$('#pfu_'+mid)?.value||ui.username;ui.password=$('#pfp_'+mid)?.value||ui.password;}alert('ذخیره شد');}
  saveSupport(){this.dm.support={phone:$('#spp')?.value||'',accountNumber:'',address:$('#spad')?.value||''};this.dm.syncSup();alert('ذخیره شد');}
}

try{const app=new App();window.app=app;}catch(e){console.error(e);}
