function showSyncStatus(text, type='syncing') {
    const el = $('#syncStatus');
    const txt = $('#syncText');
    if (!el || !txt) return;
    el.classList.remove('hidden', 'syncing', 'success', 'error');
    el.classList.add(type);
    txt.textContent = text;
    const icon = el.querySelector('i');
    if (type === 'syncing') icon.className = 'fas fa-sync fa-spin';
    else if (type === 'success') {
        icon.className = 'fas fa-check';
        setTimeout(() => el.classList.add('hidden'), 3000);
    } else if (type === 'error') {
        icon.className = 'fas fa-exclamation-triangle';
        setTimeout(() => el.classList.add('hidden'), 5000);
    }
}

async function syncDataToGitHub(data) {

                'Authorization': `token ${GITHUB_TOKEN}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                title: `[DATA] ${new Date().toISOString()}`,
                body: JSON.stringify(data),
                labels: ['sync-data']
            })
        });
        if (response.ok) {
            showSyncStatus('✅ ذخیره شد', 'success');
            return true;
        } else {
            console.warn('خطا در ذخیره GitHub:', response.status);

        }
    } catch (error) {
        console.warn('خطا در اتصال GitHub:', error);
        showSyncStatus('⚠️ بدون اینترنت', 'error');
        return false;
    }
}

async function loadDataFromGitHub() {
    try {
        showSyncStatus('در حال بارگذاری از GitHub...', 'syncing');
        const response = await fetch(
            `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/issues?labels=sync-data&state=all&per_page=1&sort=created&direction=desc`,
            { headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json' } }
        );
        if (response.ok) {
            const issues = await response.json();
            if (issues.length > 0) {
                const data = JSON.parse(issues[0].body);
                showSyncStatus('✅ بارگذاری شد', 'success');
                return data;
            }
        } else {
            console.warn('خطا در بارگذاری GitHub:', response.status);
        }
        return null;
    } catch (error) {
        console.warn('خطا در اتصال GitHub:', error);
        return null;
    }
}

let lastSyncTime = 0;
let isSyncing = false;
async function autoSync() {
    try {
        if (isSyncing) return;
        const now = Date.now();
        if (now - lastSyncTime < 30000) return;
        if (!window.app) return;
        isSyncing = true;
        if (window.app.auth.isAdmin()) {
            const data = {
                members: window.app.dm.members,
                users: window.app.dm.users,
                messages: window.app.dm.messages,
                announcements: window.app.dm.announcements,
                polls: window.app.dm.polls,
                support: window.app.dm.support,
                logo: window.app.dm.logo,
                shopItems: window.app.dm.shopItems,
                timestamp: now
            };
            await syncDataToGitHub(data);
        } else if (window.app.auth.isLoggedIn()) {
            const data = await loadDataFromGitHub();
            if (data && data.members) {
                window.app.dm.members = data.members;
                window.app.dm.users = data.users;
                window.app.dm.messages = data.messages || [];
                window.app.dm.announcements = data.announcements || [];
                window.app.dm.polls = data.polls || [];
                window.app.dm.support = data.support || {phone:'',accountNumber:'',address:''};
                window.app.dm.logo = data.logo || '';
                window.app.dm.shopItems = data.shopItems || [];
                ['members','users','messages','announcements','polls','support','logo','shopItems'].forEach(k => window.app.dm.sv(k));
                if (window.app.ui) window.app.ui.render();
            }
        }
        lastSyncTime = now;
        isSyncing = false;
    } catch (error) {
        console.error('خطا در همگام‌سازی:', error);
        isSyncing = false;
    }
}

gUserByMid(mid){return this.users.find(u=>u.memberId===mid)}

    const m=this.gMember(mid);
    if(!m)return {success:false,msg:'عضو یافت نشد'};

applyCoinRules(m){if(!m)return;const t=new Date(),ts=t.toDateString(),mk=`${t.getFullYear()}-${t.getMonth()}`;let ch=false;const add=(a,r,d)=>{this.addCoin(m.id,a,r,d);ch=true;};if(m.coinDailyLogin!==ts){add(2,'ورود روزانه','ورود به برنامه');m.coinDailyLogin=ts;}if(m.birthDate&&!m.birthdaySetCoinsClaimed){add(2,'ثبت تاریخ تولد','ثبت تاریخ تولد');m.birthdaySetCoinsClaimed=true;}if(m.birthDate){const p=m.birthDate.split('/');if(p.length===3){const bm=parseInt(p[1]),bd=parseInt(p[2]);if(t.getMonth()+1===bm&&t.getDate()===bd&&m.lastBirthdayCoinYear!==t.getFullYear()){add(5,'تولد','تولد مبارک!');m.lastBirthdayCoinYear=t.getFullYear();}}}if(m.coinDashboardVisit!==ts){add(2,'بازدید صورتحساب','مشاهده صورتحساب');m.coinDashboardVisit=ts;}if(m.coinMessageToAdmin!==ts){add(1,'ارسال پیام به مدیر','ارسال پیام به مدیر');m.coinMessageToAdmin=ts;}if(m.coinPollParticipation!==ts){add(3,'شرکت در نظرسنجی','پاسخ به نظرسنجی');m.coinPollParticipation=ts;}if(m.coinMonthly!==mk){let e=false;if((m.loanBalance||0)<=0&&(m.overdueInstallments||0)<=0){add(1,'بدون بدهی','بدون بدهی و اقساط معوقه');e=true;}if((m.balance||0)>=0&&(m.savingsStatus||0)>=0){add(1,'بدون کسری','بدون کسری موجودی');e=true;}if(e)m.coinMonthly=mk;}if(m.openDate){const p=m.openDate.split('/');if(p.length===3){const om=parseInt(p[1]),od=parseInt(p[2]);if(t.getMonth()+1===om&&t.getDate()===od&&m.lastOpeningCoinYear!==t.getFullYear()){add(5,'سالروز افتتاح حساب',`سالروز ${t.getFullYear()}`);m.lastOpeningCoinYear=t.getFullYear();}}}if(ch)this.sv('members');return ch;}

uploadBulk(file,cb){
    if(typeof XLSX==='undefined'){cb('کتابخانه XLSX بارگذاری نشد',0,0,0,0);return;}
    const ext=file.name.split('.').pop().toLowerCase();
    if(!['xlsx','xls','csv'].includes(ext)){cb('فرمت پشتیبانی نمی‌شود',0,0,0,0);return;}
    const reader=new FileReader(),self=this;
    const process=(data,isCsv)=>{
        try{
            let wb;
            if(isCsv)wb=XLSX.read(data,{type:'string',raw:true});
            else wb=XLSX.read(new Uint8Array(data),{type:'array',raw:true});
            const sh=wb.Sheets[wb.SheetNames[0]];
            if(!sh){cb('شیت خالی است',0,0,0,0);return;}
            const rows=XLSX.utils.sheet_to_json(sh,{defval:'',raw:false});
            if(!rows.length){cb('فایل خالی است',0,0,0,0);return;}
            const headers=Object.keys(rows[0]);
            const colMap={
                firstName:U.findCol(['نام','firstname','first_name'],headers),
                lastName:U.findCol(['نام خانوادگی','lastname','last_name','فامیلی'],headers),
                accountNumber:U.findCol(['شماره حساب','accountnumber','account_number','کدعضو','شماره','کد'],headers),
                openDate:U.findCol(['تاریخ افتتاح','opendate','open_date'],headers),
                birthDate:U.findCol(['تاریخ تولد','birthdate','birth_date'],headers),
                phone1:U.findCol(['تلفن','تلفن1','phone1','phone','موبایل','mobile'],headers),
                phone2:U.findCol(['تلفن2','phone2','تلفن 2'],headers),
                balance:U.findCol(['موجودی','balance','مانده'],headers),
                savings:U.findCol(['پس انداز','savings','پس‌انداز'],headers),
                loan:U.findCol(['وام','loan','تسهیلات'],headers)
            };
            if(!colMap.accountNumber){cb('ستون "شماره حساب" در فایل یافت نشد.',0,0,0,0);return;}
            let updated=0,added=0;
            rows.forEach(row=>{
                const accNum=String(row[colMap.accountNumber]||'').trim();
                if(!accNum)return;
                let member=self.members.find(m=>String(m.accountNumber||'').trim()===accNum);
                let isNew=false;
                if(!member){
                    const newId=self.members.length>0?Math.max(...self.members.map(m=>m.id))+1:1;
                    member={id:newId,firstName:'',lastName:'',accountNumber:accNum,openDate:'',birthDate:'',phone1:'',phone2:'',balance:0,coins:0,usedCoins:0,coinHistory:[],loginCount:0,smsStatus:{},transactions:[]};
                    self.members.push(member);
                    isNew=true;
                }
                if(colMap.firstName)member.firstName=String(row[colMap.firstName]||member.firstName||'').trim();
                if(colMap.lastName)member.lastName=String(row[colMap.lastName]||member.lastName||'').trim();
                if(colMap.openDate)member.openDate=String(row[colMap.openDate]||member.openDate||'').trim();
                if(colMap.birthDate)member.birthDate=String(row[colMap.birthDate]||member.birthDate||'').trim();
                if(colMap.phone1)member.phone1=String(row[colMap.phone1]||member.phone1||'').trim();
                if(colMap.phone2)member.phone2=String(row[colMap.phone2]||member.phone2||'').trim();
                if(colMap.balance)member.balance=U.parseNum(row[colMap.balance]);
                if(colMap.savings)member.savingsStatus=U.parseNum(row[colMap.savings]);
                if(colMap.loan)member.loanBalance=U.parseNum(row[colMap.loan]);
                member.fullName=(member.firstName||'')+' '+(member.lastName||'');
                let user=self.gUserByMid(member.id);
                if(!user){
                    user={id:self.users.length>0?Math.max(...self.users.map(u=>u.id))+1:1,username:accNum,password:accNum,role:'member',memberId:member.id};
                    self.users.push(user);
                } else {
                    user.username = accNum;
                    user.password = accNum;
                }
                if(isNew)added++;else updated++;
            });
            self.sv('members');
            self.sv('users');
            cb(null,rows.length,updated,added,0);
            syncDataToGitHub({members:self.members,users:self.users,messages:self.messages,announcements:self.announcements,polls:self.polls,support:self.support,logo:self.logo,shopItems:self.shopItems,timestamp:Date.now()});
        }catch(e){console.error(e);cb('خطا در پردازش: '+e.message,0,0,0,0);}
    };
    reader.onload=function(e){
        if(ext==='csv'){const arr=new Uint8Array(e.target.result);let txt=new TextDecoder('utf-8').decode(arr);process(txt,true);}
        else process(e.target.result,false);
    };
    reader.onerror=()=>cb('خطا در خواندن فایل',0,0,0,0);
    reader.readAsArrayBuffer(file);
}

class Auth{constructor(dm){this.dm=dm;this.user=null;this.pending=null;}
login(un,pw){
    const u=this.dm.users.find(x=>U.norm(x.username)===U.norm(un));
    if(!u)return{s:false,m:'نام کاربری یا رمز عبور اشتباه است'};
    if(u.password!==pw)return{s:false,m:'نام کاربری یا رمز عبور اشتباه است'};
    if(U.norm(u.password)===U.norm(u.username) && u.role!=='admin'){
        this.pending=u;
        return{s:true,fc:true};
    }
    this.user=u;
    if((u.role==='member'||u.role==='special')&&u.memberId){
        this.dm.incLogin(u.memberId);
        const m=this.dm.gMember(u.memberId);
        if(m)this.dm.applyCoinRules(m);
    }
    return{s:true,fc:false};
}
changeForced(np){
    const u=this.pending;
    if(!u)return{s:false,m:'خطا در احراز هویت'};
    if(U.norm(np)===U.norm(u.username))return{s:false,m:'رمز عبور نمی‌تواند با نام کاربری یکسان باشد'};
    if(U.strength(np)==='ضعیف')return{s:false,m:'رمز عبور بسیار ضعیف است'};
    u.password=np;
    this.dm.sv('users');
    this.user=u;
    this.pending=null;
    return{s:true};
}
logout(){this.user=null;this.pending=null;}
isAdmin(){return this.user?.role==='admin';}
isSpecial(){return this.user?.role==='special';}
isSupervisor(){
    if(this.isAdmin()) return true;
    if(this.user?.role==='member' && this.user.memberId){
        const m = this.dm.gMember(this.user.memberId);
        return m && (m.sessionActive || (m.smsStatus && m.smsStatus.council));
    }
    return false;
}
isLoggedIn(){return!!this.user;}
}

renderDashboardForMember(mid, c){
    const m=this.app.dm.gMember(mid);
    if(!m){c.innerHTML='<div style="text-align:center;padding:40px"><i class="fas fa-exclamation-circle" style="font-size:3rem;color:#e53e3e"></i><p style="margin-top:15px">اطلاعات یافت نشد</p></div>';return;}
    this.app.dm.applyCoinRules(m);
    const txns=[...(m.transactions||[])].sort((a,b)=>(parseInt(b.transactionId)||0)-(parseInt(a.transactionId)||0));
    const allH=txns.length&&txns[0].allHeaders?.length?txns[0].allHeaders:['id','شماره حساب','مقرری ماهانه','شماره فیش','تاریخ تراکنش','مبلغ تراکنش','نام تراکنش کننده','مبلغ قسط واریزی','تاریخ قسط واریزی','جمع واریزی','موجودی','جمع','تعداد قسط پرداخت شده','تعداد قسط مانده','وضعیت پس انداز'];
    const memberHeaders=['id','شماره حساب','تاریخ تراکنش','مبلغ تراکنش','مقرری ماهانه','شماره فیش','نام تراکنش کننده','مبلغ قسط واریزی','تاریخ قسط واریزی','جمع واریزی','موجودی','جمع','تعداد قسط پرداخت شده','تعداد قسط مانده','وضعیت پس انداز','توضیحات'];
    const isAdmin=this.app.auth.isAdmin();
    const ah=isAdmin?allH:allH.filter(h=>memberHeaders.includes(h));
    const dur=U.getMembershipDuration(m.openDate);
    const latestTx=txns.length?txns[0]:null;
    let balance=m.balance, savingsStatus=m.savingsStatus, monthlySalary=m.monthlySalary, monthlySalaryApproved=m.monthlySalaryApproved, currentMonthBalance=m.currentMonthBalance;
    if(latestTx&&latestTx.rawData){
      const raw=latestTx.rawData;
      const b=U.parseNum(findInRaw(raw,['موجودی','balance']));if(!isNaN(b))balance=b;
      const ss=findInRaw(raw,['وضعیت پس انداز','وضعیت پس‌انداز','savings status']);if(ss!==undefined)savingsStatus=U.parseNum(ss);
      const ms=U.parseNum(findInRaw(raw,['mogmo','مقرری ماهانه','مقرری','monthly salary']));if(!isNaN(ms))monthlySalary=ms;
      const msa=U.parseNum(findInRaw(raw,['mogmoMosavab','مقرری ماهانه مصوب شده هرنفر','monthly salary approved']));if(!isNaN(msa))monthlySalaryApproved=msa;
      const tb=U.parseNum(findInRaw(raw,['mojodiTil','mojodi ta in lahzeh','موجودی تا این لحظه','current balance']));if(!isNaN(tb))currentMonthBalance=tb;
    }
    let loanRequestDate=m.loanRequestDate, loanReceiveDate=m.loanReceiveDate, lastInstallmentDate=m.lastInstallmentDate;
    let installmentAmount=m.installmentAmount, feeAmount=m.feeAmount, totalInstallments=m.totalInstallments;
    let paidInstallments=m.paidInstallments, remainingInstallments=m.remainingInstallments;
    let remainingInstallmentAmount=0;
    let overdueInstallments=m.overdueInstallments, loanBalance=m.loanBalance;
    if(latestTx && latestTx.rawData){
      const raw=latestTx.rawData;
      loanRequestDate = findInRaw(raw,['date sabt','date_sabt','تاریخ درخواست وام']) || loanRequestDate;
      loanReceiveDate = findInRaw(raw,['date vam','date_vam','تاریخ دریافت وام']) || loanReceiveDate;
      lastInstallmentDate = findInRaw(raw,['akharin ghest','akharin_ghest','تاریخ آخرین قسط']) || lastInstallmentDate;
      const ia=U.parseNum(findInRaw(raw,['mablagh har ghest','mablagh_har_ghest','مبلغ اقساط وام']));if(!isNaN(ia))installmentAmount=ia;
      const fa=U.parseNum(findInRaw(raw,['mablagh karmozd','mablagh_karmozd','مبلغ کارمزد']));if(!isNaN(fa))feeAmount=fa;
      const ti=U.parseNum(findInRaw(raw,['tedad aghsat','tedad_aghsat','تعداد اقساط']));if(!isNaN(ti))totalInstallments=ti;
      const pi=U.parseNum(findInRaw(raw,['تعداد قسط پرداخت شده','تعداد_قسط_پرداخت_شده','paid installments']));if(!isNaN(pi))paidInstallments=pi;
      const ri=U.parseNum(findInRaw(raw,['تعداد قسط مانده','تعداد_قسط_مانده','remaining installments']));if(!isNaN(ri))remainingInstallments=ri;
      const oi=U.parseNum(findInRaw(raw,['تعداد قسط معوقه','تعداد_قسط_معوقه','overdue']));if(!isNaN(oi))overdueInstallments=oi;
      const lb=U.parseNum(findInRaw(raw,['مانده وام','مانده_وام','loan balance']));if(!isNaN(lb))loanBalance=lb;

    let h=`<div class="dashboard-section"><h3><i class="fas fa-info-circle"></i> اطلاعات حساب</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px"><div style="display:flex;align-items:center;gap:10px"><i class="fas fa-hashtag" style="color:#667eea"></i><div><label style="font-weight:600;color:#718096;font-size:.85rem">شماره حساب:</label><div style="font-weight:700">${U.esc(m.accountNumber||'---')}</div></div></div><div style="display:flex;align-items:center;gap:10px"><i class="fas fa-clock" style="color:#667eea"></i><div><label style="font-weight:600;color:#718096;font-size:.85rem">مدت عضویت:</label><div style="font-weight:700">${dur}</div></div></div><div style="display:flex;align-items:center;gap:10px"><i class="fas fa-exchange-alt" style="color:#667eea"></i><div><label style="font-weight:600;color:#718096;font-size:.85rem">تعداد تراکنش:</label><div style="font-weight:700">${txns.length}</div></div></div><div style="display:flex;align-items:center;gap:10px"><i class="fas fa-check-circle" style="color:${m.statusActive!==false?'#48bb78':'#e53e3e'}"></i><div><label style="font-weight:600;color:#718096;font-size:.85rem">وضعیت حساب:</label><div style="font-weight:700;color:${m.statusActive!==false?'#48bb78':'#e53e3e'}">${m.statusActive!==false?'✅ فعال':'❌ غیرفعال'}</div></div></div><div style="display:flex;align-items:center;gap:10px"><i class="fas fa-money-bill" style="color:#667eea"></i><div><label style="font-weight:600;color:#718096;font-size:.85rem">مقرری ماهانه مصوب شده شما:</label><div style="font-weight:700">${U.fmtNum(monthlySalaryApproved)}</div></div></div><div style="display:flex;align-items:center;gap:10px"><i class="fas fa-wallet" style="color:#667eea"></i><div><label style="font-weight:600;color:#718096;font-size:.85rem">موجودی هرشخص تا این ماه باید باشد:</label><div style="font-weight:700">${U.fmtNum(currentMonthBalance)}</div></div></div></div>`;

render_shop(c){
    const m=this.app.dm.gMember(this.app.auth.user?.memberId);
    if(!m){c.innerHTML='<div style="text-align:center;padding:40px"><i class="fas fa-exclamation-circle" style="font-size:3rem;color:#e53e3e"></i><p style="margin-top:15px">خطا</p></div>';return;}
    const available=(m.coins||0)-(m.usedCoins||0);
    let h=`<div class="info-box"><i class="fas fa-shopping-cart"></i> فروشگاه - خرج کردن سکه‌ها</div>`;
    h+=`<div class="dashboard-section"><h3><i class="fas fa-coins"></i> موجودی سکه شما</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px"><div style="background:linear-gradient(135deg,rgba(236,201,75,.2),rgba(214,158,46,.2));padding:20px;border-radius:16px;text-align:center"><i class="fas fa-coins" style="font-size:2rem;color:#d69e2e;margin-bottom:10px"></i><div style="font-size:.9rem;color:#718096;margin-bottom:5px">جمع کل</div><div style="font-size:1.8rem;font-weight:700;color:#d69e2e">${m.coins||0}</div></div><div style="background:linear-gradient(135deg,rgba(229,62,62,.2),rgba(197,48,48,.2));padding:20px;border-radius:16px;text-align:center"><i class="fas fa-shopping-cart" style="font-size:2rem;color:#e53e3e;margin-bottom:10px"></i><div style="font-size:.9rem;color:#718096;margin-bottom:5px">مصرف شده</div><div style="font-size:1.8rem;font-weight:700;color:#e53e3e">${m.usedCoins||0}</div></div><div style="background:linear-gradient(135deg,rgba(72,187,120,.2),rgba(56,161,105,.2));padding:20px;border-radius:16px;text-align:center"><i class="fas fa-wallet" style="font-size:2rem;color:#48bb78;margin-bottom:10px"></i><div style="font-size:.9rem;color:#718096;margin-bottom:5px">قابل مصرف</div><div style="font-size:1.8rem;font-weight:700;color:#48bb78">${U.fmtNum(available)}</div></div></div></div>`;
    h+=`<div class="dashboard-section"><h3><i class="fas fa-store"></i> کالاها و خدمات</h3>`;
    const items=this.app.dm.shopItems||[];
    if(!items.length)h+=`<div style="text-align:center;padding:30px;color:#a0aec0"><i class="fas fa-box-open" style="font-size:3rem;margin-bottom:10px"></i><p>هیچ کالایی موجود نیست</p></div>`;
    else items.forEach(item=>{const canBuy=available>=item.price;h+=`<div class="shop-item"><div class="shop-item-info"><div class="shop-item-title">${U.esc(item.name)}</div><div class="shop-item-desc">${U.esc(item.description||'')}</div><div class="shop-item-price"><i class="fas fa-coins"></i> ${item.price} سکه</div></div><button class="btn-small ${canBuy?'success-btn':'danger-btn'}" ${canBuy?'':'disabled'} data-item-id="${item.id}" style="${canBuy?'':'opacity:.5;cursor:not-allowed'}"><i class="fas fa-shopping-cart"></i> خرید</button></div>`;});
    h+=`</div>`;
    c.innerHTML=h;
    c.querySelectorAll('[data-item-id]').forEach(btn=>{btn.onclick=()=>{const itemId=btn.dataset.itemId;const item=items.find(i=>i.id===itemId);if(!item)return;if(confirm(`آیا از خرید "${item.name}" با ${item.price} سکه مطمئن هستید؟`))this.app.spendCoinOnItem(itemId);};});
}

render_settings(c){
    if(!this.app.auth.isAdmin()){c.innerHTML='<div style="text-align:center;padding:40px"><i class="fas fa-ban" style="font-size:3rem;color:#e53e3e"></i><p style="margin-top:15px">دسترسی غیرمجاز</p></div>';return;}
    const currentLogo=this.app.dm.logo;
    let h=`<div class="info-box"><i class="fas fa-cog"></i> تنظیمات سیستم</div>`;
    h+=`<div class="dashboard-section"><h3><i class="fas fa-image"></i> مدیریت لوگو</h3><div style="background:rgba(247,250,252,.8);padding:20px;border-radius:16px;margin-bottom:20px;border:2px dashed #cbd5e0"><div style="text-align:center">`;
    if(currentLogo)h+=`<img src="${currentLogo}" class="logo-preview" alt="لوگوی فعلی">`;
    else h+=`<div style="width:100px;height:100px;border-radius:50%;background:#e2e8f0;margin:15px auto;display:flex;align-items:center;justify-content:center"><i class="fas fa-image" style="font-size:2rem;color:#a0aec0"></i></div>`;
    h+=`<div style="margin-top:15px"><input type="file" id="logoInput" accept="image/*" style="display:none"><button class="btn-small info-btn" id="uploadLogoBtn"><i class="fas fa-upload"></i> انتخاب لوگو</button>`;
    if(currentLogo)h+=`<button class="btn-small danger-btn" id="removeLogoBtn" style="margin-right:10px"><i class="fas fa-trash"></i> حذف لوگو</button>`;
    h+=`</div></div></div></div>`;
    h+=`<div class="dashboard-section"><h3><i class="fas fa-store"></i> مدیریت فروشگاه</h3><div style="background:rgba(247,250,252,.8);padding:20px;border-radius:16px;margin-bottom:20px"><div style="display:grid;gap:12px"><input type="text" id="shopItemName" placeholder="نام کالا" style="padding:10px;border:2px solid #e2e8f0;border-radius:12px"><textarea id="shopItemDesc" placeholder="توضیحات" style="padding:10px;border:2px solid #e2e8f0;border-radius:12px;min-height:60px;resize:vertical"></textarea><input type="number" id="shopItemPrice" placeholder="قیمت (سکه)" min="1" style="padding:10px;border:2px solid #e2e8f0;border-radius:12px"><button class="btn-small success-btn" id="addShopItemBtn"><i class="fas fa-plus"></i> افزودن کالا</button></div></div>`;
    const items=this.app.dm.shopItems||[];
    if(items.length){h+=`<div class="table-wrapper"><table><thead><tr><th>نام</th><th>توضیحات</th><th>قیمت</th><th>عملیات</th></tr></thead><tbody>`;items.forEach(item=>{h+=`<tr><td>${U.esc(item.name)}</td><td>${U.esc(item.description||'')}</td><td><span style="background:linear-gradient(135deg,#ecc94b,#d69e2e);color:#fff;padding:4px 12px;border-radius:16px;font-weight:700">${item.price}</span></td><td><button class="btn-small danger-btn" data-del-shop="${item.id}"><i class="fas fa-trash"></i></button></td></tr>`;});h+=`</tbody></table></div>`;}
    h+=`</div>`;
    c.innerHTML=h;
    $('#uploadLogoBtn',c).onclick=()=>$('#logoInput',c).click();
    $('#logoInput',c).onchange=function(){if(this.files[0]){const file=this.files[0];if(!file.type.startsWith('image/')){alert('لطفاً یک فایل تصویری انتخاب کنید');return;}const reader=new FileReader();reader.onload=function(e){window.app.dm.setLogo(e.target.result);alert('✅ لوگو با موفقیت بارگذاری شد');window.app.ui.render();};reader.readAsDataURL(file);}};
    const removeBtn=$('#removeLogoBtn',c);
    if(removeBtn)removeBtn.onclick=()=>{if(confirm('آیا مطمئن هستید؟')){window.app.dm.setLogo('');alert('✅ لوگو حذف شد');window.app.ui.render();}};
    $('#addShopItemBtn',c).onclick=()=>{const name=$('#shopItemName',c).value.trim();const desc=$('#shopItemDesc',c).value.trim();const price=parseInt($('#shopItemPrice',c).value);if(!name){alert('نام کالا را وارد کنید');return;}if(isNaN(price)||price<=0){alert('قیمت معتبر وارد کنید');return;}this.app.dm.addShopItem({id:'s_'+Date.now(),name,description:desc,price});alert('✅ کالا اضافه شد');this.render_settings(c);};
    c.querySelectorAll('[data-del-shop]').forEach(btn=>{btn.onclick=()=>{if(confirm('حذف این کالا؟')){this.app.dm.delShopItem(btn.dataset.delShop);this.render_settings(c);}};});
}

        if(m.coinHistory?.length)h+=`<div class="dashboard-section"><h3><i class="fas fa-history"></i> تاریخچه</h3><div class="table-wrapper"><table><thead><tr><th>تاریخ</th><th>تعداد</th><th>دلیل</th><th>توضیحات</th></tr></thead><tbody>${[...m.coinHistory].reverse().map(x=>`<tr><td>${U.esc(x.date||'')}</td><td style="color:${x.amount>0?'#48bb78':'#e53e3e'};font-weight:700">${x.amount>0?'+':''}${x.amount}</td><td>${U.esc(x.reason||'')}</td><td>${U.esc(x.description||'')}</td></tr>`).join('')}</tbody></table></div></div>`; 
        h+=`<div class="dashboard-section" style="text-align:center"><h3><i class="fas fa-dharmachakra"></i> گردونه شانس</h3><div class="wheel" id="wheel"><div class="pointer"><i class="fas fa-caret-down"></i></div><div class="center"><i class="fas fa-play"></i></div></div><button id="spinBtn" style="padding:14px 35px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:28px;cursor:pointer;font-size:1.1rem;font-weight:700;box-shadow:0 5px 20px rgba(102,126,234,.4);transition:all .3s ease;display:inline-flex;align-items:center;gap:10px"><i class="fas fa-sync-alt"></i> چرخش</button><div id="wheelResult" style="margin-top:15px;font-size:1.2rem;font-weight:700;color:#667eea"></div></div>`;

render_messenger(c){c.innerHTML='<div style="text-align:center;padding:40px"><i class="fas fa-spinner fa-spin" style="font-size:3rem;color:#667eea"></i><p style="margin-top:15px">در حال بارگذاری...</p></div>';setTimeout(()=>this._loadMessenger(c),10);}
_loadMessenger(c){
    const self=this,ia=this.app.auth.isAdmin(),isp=this.app.auth.isSpecial(),isv=this.app.auth.isSupervisor();
    let h=`<div class="info-box"><i class="fas fa-envelope"></i> پیامرسان</div>`;
    if(ia)h+=`<div class="msg-actions-bar"><button class="btn-small danger-btn" id="clrAllMsgsBtn"><i class="fas fa-trash"></i> حذف کلیه پیام‌ها</button></div>`;
    h+=`<div class="messenger-section-title"><i class="fas fa-envelope-open-text"></i> پیام به مدیر</div>`;
    if(!ia&&!isp&&!isv)h+=`<div class="dashboard-section" style="padding:15px"><div style="display:flex;gap:10px;margin-bottom:0;flex-wrap:wrap"><textarea id="mtai" placeholder="پیام به مدیر..." style="flex:2;min-width:220px;padding:10px;border:2px solid #e2e8f0;border-radius:10px;min-height:60px;resize:vertical;font-size:.9rem"></textarea><button class="btn-small success-btn" id="sta" style="align-self:flex-start"><i class="fas fa-paper-plane"></i> ارسال</button></div></div>`;
    h+=`<div id="mac">${this.msgs('member_to_admin')}</div>`;
    h+=`<div class="messenger-section-title"><i class="fas fa-comments"></i> پیام به عضو دیگر</div>`;
    h+=`<div class="dashboard-section" style="padding:15px"><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:0"><input type="text" id="mpi" placeholder="شماره تلفن مقصد..." style="flex:1;min-width:140px;padding:10px;border:2px solid #e2e8f0;border-radius:10px;font-size:.9rem"><textarea id="mtmi" placeholder="پیام..." style="flex:2;min-width:220px;padding:10px;border:2px solid #e2e8f0;border-radius:10px;min-height:60px;resize:vertical;font-size:.9rem"></textarea><button class="btn-small success-btn" id="stm" style="align-self:flex-start"><i class="fas fa-paper-plane"></i> ارسال</button></div></div><div id="mmc">${this.msgs('member_to_member')}</div>`;
    c.innerHTML=h;
    $('#sta',c)&&($('#sta',c).onclick=()=>this.app.sendToAdmin());
    $('#stm',c)&&($('#stm',c).onclick=()=>this.app.sendToMember());
    $('#clrAllMsgsBtn',c)&&($('#clrAllMsgsBtn',c).onclick=()=>{if(confirm('آیا از حذف کلیه پیام‌ها مطمئن هستید؟')){if(confirm('تأیید نهایی حذف همه پیام‌ها؟')){window.app.dm.clrMsgs();self._loadMessenger(c);}}});
    setTimeout(()=>{c.querySelectorAll('.reply-btn').forEach(b=>{b.onclick=function(e){e.stopPropagation();self.showReply(this.dataset.p,this.dataset.t);};});c.querySelectorAll('.delete-btn[data-mid]').forEach(b=>{b.onclick=function(e){e.stopPropagation();self.app.delMsg(this.dataset.mid);self._loadMessenger(c);};});},20);
    this.updNotif();
}

msgs(type){
    const dm=this.app.dm,ia=this.app.auth.isAdmin(),isp=this.app.auth.isSpecial(),isv=this.app.auth.isSupervisor(),cm=dm.gMember(this.app.auth.user?.memberId),cp=cm?.phone1||'',uid=this.app.auth.user?.id;
    const hasPrivilege = ia || isp || isv;
    let fl=[];
    if(type==='member_to_admin'){
        if(hasPrivilege)fl=dm.messages.filter(m=>m.type==='member_to_admin');
        else{const myMessages = dm.messages.filter(m=>m.type==='member_to_admin' && m.senderId===uid);const myMessageIds = new Set(myMessages.map(m=>m.id));const repliesToMe = dm.messages.filter(m=>m.type==='member_to_admin' && m.parentId && myMessageIds.has(m.parentId));fl = [...myMessages, ...repliesToMe];}
    } else if(type==='member_to_member'){
        if(hasPrivilege)fl=dm.messages.filter(m=>m.type==='member_to_member');
        else fl=dm.messages.filter(m=>m.type==='member_to_member'&&(m.senderPhone===cp||m.receiverPhone===cp));
    }
    fl.sort((a,b)=>(a.timestamp||'').localeCompare(b.timestamp||''));
    if(!fl.length)return'<div style="color:#a0aec0;padding:15px;text-align:center"><i class="fas fa-inbox" style="font-size:2rem;margin-bottom:10px"></i><p>هیچ پیامی نیست</p></div>';
    const msgClass = type==='member_to_admin' ? 'msg-to-admin' : 'msg-member';
    return fl.map(msg=>{
        const canDel = ia || (msg.senderId === uid);
        let dn=msg.senderName||'کاربر';
        let senderInfo='',senderBadge='',phoneInfo='';
        if(type==='member_to_admin'){
            if(msg.parentId){
                dn=`پاسخ شورا یا سیستم`;
                senderBadge=`<span class="msg-sender-badge" style="background:linear-gradient(135deg,#48bb78,#38a169);color:#fff"><i class="fas fa-reply"></i> پاسخ شورا یا سیستم</span>`;
                if(hasPrivilege)senderInfo=`<div style="font-size:.78rem;color:#4a5568;margin-top:4px;padding:6px 10px;background:rgba(72,187,120,.06);border-radius:6px;border:1px solid rgba(72,187,120,.2)"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><i class="fas fa-user" style="color:#48bb78"></i> <strong>پاسخ دهنده:</strong> ${U.esc(msg.senderName||'نامشخص')}</div><div style="display:flex;align-items:center;gap:6px"><i class="fas fa-clock" style="color:#48bb78"></i> <strong>تاریخ و ساعت:</strong> ${U.esc(msg.timestamp||'---')}</div></div>`;
                else senderInfo=`<div style="font-size:.78rem;color:#4a5568;margin-top:4px;padding:6px 10px;background:rgba(72,187,120,.06);border-radius:6px;border:1px solid rgba(72,187,120,.2)"><div style="display:flex;align-items:center;gap:6px"><i class="fas fa-clock" style="color:#48bb78"></i> <strong>تاریخ و ساعت پاسخ:</strong> ${U.esc(msg.timestamp||'---')}</div></div>`;
            }else{
                if(hasPrivilege){dn=`پیام از طرف عضو`;senderInfo=`<div style="font-size:.78rem;color:#4a5568;margin-top:4px;padding:6px 10px;background:rgba(66,153,225,.06);border-radius:6px;border:1px solid rgba(66,153,225,.2)"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><i class="fas fa-user" style="color:#4299e1"></i> <strong>نام ارسال کننده:</strong> ${U.esc(msg.senderName||'عضو')}</div><div style="display:flex;align-items:center;gap:6px"><i class="fas fa-clock" style="color:#4299e1"></i> <strong>تاریخ و ساعت:</strong> ${U.esc(msg.timestamp||'---')}</div></div>`;}
                else{dn=`پیام شما به مدیر`;senderInfo=`<div style="font-size:.78rem;color:#4a5568;margin-top:4px;padding:6px 10px;background:rgba(66,153,225,.06);border-radius:6px;border:1px solid rgba(66,153,225,.2)"><div style="display:flex;align-items:center;gap:6px"><i class="fas fa-clock" style="color:#4299e1"></i> <strong>تاریخ و ساعت:</strong> ${U.esc(msg.timestamp||'---')}</div></div>`;}
            }
        } else if(type==='member_to_member'){
            const isSender = msg.senderPhone === cp;
            if(msg.parentId){dn=`پاسخ پیام`;senderBadge=`<span class="msg-sender-badge" style="background:linear-gradient(135deg,#9f7aea,#805ad5);color:#fff"><i class="fas fa-reply"></i> ${msg.replyLabel||'پاسخ'}</span>`;}
            else{if(isSender)dn=`پیام ارسالی شما`;else dn=`پیام دریافتی`;}
            let phoneHtml='';
            if(msg.senderPhone)phoneHtml+=`<div><i class="fas fa-phone" style="color:#667eea"></i> تلفن فرستنده: <strong>${U.esc(msg.senderPhone)}</strong></div>`;
            if(msg.receiverPhone)phoneHtml+=`<div><i class="fas fa-phone" style="color:#ed8936"></i> تلفن گیرنده: <strong>${U.esc(msg.receiverPhone)}</strong></div>`;
            phoneHtml+=`<div><i class="fas fa-clock" style="color:#48bb78"></i> تاریخ و ساعت: <strong>${U.esc(msg.timestamp||'---')}</strong></div>`;
            phoneInfo=`<div class="msg-phone-info">${phoneHtml}</div>`;
        }
        const finalClass = msg.parentId ? 'msg-reply' : msgClass;
        let h=`<div class="msg-item ${finalClass}"><div class="msg-header"><span><i class="fas fa-user-circle"></i> ${U.esc(dn)}</span><span><i class="fas fa-clock"></i> ${U.esc(msg.timestamp||'---')}</span></div>`;
        if(senderBadge) h+=senderBadge;
        if(senderInfo) h+=senderInfo;
        if(phoneInfo) h+=phoneInfo;
        if(msg.replyLabel && !msg.parentId)h+=`<div style="font-size:.78rem;color:#ed8936;margin:6px 0;padding:5px 8px;background:rgba(237,137,54,.1);border-radius:6px;display:inline-block"><i class="fas fa-reply"></i> ${U.esc(msg.replyLabel)}</div>`;
        h+=`<div style="line-height:1.6;font-size:.92rem">${U.esc(msg.message)}</div><div style="display:flex;gap:8px;margin-top:8px">`;
        if(type==='member_to_admin' && hasPrivilege)h+=`<button class="reply-btn" data-p="${msg.id}" data-t="${type}" style="background:none;border:none;color:#4299e1;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:600;font-size:.82rem"><i class="fas fa-reply"></i> پاسخ</button>`;
        else if(type==='member_to_member' && !msg.parentId && msg.senderPhone !== cp)h+=`<button class="reply-btn" data-p="${msg.id}" data-t="${type}" style="background:none;border:none;color:#4299e1;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:600;font-size:.82rem"><i class="fas fa-reply"></i> پاسخ</button>`;
        if(canDel)h+=`<button class="delete-btn" data-mid="${msg.id}" style="background:none;border:none;color:#e53e3e;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:600;font-size:.82rem"><i class="fas fa-trash"></i> حذف</button>`;
        h+=`</div><div id="rf_${msg.id}" style="display:none;margin-top:8px"></div></div>`;
        return h;
    }).join('');
}

showReply(pid,type){
    const container=$(`#rf_${pid}`);
    if(!container)return;
    if(container.style.display==='block'){container.style.display='none';container.innerHTML='';return;}
    container.innerHTML=`<div style="background:rgba(247,250,252,.8);padding:12px;border-radius:10px;margin-top:8px"><textarea id="replyTxt_${pid}" placeholder="متن پاسخ..." style="width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:8px;min-height:60px;resize:vertical;font-size:.9rem"></textarea><div style="display:flex;gap:8px;margin-top:8px"><button class="btn-small success-btn" id="sendReplyBtn_${pid}"><i class="fas fa-paper-plane"></i> ارسال پاسخ</button><button class="btn-small danger-btn" id="cancelReplyBtn_${pid}"><i class="fas fa-times"></i> انصراف</button></div></div>`;
    container.style.display='block';
    const self=this;
    $(`#sendReplyBtn_${pid}`).onclick=()=>{const txt=$(`#replyTxt_${pid}`).value.trim();if(!txt){alert('متن پاسخ را وارد کنید');return;}self.app.sendReply(pid,type,txt);};
    $(`#cancelReplyBtn_${pid}`).onclick=()=>{container.style.display='none';container.innerHTML='';};
}

render_cultural(c){const ia=this.app.auth.isAdmin();let h=`<div class="info-box"><i class="fas fa-theater-masks"></i> برنامه‌های فرهنگی</div><div class="dashboard-section"><h3><i class="fas fa-bullhorn"></i> اطلاعیه‌ها</h3>`;if(ia)h+=`<div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap"><input type="text" id="ant" placeholder="عنوان..." style="flex:1;min-width:200px;padding:12px;border:2px solid #e2e8f0;border-radius:12px"><textarea id="anc" placeholder="متن..." style="flex:2;min-width:250px;padding:12px;border:2px solid #e2e8f0;border-radius:12px;min-height:70px;resize:vertical"></textarea><button class="btn-small success-btn" id="sanb" style="align-self:flex-start"><i class="fas fa-paper-plane"></i> ارسال</button></div>`;h+=`<div id="ancr"></div></div>`;c.innerHTML=h;$('#sanb',c)&&($('#sanb',c).onclick=()=>this.app.sendAnn());this.renderAnns();}

e="font-weight:600;color:#718096;font-size:.85rem">حساب:</label><div style="font-weight:700;font-size:1.1rem">${U.esc(s.accountNumber||'---')}</div></div></div><div style="display:flex;align-items:center;gap:12px;padding:15px;background:rgba(237,137,54,.1);border-radius:12px"><i class="fas fa-map-marker-alt" style="font-size:1.5rem;color:#ed8936"></i><div><label style="font-weight:600;color:#718096;font-size:.85rem">آدرس:</label><div style="font-weight:700;font-size:1.1rem">${U.esc(s.address||'---')}</div></div></div></div></div>`;c.innerHTML=h;$('#ssb',c)&&($('#ssb',c).onclick=()=>this.app.saveSupport());}

search(inputId,tableSelector,container=document){
    const input=$(inputId,container);
    if(!input)return;
    const clearBtn=$(inputId+'_cl',container);
    const filter=()=>{const q=input.value.trim().toLowerCase(),tb=container.querySelector(tableSelector);if(!tb?.querySelector('tbody'))return;tb.querySelector('tbody').querySelectorAll('tr').forEach(r=>{if(!q||r.textContent.trim().toLowerCase().includes(q))r.style.display='';else r.style.display='none';});};
    input.oninput=filter;
    if(clearBtn)clearBtn.onclick=()=>{input.value='';filter();input.focus();};
    setTimeout(filter,50);
}

updUI(){
    const ia=this.app.auth.isAdmin(),isp=this.app.auth.isSpecial();
    const cm=ia?null:this.app.dm.gMember(this.app.auth.user?.memberId);
    const isCouncil=cm&&(cm.sessionActive||(cm.smsStatus&&cm.smsStatus.council));
    const wb=$('#welcomeBanner'),rb=$('#roleBadge');
    const lastLoginInfo = cm?.lastLoginDate ? `<span class="last-login-info"><i class="fas fa-clock"></i> آخرین ورود: ${U.esc(cm.lastLoginDate)}</span>` : '';
    if(wb){
        if(ia)wb.innerHTML=`<i class="fas fa-star"></i> خوش آمدید مدیر محترم <i class="fas fa-star"></i>`;
        else if(isp)wb.innerHTML=`<i class="fas fa-shield-alt"></i> خوش آمدید پاسخ‌دهنده ویژه <i class="fas fa-star"></i>`;
        else if(isCouncil)wb.innerHTML=`<i class="fas fa-user-shield"></i> خوش آمدید ${cm.firstName||''} ${cm.lastName||''} (عضو شورا) <i class="fas fa-star"></i>${lastLoginInfo}`;
        else if(cm)wb.innerHTML=`<i class="fas fa-star"></i> خوش آمدید ${cm.firstName||''} ${cm.lastName||''} <i class="fas fa-star"></i>${lastLoginInfo}`;
        else wb.innerHTML=`<i class="fas fa-star"></i> خوش آمدید <i class="fas fa-star"></i>`;

        rb.innerHTML=ia?'<i class="fas fa-crown"></i> مدیر':isp?'<i class="fas fa-shield-alt"></i> پاسخ‌دهنده':isCouncil?'<i class="fas fa-user-shield"></i> عضو شورا':'<i class="fas fa-user"></i> عضو';

updCoinBadge(){const badge=$('#coinCount');if(!badge)return;const m=this.app.dm.gMember(this.app.auth.user?.memberId);if(m)badge.textContent=(m.coins||0)-(m.usedCoins||0);}

startClock(){if(this.ci)clearInterval(this.ci);const tick=()=>{const n=new Date(),h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');const cl=$('#clockDisplay');if(cl)cl.innerHTML=`${h}:${m}<span class="clock-seconds">:${s}</span>`;const pd=$('#persianDate');if(pd)pd.textContent=U.toJalali(n);const gd=$('#gregorianDate');if(gd)gd.textContent=`${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')}`;};tick();this.ci=setInterval(tick,1000);}

updNotif(){
    const badge=$('#notifBadge');
    if(!badge)return;
    const dm=this.app.dm,cm=dm.gMember(this.app.auth.user?.memberId),cp=cm?.phone1||'',uid=this.app.auth.user?.id;
    let n=0;
    if(this.app.auth.isLoggedIn()){
        const ia=this.app.auth.isAdmin(),isp=this.app.auth.isSpecial(),isv=this.app.auth.isSupervisor();
        const hasPrivilege = ia || isp || isv;
        let rel = dm.messages.filter(m=>m.type==='admin_to_members' && m.senderId!==uid);
        if(hasPrivilege)rel = rel.concat(dm.messages.filter(m=>(m.type==='member_to_admin'||m.type==='member_to_member')&&m.senderId!==uid));
        else{
            const myMsgIds = new Set(dm.messages.filter(m=>m.type==='member_to_admin'&&m.senderId===uid).map(m=>m.id));
            const repliesToMe = dm.messages.filter(m=>m.type==='member_to_admin'&&m.parentId&&myMsgIds.has(m.parentId));
            const msgsToMe = dm.messages.filter(m=>m.type==='member_to_member'&&m.receiverPhone===cp&&m.senderId!==uid);
            rel = rel.concat(repliesToMe, msgsToMe);
        }
        n = rel.length;
    }
    if(n){badge.classList.remove('hidden');badge.textContent=n>9?'9+':n;}
    else badge.classList.add('hidden');
}
}

class App{constructor(){this.dm=new DM();this.auth=new Auth(this.dm);this.ui=new UI(this);this.init();}
init(){this.ui.render();}
setTheme(t){localStorage.setItem('theme',t);$$('.theme-btn').forEach(b=>b.classList.remove('active'));$(`.theme-btn[data-theme="${t}"]`)?.classList.add('active');}
doLogin(){const un=$('#loginUsername').value.trim(),pw=$('#loginPassword').value.trim(),ed=$('#loginError');ed.textContent='';if(!un||!pw){ed.innerHTML='<i class="fas fa-exclamation-circle"></i> نام کاربری و رمز عبور را وارد کنید';return;}const r=this.auth.login(un,pw);if(!r.s){ed.innerHTML=`<i class="fas fa-exclamation-circle"></i> ${r.m}`;return;}if(r.fc){this.ui.render();return;}this.ui.render();}
doForgot(){
    const un=$('#loginUsername').value.trim(),ed=$('#loginError'),sd=$('#forgotSuccess');
    ed.textContent='';sd.textContent='';
    if(!un){ed.innerHTML='<i class="fas fa-exclamation-circle"></i> نام کاربری را وارد کنید';return;}
    const u=this.dm.users.find(x=>U.norm(x.username)===U.norm(un)&&x.role!=='admin');
    if(!u){ed.innerHTML='<i class="fas fa-exclamation-circle"></i> نام کاربری یافت نشد';return;}
    u.password=u.username;
    this.dm.sv('users');
    sd.innerHTML=`<i class="fas fa-check-circle"></i> رمز عبور ${un} به شماره حساب (${u.username}) تغییر یافت. لطفاً پس از ورود رمز جدید انتخاب کنید.`;
    setTimeout(()=>sd.textContent='',10000);
}
doForceChange(){const np=$('#newPasswordForce').value.trim(),cp=$('#confirmPasswordForce').value.trim(),ed=$('#forceError');ed.textContent='';if(!np){ed.innerHTML='<i class="fas fa-exclamation-circle"></i> رمز جدید را وارد کنید';return;}if(np!==cp){ed.innerHTML='<i class="fas fa-exclamation-circle"></i> رمز و تکرار آن مطابقت ندارند';return;}const r=this.auth.changeForced(np);if(!r.s){ed.innerHTML=`<i class="fas fa-exclamation-circle"></i> ${r.m}`;return;}this.ui.render();}
doLogout(){this.auth.logout();localStorage.removeItem('activeTab');this.ui.render();}
addCoin(){const s=$('#cms'),a=$('#cai');if(!s||!a)return;const mid=parseInt(s.value),amt=parseInt(a.value);if(isNaN(amt)||amt<=0){alert('تعداد سکه معتبر وارد کنید');return;}const m=this.dm.gMember(mid);if(!m){alert('عضو یافت نشد');return;}this.dm.addCoin(mid,amt,'افزودن توسط مدیر',`افزودن ${amt} سکه`);alert(`✅ اضافه شد`);this.ui.switchTab('coins');}
resetCoins(mid){if(!confirm('ریست سکه‌ها؟'))return;const m=this.dm.gMember(mid);if(!m)return;m.coins=m.usedCoins=0;m.coinHistory=[];this.dm.sv('members');alert('ریست شد');this.ui.switchTab('coins');}
spendCoinOnItem(itemId){
    const item=this.dm.shopItems.find(i=>i.id===itemId);
    if(!item){alert('کالا یافت نشد');return;}
    const m=this.dm.gMember(this.auth.user.memberId);
    if(!m){alert('اطلاعات یافت نشد');return;}
    const result=this.dm.spendCoin(m.id,item.price,`خرید ${item.name}`,`خرید کالا از فروشگاه`);
    if(result.success){alert(`✅ ${result.msg}\nکالا: ${item.name}\nمبلغ: ${item.price} سکه`);this.ui.switchTab('shop');}
    else{alert(`❌ ${result.msg}`);}
}
spinWheel(){const wh=$('#wheel'),btn=$('#spinBtn'),res=$('#wheelResult');if(!wh||!btn)return;const today=new Date().toDateString();if(localStorage.getItem('lastSpinDate')===today){if(res)res.innerHTML='<i class="fas fa-times-circle"></i> امروز انجام شده';return;}btn.disabled=true;const prize=[1,2,3,4,5][Math.floor(Math.random()*5)],angle=Math.floor(Math.random()*5)*60+30+Math.random()*360+720;this.ui.sa+=angle;wh.style.transition='transform 4s cubic-bezier(.17,.67,.12,.99)';wh.style.transform=`rotate(${this.ui.sa}deg)`;setTimeout(()=>{if(res)res.innerHTML=`<i class="fas fa-trophy"></i> ${prize} سکه`;if(prize>0){const m=this.dm.gMember(this.auth.user.memberId);if(m)this.dm.addCoin(m.id,prize,'چرخش گردونه','گردونه شانس');}localStorage.setItem('lastSpinDate',today);btn.disabled=true;btn.innerHTML='<i class="fas fa-check"></i> امروز انجام شد';btn.style.opacity='.6';this.ui.updCoinBadge();},4000);}
sendToAdmin(){const i=$('#mtai');if(!i?.value.trim()){alert('متن را وارد کنید');return;}const m=this.dm.gMember(this.auth.user.memberId);if(!m){alert('اطلاعات یافت نشد');return;}this.dm.addMsg({id:'m_'+Date.now()+Math.random().toString(36).slice(2,6),senderId:this.auth.user.id,senderName:`${m.firstName||''} ${m.lastName||''}`,senderRole:'member',senderPhone:m.phone1||'',receiverId:1,receiverPhone:'',message:i.value.trim(),timestamp:U.now(),type:'member_to_admin',parentId:null,replyLabel:''});i.value='';this.dm.applyCoinRules(m);this.ui.switchTab('messenger');}
sendToMember(){

    pi.value='';mi.value='';
    this.ui.switchTab('messenger');
}
sendReply(pid,type,txt){
    const pm=this.dm.messages.find(m=>m.id===pid);
    if(!pm){alert('پیام اصلی یافت نشد');return;}
    const ia=this.auth.isAdmin(),isp=this.auth.isSpecial(),isv=this.auth.isSupervisor();
    let rl='',sn='',sr='member';
    if(ia){rl='پاسخ از مدیریت';sn='مدیر';sr='admin';}
    else if(isp){rl='پاسخ از شورا';const m=this.dm.gMember(this.auth.user.memberId);sn=m?`${m.firstName||''} ${m.lastName||''}`:'شورا';sr='special';}
    else if(isv){rl='پاسخ از سرپرست';const m=this.dm.gMember(this.auth.user.memberId);sn=m?`${m.firstName||''} ${m.lastName||''}`:'سرپرست';sr='supervisor';}
    else{const m=this.dm.gMember(this.auth.user.memberId);sn=`${m?.firstName||''} ${m?.lastName||''}`;}
    const m=this.dm.gMember(this.auth.user.memberId);
    this.dm.addMsg({id:'m_'+Date.now()+Math.random().toString(36).slice(2,6),senderId:this.auth.user.id,senderName:sn,senderRole:sr,senderPhone:m?.phone1||'',receiverId:ia?1:null,receiverPhone:type==='member_to_member'?pm.senderPhone:'',message:txt,timestamp:U.now(),type,parentId:pid,replyLabel:rl});
    this.ui.switchTab('messenger');
}
delMsg(id){if(confirm('حذف پیام؟')){this.dm.delMsg(id);this.ui.render();}}
sendAnn(){const t=$('#ant').value.trim(),c=$('#anc').value.trim();if(!t||!c){alert('عنوان و متن را وارد کنید');return;}this.dm.addAnn({id:'a_'+Date.now()+Math.random().toString(36).slice(2,6),title:t,content:c,timestamp:U.now(),sender:this.auth.user.username||'مدیر'});$('#ant').value='';$('#anc').value='';this.ui.switchTab('cultural');}
saveProf(mid){const m=this.dm.gMember(mid);if(!m)return;const vals={};['firstName','lastName','accountNumber','openDate','birthDate','phone1','phone2'].forEach(k=>{vals[k]=$(`#pf_${k}_${mid}`)?.value.trim()||'';});const un=$(`#pfu_${mid}`)?.value.trim()||'',pw=$(`#pfp_${mid}`)?.value.trim()||'';if(!vals.firstName||!vals.lastName||!vals.accountNumber||!vals.openDate){alert('موارد اجباری را پر کنید');return;}const ui=this.dm.gUserByMid(mid);if(ui){if(this.dm.users.some(u=>u.username===un&&u.id!==ui.id)){alert('نام کاربری تکراری');return;}ui.username=un;ui.password=pw;this.dm.sv('users');}Object.assign(m,vals);m.fullName=vals.firstName+' '+vals.lastName;this.dm.sv('members');alert('ذخیره شد');this.ui.switchTab('profile');}
saveBirth(mid){const v=$('#nbd')?.value.trim();if(!v){alert('تاریخ تولد را وارد کنید');return;}const m=this.dm.gMember(mid);if(!m)return;m.birthDate=v;this.dm.sv('members');alert('✅ ذخیره شد');this.ui.render();}
savePass(mid){const np=$('#npi')?.value.trim(),cp=$('#cpi')?.value.trim();if(!np||!cp){alert('رمز و تکرار آن را وارد کنید');return;}if(np!==cp){alert('رمز و تکرار آن مطابقت ندارند');return;}if(U.strength(np)==='ضعیف'){alert('رمز عبور بسیار ضعیف است');return;}const u=this.dm.gUserByMid(mid);if(!u)return;u.password=np;this.dm.sv('users');alert('✅ رمز عبور تغییر یافت');this.ui.render();}
delMember(mid){if(confirm('حذف عضو؟')){this.dm.delMember(mid);alert('حذف شد');this.ui.switchTab('members');}}
delAllMembers(){this.dm.delAllMembers();alert('همه اعضا حذف شدند');this.ui.switchTab('members');}
uploadBulk(file){
    showSyncStatus('در حال پردازش فایل اکسل...', 'syncing');
    this.dm.uploadBulk(file,(e,tr,up,ad,nm)=>{
        if(e){showSyncStatus('❌ '+e, 'error');alert('❌ '+e);}
        else{
            showSyncStatus('✅ آپلود کامل شد', 'success');
            alert(`✅ عملیات با موفقیت انجام شد\n\n📊 کل ردیف‌های فایل: ${tr}\n🔄 به‌روزرسانی شده: ${up}\n➕ عضو جدید اضافه شده: ${ad}\n\nنام کاربری = شماره حساب\nرمز عبور = شماره حساب`);
            this.ui.switchTab('members');
        }
    });
}
saveSupport(){const p=$('#spp').value.trim(),a=$('#spa').value.trim(),ad=$('#spad').value.trim();this.dm.support={phone:p,accountNumber:a,address:ad};this.dm.sv('support');alert('ذخیره شد');this.ui.switchTab('support');}
}
