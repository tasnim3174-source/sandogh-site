<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>صندوق اتحاد</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://v1.fontapi.ir/css/BTitr" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'B Titr','BTitr',Tahoma,sans-serif;font-weight:bold}
html,body{overflow-x:hidden;width:100%;position:relative}
body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:5px;color:#2d3748}
[data-theme="dark"] body{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fbbf24}
.container{max-width:1600px;margin:0 auto;transform:scale(0.75);transform-origin:top center;padding-top:5px}
.login-page,.app-page{background:rgba(255,255,255,.98);border-radius:24px;padding:20px;box-shadow:0 15px 35px rgba(0,0,0,.3),0 5px 15px rgba(0,0,0,.1);max-width:100%;overflow:hidden;border:2px solid rgba(102,126,234,.3)}
[data-theme="dark"] .login-page,[data-theme="dark"] .app-page{background:rgba(26,26,46,.98);border-color:rgba(251,191,36,.3)}
h1{color:#2d3748;text-align:center;margin-bottom:10px;font-size:1.6rem}
[data-theme="dark"] h1{color:#fbbf24}
.subtitle{color:#718096;text-align:center;margin-bottom:25px;font-size:.95rem}
[data-theme="dark"] .subtitle{color:#d97706}
.input-group{margin-bottom:18px;position:relative}
.input-group label{display:block;margin-bottom:6px;font-weight:bold;color:#4a5568;font-size:.9rem}
[data-theme="dark"] .input-group label{color:#f59e0b}
.input-group input{width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:12px;font-size:1rem;background:#fff;color:#2d3748;font-family:'B Titr','BTitr',Tahoma,sans-serif;font-weight:bold}
[data-theme="dark"] .input-group input{background:#1e1e3f;border-color:#fbbf24;color:#fbbf24}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:bold;cursor:pointer;box-shadow:0 4px 15px rgba(102,126,234,.4)}
[data-theme="dark"] .btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e;box-shadow:0 4px 15px rgba(245,158,11,.4)}
.btn-small{padding:7px 14px;font-size:.82rem;border-radius:18px;border:none;cursor:pointer;font-weight:bold;display:inline-flex;align-items:center;gap:5px;margin:2px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.success-btn{background:linear-gradient(135deg,#48bb78,#38a169);color:#fff}
.danger-btn{background:linear-gradient(135deg,#f56565,#e53e3e);color:#fff}
.info-btn{background:linear-gradient(135deg,#4299e1,#3182ce);color:#fff}
.edit-btn{background:linear-gradient(135deg,#ed8936,#dd6b20);color:#fff}
.error-msg{color:#e53e3e;text-align:center;margin-top:15px;padding:10px;background:rgba(229,62,62,.1);border-radius:10px;display:none;font-size:.9rem;font-weight:bold}
.toggle-password{position:absolute;left:12px;top:42px;background:none;border:none;cursor:pointer;font-size:1.2rem;color:#718096}
.floating-menu-btn{position:fixed;top:15px;right:15px;width:auto;height:48px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:24px;cursor:pointer;z-index:1002;display:none;align-items:center;justify-content:center;font-size:1.2rem;color:#1a1a2e;box-shadow:0 4px 15px rgba(245,158,11,0.4);padding:0 14px;gap:6px;font-weight:bold}
.floating-menu-btn.show{display:flex}
.floating-menu-btn.active{background:linear-gradient(135deg,#e53e3e,#c53030)}
.floating-menu-btn .menu-text{font-size:.8rem;font-weight:bold}
.sidebar-menu{position:fixed;top:0;right:-240px;width:220px;height:100vh;background:rgba(255,255,255,.98);z-index:1001;transition:right 0.3s ease;overflow-y:auto;padding:60px 8px 8px;box-shadow:-5px 0 20px rgba(0,0,0,0.3);display:flex;flex-direction:column}
[data-theme="dark"] .sidebar-menu{background:rgba(26,26,46,.98)}
.sidebar-menu.show{right:0}
.sidebar-menu .menu-item{display:flex;align-items:center;gap:6px;padding:7px 8px;margin:1px 0;border-radius:8px;color:#4a5568;font-weight:bold;cursor:pointer;font-size:.75rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
[data-theme="dark"] .sidebar-menu .menu-item{color:#fbbf24}
.sidebar-menu .menu-item:hover{background:rgba(102,126,234,.1)}
.sidebar-menu .menu-item.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
[data-theme="dark"] .sidebar-menu .menu-item.active{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e}
.menu-item .help-icon{width:18px;height:18px;border-radius:50%;background:rgba(102,126,234,.2);color:#667eea;display:inline-flex;align-items:center;justify-content:center;font-size:.65rem;cursor:pointer;flex-shrink:0}
[data-theme="dark"] .menu-item .help-icon{background:rgba(251,191,36,.2);color:#fbbf24}
.menu-item .help-icon:hover{background:#667eea;color:#fff}
[data-theme="dark"] .menu-item .help-icon:hover{background:#fbbf24;color:#1a1a2e}
.menu-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:none}
.menu-overlay.show{display:block}
.menu-top{padding:6px 5px;border-bottom:1px solid #e2e8f0;margin-bottom:4px}
[data-theme="dark"] .menu-top{border-color:#fbbf24}
.theme-switcher{display:flex;gap:3px;background:#fff;padding:3px;border-radius:8px;border:2px solid #e2e8f0}
[data-theme="dark"] .theme-switcher{background:#1e1e3f;border-color:#fbbf24}
.theme-btn{background:transparent;color:#4a5568;border:none;padding:4px 5px;border-radius:6px;cursor:pointer;font-weight:bold;font-size:.68rem;display:flex;align-items:center;gap:2px;flex:1;justify-content:center}
[data-theme="dark"] .theme-btn{color:#fbbf24}
.theme-btn.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
[data-theme="dark"] .theme-btn.active{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e}
.menu-footer{padding-top:8px;margin-top:8px}
.menu-user-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:8px;background:linear-gradient(135deg,rgba(102,126,234,.15),rgba(118,75,162,.1));border-radius:10px;margin-bottom:6px;border:2px solid rgba(102,126,234,.3);box-shadow:0 2px 8px rgba(102,126,234,.2)}
[data-theme="dark"] .menu-user-row{background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(245,158,11,.1));border-color:rgba(251,191,36,.3)}
.menu-user-row .role-text{font-size:.7rem;color:#4a5568;font-weight:bold}
[data-theme="dark"] .menu-user-row .role-text{color:#fbbf24}
.logout-btn{width:100%;background:linear-gradient(135deg,#f56565,#e53e3e);color:#fff;border:none;padding:8px;border-radius:10px;cursor:pointer;font-weight:bold;display:flex;align-items:center;justify-content:center;gap:4px;font-size:.8rem;box-shadow:0 4px 12px rgba(245,101,101,.4)}
.logout-btn:hover{opacity:.9}
.header-bar{display:grid;grid-template-columns:1fr 1fr;gap:15px;align-items:stretch;padding:15px 20px;border-radius:16px;margin-bottom:20px;background:linear-gradient(135deg,rgba(102,126,234,.2),rgba(118,75,162,.15));border:2px solid rgba(102,126,234,.4);box-shadow:0 4px 15px rgba(102,126,234,.2)}
[data-theme="dark"] .header-bar{background:linear-gradient(135deg,rgba(251,191,36,.2),rgba(245,158,11,.15));border-color:rgba(251,191,36,.4)}
.welcome-with-greeting{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.welcome-with-greeting .welcome-text{font-size:1.2rem;font-weight:bold;color:#667eea}
[data-theme="dark"] .welcome-with-greeting .welcome-text{color:#fbbf24}
.welcome-with-greeting .greeting-text{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:5px 12px;border-radius:8px;font-size:.82rem;font-weight:bold}
[data-theme="dark"] .welcome-with-greeting .greeting-text{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e}
.content-area{background:rgba(255,255,255,.98);border-radius:20px;padding:20px;min-height:500px;box-shadow:0 10px 30px rgba(0,0,0,.15);border:2px solid rgba(102,126,234,.2)}
[data-theme="dark"] .content-area{background:rgba(26,26,46,.98);border-color:rgba(251,191,36,.2)}
.info-box{background:linear-gradient(135deg,rgba(66,153,225,.2),rgba(102,126,234,.15));border-right:5px solid #4299e1;padding:12px 16px;margin-bottom:18px;border-radius:12px;font-weight:bold;display:flex;align-items:center;gap:10px;font-size:.9rem;box-shadow:0 4px 12px rgba(66,153,225,.2)}
[data-theme="dark"] .info-box{background:linear-gradient(135deg,rgba(251,191,36,.2),rgba(245,158,11,.15));border-right-color:#fbbf24}
.dashboard-section{background:linear-gradient(135deg,rgba(247,250,252,.9),rgba(237,242,247,.8));border-radius:14px;padding:18px;margin-bottom:18px;border:2px solid rgba(102,126,234,.3);border-right:5px solid #667eea;box-shadow:0 4px 15px rgba(102,126,234,.15)}
[data-theme="dark"] .dashboard-section{background:linear-gradient(135deg,rgba(30,30,63,.9),rgba(26,26,46,.8));border-color:rgba(251,191,36,.3);border-right-color:#fbbf24}
.dashboard-section h3{color:#2d3748;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:1rem}
[data-theme="dark"] .dashboard-section h3{color:#fbbf24}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:14px;padding:15px;border:2px solid #e2e8f0;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.1)}
[data-theme="dark"] .stat-card{background:#1e1e3f;border-color:#fbbf24}
.stat-card .stat-icon{font-size:1.8rem;margin-bottom:8px}
.stat-card .stat-value{font-size:1.5rem;font-weight:bold;color:#2d3748}
[data-theme="dark"] .stat-card .stat-value{color:#fbbf24}
.stat-card .stat-label{font-size:.8rem;color:#718096}
.profile-info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.profile-info-item{display:flex;align-items:center;gap:10px;background:#fff;padding:12px 14px;border-radius:12px;border:2px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
[data-theme="dark"] .profile-info-item{background:#1e1e3f;border-color:#fbbf24}
.profile-info-item i{font-size:1.2rem;color:#667eea;width:26px;text-align:center}
[data-theme="dark"] .profile-info-item i{color:#fbbf24}
.profile-info-item .info-label{font-weight:bold;color:#718096;font-size:.75rem}
.profile-info-item .info-value{font-weight:bold;color:#2d3748;font-size:.92rem}
[data-theme="dark"] .profile-info-item .info-value{color:#fbbf24}
.last-tx-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.last-tx-item{background:#fff;padding:10px 12px;border-radius:10px;border:2px solid #e2e8f0;box-shadow:0 2px 6px rgba(0,0,0,.08)}
[data-theme="dark"] .last-tx-item{background:#1e1e3f;border-color:#fbbf24}
.last-tx-label{font-size:.75rem;color:#718096;margin-bottom:3px;display:flex;align-items:center;gap:5px;font-weight:bold}
.last-tx-label i{color:#38b2ac}
[data-theme="dark"] .last-tx-label i{color:#fbbf24}
.last-tx-value{font-size:.88rem;font-weight:bold;color:#2d3748;word-break:break-word}
[data-theme="dark"] .last-tx-value{color:#fbbf24}
.loan-info{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
.loan-info-item{background:#fff;padding:12px;border-radius:10px;border:2px solid #e2e8f0;display:flex;flex-direction:column;gap:5px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
[data-theme="dark"] .loan-info-item{background:#1e1e3f;border-color:#fbbf24}
.loan-info-label{font-size:.75rem;color:#718096;margin-bottom:2px;display:flex;align-items:center;gap:6px;font-weight:bold}
.loan-info-label i{color:#9f7aea;font-size:.85rem}
[data-theme="dark"] .loan-info-label i{color:#fbbf24}
.loan-info-value{font-size:.92rem;font-weight:bold;color:#2d3748;word-break:break-word}
[data-theme="dark"] .loan-info-value{color:#fbbf24}
.warning-box{background:#fff5f5;border:2px solid #feb2b2;border-radius:12px;padding:12px 15px;color:#c53030;display:flex;align-items:center;gap:10px;margin-top:12px;font-size:.88rem;font-weight:bold;box-shadow:0 4px 12px rgba(254,178,178,.3)}
.warning-box.inactive{background:rgba(66,153,225,.1);border-color:#e53e3e}
.warning-box.savings{background:#fffff0;border-color:#d69e2e;color:#975a16}
[data-theme="dark"] .warning-box.savings{background:rgba(251,191,36,.1);color:#fbbf24;border-color:#fbbf24}
.warning-box.loan{background:rgba(66,153,225,.1);border-color:#e53e3e;color:#2d3748}
.warning-box.loan-critical{background:#fed7d7;border-color:#c53030;color:#742a2a}
[data-theme="dark"] .warning-box.loan-critical{background:rgba(239,68,68,.15);color:#fca5a5;border-color:#ef4444}
.account-status-badge{padding:3px 8px;border-radius:10px;font-size:.75rem;font-weight:bold;display:inline-flex;align-items:center;gap:3px}
.account-status-badge.active{background:rgba(72,187,120,.15);color:#38a169}
.account-status-badge.inactive{background:rgba(229,62,62,.1);color:#e53e3e}
.coin-display{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,rgba(236,201,75,.2),rgba(214,158,46,.15));padding:15px;border-radius:14px;margin-bottom:15px;border:2px solid rgba(236,201,75,.4);box-shadow:0 4px 12px rgba(236,201,75,.2)}
.coin-display i{font-size:1.8rem;color:#d69e2e}
[data-theme="dark"] .coin-display i{color:#fbbf24}
.coin-display .coin-label{font-size:.85rem;color:#718096;font-weight:bold}
.coin-display .coin-amount{font-size:1.5rem;font-weight:bold;color:#d69e2e}
[data-theme="dark"] .coin-display .coin-amount{color:#fbbf24}
.table-wrapper-scroll{max-height:500px;overflow:auto;border:2px solid #e2e8f0;border-radius:12px;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1)}
[data-theme="dark"] .table-wrapper-scroll{background:#1e1e3f;border-color:#fbbf24}
.table-wrapper-scroll table{min-width:1100px;border-collapse:collapse;font-size:.82rem}
.table-wrapper-scroll th,.table-wrapper-scroll td{padding:8px 6px;text-align:right;border-bottom:1px solid #e2e8f0;min-width:90px}
[data-theme="dark"] .table-wrapper-scroll th,[data-theme="dark"] .table-wrapper-scroll td{border-color:#fbbf24}
.table-wrapper-scroll th{background:linear-gradient(135deg,#2d3748,#1a202c);color:#fff;position:sticky;top:0;z-index:10;font-size:.78rem;font-weight:bold}
[data-theme="dark"] .table-wrapper-scroll th{background:linear-gradient(135deg,#1e1e3f,#16213e);color:#fbbf24}
.table-wrapper-scroll tbody tr:hover{background:rgba(102,126,234,.05)}
[data-theme="dark"] .table-wrapper-scroll tbody tr:hover{background:rgba(251,191,36,.05)}
table{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:12px}
th,td{padding:8px 6px;text-align:right;border-bottom:1px solid #e2e8f0}
[data-theme="dark"] th,[data-theme="dark"] td{border-color:#fbbf24}
th{background:linear-gradient(135deg,#2d3748,#1a202c);color:#fff;position:sticky;top:0;font-size:.78rem;font-weight:bold}
[data-theme="dark"] th{background:linear-gradient(135deg,#1e1e3f,#16213e);color:#fbbf24}
.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;background:linear-gradient(135deg,rgba(247,250,252,.9),rgba(237,242,247,.8));padding:12px;border-radius:12px;border:2px solid rgba(102,126,234,.2);box-shadow:0 2px 8px rgba(0,0,0,.08)}
[data-theme="dark"] .filter-bar{background:linear-gradient(135deg,rgba(30,30,63,.9),rgba(26,26,46,.8))}
.filter-bar input,.filter-bar select{padding:8px 12px;border:2px solid #e2e8f0;border-radius:10px;background:#fff;color:#2d3748;flex:1;font-size:.88rem;font-weight:bold}
[data-theme="dark"] .filter-bar input,[data-theme="dark"] .filter-bar select{background:#1e1e3f;border-color:#fbbf24;color:#fbbf24}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
.shop-card{background:#fff;border-radius:16px;padding:18px;border:2px solid #e2e8f0;box-shadow:0 4px 12px rgba(0,0,0,.1)}
[data-theme="dark"] .shop-card{background:#1e1e3f;border-color:#fbbf24}
.shop-card-title{font-size:1.05rem;font-weight:bold;color:#2d3748;margin-bottom:8px}
[data-theme="dark"] .shop-card-title{color:#fbbf24}
.shop-card-description{color:#4a5568;font-size:.85rem;margin-bottom:12px}
[data-theme="dark"] .shop-card-description{color:#d97706}
.shop-card-price{display:flex;align-items:center;gap:8px;padding:10px;background:linear-gradient(135deg,rgba(236,201,75,.2),rgba(214,158,46,.15));border-radius:10px;margin-bottom:8px;border:1px solid rgba(236,201,75,.3)}
.shop-card-price i{font-size:1.1rem;color:#d69e2e}
.shop-card-price .price-value{font-size:1.1rem;font-weight:bold;color:#d69e2e}
[data-theme="dark"] .shop-card-price .price-value{color:#fbbf24}
.coin-history-item{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:12px;border-radius:10px;margin-bottom:8px;border:1px solid #e2e8f0;box-shadow:0 2px 6px rgba(0,0,0,.08)}
[data-theme="dark"] .coin-history-item{background:#1e1e3f;border-color:#fbbf24}
.coin-history-item.positive{border-right:3px solid #48bb78}
.coin-history-item.negative{border-right:3px solid #e53e3e}
.coin-rule-item{display:flex;justify-content:space-between;align-items:center;padding:10px;border-radius:8px;margin-bottom:6px;background:#fff;border:1px solid #e2e8f0;font-size:.9rem;font-weight:bold;box-shadow:0 2px 6px rgba(0,0,0,.08)}
[data-theme="dark"] .coin-rule-item{background:#1e1e3f;border-color:#fbbf24}
.coin-rule-item.achieved{background:linear-gradient(135deg,rgba(72,187,120,.15),rgba(56,161,105,.1));border-color:#48bb78}
.coin-rule-item.not-achieved{background:rgba(229,62,62,.05);border-color:#e53e3e;opacity:.7}
.support-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.support-card{background:#fff;border-radius:12px;padding:10px;border:2px solid #e2e8f0;display:flex;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
[data-theme="dark"] .support-card{background:#1e1e3f;border-color:#fbbf24}
.support-card .support-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;flex-shrink:0}
.support-card .support-icon.phone{background:linear-gradient(135deg,#48bb78,#38a169)}
.support-card .support-icon.account{background:linear-gradient(135deg,#4299e1,#3182ce)}
.support-card .support-icon.card{background:linear-gradient(135deg,#9f7aea,#805ad5)}
.support-card .support-icon.sheba{background:linear-gradient(135deg,#ed8936,#dd6b20)}
.support-card .support-icon.itaa{background:linear-gradient(135deg,#38b2ac,#319795)}
.support-card .support-icon.web{background:linear-gradient(135deg,#f56565,#e53e3e)}
.support-card .support-content{flex:1;min-width:0}
.support-card .support-label{font-size:.7rem;color:#718096;margin-bottom:2px;font-weight:bold}
.support-card .support-value{font-weight:bold;color:#2d3748;font-size:.78rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
[data-theme="dark"] .support-card .support-value{color:#fbbf24}
.copy-btn{background:rgba(102,126,234,.1);border:none;color:#667eea;padding:3px 7px;border-radius:6px;cursor:pointer;font-size:.7rem;font-weight:bold}
[data-theme="dark"] .copy-btn{background:rgba(251,191,36,.2);color:#fbbf24}
.copy-btn.copied{background:rgba(72,187,120,.15);color:#48bb78}
.help-section{background:#fff;border-radius:14px;padding:15px;margin-bottom:12px;border:1px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.08)}
[data-theme="dark"] .help-section{background:#1e1e3f;border-color:#fbbf24}
.help-section h4{color:#667eea;margin-bottom:8px;display:flex;align-items:center;gap:6px;font-size:.95rem}
[data-theme="dark"] .help-section h4{color:#fbbf24}
.help-section p,.help-section li{color:#4a5568;line-height:1.7;font-size:.9rem}
[data-theme="dark"] .help-section p,[data-theme="dark"] .help-section li{color:#d97706}

function calculateMemberScore(member){
let score=0;const details={};
const totalInstallments=member.totalInstallments||0;const paidInstallments=member.paidInstallments||0;const overdueInstallments=Math.abs(member.overdueInstallments||0);
let installmentScore=0;
if(totalInstallments>0){installmentScore=(paidInstallments/totalInstallments)*40;installmentScore=Math.max(0,installmentScore-(overdueInstallments*5));}else{installmentScore=40;}
installmentScore=Math.max(0,Math.min(40,installmentScore));
details.installment={score:Math.round(installmentScore),max:40};
const savings=member.savingsStatus||0;let savingsScore=0;
if(savings>=0){savingsScore=25;}else{const monthlySalary=member.monthlySalary||1;const ratio=Math.abs(savings)/monthlySalary;savingsScore=Math.max(0,25-(ratio*25));}
savingsScore=Math.max(0,Math.min(25,savingsScore));
details.savings={score:Math.round(savingsScore),max:25};
const coins=userCoins;let coinsScore=Math.min(coins/50,1)*20;coinsScore=Math.max(0,Math.min(20,coinsScore));
details.coins={score:Math.round(coinsScore),max:20,value:coins};
const txCount=transactions.filter(t=>String(t._memberId)===String(member.id)).length;
let activityScore=Math.min(txCount/10,1)*15;activityScore=Math.max(0,Math.min(15,activityScore));
details.activity={score:Math.round(activityScore),max:15,value:txCount};
score=installmentScore+savingsScore+coinsScore+activityScore;
score=Math.max(0,Math.min(100,score));score=Math.round(score);
let tier,tierName,tierEmoji,tierColor,tierMessage;
if(score>=80){tier='gold';tierName='طلایی';tierEmoji='⭐';tierColor='#FFD700';tierMessage=' عالی! شما عضو طلایی صندوق هستید.';}
else if(score>=50){tier='silver';tierName='نقره‌ای';tierEmoji='🥈';tierColor='#C0C0C0';tierMessage='💪 خوب! کمی دیگر تا طلایی شدن فاصله دارید.';}
else{tier='black';tierName='سیاه';tierEmoji='⚫';tierColor='#4A5568';tierMessage='️ توجه! وضعیت حساب شما نیاز به بهبود دارد.';}
return{score,tier,tierName,tierEmoji,tierColor,tierMessage,details};
}

function renderGaugeChart(score,size='large'){
const sizes={small:{width:60,height:60,strokeWidth:6,fontSize:12,textSize:7,cy:38},medium:{width:100,height:100,strokeWidth:8,fontSize:20,textSize:9,cy:62},large:{width:160,height:160,strokeWidth:12,fontSize:32,textSize:12,cy:100}};
const s=sizes[size];
let startColor,endColor,tierName,tierEmoji;
if(score>=80){startColor='#FFD700';endColor='#FFA500';tierName='طلایی';tierEmoji='⭐';}
else if(score>=50){startColor='#E8E8E8';endColor='#A8A8A8';tierName='نقره‌ای';tierEmoji='';}
else{startColor='#6B7280';endColor='#374151';tierName='سیاه';tierEmoji='';}
const radius=(s.width-s.strokeWidth)/2;const circumference=Math.PI*radius;const progress=(score/100)*circumference;
const cx=s.width/2;const cy=s.cy;const uid='g_'+Math.random().toString(36).substr(2,9);
return`<svg width="${s.width}" height="${s.height}" class="gauge-chart" viewBox="0 0 ${s.width} ${s.height}"><defs><linearGradient id="${uid}" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:${startColor};stop-opacity:1"/><stop offset="100%" style="stop-color:${endColor};stop-opacity:1"/></linearGradient></defs><path d="M ${cx-radius} ${cy} A ${radius} ${radius} 0 0 1 ${cx+radius} ${cy}" fill="none" stroke="rgba(128,128,128,0.2)" stroke-width="${s.strokeWidth}" stroke-linecap="round"/><path d="M ${cx-radius} ${cy} A ${radius} ${radius} 0 0 1 ${cx+radius} ${cy}" fill="none" stroke="url(#${uid})" stroke-width="${s.strokeWidth}" stroke-linecap="round" stroke-dasharray="${progress} ${circumference}"/><text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="${s.fontSize}" font-weight="700" fill="currentColor">${Math.round(score)}</text><text x="${cx}" y="${cy+s.textSize+4}" text-anchor="middle" font-size="${s.textSize}" fill="currentColor" opacity="0.7">${tierEmoji} ${tierName}</text></svg>`;
}

function getTimeAgo(timestamp){const diff=Date.now()-timestamp;const seconds=Math.floor(diff/1000);const minutes=Math.floor(seconds/60);const hours=Math.floor(minutes/60);const days=Math.floor(hours/24);if(seconds<60)return'لحظاتی پیش';if(minutes<60)return`${minutes} دقیقه پیش`;if(hours<24)return`${hours} ساعت پیش`;if(days<7)return`${days} روز پیش`;return`${Math.floor(days/7)} هفته پیش`;}

function calculateMembershipDuration(datMiladi){
if(!datMiladi)return'نامشخص';
const open=new Date(datMiladi);
if(isNaN(open.getTime()))return'نامشخص';
const now=new Date();
let years=now.getFullYear()-open.getFullYear();
let months=now.getMonth()-open.getMonth();
let days=now.getDate()-open.getDate();
if(days<0){months--;days+=new Date(now.getFullYear(),now.getMonth(),0).getDate();}
if(months<0){years--;months+=12;}
return`${years} سال، ${months} ماه و ${days} روز`;
}

function buyProduct(shenaseh,name,price){
if(userCoins>=price){
if(confirm(`آیا می‌خواهید ${name} را به قیمت ${price} امتیاز خریداری کنید؟`)){
deductCoins(price,'خرید از فروشگاه',`محصول: ${name}`);
const purchases=JSON.parse(localStorage.getItem('sandogh_purchases_'+currentUser.memberId)||'[]');
const orderCode='ORD-'+Date.now().toString().slice(-6);

function copyText(text,btn){navigator.clipboard.writeText(text).then(()=>{btn.innerHTML='<i class="fas fa-check"></i> کپی شد';btn.classList.add('copied');setTimeout(()=>{btn.innerHTML='<i class="fas fa-copy"></i> کپی';btn.classList.remove('copied');},2000);});}
