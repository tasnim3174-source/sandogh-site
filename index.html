<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ШіЫҢШіШӘЩ… ШӯШіШ§ШЁШҜШ§ШұЫҢ ШөЩҶШҜЩҲЩӮ Ш§ШӘШӯШ§ШҜ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
<style>
:root{--bg-gradient:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);--card-bg:rgba(255,255,255,.95);--text-primary:#2d3748;--text-secondary:#4a5568;--text-muted:#718096;--text-light:#a0aec0;--border-color:rgba(226,232,240,.5);--input-bg:#fff;--input-border:#e2e8f0;--hover-bg:rgba(102,126,234,.05);--section-bg:linear-gradient(135deg,rgba(247,250,252,.8),rgba(237,242,247,.8));--info-bg:linear-gradient(135deg,rgba(66,153,225,.1),rgba(66,153,225,.05));--shadow:0 25px 50px rgba(0,0,0,.25);--clock-bg:linear-gradient(135deg,#667eea,#764ba2);--clock-text:#fff;--datetime-bg:rgba(102,126,234,.1);--datetime-text:#2d3748;--datetime-label:#718096;--welcome-text:#667eea;--menu-text:#4a5568;--menu-hover:rgba(102,126,234,.1);--table-header:linear-gradient(135deg,#2d3748,#1a202c);--table-text:#2d3748;--table-hover:rgba(102,126,234,.05)}
[data-theme="dark"]{--bg-gradient:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);--card-bg:rgba(26,26,46,.95);--text-primary:#fbbf24;--text-secondary:#f59e0b;--text-muted:#d97706;--text-light:#b45309;--border-color:rgba(251,191,36,.2);--input-bg:#1e1e3f;--input-border:#fbbf24;--hover-bg:rgba(251,191,36,.1);--section-bg:linear-gradient(135deg,rgba(30,30,63,.8),rgba(26,26,46,.8));--info-bg:linear-gradient(135deg,rgba(251,191,36,.15),rgba(245,158,11,.1));--shadow:0 25px 50px rgba(0,0,0,.5);--clock-bg:linear-gradient(135deg,#f59e0b,#d97706);--clock-text:#fff;--datetime-bg:rgba(251,191,36,.15);--datetime-text:#fbbf24;--datetime-label:#f59e0b;--welcome-text:#fbbf24;--menu-text:#fbbf24;--menu-hover:rgba(251,191,36,.15);--table-header:linear-gradient(135deg,#1e1e3f,#16213e);--table-text:#fbbf24;--table-hover:rgba(251,191,36,.1)}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Vazirmatn',Tahoma,system-ui,sans-serif}
body{background:var(--bg-gradient);min-height:100vh;padding:20px;transition:background .3s ease;color:var(--text-primary)}
.container{max-width:1600px;margin:0 auto}
.login-page,.app-page{background:var(--card-bg);border-radius:32px;padding:40px;box-shadow:var(--shadow);transition:all .3s ease}
.hidden{display:none!important}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:16px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Vazirmatn',Tahoma,sans-serif;transition:all .3s}
[data-theme="dark"] .btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(0,0,0,.2)}
.btn-small{padding:8px 16px;font-size:.85rem;border-radius:20px;border:none;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px;font-family:'Vazirmatn',Tahoma,sans-serif;transition:all .3s}
.btn-small:hover{transform:translateY(-1px)}
.success-btn{background:linear-gradient(135deg,#48bb78,#38a169);color:#fff}
.danger-btn{background:linear-gradient(135deg,#f56565,#e53e3e);color:#fff}
.edit-btn{background:linear-gradient(135deg,#ed8936,#dd6b20);color:#fff}
.info-btn{background:linear-gradient(135deg,#4299e1,#3182ce);color:#fff}
[data-theme="dark"] .success-btn{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a2e}
[data-theme="dark"] .info-btn{background:linear-gradient(135deg,#fbbf24,#d97706);color:#1a1a2e}
.app-layout{display:flex;gap:25px;margin-top:25px}
.vertical-menu{width:240px;background:var(--card-bg);border-radius:24px;padding:25px 15px;flex-shrink:0;max-height:calc(100vh - 200px);overflow-y:auto;transition:all .3s}
.vertical-menu .menu-item{display:flex;align-items:center;gap:12px;padding:14px 18px;margin:6px 0;border-radius:16px;color:var(--menu-text);font-weight:600;cursor:pointer;transition:all .2s}
.vertical-menu .menu-item:hover{background:var(--menu-hover)}
.vertical-menu .menu-item.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
[data-theme="dark"] .vertical-menu .menu-item.active{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e}
.admin-badge{background:rgba(255,255,255,.25);padding:2px 8px;border-radius:8px;font-size:.7rem;margin-right:auto;font-weight:700;letter-spacing:.5px}
[data-theme="dark"] .admin-badge{background:rgba(26,26,46,.4);color:#fbbf24}
.content-area{flex:1;background:var(--card-bg);border-radius:24px;padding:30px;min-height:600px;overflow-y:auto;transition:all .3s}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:.9rem}
th,td{padding:12px 15px;text-align:right;border-bottom:1px solid var(--border-color);color:var(--table-text)}
th{background:var(--table-header);font-weight:700;color:#fff;position:sticky;top:0;z-index:10}
tbody tr:hover{background:var(--table-hover)}
.input-group{margin-bottom:25px;position:relative}
.input-group label{display:block;margin-bottom:8px;font-weight:600;color:var(--text-secondary)}
.input-group input,.input-group select,.input-group textarea{width:100%;padding:14px;border:2px solid var(--input-border);border-radius:16px;font-size:1rem;background:var(--input-bg);color:var(--text-primary);font-family:'Vazirmatn',Tahoma,sans-serif;transition:all .3s}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
[data-theme="dark"] .input-group input:focus,[data-theme="dark"] .input-group select:focus,[data-theme="dark"] .input-group textarea:focus{border-color:#fbbf24;box-shadow:0 0 0 3px rgba(251,191,36,.2)}
.toggle-password{position:absolute;left:14px;top:42px;background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--text-muted);transition:color .3s}
.toggle-password:hover{color:#667eea}
[data-theme="dark"] .toggle-password:hover{color:#fbbf24}
.error-msg{color:#e53e3e;text-align:center;margin-top:20px;padding:12px;background:rgba(229,62,62,.1);border-radius:12px}
.info-box{background:var(--info-bg);border-right:5px solid #4299e1;padding:16px 20px;margin-bottom:25px;border-radius:16px;font-weight:600;display:flex;align-items:center;gap:10px;color:var(--text-primary);transition:all .3s}
[data-theme="dark"] .info-box{border-right-color:#fbbf24}
.dashboard-section{background:var(--section-bg);border-radius:20px;padding:25px;margin-bottom:25px;border-right:5px solid #667eea;color:var(--text-primary);transition:all .3s}
[data-theme="dark"] .dashboard-section{border-right-color:#fbbf24}
.dashboard-section h3{color:var(--text-primary);margin-bottom:15px;display:flex;align-items:center;gap:10px}
.filter-bar{display:flex;gap:12px;margin-bottom:25px;flex-wrap:wrap;background:var(--section-bg);padding:15px;border-radius:16px}
.filter-bar input,.filter-bar select{padding:10px 15px;border:2px solid var(--input-border);border-radius:12px;background:var(--input-bg);color:var(--text-primary);font-family:'Vazirmatn',Tahoma,sans-serif}
.filter-bar input{flex:1}
.header-bar{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;padding:20px 30px;border-radius:24px;margin-bottom:25px;background:var(--card-bg);transition:all .3s}
.datetime-display{display:flex;gap:15px;flex-wrap:wrap}
.date-combined-box{background:var(--datetime-bg);border-radius:16px;padding:15px 20px;display:flex;flex-direction:column;gap:8px;min-width:200px;transition:all .3s}
.date-combined-box .date-row{display:flex;align-items:center;gap:10px;font-size:.95rem;color:var(--datetime-text)}
.date-combined-box .date-row i{color:#667eea;width:20px}
[data-theme="dark"] .date-combined-box .date-row i{color:#fbbf24}
.date-combined-box .date-row.day-name{font-weight:700;font-size:1rem;color:#667eea;border-top:1px dashed var(--border-color);padding-top:8px;margin-top:4px}
[data-theme="dark"] .date-combined-box .date-row.day-name{color:#fbbf24}
.system-message-box{background:linear-gradient(135deg,rgba(236,201,75,.1),rgba(214,158,46,.05));border:2px solid #ecc94b;border-radius:12px;padding:10px 15px;font-size:.9rem;color:var(--text-primary);max-width:400px;line-height:1.6;transition:all .3s}
[data-theme="dark"] .system-message-box{background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(245,158,11,.05));border-color:#fbbf24}
.system-message-box .message-icon{color:#ecc94b;margin-left:8px}
[data-theme="dark"] .system-message-box .message-icon{color:#fbbf24}
.welcome-with-greeting{display:flex;align-items:center;gap:15px;flex-wrap:wrap}
.welcome-with-greeting .greeting-text{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:8px 16px;border-radius:12px;font-size:.9rem;font-weight:600;transition:all .3s}
[data-theme="dark"] .welcome-with-greeting .greeting-text{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e}
.welcome-with-greeting .welcome-text{font-size:1.3rem;font-weight:700;color:var(--welcome-text)}
.datetime-card{display:flex;align-items:center;gap:12px;padding:12px 20px;border-radius:16px;background:var(--datetime-bg);transition:all .3s}
.datetime-card i{font-size:1.5rem;color:#667eea}
[data-theme="dark"] .datetime-card i{color:#fbbf24}
.datetime-card .dt-label{font-size:.75rem;color:var(--datetime-label)}
.datetime-card .dt-value{font-size:1.1rem;font-weight:700;color:var(--datetime-text)}
.clock-card{background:var(--clock-bg);color:var(--clock-text);padding:15px 25px;border-radius:20px;display:flex;align-items:center;gap:15px;box-shadow:0 5px 15px rgba(102,126,234,.3);transition:all .3s}
[data-theme="dark"] .clock-card{box-shadow:0 5px 15px rgba(251,191,36,.3)}
.clock-card .clock-time{font-size:1.8rem;font-weight:700;font-family:'Vazirmatn',monospace;letter-spacing:2px;text-shadow:0 2px 4px rgba(0,0,0,.2)}
.header-actions{display:flex;gap:15px;align-items:center}
.coin-badge{display:flex;align-items:center;gap:8px;padding:10px 18px;background:linear-gradient(135deg,#ecc94b,#d69e2e);color:#fff;border-radius:20px;font-weight:700}
.search-box{margin-bottom:20px;display:flex;gap:12px;align-items:center;background:var(--section-bg);padding:12px 18px;border-radius:16px}
.search-box input{flex:1;padding:10px 15px;border:2px solid var(--input-border);border-radius:12px;background:var(--input-bg);color:var(--text-primary);font-family:'Vazirmatn',Tahoma,sans-serif}
.table-wrapper{overflow-x:auto;max-height:600px;overflow-y:auto;border:2px solid var(--border-color);border-radius:16px;background:var(--input-bg)}
.password-dots{font-family:monospace;font-size:1.2rem;cursor:pointer;background:var(--input-bg);padding:6px 12px;border-radius:12px;display:inline-flex;align-items:center;gap:8px;color:var(--text-primary)}
.warning-box{background:#fff5f5;border:2px solid #feb2b2;border-radius:16px;padding:18px 20px;color:#c53030;display:flex;align-items:center;gap:12px;margin-top:15px;transition:all .3s}
.warning-box.inactive{background:var(--warning-bg);border-color:#e53e3e}
.warning-box.savings{background:#fffff0;border-color:#d69e2e;color:#975a16}
[data-theme="dark"] .warning-box.savings{background:rgba(251,191,36,.1);color:#fbbf24;border-color:#fbbf24}
.warning-box.loan{background:var(--warning-bg);border-color:#e53e3e;color:var(--text-primary)}
.warning-box.loan-critical{background:#fed7d7;border-color:#c53030;color:#742a2a}
[data-theme="dark"] .warning-box.loan-critical{background:rgba(239,68,68,.15);color:#fca5a5;border-color:#ef4444}
.loan-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.loan-info-item{background:var(--input-bg);padding:12px 15px;border-radius:12px;border:2px solid var(--input-border);transition:all .3s}
.loan-info-label{font-size:.8rem;color:var(--text-muted);margin-bottom:5px}
.loan-info-value{font-size:1rem;font-weight:700;color:var(--text-primary)}
.coin-display{background:linear-gradient(135deg,#ecc94b,#d69e2e);color:#fff;padding:12px 20px;border-radius:14px;text-align:center;margin-bottom:20px;box-shadow:0 3px 12px rgba(236,201,75,.3);display:inline-flex;align-items:center;gap:10px;transition:all .3s}
.coin-display .coin-amount{font-size:1.4rem;font-weight:700}
.coin-display .coin-label{font-size:.85rem;opacity:.95}
.coin-history-item{background:var(--input-bg);border-radius:12px;padding:15px;margin-bottom:10px;border-right:4px solid #667eea;display:flex;justify-content:space-between;align-items:center;transition:all .3s}
[data-theme="dark"] .coin-history-item{border-right-color:#fbbf24}
.coin-history-item.positive{border-right-color:#48bb78}
.coin-history-item.negative{border-right-color:#e53e3e}
[data-theme="dark"] .coin-history-item.positive{border-right-color:#fbbf24}
.coin-amount-badge{background:linear-gradient(135deg,#ecc94b,#d69e2e);color:#fff;padding:6px 14px;border-radius:20px;font-weight:700}
.coin-rules-box{background:var(--info-bg);border-radius:16px;padding:20px;margin-bottom:20px;transition:all .3s}
.coin-rule-item{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:var(--input-bg);border-radius:12px;margin-bottom:8px;color:var(--text-primary);transition:all .3s}
.coin-rule-item.achieved{background:rgba(72,187,120,.1);border-right:3px solid #48bb78}
[data-theme="dark"] .coin-rule-item.achieved{background:rgba(251,191,36,.15);border-right-color:#fbbf24}
.coin-rule-item.not-achieved{background:rgba(229,62,62,.05);border-right:3px solid #e53e3e}
.coin-rule-item.locked{background:rgba(160,174,192,.1);border-right:3px solid #a0aec0;opacity:.6}
.profile-info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;padding:10px}
.profile-info-item{display:flex;align-items:center;gap:12px;background:var(--input-bg);padding:14px 16px;border-radius:14px;border:1px solid var(--input-border);transition:all .3s}
.profile-info-item i{font-size:1.4rem;color:#667eea;width:30px;text-align:center}
[data-theme="dark"] .profile-info-item i{color:#fbbf24}
.profile-info-item .info-content{flex:1}
.profile-info-item .info-label{font-weight:600;color:var(--text-muted);font-size:.8rem;margin-bottom:3px}
.profile-info-item .info-value{font-weight:700;color:var(--text-primary);font-size:1rem}
.last-login-box{background:var(--info-bg);border-right:4px solid #4299e1;padding:14px 18px;border-radius:14px;margin-top:15px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;transition:all .3s}
[data-theme="dark"] .last-login-box{border-right-color:#fbbf24}
.last-login-box i{font-size:1.3rem;color:#4299e1}
[data-theme="dark"] .last-login-box i{color:#fbbf24}
.last-login-box .ll-label{font-size:.8rem;color:var(--text-muted)}
.last-login-box .ll-value{font-weight:700;color:var(--text-primary);font-size:1rem}
.last-tx-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.last-tx-item{background:var(--input-bg);padding:12px 15px;border-radius:12px;border:2px solid var(--input-border);transition:all .3s}
.last-tx-label{font-size:.8rem;color:var(--text-muted);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.last-tx-value{font-size:1rem;font-weight:700;color:var(--text-primary)}
.sms-status-icon{font-size:1.3rem;font-weight:700}
.account-status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-weight:700;font-size:.9rem}
.account-status-badge.active{background:rgba(72,187,120,.15);color:#22543d}
[data-theme="dark"] .account-status-badge.active{background:rgba(251,191,36,.2);color:#fbbf24}
.account-status-badge.inactive{background:rgba(229,62,62,.15);color:#9b2c2c}
[data-theme="dark"] .account-status-badge.inactive{background:rgba(239,68,68,.2);color:#fca5a5}
.coming-soon-box{background:var(--info-bg);border:2px dashed #667eea;border-radius:24px;padding:60px 40px;text-align:center;margin:40px auto;max-width:500px;transition:all .3s}
[data-theme="dark"] .coming-soon-box{border-color:#fbbf24}
.coming-soon-box i{font-size:5rem;color:#667eea;margin-bottom:20px}
[data-theme="dark"] .coming-soon-box i{color:#fbbf24}
.coming-soon-box h2{color:var(--text-primary);margin-bottom:15px;font-size:1.8rem}
.coming-soon-box p{color:var(--text-muted);font-size:1.1rem;line-height:1.8}
.installment-select{width:100%;padding:12px;border:2px solid var(--input-border);border-radius:12px;font-size:1rem;margin-bottom:15px;background:var(--input-bg);color:var(--text-primary);font-family:'Vazirmatn',Tahoma,sans-serif}
.calendar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
.calendar-event{background:var(--input-bg);border-radius:14px;padding:15px;border-right:4px solid #667eea;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:all .3s}
[data-theme="dark"] .calendar-event{border-right-color:#fbbf24}
.calendar-event.birthday{border-right-color:#ecc94b}
.calendar-event.installment{border-right-color:#48bb78}
[data-theme="dark"] .calendar-event.installment{border-right-color:#fbbf24}
.calendar-event.occasion{border-right-color:#ed8936}
.calendar-event .event-date{font-size:.85rem;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.calendar-event .event-title{font-weight:700;color:var(--text-primary);margin-bottom:5px}
.calendar-event .event-desc{font-size:.9rem;color:var(--text-secondary)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:25px}
.stat-card{background:var(--input-bg);border-radius:16px;padding:20px;border:2px solid var(--input-border);text-align:center;transition:all .3s}
.stat-card .stat-icon{font-size:2rem;margin-bottom:10px}
.stat-card .stat-value{font-size:1.8rem;font-weight:700;color:var(--text-primary)}
.stat-card .stat-label{font-size:.85rem;color:var(--text-muted);margin-top:5px}
.stat-card.blue{border-color:#4299e1}
.stat-card.blue .stat-icon{color:#4299e1}
[data-theme="dark"] .stat-card.blue{border-color:#fbbf24}
[data-theme="dark"] .stat-card.blue .stat-icon{color:#fbbf24}
.stat-card.green{border-color:#48bb78}
.stat-card.green .stat-icon{color:#48bb78}
[data-theme="dark"] .stat-card.green{border-color:#fbbf24}
[data-theme="dark"] .stat-card.green .stat-icon{color:#fbbf24}
.stat-card.red{border-color:#e53e3e}
.stat-card.red .stat-icon{color:#e53e3e}
[data-theme="dark"] .stat-card.red{border-color:#ef4444}
[data-theme="dark"] .stat-card.red .stat-icon{color:#ef4444}
.stat-card.yellow{border-color:#ecc94b}
.stat-card.yellow .stat-icon{color:#d69e2e}
[data-theme="dark"] .stat-card.yellow{border-color:#fbbf24}
[data-theme="dark"] .stat-card.yellow .stat-icon{color:#fbbf24}
.stat-card.purple{border-color:#9f7aea}
.stat-card.purple .stat-icon{color:#9f7aea}
[data-theme="dark"] .stat-card.purple{border-color:#fbbf24}
[data-theme="dark"] .stat-card.purple .stat-icon{color:#fbbf24}
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:200px;padding:20px;background:var(--input-bg);border-radius:16px;border:2px solid var(--input-border);transition:all .3s}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.bar{width:100%;background:linear-gradient(180deg,#667eea,#764ba2);border-radius:8px 8px 0 0;min-height:5px}
[data-theme="dark"] .bar{background:linear-gradient(180deg,#fbbf24,#d97706)}
.bar-label{font-size:.75rem;color:var(--text-muted);text-align:center}
.bar-value{font-size:.8rem;font-weight:700;color:var(--text-primary)}
.help-section{background:var(--input-bg);border-radius:16px;padding:20px;margin-bottom:15px;border:1px solid var(--input-border);transition:all .3s}
.help-section h4{color:#667eea;margin-bottom:10px;display:flex;align-items:center;gap:8px}
[data-theme="dark"] .help-section h4{color:#fbbf24}
.help-section p,.help-section li{color:var(--text-secondary);line-height:1.8;font-size:.95rem}

class DynamicDataManager{
    constructor(){
        this.coins=this.load('coins',{});
        this.coinHistory=this.load('coinHistory',{});
        this.calculatedTxIds=this.load('calculatedTxIds',[]);
        this.monthlyCalculated=this.load('monthlyCalculated','');
        this.shopPurchases=this.load('shopPurchases',[]);
    }
    load(key,defaultVal){try{return JSON.parse(localStorage.getItem('sandogh_'+key))||defaultVal;}catch{return defaultVal;}}
    save(key,data){localStorage.setItem('sandogh_'+key,JSON.stringify(data));}
    addCoins(memberId,amount,reason,detail){
        if(!this.coins[memberId])this.coins[memberId]=0;
        if(!this.coinHistory[memberId])this.coinHistory[memberId]=[];
        this.coins[memberId]+=amount;
        this.coinHistory[memberId].push({date:U.now(),amount:amount,reason:reason,detail:detail||''});
        this.save('coins',this.coins);
        this.save('coinHistory',this.coinHistory);
    }
    deductCoins(memberId,amount,reason,detail){
        if(!this.coins[memberId])this.coins[memberId]=0;
        if(!this.coinHistory[memberId])this.coinHistory[memberId]=[];
        this.coins[memberId]-=amount;
        this.coinHistory[memberId].push({date:U.now(),amount:-amount,reason:reason,detail:detail||''});
        this.save('coins',this.coins);
        this.save('coinHistory',this.coinHistory);
    }
    getTotalCoins(memberId){return this.coins[memberId]||0;}
    getHistory(memberId){return this.coinHistory[memberId]||[];}
    isTxCalculated(txId){return this.calculatedTxIds.includes(String(txId));}
    markTxCalculated(txId){if(!this.calculatedTxIds.includes(String(txId))){this.calculatedTxIds.push(String(txId));this.save('calculatedTxIds',this.calculatedTxIds);}}
    isMonthlyCalculated(){const jalali=U.getJalaliMonth();return this.monthlyCalculated===`${jalali.year}-${jalali.month}`;}
    markMonthlyCalculated(){const jalali=U.getJalaliMonth();this.monthlyCalculated=`${jalali.year}-${jalali.month}`;this.save('monthlyCalculated',this.monthlyCalculated);}
    addShopPurchase(purchase){this.shopPurchases.push(purchase);this.save('shopPurchases',this.shopPurchases);}
    getMemberPurchases(memberId){return this.shopPurchases.filter(p=>String(p.memberId)===String(memberId));}
    getAllPurchases(){return this.shopPurchases;}
    exportToExcel(members){

        const coinData=members.map(m=>({memberId:m.id,firstName:m.firstName,lastName:m.lastName,accountNumber:m.accountNumber,totalCoins:this.getTotalCoins(m.id),history:JSON.stringify(this.getHistory(m.id))}));

            try{
                const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
                if(wb.Sheets['Coins']){
                    const data=XLSX.utils.sheet_to_json(wb.Sheets['Coins']);

function calculateCoins(member,transactions,ddm){
    const jalali=U.getJalaliMonth();
    if(!ddm.isMonthlyCalculated()){
        if(U.parseNum(member.loanBalance)!==0&&U.parseNum(member.paidInstallments)>0){
            ddm.addCoins(member.id,2,'ЩҫШұШҜШ§Ш®ШӘ ШЁЩҮ Щ…ЩҲЩӮШ№ ЩӮШіШ·',`Щ…Ш§ЩҮ ${jalali.month}/${jalali.year} - ЩҫШұШҜШ§Ш®ШӘ ${U.parseNum(member.paidInstallments)} ЩӮШіШ·`);
        }
        if(U.parseNum(member.overdueInstallments)===0&&U.parseNum(member.loanBalance)!==0){
            ddm.addCoins(member.id,3,'ШЁШҜЩҲЩҶ ЩӮШіШ· Щ…Ш№ЩҲЩӮЩҮ',`Щ…Ш§ЩҮ ${jalali.month}/${jalali.year} - ШӘЩ…Ш§Щ… Ш§ЩӮШіШ§Ш· ШЁЩҮ Щ…ЩҲЩӮШ№ ЩҫШұШҜШ§Ш®ШӘ ШҙШҜЩҮ`);
        }
        if(U.parseNum(member.balance)>U.parseNum(member.monthlySalary)){
            ddm.addCoins(member.id,2,'Щ…ЩҲШ¬ЩҲШҜЫҢ ШЁШ§Щ„Ш§ШӘШұ Ш§ШІ Щ…ЩӮШұШұЫҢ',`Щ…Ш§ЩҮ ${jalali.month}/${jalali.year} - Щ…ЩҲШ¬ЩҲШҜЫҢ: ${U.fmtNum(member.balance)} ШұЫҢШ§Щ„`);
        }
        const savings=U.parseNum(member.savingsStatus);
        const mojodi=U.parseNum(member.currentMonthBalance);
        const extraSavings=savings-mojodi;
        if(extraSavings>3000000){
            const bonusCoins=Math.floor(extraSavings/3000000)*2;
            ddm.addCoins(member.id,bonusCoins,'ЩҫШівҖҢШ§ЩҶШҜШ§ШІ ШЁШ§Щ„Ш§',`${U.fmtNum(extraSavings)} ШұЫҢШ§Щ„ Ш§Ш¶Ш§ЩҒЩҮ ЩҫШівҖҢШ§ЩҶШҜШ§ШІ`);
        }
        ddm.markMonthlyCalculated();
    }
    if(member.active&&member.birthDateShamsi){
        const birthParts=member.birthDateShamsi.split('/');
        if(birthParts.length===3){
            const birthMonth=parseInt(birthParts[1]);
            const birthDay=parseInt(birthParts[2]);
            if(birthMonth===jalali.month&&birthDay===jalali.day){
                if(!ddm.coinHistory[member.id]?.find(h=>h.reason==='ШӘЩҲЩ„ШҜ Щ…ШЁШ§ШұЪ©'&&h.detail.includes(jalali.year))){
                    ddm.addCoins(member.id,5,'ШӘЩҲЩ„ШҜ Щ…ШЁШ§ШұЪ©',`ШіШ§Щ„ ${jalali.year} - ШӘЩҲЩ„ШҜШӘШ§ЩҶ Щ…ШЁШ§ШұЪ©!`);
                }
            }
        }
    }
    if(member.openDate){
        const openParts=member.openDate.split('/');
        if(openParts.length===3){
            const openMonth=parseInt(openParts[1]);
            const openDay=parseInt(openParts[2]);
            if(openMonth===jalali.month&&openDay===jalali.day){
                const alreadyGiven=ddm.coinHistory[member.id]?.find(h=>h.reason==='ЩҮШҜЫҢЩҮ ШіШ§Щ„Ш§ЩҶЩҮ ШӯШіШ§ШЁ ЩҒШ№Ш§Щ„'&&h.detail.includes(jalali.year));
                if(!alreadyGiven){
                    if(member.active){
                        ddm.addCoins(member.id,5,'ЩҮШҜЫҢЩҮ ШіШ§Щ„Ш§ЩҶЩҮ ШӯШіШ§ШЁ ЩҒШ№Ш§Щ„',`ШіШ§Щ„ ${jalali.year} - ШЁЩҮ ШҜЩ„ЫҢЩ„ ЩҒШ№Ш§Щ„ ШЁЩҲШҜЩҶ ШӯШіШ§ШЁ`);
                    }else{
                        ddm.addCoins(member.id,0,'Щ…ШӯШұЩҲЩ…ЫҢШӘ - ШӯШіШ§ШЁ ШәЫҢШұЩҒШ№Ш§Щ„',`ШіШ§Щ„ ${jalali.year} - ШЁЩҮ ШҜЩ„ЫҢЩ„ ШәЫҢШұЩҒШ№Ш§Щ„ ШЁЩҲШҜЩҶ ШӯШіШ§ШЁ`);
                    }
                }
            }
        }
    }
    const memberTxns=transactions.filter(t=>String(t._memberId)===String(member.id)||String(t['ШҙЩ…Ш§ШұЩҮ ШӯШіШ§ШЁ'])===String(member.accountNumber));
    memberTxns.forEach(tx=>{
        if(ddm.isTxCalculated(tx._transactionId))return;
        const txDate=tx['ШӘШ§ШұЫҢШ® ШӘШұШ§Ъ©ЩҶШҙ']||'';
        const txParts=txDate.split('/');
        let isCurrentMonth=false;
        if(txParts.length===3){
            const txYear=parseInt(txParts[0]);
            const txMonth=parseInt(txParts[1]);
            if(txYear===jalali.year&&txMonth===jalali.month){
                isCurrentMonth=true;
            }
        }
        if(isCurrentMonth){
            if(tx.smsStatus&&tx.smsStatus.general){
                ddm.addCoins(member.id,3,'ЩҫЫҢШ§Щ…Ъ© ЩҲШ§ШұЫҢШІ ЩҒШ№Ш§Щ„',`ЩҒЫҢШҙ ${tx['ШҙЩ…Ш§ШұЩҮ ЩҒЫҢШҙ']||tx['ID']} - ШӘШ§ШұЫҢШ® ${txDate}`);
            }
            if(tx.smsStatus&&!tx.smsStatus.overdue){
                ddm.addCoins(member.id,2,'ШЁШҜЩҲЩҶ ЩҫЫҢШ§Щ…Ъ© Ш§Ш®Ш·Ш§Шұ',`ЩҒЫҢШҙ ${tx['ШҙЩ…Ш§ШұЩҮ ЩҒЫҢШҙ']||tx['ID']} - ШӘШ§ШұЫҢШ® ${txDate}`);
            }
            ddm.markTxCalculated(tx._transactionId);
        }
    });
}

    bindMenu(){
        $$('.menu-item[data-tab]').forEach(el=>{
            el.onclick=()=>{
                this.tab=el.dataset.tab;
                localStorage.setItem('activeTab',this.tab);
                $$('.menu-item').forEach(e=>e.classList.remove('active'));
                el.classList.add('active');
                this.switchTab(this.tab);
                if(window.innerWidth<=768){
                    this.mobileMenuOpen=false;
                    const menu=$('#verticalMenu');
                    if(menu)menu.classList.add('collapsed');
                }
            };
        });
        $('#logoutBtn').onclick=()=>this.doLogout();
        const toggleBtn=$('#mobileMenuToggle');
        if(toggleBtn){
            toggleBtn.onclick=()=>{
                this.mobileMenuOpen=!this.mobileMenuOpen;
                const menu=$('#verticalMenu');
                if(menu){
                    if(this.mobileMenuOpen){menu.classList.remove('collapsed');toggleBtn.innerHTML='<i class="fas fa-times"></i> ШЁШіШӘЩҶ Щ…ЩҶЩҲ';}
                    else{menu.classList.add('collapsed');toggleBtn.innerHTML='<i class="fas fa-bars"></i> Щ…ЩҶЩҲЫҢ Ш§ШөЩ„ЫҢ';}
                }
            };
        }
    }

    render_shop(c){

        const categories=[...new Set(SHOP_PRODUCTS.map(p=>p.category).filter(cat=>cat))];
        h+=`<div class="shop-filter-bar"><input type="text" id="shopSearch" placeholder="Ш¬ШіШӘШ¬ЩҲЫҢ Щ…ШӯШөЩҲЩ„..."><select id="shopCategoryFilter"><option value="">ЩҮЩ…ЩҮ ШҜШіШӘЩҮвҖҢЩҮШ§</option>${categories.map(cat=>`<option value="${U.esc(cat)}">${U.esc(cat)}</option>`).join('')}</select><select id="shopSortFilter"><option value="default">Щ…ШұШӘШЁвҖҢШіШ§ШІЫҢ: ЩҫЫҢШҙвҖҢЩҒШұШ¶</option><option value="price-asc">ЩӮЫҢЩ…ШӘ: Ъ©Щ… ШЁЩҮ ШІЫҢШ§ШҜ</option><option value="price-desc">ЩӮЫҢЩ…ШӘ: ШІЫҢШ§ШҜ ШЁЩҮ Ъ©Щ…</option><option value="stock-desc">Щ…ЩҲШ¬ЩҲШҜЫҢ: ШІЫҢШ§ШҜ ШЁЩҮ Ъ©Щ…</option></select></div><div class="shop-grid" id="shopGrid"></div>`;
        c.innerHTML=h;
        const renderProducts=()=>{
            const search=$('#shopSearch',c)?.value.trim().toLowerCase()||'';
            const category=$('#shopCategoryFilter',c)?.value||'';
            const sort=$('#shopSortFilter',c)?.value||'default';
            let products=[...SHOP_PRODUCTS];
            if(search){products=products.filter(p=>p.name.toLowerCase().includes(search)||p.description.toLowerCase().includes(search)||p.shenaseh.toLowerCase().includes(search));}
            if(category){products=products.filter(p=>p.category===category);}
            if(sort==='price-asc')products.sort((a,b)=>a.price-b.price);
            else if(sort==='price-desc')products.sort((a,b)=>b.price-a.price);
            else if(sort==='stock-desc')products.sort((a,b)=>b.stock-a.stock);
            const grid=$('#shopGrid',c);
            if(!grid)return;
            if(products.length===0){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-light)"><i class="fas fa-search" style="font-size:3rem;margin-bottom:15px"></i><p>ЩҮЫҢЪҶ Щ…ШӯШөЩҲЩ„ЫҢ ЫҢШ§ЩҒШӘ ЩҶШҙШҜ</p></div>';return;}

            }).join('');
        };
        setTimeout(()=>{$('#shopSearch',c).oninput=renderProducts;$('#shopCategoryFilter',c).onchange=renderProducts;$('#shopSortFilter',c).onchange=renderProducts;renderProducts();},50);
    }
    buyProduct(shenaseh){
        const product=SHOP_PRODUCTS.find(p=>p.shenaseh===shenaseh);
        if(!product){alert('вқҢ Щ…ШӯШөЩҲЩ„ ЫҢШ§ЩҒШӘ ЩҶШҙШҜ');return;}
        const member=this.dm.members.find(m=>m.id===this.currentUser.memberId);
        if(!member){alert('вқҢ Ш®Ш·Ш§ ШҜШұ ШҙЩҶШ§ШіШ§ЫҢЫҢ Ъ©Ш§ШұШЁШұ');return;}
        const userCoins=this.ddm.getTotalCoins(member.id);
        if(userCoins<product.price){
            alert(`вқҢ ШіЪ©ЩҮ Ъ©Ш§ЩҒЫҢ ЩҶШҜШ§ШұЫҢШҜ!\n\nШіЪ©ЩҮвҖҢЩҮШ§ЫҢ ШҙЩ…Ш§: ${userCoins}\nЩӮЫҢЩ…ШӘ Щ…ШӯШөЩҲЩ„: ${product.price}\n\nШіЪ©ЩҮ Щ…ЩҲШұШҜ ЩҶЫҢШ§ШІ: ${product.price-userCoins}`);
            return;
        }
        if(product.stock<=0){alert('вқҢ Ш§ЫҢЩҶ Щ…ШӯШөЩҲЩ„ ЩҶШ§Щ…ЩҲШ¬ЩҲШҜ Ш§ШіШӘ');return;}
        if(!confirm(`ШўЫҢШ§ Ш§ШІ Ш®ШұЫҢШҜ "${product.name}" ШЁШ§ ${product.price} ШіЪ©ЩҮ Щ…Ш·Щ…ШҰЩҶ ЩҮШіШӘЫҢШҜ?\n\nШіЪ©ЩҮвҖҢЩҮШ§ЫҢ ЩҒШ№Щ„ЫҢ ШҙЩ…Ш§: ${userCoins}\nШіЪ©ЩҮвҖҢЩҮШ§ЫҢ ЩҫШі Ш§ШІ Ш®ШұЫҢШҜ: ${userCoins-product.price}`)){return;}
        const orderCode=U.generateOrderCode(member.accountNumber);
        this.ddm.deductCoins(member.id,product.price,'Ш®ШұЫҢШҜ Ш§ШІ ЩҒШұЩҲШҙЪҜШ§ЩҮ',`Щ…ШӯШөЩҲЩ„: ${product.name} | Ъ©ШҜ ШіЩҒШ§ШұШҙ: ${orderCode} | ШҜШіШӘЩҮвҖҢШЁЩҶШҜЫҢ: ${product.category||'ЩҶШ§Щ…ШҙШ®Шө'}`);
        const purchase={orderCode:orderCode,productId:product.shenaseh,productName:product.name,productDescription:product.description,price:product.price,memberId:member.id,memberName:`${member.firstName} ${member.lastName||''}`.trim(),accountNumber:member.accountNumber,date:U.now(),delivered:false};
        this.ddm.addShopPurchase(purchase);
        this.showPurchaseReceipt(purchase);
    }
    showPurchaseReceipt(purchase){

 class="fas fa-paper-plane"></i> ЩҫЫҢШ§Щ… ШЁШұШ§ЫҢ Щ…ШҜЫҢШұ ШөЩҶШҜЩҲЩӮ</h4><div style="background:var(--input-bg);border-radius:8px;padding:12px;font-family:monospace;font-size:.85rem;line-height:1.6;white-space:pre-wrap;direction:rtl;text-align:right;color:var(--text-primary)">${U.esc(messageText)}</div></div><div class="modal-actions"><button class="btn-small success-btn" id="copyMsgBtn"><i class="fas fa-copy"></i> Ъ©ЩҫЫҢ ЩҫЫҢШ§Щ…</button><button class="btn-small info-btn" id="downloadReceiptBtn"><i class="fas fa-download"></i> ШҜШ§ЩҶЩ„ЩҲШҜ ШұШіЫҢШҜ</button>${SUPPORT_INFO.itaaAddress?`<a href="https://eitaa.com/${SUPPORT_INFO.itaaAddress.replace('@','')}" target="_blank" class="btn-small edit-btn" style="text-decoration:none"><i class="fas fa-paper-plane"></i> Ш§ШұШіШ§Щ„ ШҜШұ Ш§ЫҢШӘШ§</a>`:''}<button class="btn-small danger-btn" id="closeModalBtn"><i class="fas fa-times"></i> ШЁШіШӘЩҶ</button></div></div>`;
        document.body.appendChild(modal);
        setTimeout(()=>{

            $('#closeModalBtn',modal).onclick=closeModal;
            $('#copyMsgBtn',modal).onclick=()=>{

                try{document.execCommand('copy');const btn=$('#copyMsgBtn',modal);const originalHtml=btn.innerHTML;btn.innerHTML='<i class="fas fa-check"></i> Ъ©ЩҫЫҢ ШҙШҜ';btn.classList.add('copied');setTimeout(()=>{btn.innerHTML=originalHtml;btn.classList.remove('copied');},2000);}catch(err){alert('Ш®Ш·Ш§ ШҜШұ Ъ©ЩҫЫҢ');}
                document.body.removeChild(textarea);
            };
            $('#downloadReceiptBtn',modal).onclick=()=>{
                const wb=XLSX.utils.book_new();

    }
    render_shopHistory(c){
        const member=this.dm.members.find(m=>m.id===this.currentUser.memberId);
        if(!member){c.innerHTML='<div style="text-align:center;padding:40px">Ш®Ш·Ш§</div>';return;}
        const purchases=this.ddm.getMemberPurchases(member.id);
        let h=`<div class="info-box"><i class="fas fa-receipt"></i> Ш®ШұЫҢШҜЩҮШ§ЫҢ Щ…ЩҶ</div>`;
        if(purchases.length===0){h+=`<div class="dashboard-section" style="text-align:center;padding:40px"><i class="fas fa-shopping-bag" style="font-size:4rem;color:var(--text-light);margin-bottom:15px"></i><h3 style="color:var(--text-primary);margin-bottom:10px">ЩҮЩҶЩҲШІ Ш®ШұЫҢШҜЫҢ ЩҶЪ©ШұШҜЩҮвҖҢШ§ЫҢШҜ</h3><p style="color:var(--text-muted)">ШЁШұШ§ЫҢ Щ…ШҙШ§ЩҮШҜЩҮ Щ…ШӯШөЩҲЩ„Ш§ШӘ ШЁЩҮ ЩҒШұЩҲШҙЪҜШ§ЩҮ Щ…ШұШ§Ш¬Ш№ЩҮ Ъ©ЩҶЫҢШҜ</p></div>`;c.innerHTML=h;return;}
        const totalSpent=purchases.reduce((sum,p)=>sum+p.price,0);
        h+=`<div class="dashboard-section" style="background:var(--info-bg);border-right-color:#ecc94b"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px"><div><i class="fas fa-shopping-cart" style="font-size:1.5rem;color:#d69e2e;margin-left:10px"></i><span style="font-weight:700;color:var(--text-primary)">ШӘШ№ШҜШ§ШҜ Ш®ШұЫҢШҜЩҮШ§: ${purchases.length}</span></div><div><i class="fas fa-coins" style="font-size:1.5rem;color:#d69e2e;margin-left:10px"></i><span style="font-weight:700;color:var(--text-primary)">Щ…Ш¬Щ…ЩҲШ№ ШіЪ©ЩҮ Щ…ШөШұЩҒ ШҙШҜЩҮ: ${U.fmtNum(totalSpent)}</span></div></div></div><div class="dashboard-section"><h3><i class="fas fa-list"></i> Щ„ЫҢШіШӘ Ш®ШұЫҢШҜЩҮШ§</h3>`;
        purchases.slice().reverse().forEach(p=>{
            const statusClass=p.delivered?'delivered':'pending';
            const statusText=p.delivered?'вң… ШӘШӯЩҲЫҢЩ„ ШҙШҜЩҮ':'вҸі ШҜШұ Ш§ЩҶШӘШёШ§Шұ ШӘШӯЩҲЫҢЩ„';
            h+=`<div class="shop-history-item ${statusClass}"><div class="history-info"><div class="history-product">${U.esc(p.productName)}</div><div class="history-date"><i class="fas fa-calendar"></i> ${p.date}</div><div class="history-code"><i class="fas fa-barcode"></i> ${p.orderCode}</div><div style="font-size:.85rem;color:var(--text-muted);margin-top:5px">${statusText}</div></div><div class="history-price">${U.fmtNum(p.price)} ШіЪ©ЩҮ</div></div>`;
        });
        h+=`</div>`;
        c.innerHTML=h;
    }
    render_shopAdmin(c){
        if(this.currentUser.role!=='admin'){c.innerHTML='<div style="text-align:center;padding:40px"><i class="fas fa-lock" style="font-size:3rem;color:#e53e3e"></i><p style="margin-top:15px">ШҜШіШӘШұШіЫҢ ЩҒЩӮШ· ШЁШұШ§ЫҢ Щ…ШҜЫҢШұ</p></div>';return;}
        const allPurchases=this.ddm.getAllPurchases();
        let h=`<div class="info-box"><i class="fas fa-clipboard-check"></i> ШіЩҒШ§ШұШҙШ§ШӘ ЩҒШұЩҲШҙЪҜШ§ЩҮ</div>`;
        if(allPurchases.length===0){h+=`<div class="dashboard-section" style="text-align:center;padding:40px"><i class="fas fa-inbox" style="font-size:4rem;color:var(--text-light);margin-bottom:15px"></i><h3 style="color:var(--text-primary);margin-bottom:10px">ЩҮЩҶЩҲШІ ШіЩҒШ§ШұШҙЫҢ Ш«ШЁШӘ ЩҶШҙШҜЩҮ Ш§ШіШӘ</h3></div>`;c.innerHTML=h;return;}
        const pendingCount=allPurchases.filter(p=>!p.delivered).length;
        const deliveredCount=allPurchases.filter(p=>p.delivered).length;
        const totalRevenue=allPurchases.reduce((sum,p)=>sum+p.price,0);
        h+=`<div class="stats-grid"><div class="stat-card blue"><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="stat-value">${U.fmtNum(allPurchases.length)}</div><div class="stat-label">Ъ©Щ„ ШіЩҒШ§ШұШҙШ§ШӘ</div></div><div class="stat-card yellow"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-value">${U.fmtNum(pendingCount)}</div><div class="stat-label">ШҜШұ Ш§ЩҶШӘШёШ§Шұ ШӘШӯЩҲЫҢЩ„</div></div><div class="stat-card green"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-value">${U.fmtNum(deliveredCount)}</div><div class="stat-label">ШӘШӯЩҲЫҢЩ„ ШҙШҜЩҮ</div></div><div class="stat-card purple"><div class="stat-icon"><i class="fas fa-coins"></i></div><div class="stat-value">${U.fmtNum(totalRevenue)}</div><div class="stat-label">ШҜШұШўЩ…ШҜ Ъ©Щ„ (ШіЪ©ЩҮ)</div></div></div>`;
        h+=`<div class="shop-filter-bar"><input type="text" id="adminSearch" placeholder="Ш¬ШіШӘШ¬ЩҲ ШЁШұ Ш§ШіШ§Ші ЩҶШ§Щ…ШҢ ШҙЩ…Ш§ШұЩҮ ШӯШіШ§ШЁШҢ Ъ©ШҜ ШіЩҒШ§ШұШҙ..."><select id="adminStatusFilter"><option value="">ЩҮЩ…ЩҮ ШіЩҒШ§ШұШҙШ§ШӘ</option><option value="pending">ШҜШұ Ш§ЩҶШӘШёШ§Шұ ШӘШӯЩҲЫҢЩ„</option><option value="delivered">ШӘШӯЩҲЫҢЩ„ ШҙШҜЩҮ</option></select><button class="btn-small info-btn" id="downloadAllOrders"><i class="fas fa-download"></i> ШҜШ§ЩҶЩ„ЩҲШҜ ЩҮЩ…ЩҮ ШіЩҒШ§ШұШҙШ§ШӘ</button></div><div id="adminOrdersList"></div>`;
        c.innerHTML=h;
        const renderOrders=()=>{
            const search=$('#adminSearch',c)?.value.trim().toLowerCase()||'';
            const status=$('#adminStatusFilter',c)?.value||'';
            let orders=[...allPurchases].reverse();
            if(search){orders=orders.filter(o=>o.memberName.toLowerCase().includes(search)||o.accountNumber.toLowerCase().includes(search)||o.orderCode.toLowerCase().includes(search)||o.productName.toLowerCase().includes(search));}
            if(status==='pending')orders=orders.filter(o=>!o.delivered);
            else if(status==='delivered')orders=orders.filter(o=>o.delivered);
            const list=$('#adminOrdersList',c);
            if(!list)return;
            if(orders.length===0){list.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-light)"><i class="fas fa-search" style="font-size:3rem;margin-bottom:15px"></i><p>ЩҮЫҢЪҶ ШіЩҒШ§ШұШҙЫҢ ЫҢШ§ЩҒШӘ ЩҶШҙШҜ</p></div>';return;}
            list.innerHTML=`<div class="dashboard-section"><div class="table-wrapper"><table><thead><tr><th>Ъ©ШҜ ШіЩҒШ§ШұШҙ</th><th>ЩҶШ§Щ… Ш®ШұЫҢШҜШ§Шұ</th><th>ШҙЩ…Ш§ШұЩҮ ШӯШіШ§ШЁ</th><th>Щ…ШӯШөЩҲЩ„</th><th>ШіЪ©ЩҮ</th><th>ШӘШ§ШұЫҢШ®</th><th>ЩҲШ¶Ш№ЫҢШӘ</th><th>Ш№Щ…Щ„ЫҢШ§ШӘ</th></tr></thead><tbody>${orders.map(o=>{const statusBadge=o.delivered?`<span class="account-status-badge active">ШӘШӯЩҲЫҢЩ„ ШҙШҜЩҮ</span>`:`<span class="account-status-badge inactive">ШҜШұ Ш§ЩҶШӘШёШ§Шұ</span>`;return`<tr><td style="font-family:monospace;font-size:.8rem">${U.esc(o.orderCode)}</td><td>${U.esc(o.memberName)}</td><td>${U.esc(o.accountNumber)}</td><td>${U.esc(o.productName)}</td><td style="font-weight:700;color:#d69e2e">${U.fmtNum(o.price)}</td><td style="font-size:.85rem">${U.esc(o.date)}</td><td>${statusBadge}</td><td>${o.delivered?`<button class="btn-small edit-btn" onclick="window.app.toggleDelivery('${o.orderCode}')"><i class="fas fa-undo"></i> ШЁШ§ШІЪҜШұШҜШ§ЩҶЫҢ</button>`:`<button class="btn-small success-btn" onclick="window.app.toggleDelivery('${o.orderCode}')"><i class="fas fa-check"></i> ШӘШӯЩҲЫҢЩ„ ШҙШҜ</button>`}</td></tr>`;}).join('')}</tbody></table></div></div>`;
        };
        setTimeout(()=>{
            $('#adminSearch',c).oninput=renderOrders;
            $('#adminStatusFilter',c).onchange=renderOrders;
            $('#downloadAllOrders',c).onclick=()=>{
                const wb=XLSX.utils.book_new();
                const data=allPurchases.map(p=>({'Ъ©ШҜ ШіЩҒШ§ШұШҙ':p.orderCode,'ЩҶШ§Щ… Ш®ШұЫҢШҜШ§Шұ':p.memberName,'ШҙЩ…Ш§ШұЩҮ ШӯШіШ§ШЁ':p.accountNumber,'ШҙЩҶШ§ШіЩҮ Щ…ШӯШөЩҲЩ„':p.productId,'ЩҶШ§Щ… Щ…ШӯШөЩҲЩ„':p.productName,'ШӘЩҲШ¶ЫҢШӯШ§ШӘ':p.productDescription,'ШӘШ№ШҜШ§ШҜ ШіЪ©ЩҮ':p.price,'ШӘШ§ШұЫҢШ® Ш®ШұЫҢШҜ':p.date,'ЩҲШ¶Ш№ЫҢШӘ':p.delivered?'ШӘШӯЩҲЫҢЩ„ ШҙШҜЩҮ':'ШҜШұ Ш§ЩҶШӘШёШ§Шұ ШӘШӯЩҲЫҢЩ„'}));
                const ws=XLSX.utils.json_to_sheet(data);
                XLSX.utils.book_append_sheet(wb,ws,'ШіЩҒШ§ШұШҙШ§ШӘ');
                XLSX.writeFile(wb,'ШіЩҒШ§ШұШҙШ§ШӘ_ЩҒШұЩҲШҙЪҜШ§ЩҮ_'+new Date().toISOString().slice(0,10)+'.xlsx');
            };
            renderOrders();
        },50);
    }

    search(inputId,tableSelector,container){
        container=container||document;
        const input=$(inputId,container);
        if(!input)return;
        const clearBtn=$(inputId+'_cl',container);
        const filter=function(){
            const q=input.value.trim().toLowerCase();
            const tb=container.querySelector(tableSelector);
            if(!tb||!tb.querySelector('tbody'))return;
            tb.querySelector('tbody').querySelectorAll('tr').forEach(function(r){
                if(!q||r.textContent.trim().toLowerCase().includes(q))r.style.display='';
                else r.style.display='none';
            });
        };
        input.oninput=filter;
        if(clearBtn)clearBtn.onclick=function(){input.value='';filter();input.focus();};
        setTimeout(filter,50);
    }
    startClock(){
        if(this.ci)clearInterval(this.ci);
        const tick=function(){
            const n=new Date();
            const h=String(n.getHours()).padStart(2,'0');
            const m=String(n.getMinutes()).padStart(2,'0');
            const s=String(n.getSeconds()).padStart(2,'0');
            const cl=$('#clockDisplay');
            if(cl)cl.innerHTML=`${h}:${m}<span style="font-size:1rem;opacity:.8">:${s}</span>`;
        };
        tick();
        this.ci=setInterval(tick,1000);
    }
    doLogin(){
        const un=$('#loginUsername').value.trim();
        const pw=$('#loginPassword').value.trim();
        const user=this.dm.users.find(u=>u.username===un&&u.password===pw);
        if(user){
            this.currentUser=user;
            if(user.memberId){
                localStorage.setItem('sandogh_lastLogin_'+user.memberId,U.now());
                const currentCount=parseInt(localStorage.getItem('sandogh_loginCount_'+user.memberId)||'0');
                localStorage.setItem('sandogh_loginCount_'+user.memberId,String(currentCount+1));
            }
            this.render();
        }else{$('#loginError').textContent='ЩҶШ§Щ… Ъ©Ш§ШұШЁШұЫҢ ЫҢШ§ ШұЩ…ШІ Ш№ШЁЩҲШұ Ш§ШҙШӘШЁШ§ЩҮ Ш§ШіШӘ';}
    }
    doLogout(){this.currentUser=null;this.render();}
