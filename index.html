<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صندوق اتحاد</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma}
body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
.container{max-width:800px;margin:0 auto;background:#fff;border-radius:15px;overflow:hidden}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px;text-align:center}
.login-box{max-width:400px;margin:50px auto;padding:30px}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:5px;font-weight:bold}
.form-group input,.form-group textarea{width:100%;padding:10px;border:2px solid #ddd;border-radius:8px}
.btn{padding:12px 24px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;color:#fff}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2)}
.btn-success{background:#27ae60}
.nav{display:flex;background:#f8f9fa}
.nav button{flex:1;padding:15px;border:none;background:transparent;cursor:pointer;font-weight:bold}
.nav button.active{background:#fff;border-bottom:3px solid #667eea}
.content{padding:20px}
.section{display:none}
.section.active{display:block}
.card{background:#f8f9fa;padding:15px;border-radius:10px;margin:10px 0}
.coin{background:#f39c12;color:#fff;padding:5px 10px;border-radius:20px}
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>💰 صندوق اتحاد</h1></div>
  
  <div id="loginPage" class="login-box">
    <h2 style="text-align:center;margin-bottom:20px">ورود</h2>
    <div class="form-group"><label>نام کاربری</label><input type="text" id="username"></div>
    <div class="form-group"><label>رمز عبور</label><input type="password" id="password"></div>
    <button class="btn btn-primary" style="width:100%" onclick="login()">ورود</button>
  </div>

  <div id="dashboard" style="display:none">
    <div style="padding:15px;background:#f8f9fa;display:flex;justify-content:space-between">
      <div><strong id="currentUser"></strong> <span class="coin" id="userCoins">0🪙</span></div>
      <button class="btn" style="background:#e74c3c" onclick="logout()">خروج</button>
    </div>
    
    <div class="nav">
      <button class="active" onclick="show('home')">خانه</button>
      <button onclick="show('messages')">💬 پیام</button>
      <button onclick="show('admin')">⚙️ مدیریت</button>
    </div>
    
    <div class="content">
      <div id="home" class="section active">
        <h2>خوش آمدید</h2>
        <div class="card">موجودی: <strong id="balance">0</strong> سکه</div>
      </div>
      
      <div id="messages" class="section">
        <h2>پیام‌ها</h2>
        <div class="form-group"><textarea id="msg" rows="3"></textarea></div>
        <button class="btn btn-primary" onclick="sendMsg()">ارسال</button>
        <div id="msgList"></div>
      </div>
      
      <div id="admin" class="section">
        <h2>مدیریت</h2>
        <div class="card">
          <h3>افزودن سکه</h3>
          <input type="text" id="coinUser" placeholder="نام کاربری" style="padding:8px;margin:5px 0;width:100%">
          <input type="number" id="coinAmt" placeholder="مقدار" style="padding:8px;margin:5px 0;width:100%">
          <button class="btn btn-success" onclick="addCoin()">افزودن</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const BIN = '6a474da0da38895dfe267fbe';
const KEY = '$2a$10$XU6ZAUe2GDqmvw0Zkgdh/O1rTz5o20cnnaSY/GjMXdn1bvkpYLBjC';
const URL = `https://api.jsonbin.io/v3/b/${BIN}`;

let user = null;
let data = {
  coins: {},
  messages: [],
  users: { admin: { password: 'admin123', role: 'admin' } }
};

async function load() {
  console.log('🔄 بارگذاری از JSONBin...');
  try {
    const r = await fetch(URL + '/latest', { headers: { 'X-Master-Key': KEY } });
    console.log('Status:', r.status);
    const d = await r.json();
    if (d.record) {
      data = { ...data, ...d.record };
      console.log('✅ بارگذاری موفق');
    }
  } catch(e) { console.error('❌ خطا:', e); }
}

async function save() {
  console.log('💾 ذخیره در JSONBin...');
  try {
    await fetch(URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': KEY },
      body: JSON.stringify(data)
    });
    console.log('✅ ذخیره موفق');
  } catch(e) { console.error('❌ خطا:', e); }
}

async function login() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  await load();
  if (data.users[u] && data.users[u].password === p) {
    user = u;
    localStorage.setItem('u', u);
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('currentUser').textContent = u;
    update();
  } else {
    alert('نام کاربری یا رمز اشتباه است');
  }
}

function logout() {
  localStorage.removeItem('u');
  location.reload();
}

function show(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function update() {
  const c = data.coins[user] || 0;
  document.getElementById('balance').textContent = c;
  document.getElementById('userCoins').textContent = c + '🪙';
  const ml = document.getElementById('msgList');
  ml.innerHTML = data.messages.map(m => `<div class="card"><strong>${m.user}:</strong> ${m.text}</div>`).join('');
}

async function sendMsg() {
  const t = document.getElementById('msg').value;
  if (!t) return;
  data.messages.push({ user, text: t, date: new Date().toISOString() });
  document.getElementById('msg').value = '';
  await save();
  update();
}

async function addCoin() {
  const u = document.getElementById('coinUser').value;
  const a = parseInt(document.getElementById('coinAmt').value);
  if (!u || !a) return;
  data.coins[u] = (data.coins[u] || 0) + a;
  await save();
  alert('✓ سکه اضافه شد');
}

window.onload = async () => {
  console.log('🚀 برنامه شروع شد');
  const s = localStorage.getItem('u');
  if (s) {
    user = s;
    await load();
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('currentUser').textContent = user;
    update();
  }
};
</script>
</body>
</html>
