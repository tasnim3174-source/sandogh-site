<script>

try {
(function(){"use strict";
const $=(s,p=document)=>p.querySelector(s);
const $$=(s,p=document)=>p.querySelectorAll(s);

const CONFIG = {
    APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxbhwlpcTIbxOHVRxGmCSgE6bhEZf8PueDApRi1GQlj625iyAnpCk97m4m17ydnPjq-/exec',
    SYNC_INTERVAL: 30000
};

const U={
norm(s){if(s===null||s===undefined||s==='')return'';return String(s).toLowerCase().replace(/[\s\-_]/g,'');},
fmtNum(n){return new Intl.NumberFormat('fa-IR').format(n);},
toJalali(g){const d=new Date(g),gy=d.getFullYear(),gm=d.getMonth()+1,gd=d.getDate(),gdm=[0,31,59,90,120,151,181,212,243,273,304,334];let gy2=gm>2?gy+1:gy,days=355666+365*gy+~~((gy2+3)/4)-~~((gy2+99)/100)+~~((gy2+399)/400)+gd+gdm[gm-1],jy=-1595+33*~~(days/12053);days%=12053;jy+=4*~~(days/1461);days%=1461;if(days>365){jy+=~~((days-1)/365);days=(days-1)%365;}const jm=days<186?1+~~(days/31):7+~~((days-186)/30),jd=1+(days<186?days%31:(days-186)%30);return`${jy}/${String(jm).padStart(2,'0')}/${String(jd).padStart(2,'0')}`;},
now(){const n=new Date();return`${this.toJalali(n)} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;},
parseNum(v){if(v==null||v==='')return 0;if(typeof v==='number')return v;let s=String(v).replace(/[,\s]/g,'');return isNaN(parseFloat(s))?0:parseFloat(s);},
fmtDate(s){if(!s)return'---';const c=String(s).replace(/\D/g,'');return c.length===8?`${c.slice(0,4)}/${c.slice(4,6)}/${c.slice(6,8)}`:s;},
esc(s){if(s===null||s===undefined)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;},
strength(p){let s=0;if(p.length>=6)s++;if(p.length>=8)s++;if(/[a-z]/.test(p))s++;if(/[A-Z]/.test(p))s++;if(/\d/.test(p))s++;if(/[^a-zA-Z\d]/.test(p))s++;return s<=2?'ضعیف':s<=4?'متوسط':'قوی';},
findCol(names,headers){for(const n of names){const nn=n.toLowerCase().replace(/[_\s\-]/g,'');for(const h of headers)if(h.toLowerCase().replace(/[_\s\-]/g,'')===nn)return h;}return null;},
getMembershipDuration(openDate){if(!openDate)return'---';return openDate;},
parseJSON(s){try{return typeof s==='string'?JSON.parse(s):s}catch(e){return s}},
parseBool(v){if(v===null||v===undefined||v==='')return false;const s=String(v).trim().toLowerCase();return['true','1','yes','فعال','بله','✓','✅','on'].includes(s);}
};

function removeDuplicateMembers(members) {
    if (!members || !members.length) return [];
    const seen = new Map();
    members.forEach(function(m) {
        const key = String(m.accountNumber || '').trim();
        if (!key) return;
        const existing = seen.get(key);
        if (!existing) {
            seen.set(key, m);
        } else {
            const existingId = parseInt(existing.id) || 0;
            const newId = parseInt(m.id) || 0;
            if (newId > existingId) {
                seen.set(key, m);
            }
        }
    });
    return Array.from(seen.values());
}

function removeDuplicateTransactions(transactions) {
    if (!transactions || !transactions.length) return [];
    const seen = new Map();
    transactions.forEach(function(t) {
        const key = String(t.transactionId || '').trim();
        if (!key) return;
        seen.set(key, t);
    });
    return Array.from(seen.values());
}

function showSyncStatus(text, type) {
    type = type || 'syncing';
    const el = $('#syncStatus');
    const txt = $('#syncText');
    if (!el || !txt) return;
    el.classList.remove('hidden', 'syncing', 'success', 'error');
    el.classList.add(type);
    txt.textContent = text;
    const icon = el.querySelector('i');
    if (type === 'syncing') icon.className = 'fas fa-sync fa-spin';
    else if (type === 'success') {
        icon.className = 'fas fa-check';
        setTimeout(function() { el.classList.add('hidden'); }, 3000);
    } else if (type === 'error') {
        icon.className = 'fas fa-exclamation-triangle';
        setTimeout(function() { el.classList.add('hidden'); }, 5000);
    }
}

async function loadDataFromSheets() {
    const proxies = [
        function(url) { return 'https://corsproxy.io/?' + encodeURIComponent(url); },
        function(url) { return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url); },
        function(url) { return 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(url); }
    ];
    
    for (let i = 0; i < proxies.length; i++) {
        try {
            showSyncStatus('در حال بارگذاری از Google Sheets...', 'syncing');
            const proxyUrl = proxies[i](CONFIG.APPS_SCRIPT_URL);
            const response = await fetch(proxyUrl, { method: 'GET', cache: 'no-store' });
            if (response.ok) {
                const text = await response.text();
                const result = JSON.parse(text);
                if (result.success && result.data) {
                    console.log('✅ داده‌ها از Google Sheets بارگذاری شدند (Proxy ' + (i+1) + ')');
                    showSyncStatus('✅ داده‌ها بارگذاری شدند', 'success');
                    return result.data;
                }
            }
            console.warn('⚠️ Proxy ' + (i+1) + ' کار نکرد:', response.status);
        } catch (error) {
            console.warn('⚠️ Proxy ' + (i+1) + ' خطا داد:', error.message);
        }
    }
    
    console.error('❌ همه Proxy ها شکست خوردند');
    showSyncStatus('❌ خطا در اتصال', 'error');
    return null;
}

async function saveDataToSheets(data) {
    return new Promise(function(resolve) {
        try {
            showSyncStatus('در حال ذخیره در Google Sheets...', 'syncing');
            if (data.members) data.members = removeDuplicateMembers(data.members);
            if (data.transactions) data.transactions = removeDuplicateTransactions(data.transactions);
            
            console.log('📤 ارسال داده‌ها به Google Sheets...');
            console.log('📊 تعداد اعضا:', data.members ? data.members.length : 0);
            console.log('📊 تعداد کاربران:', data.users ? data.users.length : 0);
            console.log('📊 تعداد تراکنش‌ها:', data.transactions ? data.transactions.length : 0);
            
            const formData = new FormData();
            formData.append('action', 'save');
            formData.append('data', JSON.stringify(data));
            
            fetch(CONFIG.APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            })
            .then(function() {
                console.log('✅ درخواست ذخیره ارسال شد');
                showSyncStatus('✅ داده‌ها ذخیره شدند', 'success');
                resolve(true);
            })
            .catch(function(error) {
                console.error('❌ خطا در ذخیره:', error);
                showSyncStatus('❌ خطا در اتصال', 'error');
                resolve(false);
            });
        } catch (error) {
            console.error('خطا در ذخیره در Google Sheets:', error);
            showSyncStatus('❌ خطا در اتصال', 'error');
            resolve(false);
        }
    });
}

let lastSyncTime = 0;
let isSyncing = false;
let initialLoadDone = false;

async function autoSync() {
    try {
        if (window.lastUploadTime && (Date.now() - window.lastUploadTime < 15000)) {
            console.log('⏸️ autoSync موقتاً غیرفعال است');
            return;
        }
        if (isSyncing) return;
        const now = Date.now();
        if (now - lastSyncTime < CONFIG.SYNC_INTERVAL) return;
        if (!window.app) return;
        isSyncing = true;
        const data = await loadDataFromSheets();
        if (data) {
            let membersData = data.members || [];
            membersData = removeDuplicateMembers(membersData);
            window.app.dm.members = membersData.map(function(m) {
                return Object.assign({}, m, {
                    id: parseInt(m.id) || m.id,
                    balance: U.parseNum(m.balance),
                    savings: U.parseNum(m.savings),
                    savingsStatus: U.parseNum(m.savingsStatus),
                    loan: U.parseNum(m.loan),
                    loanBalance: U.parseNum(m.loanBalance),
                    coins: parseInt(m.coins) || 0,
                    usedCoins: parseInt(m.usedCoins) || 0,
                    coinHistory: [],
                    loginCount: parseInt(m.loginCount) || 0,
                    smsStatus: m.smsStatus || {},
                    transactions: []
                });
            });
            window.app.dm.users = (data.users || []).map(function(u) {
                return Object.assign({}, u, {
                    id: parseInt(u.id) || u.id,
                    username: String(u.username || ''),
                    password: String(u.password || ''),
                    role: String(u.role || 'member'),
                    memberId: u.memberId ? (parseInt(u.memberId) || null) : null
                });
            });
            window.app.dm.messages = data.messages || [];
            window.app.dm.announcements = data.announcements || [];
            window.app.dm.support = (data.support && data.support[0]) || {phone:'',accountNumber:'',address:''};
            window.app.dm.shopItems = data.shopitems || [];
            window.app.dm.logo = (data.settings && data.settings.find(function(s) { return s.key === 'logo'; }) || {}).value || '';
            window.app.allTransactions = removeDuplicateTransactions(data.transactions || []);
            window.app.allPolls = (data.polls || []).map(function(p) {
                return Object.assign({}, p, {
                    options: U.parseJSON(p.options) || [],
                    active: String(p.active).toLowerCase() === 'true'
                });
            });
            window.app.allPollVotes = data.pollvotes || [];
            window.app.allCoinHistory = data.coinhistory || [];
            ['members','users','messages','announcements','support','shopItems','logo'].forEach(function(k) { window.app.dm.sv(k); });
            if (window.app.ui && initialLoadDone) window.app.ui.render();
        }
        lastSyncTime = now;
        isSyncing = false;
        initialLoadDone = true;
    } catch (error) {
        console.error('خطا در همگام‌سازی:', error);
        isSyncing = false;
    }
}

addCoin(mid,amount,reason,desc){

spendCoin(mid,amount,reason,desc){
    desc = desc || '';
    const m=this.gMember(mid);
    if(!m)return {success:false,msg:'عضو یافت نشد'};
    const available=(m.coins||0)-(m.usedCoins||0);
    if(available<amount)return {success:false,msg:'سکه کافی نیست'};
    m.usedCoins=(m.usedCoins||0)+amount;
    if(!m.coinHistory)m.coinHistory=[];
    m.coinHistory.push({date:U.now(),amount:-amount,reason:reason,description:desc,balance:(m.coins||0)-(m.usedCoins||0)});

}
applyCoinRules(m){if(!m)return;const t=new Date(),ts=t.toDateString(),mk=`${t.getFullYear()}-${t.getMonth()}`;let ch=false;const self=this;const add=function(a,r,d){self.addCoin(m.id,a,r,d);ch=true;};if(m.coinDailyLogin!==ts){add(2,'ورود روزانه','ورود به برنامه');m.coinDailyLogin=ts;}if(m.birthDate&&!m.birthdaySetCoinsClaimed){add(2,'ثبت تاریخ تولد','ثبت تاریخ تولد');m.birthdaySetCoinsClaimed=true;}if(m.birthDate){const p=m.birthDate.split('/');if(p.length===3){const bm=parseInt(p[1]),bd=parseInt(p[2]);if(t.getMonth()+1===bm&&t.getDate()===bd&&m.lastBirthdayCoinYear!==t.getFullYear()){add(5,'تولد','تولد مبارک!');m.lastBirthdayCoinYear=t.getFullYear();}}}if(m.coinDashboardVisit!==ts){add(2,'بازدید صورتحساب','مشاهده صورتحساب');m.coinDashboardVisit=ts;}if(m.coinMessageToAdmin!==ts){add(1,'ارسال پیام به مدیر','ارسال پیام به مدیر');m.coinMessageToAdmin=ts;}if(m.coinPollParticipation!==ts){add(3,'شرکت در نظرسنجی','پاسخ به نظرسنجی');m.coinPollParticipation=ts;}if(m.coinMonthly!==mk){let e=false;if((m.loanBalance||0)<=0&&(m.overdueInstallments||0)<=0){add(1,'بدون بدهی','بدون بدهی و اقساط معوقه');e=true;}if((m.balance||0)>=0&&(m.savingsStatus||0)>=0){add(1,'بدون کسری','بدون کسری موجودی');e=true;}if(e)m.coinMonthly=mk;}if(m.openDate){const p=m.openDate.split('/');if(p.length===3){const om=parseInt(p[1]),od=parseInt(p[2]);if(t.getMonth()+1===om&&t.getDate()===od&&m.lastOpeningCoinYear!==t.getFullYear()){add(5,'سالروز افتتاح حساب',`سالروز ${t.getFullYear()}`);m.lastOpeningCoinYear=t.getFullYear();}}}if(ch)this.sv('members');return ch;}

class Auth{constructor(dm){this.dm=dm;this.user=null;this.pending=null;}
login(un,pw){
    const u=this.dm.users.find(function(x){return U.norm(x.username)===U.norm(un);});
    if(!u)return{s:false,m:'نام کاربری یا رمز عبور اشتباه است'};
    if(String(u.password)!==String(pw))return{s:false,m:'نام کاربری یا رمز عبور اشتباه است'};
    if(U.norm(u.password)===U.norm(u.username) && u.role!=='admin'){ this.pending=u; return{s:true,fc:true}; }
    this.user=u;
    if((u.role==='member'||u.role==='special')&&u.memberId){
        this.dm.incLogin(u.memberId);
        const m=this.dm.gMember(u.memberId);
        if(m)this.dm.applyCoinRules(m);
    }
    return{s:true,fc:false};
}
changeForced(np){
    const u=this.pending;
    if(!u)return{s:false,m:'خطا در احراز هویت'};
    if(U.norm(np)===U.norm(u.username))return{s:false,m:'رمز عبور نمی‌تواند با نام کاربری یکسان باشد'};
    if(U.strength(np)==='ضعیف')return{s:false,m:'رمز عبور بسیار ضعیف است'};
    u.password=np; this.dm.sv('users'); this.user=u; this.pending=null; return{s:true};
}
logout(){this.user=null;this.pending=null;}
isAdmin(){return this.user && this.user.role==='admin';}
isSpecial(){return this.user && this.user.role==='special';}
isSupervisor(){
    if(this.isAdmin()) return true;
    if(this.user && this.user.role==='member' && this.user.memberId){
        const m = this.dm.gMember(this.user.memberId);
        return m && (m.sessionActive || (m.smsStatus && m.smsStatus.council));
    }
    return false;
}
isLoggedIn(){return !!this.user;}
}

render(){if(this.app.auth.pending){this.el.innerHTML=this.forceHTML();this.bindFC();return;}if(!this.app.auth.isLoggedIn()){this.el.innerHTML=this.loginHTML();this.bindLogin();return;}this.el.innerHTML=this.appHTML();this.bindApp();this.switchTab(this.tab);this.updUI();this.startClock();this.updNotif();this.updCoinBadge();}
loginHTML(){const logo=this.app.dm.logo;return`<div class="login-page"><div style="text-align:center;margin-bottom:30px">${logo?`<img src="${logo}" style="width:120px;height:120px;border-radius:50%;margin-bottom:20px">`:`<i class="fas fa-university" style="font-size:4rem;color:#667eea;margin-bottom:15px"></i>`}<h1 style="color:#2d3748;margin-bottom:10px">سیستم حسابداری صندوق اتحاد</h1><p style="color:#718096">ورود با رمز اختصاصی</p></div><div class="input-group"><label><i class="fas fa-user"></i> نام کاربری</label><input type="text" id="loginUsername" placeholder="نام کاربری خود را وارد کنید"></div><div class="input-group"><label><i class="fas fa-lock"></i> رمز عبور</label><input type="password" id="loginPassword" placeholder="رمز عبور خود را وارد کنید"><button class="toggle-password" id="toggleLoginPass"><i class="fas fa-eye"></i></button></div><button class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> ورود</button><button class="btn" id="forgotBtn" style="background:linear-gradient(135deg,#ed8936,#dd6b20);margin-top:12px"><i class="fas fa-key"></i> رمز را فراموش کرده ام</button><div id="loginError" class="error-msg"></div><div id="forgotSuccess" class="success-msg"></div></div>`;}
forceHTML(){return`<div class="force-change-page"><div style="text-align:center;margin-bottom:30px"><i class="fas fa-exclamation-triangle" style="font-size:5rem;color:#e53e3e"></i><div style="font-size:1.8rem;color:#e53e3e;margin:15px 0;font-weight:700">تغییر رمز عبور الزامی است</div></div><div style="max-width:450px;margin:0 auto"><div class="input-group"><label><i class="fas fa-lock"></i> رمز عبور جدید</label><input type="password" id="newPasswordForce" placeholder="رمز جدید"><button class="toggle-password" id="toggleForcePass"><i class="fas fa-eye"></i></button><div id="passwordStrength" style="margin-top:8px;font-weight:600"></div></div><div class="input-group"><label><i class="fas fa-check-circle"></i> تکرار رمز جدید</label><input type="password" id="confirmPasswordForce" placeholder="تکرار رمز جدید"><button class="toggle-password" id="toggleForceConfirm"><i class="fas fa-eye"></i></button></div><button class="btn" id="forceChangeBtn"><i class="fas fa-save"></i> تغییر رمز و ورود</button><div id="forceError" class="error-msg"></div></div></div>`;}
appHTML(){const ia=this.app.auth.isAdmin(),isp=this.app.auth.isSpecial(),isv=this.app.auth.isSupervisor();const cm=ia?null:this.app.dm.gMember(this.app.auth.user && this.app.auth.user.memberId);const isCouncil=cm&&(cm.sessionActive||(cm.smsStatus&&cm.smsStatus.council));return`<div class="app-page"><div class="header-bar"><div class="datetime-display"><div class="datetime-card"><i class="fas fa-calendar-alt"></i><div><div class="dt-label">تاریخ شمسی</div><div class="dt-value" id="persianDate">---</div></div></div><div class="datetime-card"><i class="fas fa-calendar"></i><div><div class="dt-label">تاریخ میلادی</div><div class="dt-value" id="gregorianDate">---</div></div></div><div class="clock-card"><i class="fas fa-clock"></i><div><div class="dt-label" style="color:rgba(255,255,255,.8)">ساعت</div><div class="clock-time" id="clockDisplay">--:--:--</div></div></div></div><div class="header-actions"><div class="theme-buttons"><button class="theme-btn" data-theme="day"><i class="fas fa-sun"></i> روز</button><button class="theme-btn" data-theme="night"><i class="fas fa-moon"></i> شب</button></div>${!ia?`<div class="coin-badge" id="coinBadge"><i class="fas fa-coins"></i><span id="coinCount">0</span></div>`:''}<div style="position:relative"><button class="notification-bell" id="bellButton"><i class="fas fa-bell"></i><span class="badge hidden" id="notifBadge">0</span></button></div></div></div><div id="welcomeBanner" style="font-size:1.3rem;font-weight:700;color:#667eea;margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap"><i class="fas fa-star"></i> خوش آمدید</div><div class="app-layout"><div class="vertical-menu"><div style="font-size:1.3rem;font-weight:700;color:#667eea;padding-bottom:20px;border-bottom:3px solid #edf2f7;text-align:center"><i class="fas fa-university"></i> صندوق اتحاد</div><div class="menu-item" data-tab="profile"><i class="fas fa-user"></i> پروفایل</div><div class="menu-item" data-tab="dashboard"><i class="fas fa-chart-line"></i> صورتحساب</div><div class="menu-item" data-tab="coins"><i class="fas fa-coins"></i> سکه‌ها</div>${!ia?'<div class="menu-item" data-tab="shop"><i class="fas fa-shopping-cart"></i> فروشگاه</div>':''}<div class="menu-item" data-tab="polls"><i class="fas fa-poll"></i> نظرسنجی</div><div class="menu-item" data-tab="messenger"><i class="fas fa-envelope"></i> پیامرسان</div><div class="menu-item" data-tab="cultural"><i class="fas fa-theater-masks"></i> فرهنگی</div><div class="menu-item" data-tab="sms"><i class="fas fa-sms"></i> وضعیت پیامکی</div><div class="menu-item" data-tab="support"><i class="fas fa-headset"></i> پشتیبانی</div>${(ia||isp)?'<div class="menu-item" data-tab="members"><i class="fas fa-users"></i> مدیریت اعضا</div>':''}${isv?'<div class="menu-item" data-tab="supervisor"><i class="fas fa-user-shield"></i> مدیریت ویژه</div>':''}${ia?'<div class="menu-item" data-tab="settings"><i class="fas fa-cog"></i> تنظیمات</div>':''}<div style="display:flex;align-items:center;gap:12px;padding:20px 18px 0;margin-top:20px;border-top:3px solid #edf2f7"><span id="roleBadge" style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:6px 16px;border-radius:24px;font-size:.8rem;font-weight:700">${ia?'<i class="fas fa-crown"></i> مدیر':isp?'<i class="fas fa-shield-alt"></i> پاسخ‌دهنده':isCouncil?'<i class="fas fa-user-shield"></i> عضو شورا':'<i class="fas fa-user"></i> عضو'}</span><button id="logoutBtn" style="background:linear-gradient(135deg,#f56565,#e53e3e);color:#fff;border:none;padding:10px 20px;border-radius:24px;cursor:pointer;font-weight:700;margin-right:auto;display:flex;align-items:center;gap:6px"><i class="fas fa-sign-out-alt"></i> خروج</button></div></div><div class="content-area" id="dynamicContent"></div></div></div>`;}
bindLogin(){$('#loginBtn').onclick=()=>this.app.doLogin();$('#forgotBtn').onclick=()=>this.app.doForgot();$('#loginPassword').onkeydown=e=>{if(e.key==='Enter')this.app.doLogin();};$('#loginUsername').onkeydown=e=>{if(e.key==='Enter')this.app.doLogin();};$('#toggleLoginPass').onclick=()=>{const i=$('#loginPassword'),icon=$('#toggleLoginPass i');if(i.type==='password'){i.type='text';icon.className='fas fa-eye-slash';}else{i.type='password';icon.className='fas fa-eye';}};}
bindFC(){$('#forceChangeBtn').onclick=()=>this.app.doForceChange();$('#newPasswordForce').oninput=e=>{$('#passwordStrength').textContent=`قدرت رمز: ${U.strength(e.target.value)}`;$('#passwordStrength').style.color=U.strength(e.target.value)==='قوی'?'#38a169':U.strength(e.target.value)==='متوسط'?'#ed8936':'#e53e3e';};$('#toggleForcePass').onclick=()=>{const i=$('#newPasswordForce'),icon=$('#toggleForcePass i');if(i.type==='password'){i.type='text';icon.className='fas fa-eye-slash';}else{i.type='password';icon.className='fas fa-eye';}};$('#toggleForceConfirm').onclick=()=>{const i=$('#confirmPasswordForce'),icon=$('#toggleForceConfirm i');if(i.type==='password'){i.type='text';icon.className='fas fa-eye-slash';}else{i.type='password';icon.className='fas fa-eye';}};}
bindApp(){$$('.menu-item[data-tab]').forEach(el=>el.onclick=()=>{this.tab=el.dataset.tab;localStorage.setItem('activeTab', this.tab);$$('.menu-item').forEach(e=>e.classList.remove('active'));el.classList.add('active');this.switchTab(this.tab);});$('#logoutBtn').onclick=()=>this.app.doLogout();$$('.theme-btn').forEach(b=>b.onclick=()=>this.app.setTheme(b.dataset.theme));}
switchTab(t){const c=$('#dynamicContent');if(!c)return;c.innerHTML='';const fn='render_'+t;if(typeof this[fn]==='function')this[fn](c);}

el><div><span id="pds" class="password-dots">••••••</span><button class="btn-small edit-btn" id="epbtn" style="margin-right:10px"><i class="fas fa-edit"></i></button></div></div></div><div style="display:flex;align-items:center;gap:12px"><i class="fas fa-coins" style="font-size:1.5rem;color:#667eea"></i><div><label style="font-weight:600;color:#718096;font-size:.85rem">سکه:</label><div>${m.coins||0}</div></div></div><div style="display:flex;align-items:center;gap:12px"><i class="fas fa-sign-in-alt" style="font-size:1.5rem;color:#667eea"></i><div><label style="font-weight:600;color:#718096;font-size:.85rem">تعداد ورود:</label><div>${m.loginCount||0}</div></div></div><div style="display:flex;align-items:center;gap:12px"><i class="fas fa-clock" style="font-size:1.5rem;color:#667eea"></i><div><label style="font-weight:600;color:#718096;font-size:.85rem">آخرین ورود:</label><div style="font-weight:700;color:#2d3748">${U.esc(m.lastLoginDate||'---')}</div></div></div></div></div><div id="efc" style="margin-top:20px"></div>`;

render_dashboard(c){
    if(this.app.auth.isAdmin()){
        let h=`<div class="info-box"><i class="fas fa-chart-line"></i> صورتحساب اعضا</div><div class="dashboard-section"><div style="display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap"><label style="font-weight:700;color:#4a5568">انتخاب عضو:</label><select id="dashboardMemberSelect" style="flex:1;min-width:200px;padding:10px;border:2px solid #e2e8f0;border-radius:12px">${this.app.dm.members.map(mem=>`<option value="${mem.id}">${U.esc(mem.firstName||'')} ${U.esc(mem.lastName||'')} - ${U.esc(mem.accountNumber||'')}</option>`).join('')}</select><button class="btn-small info-btn" id="loadDashboardBtn"><i class="fas fa-sync"></i> بارگذاری</button></div><div id="dashboardContent"></div></div>`;
        c.innerHTML=h;
        $('#loadDashboardBtn',c).onclick=()=>{const mid=parseInt($('#dashboardMemberSelect',c).value);this.renderDashboardForMember(mid,$('#dashboardContent',c));};
        if(this.app.dm.members.length>0)this.renderDashboardForMember(this.app.dm.members[0].id,$('#dashboardContent',c));
        return;
    }
    this.renderDashboardForMember(this.app.auth.user.memberId, c);
}

renderDashboardForMember(mid, c){
    const m=this.app.dm.gMember(mid);
    if(!m){c.innerHTML='<div style="text-align:center;padding:40px"><i class="fas fa-exclamation-circle" style="font-size:3rem;color:#e53e3e"></i><p style="margin-top:15px">اطلاعات یافت نشد</p></div>';return;}
    this.app.dm.applyCoinRules(m);
    const allTransactions = window.app.allTransactions || [];
    const txns = allTransactions.filter(function(t) { 
        return String(t.memberId) === String(mid) || String(t.accountNumber) === String(m.accountNumber); 
    }).sort(function(a,b) { return (parseInt(b.transactionId)||0) - (parseInt(a.transactionId)||0); });
    const uniqueTxns = removeDuplicateTransactions(txns);
    const allH = uniqueTxns.length > 0 ? Object.keys(uniqueTxns[0]) : ['transactionId','accountNumber','transactionDate','amount','monthlySalary','fishNumber','transactionName','installmentAmount','installmentDate','balance','total','paidInstallments','remainingInstallments','savingsStatus','description'];
    const memberHeaders = ['transactionId','accountNumber','transactionDate','amount','monthlySalary','fishNumber','transactionName','installmentAmount','installmentDate','balance','total','paidInstallments','remainingInstallments','savingsStatus','description'];
    const isAdmin = this.app.auth.isAdmin();
    const ah = isAdmin ? allH : allH.filter(function(h) { return memberHeaders.includes(h); });
    const dur = U.getMembershipDuration(m.openDate);
    const latestTx = uniqueTxns.length ? uniqueTxns[0] : null;
    let balance = m.balance || 0;
    let savingsStatus = m.savingsStatus || 0;
    let monthlySalary = 0;
    let monthlySalaryApproved = 0;
    let currentMonthBalance = 0;
    if (latestTx) {
        balance = U.parseNum(latestTx.balance) || balance;
        savingsStatus = U.parseNum(latestTx.savingsStatus) || savingsStatus;
        monthlySalary = U.parseNum(latestTx.monthlySalary);
        monthlySalaryApproved = U.parseNum(latestTx.monthlySalaryApproved) || monthlySalary;
        currentMonthBalance = U.parseNum(latestTx.currentMonthBalance) || balance;
    }
    let installmentAmount = m.installmentAmount || 0;
    let feeAmount = m.feeAmount || 0;
    let totalInstallments = m.totalInstallments || 0;
    let paidInstallments = m.paidInstallments || 0;
    let remainingInstallments = m.remainingInstallments || 0;
    let overdueInstallments = m.overdueInstallments || 0;
    let loanBalance = m.loanBalance || 0;
    let loanRequestDate = m.loanRequestDate || '';
    let loanReceiveDate = m.loanReceiveDate || '';
    let lastInstallmentDate = m.lastInstallmentDate || '';
    if (latestTx) {
        loanRequestDate = latestTx.loanRequestDate || loanRequestDate;
        loanReceiveDate = latestTx.loanReceiveDate || loanReceiveDate;
        lastInstallmentDate = latestTx.lastInstallmentDate || latestTx.installmentDate || lastInstallmentDate;
        installmentAmount = U.parseNum(latestTx.installmentAmount) || installmentAmount;
        feeAmount = U.parseNum(latestTx.feeAmount) || feeAmount;
        totalInstallments = U.parseNum(latestTx.totalInstallments) || totalInstallments;
        paidInstallments = U.parseNum(latestTx.paidInstallments) || paidInstallments;
        remainingInstallments = U.parseNum(latestTx.remainingInstallments) || remainingInstallments;
        overdueInstallments = U.parseNum(latestTx.overdueInstallments) || overdueInstallments;
        loanBalance = U.parseNum(latestTx.loanBalance) || loanBalance;
    }

render_polls(c){
    const ia=this.app.auth.isAdmin();
    const mid=this.app.auth.user && this.app.auth.user.memberId;
    const allPolls = window.app.allPolls || [];
    const allVotes = window.app.allPollVotes || [];
    let h=`<div class="info-box"><i class="fas fa-poll"></i> نظرسنجی‌ها</div>`;
    if(ia){
        h+=`<div class="dashboard-section"><h3><i class="fas fa-plus-circle"></i> ایجاد نظرسنجی جدید</h3><div style="display:grid;gap:15px"><div><label style="font-weight:600;color:#718096">سوال:</label><input type="text" id="pollQuestion" placeholder="سوال نظرسنجی..." style="width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:12px;margin-top:5px"></div><div><label style="font-weight:600;color:#718096">گزینه‌ها (هر گزینه در یک خط):</label><textarea id="pollOptions" placeholder="گزینه 1&#10;گزینه 2&#10;گزینه 3" style="width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:12px;margin-top:5px;min-height:100px;resize:vertical"></textarea></div><button class="btn-small success-btn" id="createPollBtn"><i class="fas fa-plus"></i> ایجاد نظرسنجی</button></div></div>`;
    }
    h+=`<div class="dashboard-section"><h3><i class="fas fa-list"></i> نظرسنجی‌های فعال</h3>`;
    const activePolls = allPolls.filter(function(p) { return p.active !== false; });
    if(!activePolls.length){
        h+=`<div style="text-align:center;padding:30px;color:#a0aec0"><i class="fas fa-poll" style="font-size:3rem;margin-bottom:10px"></i><p>هیچ نظرسنجی فعالی وجود ندارد</p></div>`;
    } else {
        activePolls.forEach(function(poll) {
            const options = Array.isArray(poll.options) ? poll.options : [];
            const pollVotes = allVotes.filter(function(v) { return String(v.pollId) === String(poll.id); });
            const userVoted = pollVotes.some(function(v) { return String(v.memberId) === String(mid); });
            const totalVotes = pollVotes.length;
            h+=`<div class="poll-item"><div class="poll-question"><i class="fas fa-question-circle" style="color:#667eea"></i> ${U.esc(poll.question||'')}</div>`;
            if(userVoted){
                options.forEach(function(opt, idx) {
                    const votes = pollVotes.filter(function(v) { return parseInt(v.optionIndex) === idx; }).length;
                    const percent = totalVotes > 0 ? Math.round((votes/totalVotes)*100) : 0;
                    h+=`<div class="poll-option voted"><div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span>${U.esc(opt)}</span><span style="font-weight:700;color:#667eea">${percent}% (${votes})</span></div><div class="poll-bar"><div class="poll-bar-fill" style="width:${percent}%"></div></div></div></div>`;
                });
                h+=`<div style="text-align:center;color:#48bb78;margin-top:10px;font-weight:700"><i class="fas fa-check-circle"></i> شما در این نظرسنجی شرکت کرده‌اید (مجموع آرا: ${totalVotes})</div>`;
            } else {
                options.forEach(function(opt, idx) {
                    h+=`<div class="poll-option" data-poll="${poll.id}" data-option="${idx}"><i class="fas fa-circle" style="color:#cbd5e0"></i><span>${U.esc(opt)}</span></div>`;
                });
            }
            h+=`</div>`;
        });
    }
    h+=`</div>`;
    c.innerHTML=h;
    if(ia){ $('#createPollBtn',c).onclick=()=>window.app.createPoll(); }
    c.querySelectorAll('.poll-option[data-poll]').forEach(function(el){
        el.onclick=function(){
            const pollId=el.dataset.poll;
            const optionIdx=parseInt(el.dataset.option);
            window.app.votePoll(pollId, optionIdx);
        };
    });
}

msgs(type){
    const dm=this.app.dm,ia=this.app.auth.isAdmin(),isp=this.app.auth.isSpecial(),isv=this.app.auth.isSupervisor(),cm=dm.gMember(this.app.auth.user && this.app.auth.user.memberId),cp=cm?cm.phone1||'':'',uid=this.app.auth.user?this.app.auth.user.id:null;
    const hasPrivilege = ia || isp || isv;
    let fl=[];
    if(type==='member_to_admin'){
        if(hasPrivilege)fl=dm.messages.filter(function(m){return m.type==='member_to_admin';});
        else{const myMessages = dm.messages.filter(function(m){return m.type==='member_to_admin' && String(m.senderId)===String(uid);});const myMessageIds = new Set(myMessages.map(function(m){return m.id;}));const repliesToMe = dm.messages.filter(function(m){return m.type==='member_to_admin' && m.parentId && myMessageIds.has(m.parentId);});fl = myMessages.concat(repliesToMe);}
    } else if(type==='member_to_member'){
        if(hasPrivilege)fl=dm.messages.filter(function(m){return m.type==='member_to_member';});
        else fl=dm.messages.filter(function(m){return m.type==='member_to_member'&&(m.senderPhone===cp||m.receiverPhone===cp);});
    }
    fl.sort(function(a,b){return (a.timestamp||'').localeCompare(b.timestamp||'');});
    if(!fl.length)return'<div style="color:#a0aec0;padding:15px;text-align:center"><i class="fas fa-inbox" style="font-size:2rem;margin-bottom:10px"></i><p>هیچ پیامی نیست</p></div>';
    const msgClass = type==='member_to_admin' ? 'msg-to-admin' : 'msg-member';
    return fl.map(function(msg){
        const canDel = ia || (String(msg.senderId) === String(uid));
        let dn=msg.senderName||'کاربر';
        const finalClass = msg.parentId ? 'msg-reply' : msgClass;
        let h=`<div class="msg-item ${finalClass}"><div class="msg-header"><span><i class="fas fa-user-circle"></i> ${U.esc(dn)}</span><span><i class="fas fa-clock"></i> ${U.esc(msg.timestamp||'---')}</span></div>`;
        if(msg.replyLabel && !msg.parentId)h+=`<div style="font-size:.78rem;color:#ed8936;margin:6px 0;padding:5px 8px;background:rgba(237,137,54,.1);border-radius:6px;display:inline-block"><i class="fas fa-reply"></i> ${U.esc(msg.replyLabel)}</div>`;
        h+=`<div style="line-height:1.6;font-size:.92rem">${U.esc(msg.message)}</div><div style="display:flex;gap:8px;margin-top:8px">`;
        if(type==='member_to_admin' && hasPrivilege)h+=`<button class="reply-btn" data-p="${msg.id}" data-t="${type}" style="background:none;border:none;color:#4299e1;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:600;font-size:.82rem"><i class="fas fa-reply"></i> پاسخ</button>`;
        else if(type==='member_to_member' && !msg.parentId && msg.senderPhone !== cp)h+=`<button class="reply-btn" data-p="${msg.id}" data-t="${type}" style="background:none;border:none;color:#4299e1;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:600;font-size:.82rem"><i class="fas fa-reply"></i> پاسخ</button>`;
        if(canDel)h+=`<button class="delete-btn" data-mid="${msg.id}" style="background:none;border:none;color:#e53e3e;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:600;font-size:.82rem"><i class="fas fa-trash"></i> حذف</button>`;
        h+=`</div><div id="rf_${msg.id}" style="display:none;margin-top:8px"></div></div>`;
        return h;
    }).join('');
}

search(inputId,tableSelector,container){
    container = container || document;
    const input=$(inputId,container);
    if(!input)return;
    const clearBtn=$(inputId+'_cl',container);
    const filter=function(){const q=input.value.trim().toLowerCase(),tb=container.querySelector(tableSelector);if(!tb||!tb.querySelector('tbody'))return;tb.querySelector('tbody').querySelectorAll('tr').forEach(function(r){if(!q||r.textContent.trim().toLowerCase().includes(q))r.style.display='';else r.style.display='none';});};
    input.oninput=filter;
    if(clearBtn)clearBtn.onclick=function(){input.value='';filter();input.focus();};
    setTimeout(filter,50);
}

startClock(){if(this.ci)clearInterval(this.ci);const self=this;const tick=function(){const n=new Date(),h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');const cl=$('#clockDisplay');if(cl)cl.innerHTML=`${h}:${m}<span style="font-size:1rem;opacity:.8">:${s}</span>`;const pd=$('#persianDate');if(pd)pd.textContent=U.toJalali(n);const gd=$('#gregorianDate');if(gd)gd.textContent=`${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')}`;};tick();this.ci=setInterval(tick,1000);}

updNotif(){
    const badge=$('#notifBadge');
    if(!badge)return;
    const dm=this.app.dm,cm=dm.gMember(this.app.auth.user && this.app.auth.user.memberId),cp=cm?cm.phone1||'':'',uid=this.app.auth.user?this.app.auth.user.id:null;
    let n=0;
    if(this.app.auth.isLoggedIn()){
        const ia=this.app.auth.isAdmin(),isp=this.app.auth.isSpecial(),isv=this.app.auth.isSupervisor();
        const hasPrivilege = ia || isp || isv;
        let rel = dm.messages.filter(function(m){return m.type==='admin_to_members' && String(m.senderId)!==String(uid);});
        if(hasPrivilege)rel = rel.concat(dm.messages.filter(function(m){return (m.type==='member_to_admin'||m.type==='member_to_member')&&String(m.senderId)!==String(uid);}));
        else{
            const myMsgIds = new Set(dm.messages.filter(function(m){return m.type==='member_to_admin'&&String(m.senderId)===String(uid);}).map(function(m){return m.id;}));
            const repliesToMe = dm.messages.filter(function(m){return m.type==='member_to_admin'&&m.parentId&&myMsgIds.has(m.parentId);});
            const msgsToMe = dm.messages.filter(function(m){return m.type==='member_to_member'&&m.receiverPhone===cp&&String(m.senderId)!==String(uid);});
            rel = rel.concat(repliesToMe, msgsToMe);
        }
        n = rel.length;
    }
    if(n){badge.classList.remove('hidden');badge.textContent=n>9?'9+':n;}
    else badge.classList.add('hidden');
}
}

class App{constructor(){this.dm=new DM();this.auth=new Auth(this.dm);this.ui=new UI(this);this.allTransactions=[];this.allPolls=[];this.allPollVotes=[];this.allCoinHistory=[];this.init();}
async init(){
    if (!initialLoadDone) {
        console.log('🔄 بارگذاری اولیه از Google Sheets...');
        const data = await loadDataFromSheets();
        if (data) {
            let membersData = data.members || [];
            membersData = removeDuplicateMembers(membersData);
            this.dm.members = membersData.map(function(m) {
                return Object.assign({}, m, {
                    id: parseInt(m.id) || m.id, balance: U.parseNum(m.balance),
                    savingsStatus: U.parseNum(m.savingsStatus), loanBalance: U.parseNum(m.loanBalance),
                    coins: parseInt(m.coins) || 0, usedCoins: parseInt(m.usedCoins) || 0,
                    coinHistory: [], loginCount: parseInt(m.loginCount) || 0,
                    smsStatus: m.smsStatus || {}, transactions: []
                });
            });
            this.dm.users = (data.users || []).map(function(u) {
                return Object.assign({}, u, {
                    id: parseInt(u.id) || u.id,
                    username: String(u.username || ''),
                    password: String(u.password || ''),
                    role: String(u.role || 'member'),
                    memberId: u.memberId ? (parseInt(u.memberId) || null) : null
                });
            });
            this.dm.messages = data.messages || [];
            this.dm.announcements = data.announcements || [];
            this.dm.support = (data.support && data.support[0]) || {phone:'',accountNumber:'',address:''};
            this.dm.shopItems = data.shopitems || [];
            this.allTransactions = removeDuplicateTransactions(data.transactions || []);
            this.allPolls = (data.polls || []).map(function(p) {
                return Object.assign({}, p, {
                    options: U.parseJSON(p.options) || [],
                    active: String(p.active).toLowerCase() === 'true'
                });
            });
            this.allPollVotes = data.pollvotes || [];
            this.allCoinHistory = data.coinhistory || [];
            ['members','users','messages','announcements','support','shopItems'].forEach(function(k) { window.app.dm.sv(k); });
            const adminExists = this.dm.users.find(function(u) { return String(u.username) === 'admin'; });
            if (!adminExists) {
                console.log('⚠️ کاربر admin یافت نشد، در حال ساخت...');
                const newId = this.dm.users.length > 0 ? Math.max.apply(null, this.dm.users.map(function(u) { return u.id || 0; })) + 1 : 1;
                this.dm.users.push({
                    id: newId,
                    username: 'admin',
                    password: 'admin123',
                    role: 'admin',
                    memberId: null
                });
                this.dm.sv('users');
                console.log('✅ کاربر admin ساخته شد');
            } else {
                adminExists.password = 'admin123';
                adminExists.role = 'admin';
                this.dm.sv('users');
                console.log('✅ کاربر admin تأیید شد');
            }
            console.log(`✅ ${this.dm.members.length} عضو از Google Sheets بارگذاری شد (بدون تکرار)`);
            console.log(`✅ ${this.allTransactions.length} تراکنش از Google Sheets بارگذاری شد (بدون تکرار)`);
            console.log(`✅ ${this.allPolls.length} نظرسنجی از Google Sheets بارگذاری شد`);
            console.log(`✅ ${this.allCoinHistory.length} تاریخچه سکه از Google Sheets بارگذاری شد`);
        }
        initialLoadDone = true;
    }
    this.ui.render();
}
setTheme(t){localStorage.setItem('theme',t);$$('.theme-btn').forEach(function(b){b.classList.remove('active');});const activeBtn=$(`.theme-btn[data-theme="${t}"]`);if(activeBtn)activeBtn.classList.add('active');}
doLogin(){const un=$('#loginUsername').value.trim(),pw=$('#loginPassword').value.trim(),ed=$('#loginError');ed.textContent='';if(!un||!pw){ed.innerHTML='<i class="fas fa-exclamation-circle"></i> نام کاربری و رمز عبور را وارد کنید';return;}const r=this.auth.login(un,pw);if(!r.s){ed.innerHTML=`<i class="fas fa-exclamation-circle"></i> ${r.m}`;return;}if(r.fc){this.ui.render();return;}this.ui.render();}
doForgot(){
    const un=$('#loginUsername').value.trim(),ed=$('#loginError'),sd=$('#forgotSuccess');
    ed.textContent='';sd.textContent='';
    if(!un){ed.innerHTML='<i class="fas fa-exclamation-circle"></i> نام کاربری را وارد کنید';return;}
    const u=this.dm.users.find(function(x){return U.norm(x.username)===U.norm(un)&&x.role!=='admin';});

    u.password=u.username; this.dm.sv('users');

doForceChange(){const np=$('#newPasswordForce').value.trim(),cp=$('#confirmPasswordForce').value.trim(),ed=$('#forceError');ed.textContent='';if(!np){ed.innerHTML='<i class="fas fa-exclamation-circle"></i> رمز جدید را وارد کنید';return;}if(np!==cp){ed.innerHTML='<i class="fas fa-exclamation-circle"></i> رمز و تکرار آن مطابقت ندارند';return;}const r=this.auth.changeForced(np);if(!r.s){ed.innerHTML=`<i class="fas fa-exclamation-circle"></i> ${r.m}`;return;}this.ui.render();}

spinWheel(){const wh=$('#wheel'),btn=$('#spinBtn'),res=$('#wheelResult');if(!wh||!btn)return;const today=new Date().toDateString();if(localStorage.getItem('lastSpinDate')===today){return;}btn.disabled=true;const prize=[1,2,3,4,5][Math.floor(Math.random()*5)],angle=Math.floor(Math.random()*5)*60+30+Math.random()*360+720;this.ui.sa+=angle;wh.style.transition='transform 4s cubic-bezier(.17,.67,.12,.99)';wh.style.transform=`rotate(${this.ui.sa}deg)`;setTimeout(()=>{if(res)res.innerHTML=`<i class="fas fa-trophy"></i> ${prize} سکه`;if(prize>0){const m=this.dm.gMember(this.auth.user.memberId);if(m)this.dm.addCoin(m.id,prize,'چرخش گردونه','گردونه شانس');}localStorage.setItem('lastSpinDate',today);btn.disabled=true;btn.innerHTML='<i class="fas fa-check"></i> امروز انجام شد';btn.style.opacity='.6';this.ui.updCoinBadge();},4000);}
sendToAdmin(){const i=$('#mtai');if(!i||!i.value.trim()){alert('متن را وارد کنید');return;}const m=this.dm.gMember(this.auth.user.memberId);if(!m){alert('اطلاعات یافت نشد');return;}this.dm.addMsg({id:'m_'+Date.now()+Math.random().toString(36).slice(2,6),senderId:this.auth.user.id,senderName:`${m.firstName||''} ${m.lastName||''}`,senderRole:'member',senderPhone:m.phone1||'',receiverId:1,receiverPhone:'',message:i.value.trim(),timestamp:U.now(),type:'member_to_admin',parentId:null,replyLabel:''});i.value='';this.dm.applyCoinRules(m);this.ui.switchTab('messenger');}

    const m=this.dm.gMember(mid);

    if(!m){alert('عضو یافت نشد');return;}
    this.dm.addCoin(mid,amt,'افزودن توسط مدیر',`افزودن ${amt} سکه`);

createPoll(){
    const q=$('#pollQuestion')?$('#pollQuestion').value.trim():'';
    const o=$('#pollOptions')?$('#pollOptions').value.trim():'';
    if(!q){alert('سوال را وارد کنید');return;}
    if(!o){alert('گزینه‌ها را وارد کنید');return;}
    const options=o.split('\n').map(function(s){return s.trim();}).filter(function(s){return s;});
    if(options.length<2){alert('حداقل دو گزینه وارد کنید');return;}
    const poll={
        id:'p_'+Date.now()+Math.random().toString(36).slice(2,6),
        question:q, options:options, timestamp:U.now(),
        creator:this.auth.user.username||'مدیر', active:true
    };
    this.allPolls.push(poll);
    $('#pollQuestion').value='';
    $('#pollOptions').value='';
    alert('✅ نظرسنجی ایجاد شد');
    this.ui.switchTab('polls');
}
votePoll(pollId, optionIndex){
    const mid=this.auth.user?this.auth.user.memberId:null;
    if(!mid){alert('ابتدا وارد شوید');return;}
    const success=this.dm.votePoll(pollId, mid, optionIndex);
    if(success){
        const m=this.dm.gMember(mid);
        if(m)this.dm.applyCoinRules(m);
        alert('✅ رأی شما ثبت شد');
        this.ui.switchTab('polls');
    } else {
        alert('❌ شما قبلاً در این نظرسنجی شرکت کرده‌اید');
    }
