async function fetchBin(binName){
  try{
    const response=await fetch(`https://api.jsonbin.io/v3/b/${BINS[binName]}/latest`,{
      headers:{'X-Master-Key':JSONBIN_API_KEY}
    });
    if(!response.ok) return null;
    const result=await response.json();
    return result.record;
  }catch(e){
    console.error(`❌ خطا در خواندن ${binName}:`,e);
    return null;
  }
}

  try{

      method:'PUT',
      headers:{
        'Content-Type':'application/json',
        'X-Master-Key':JSONBIN_API_KEY
      },
      body:JSON.stringify(data)
    });

  }catch(e){
    console.error(`❌ خطا در ذخیره ${binName}:`,e);

  }
}

parseSmsCode(v){if(v==null||v==='')return false;const n=U.parseNum(v);if(n===-1)return true;if(n===0)return false;return['true','1','yes','فعال','بله','-1'].includes(String(v).trim().toLowerCase());},
findCol(names,headers){for(const n of names){const nn=n.toLowerCase().replace(/[_\s\-]/g,'');for(const h of headers)if(h.toLowerCase().replace(/[_\s\-]/g,'')===nn)return h;}return null;},
isValidDate(s){if(!s)return false;const p=s.split('/');if(p.length!==3)return false;const[y,m,d]=p.map(Number);if(isNaN(y)||isNaN(m)||isNaN(d))return false;if(m<1||m>12||d<1||d>31)return false;if(m>6&&d>30)return false;return true;},
getMembershipDuration(openDateStr){
if(!openDateStr)return'---';const parts=openDateStr.split('/');if(parts.length!==3)return'---';
const jy=parseInt(parts[0]),jm=parseInt(parts[1]),jd=parseInt(parts[2]);
if(isNaN(jy)||isNaN(jm)||isNaN(jd))return'---';
let jy1=jy+1595,days=-355668+365*jy1+~~(jy1/33)*8+~~(((jy1%33)+3)/4);
days+=jm<7?(jm-1)*31:(jm-7)*30+186;days+=jd;
let gy=400*~~(days/146097);days%=146097;
if(days>36524){days--;gy+=100*~~(days/36524);days%=36524;if(days>=365)days++;}
gy+=4*~~(days/1461);days%=1461;
if(days>365){gy+=~~((days-1)/365);days=(days-1)%365;}
let gd=days+1,gm=1;const gdm=[0,31,59,90,120,151,181,212,243,273,304,334];
for(let i=1;i<=12;i++){if(gd<=gdm[i]){gm=i;break;}}gd-=gdm[gm-1];
const openDate=new Date(gy,gm-1,gd),now=new Date();
let dy=now.getFullYear()-openDate.getFullYear(),dm=now.getMonth()-openDate.getMonth(),dd=now.getDate()-openDate.getDate();
if(dd<0){const prevMonth=new Date(now.getFullYear(),now.getMonth(),0);dd+=prevMonth.getDate();dm--;}
if(dm<0){dm+=12;dy--;}if(dy<0)return'---';
let result='';if(dy>0)result+=`${dy} سال `;if(dm>0)result+=`${dm} ماه `;if(dd>0)result+=`${dd} روز`;
return result.trim()||'کمتر از یک روز';
}
};

function findInRaw(raw, keys){
if(!raw) return undefined;
for(const k of Object.keys(raw)){
const nk = k.toLowerCase().replace(/[_\s\-]/g, '');
for(const q of keys){
if(nk === q.toLowerCase().replace(/[_\s\-]/g, '')) return raw[k];
}
}
return undefined;
}

class Auth{

login(un,pw){const u=this.dm.users.find(x=>U.norm(x.username)===U.norm(un));if(!u)return{s:false,m:'نام کاربری یا رمز عبور اشتباه است'};if(u.password!==pw)return{s:false,m:'نام کاربری یا رمز عبور اشتباه است'};if(pw==='1234'&&u.role!=='admin'){this.pending=u;return{s:true,fc:true};}this.user=u;if((u.role==='member'||u.role==='special')&&u.memberId){this.dm.incLogin(u.memberId);const m=this.dm.gMember(u.memberId);if(m)this.dm.applyCoinRules(m);}return{s:true,fc:false};}
changeForced(np){const u=this.pending;if(!u)return{s:false,m:'خطا در احراز هویت'};if(np==='1234')return{s:false,m:'رمز جدید نمی‌تواند 1234 باشد'};if(U.strength(np)==='ضعیف')return{s:false,m:'رمز عبور بسیار ضعیف است'};u.password=np;this.user=u;this.pending=null;return{s:true};}
logout(){this.user=null;this.pending=null;}
isAdmin(){return this.user?.role==='admin';}
isSpecial(){return this.user?.role==='special';}
isSupervisor(){
if(this.isAdmin()) return true;
if(this.user?.role==='member' && this.user.memberId){
const m = this.dm.gMember(this.user.memberId);
return m && (m.sessionActive || (m.smsStatus && m.smsStatus.council));
}
return false;
}
isLoggedIn(){return!!this.user;}
}

v><div class="menu-item" data-tab="cultural"><i class="fas fa-theater-masks"></i> فرهنگی</div><div class="menu-item" data-tab="sms"><i class="fas fa-sms"></i> وضعیت پیامکی</div><div class="menu-item" data-tab="support"><i class="fas fa-headset"></i> پشتیبانی</div>${(ia||isp)?'<div class="menu-item" data-tab="members"><i class="fas fa-users"></i> مدیریت اعضا</div>':''}${isv?'<div class="menu-item" data-tab="supervisor"><i class="fas fa-user-shield"></i> مدیریت ویژه</div>':''}${ia?'<div class="menu-item" data-tab="settings"><i class="fas fa-cog"></i> تنظیمات</div>':''}<div style="display:flex;align-items:center;gap:12px;padding:20px 18px 0;margin-top:20px;border-top:3px solid #edf2f7"><span id="roleBadge" style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:6px 16px;border-radius:24px;font-size:.8rem;font-weight:700">${ia?'<i class="fas fa-crown"></i> مدیر':isp?'<i class="fas fa-shield-alt"></i> پاسخ‌دهنده':isCouncil?'<i class="fas fa-user-shield"></i> عضو شورا':'<i class="fas fa-user"></i> عضو'}</span><button id="logoutBtn" style="background:#e53e3e;color:#fff;border:none;padding:10px 20px;border-radius:24px;cursor:pointer;font-weight:700;margin-right:auto"><i class="fas fa-sign-out-alt"></i> خروج</button></div></div><div class="content-area" id="dynamicContent"></div></div></div>`;

bindLogin(){$('#loginBtn').onclick=()=>this.app.doLogin();$('#forgotBtn').onclick=()=>this.app.doForgot();$('#loginPassword').onkeydown=e=>{if(e.key==='Enter')this.app.doLogin();};$('#loginUsername').onkeydown=e=>{if(e.key==='Enter')this.app.doLogin();};}

bindFC(){$('#forceChangeBtn').onclick=()=>this.app.doForceChange();$('#newPasswordForce').oninput=e=>{$('#passwordStrength').textContent=`قدرت رمز: ${U.strength(e.target.value)}`;$('#passwordStrength').style.color=U.strength(e.target.value)==='قوی'?'#38a169':U.strength(e.target.value)==='متوسط'?'#ed8936':'#e53e3e';};}

bindApp(){
const savedTab = localStorage.getItem('activeTab');
if(savedTab && this.el.querySelector(`.menu-item[data-tab="${savedTab}"]`)) this.tab = savedTab;
$$('.menu-item').forEach(e=>{if(e.dataset.tab === this.tab) e.classList.add('active'); else e.classList.remove('active');});
$$('.menu-item[data-tab]').forEach(el=>el.onclick=()=>{
this.tab=el.dataset.tab;
localStorage.setItem('activeTab', this.tab);
$$('.menu-item').forEach(e=>e.classList.remove('active'));
el.classList.add('active');
this.switchTab(this.tab);
});
$('#logoutBtn').onclick=()=>this.app.doLogout();
$$('.theme-btn').forEach(b=>b.onclick=()=>this.app.setTheme(b.dataset.theme));
$('#bellButton').onclick=()=>{};
}

switchTab(t){const c=$('#dynamicContent');if(!c)return;c.innerHTML='';const fn='render_'+t;if(typeof this[fn]==='function')this[fn](c);}

renderPublicMessages(){
const container=$('#publicMessages');
if(!container)return;
const ia=this.app.auth.isAdmin(),isp=this.app.auth.isSpecial(),isv=this.app.auth.isSupervisor();
const hasPrivilege = ia || isp || isv;
const msgs=this.app.dm.messages.filter(m=>m.type==='admin_to_members'&&!m.parentId);
msgs.sort((a,b)=>(b.timestamp||'').localeCompare(a.timestamp||''));
let h=`<div class="dashboard-section public-messages-section" style="border-right-color:#48bb78"><h3><i class="fas fa-bullhorn"></i> پیام‌های مدیر و شورا</h3>`;
if(hasPrivilege){
h+=`<div style="margin-bottom:12px;padding:10px;background:rgba(72,187,120,.08);border-radius:10px"><div style="display:flex;gap:8px;flex-wrap:wrap"><textarea id="adminMsgInput" placeholder="پیام جدید..." style="flex:2;min-width:200px;padding:8px 12px;border:2px solid #e2e8f0;border-radius:10px;min-height:50px"></textarea><button class="btn-small success-btn" id="sendAdminMsgBtn"><i class="fas fa-paper-plane"></i> ارسال</button></div></div>`;
}
if(!msgs.length) h+=`<div style="text-align:center;padding:15px;color:#a0aec0">هنوز پیامی ارسال نشده است</div>`;
else {
msgs.forEach(msg=>{
h+=`<div class="msg-item msg-admin"><span class="msg-sender-badge badge-admin">${msg.senderName||'مدیر'}</span><div style="font-size:.72rem;color:#4a5568;margin:2px 0">${U.esc(msg.timestamp||'---')}</div><div style="line-height:1.4;margin-top:4px">${U.esc(msg.message)}</div>${ia?`<div style="margin-top:6px;text-align:left"><button class="btn-small danger-btn" onclick="window.app.delMsg('${msg.id}')"><i class="fas fa-trash"></i></button></div>`:''}</div>`;
});
}
h+=`</div>`;
container.innerHTML=h;
if(hasPrivilege){
const sendBtn = $('#sendAdminMsgBtn', container);
const msgInput = $('#adminMsgInput', container);
if(sendBtn && msgInput){
sendBtn.onclick = () => {
const txt = msgInput.value.trim();
if(!txt){alert('متن پیام را وارد کنید');return;}
this.app.sendAdminMsgFromPublic(txt);
msgInput.value = '';
};
}
}
}

render_dashboard(c){
if(this.app.auth.isAdmin()){c.innerHTML='<div style="text-align:center;padding:40px"><i class="fas fa-ban" style="font-size:3rem;color:#e53e3e"></i><p>دسترسی غیرمجاز</p></div>';return;}
const m=this.app.dm.gMember(this.app.auth.user.memberId);if(!m){c.innerHTML='<div style="text-align:center;padding:40px">اطلاعات یافت نشد</div>';return;}
this.app.dm.applyCoinRules(m);
const txns=[...(m.transactions||[])].sort((a,b)=>(parseInt(b.transactionId)||0)-(parseInt(a.transactionId)||0));
const allH=txns.length&&txns[0].allHeaders?.length?txns[0].allHeaders:['id','شماره حساب','تاریخ تراکنش','مبلغ تراکنش','موجودی'];
const memberHeaders=['id','شماره حساب','تاریخ تراکنش','مبلغ تراکنش','مقرری ماهانه','شماره فیش','نام تراکنش کننده','مبلغ قسط واریزی','تاریخ قسط واریزی','جمع واریزی','موجودی','جمع','تعداد قسط پرداخت شده','تعداد قسط مانده','وضعیت پس انداز','توضیحات'];
const ah=allH.filter(h=>memberHeaders.includes(h));
const dur=U.getMembershipDuration(m.openDate);
const latestTx=txns.length?txns[0]:null;
let balance=m.balance, savingsStatus=m.savingsStatus, monthlySalary=m.monthlySalary, monthlySalaryApproved=m.monthlySalaryApproved, currentMonthBalance=m.currentMonthBalance;
if(latestTx&&latestTx.rawData){
const raw=latestTx.rawData;
const b=U.parseNum(findInRaw(raw,['موجودی','balance']));if(!isNaN(b)) balance=b;
const ss=findInRaw(raw,['وضعیت پس انداز','savings status']);if(ss!==undefined) savingsStatus=U.parseNum(ss);
const ms=U.parseNum(findInRaw(raw,['mogmo','مقرری ماهانه','monthly salary']));if(!isNaN(ms)) monthlySalary=ms;
const msa=U.parseNum(findInRaw(raw,['mogmoMosavab','monthly salary approved']));if(!isNaN(msa)) monthlySalaryApproved=msa;
const tb=U.parseNum(findInRaw(raw,['mojodiTil','current balance']));if(!isNaN(tb)) currentMonthBalance=tb;
}
let loanRequestDate=m.loanRequestDate, loanReceiveDate=m.loanReceiveDate, lastInstallmentDate=m.lastInstallmentDate;
let installmentAmount=m.installmentAmount, feeAmount=m.feeAmount, totalInstallments=m.totalInstallments;
let paidInstallments=m.paidInstallments, remainingInstallments=m.remainingInstallments;
let overdueInstallments=m.overdueInstallments, loanBalance=m.loanBalance;
if(latestTx && latestTx.rawData){
const raw=latestTx.rawData;
loanRequestDate = findInRaw(raw,['date sabt','تاریخ درخواست وام']) || loanRequestDate;
loanReceiveDate = findInRaw(raw,['date vam','تاریخ دریافت وام']) || loanReceiveDate;
lastInstallmentDate = findInRaw(raw,['akharin ghest','تاریخ آخرین قسط']) || lastInstallmentDate;
const ia=U.parseNum(findInRaw(raw,['mablagh har ghest','مبلغ اقساط وام']));if(!isNaN(ia)) installmentAmount=ia;
const fa=U.parseNum(findInRaw(raw,['mablagh karmozd','مبلغ کارمزد']));if(!isNaN(fa)) feeAmount=fa;
const ti=U.parseNum(findInRaw(raw,['tedad aghsat','تعداد اقساط']));if(!isNaN(ti)) totalInstallments=ti;
const pi=U.parseNum(findInRaw(raw,['تعداد قسط پرداخت شده','paid installments']));if(!isNaN(pi)) paidInstallments=pi;
const ri=U.parseNum(findInRaw(raw,['تعداد قسط مانده','remaining installments']));if(!isNaN(ri)) remainingInstallments=ri;
const oi=U.parseNum(findInRaw(raw,['تعداد قسط معوقه','overdue']));if(!isNaN(oi)) overdueInstallments=oi;
const lb=U.parseNum(findInRaw(raw,['مانده وام','loan balance']));if(!isNaN(lb)) loanBalance=lb;
}
let h=`<div class="dashboard-section"><h3><i class="fas fa-info-circle"></i> اطلاعات حساب</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px">
<div><label>شماره حساب:</label><div style="font-weight:700">${U.esc(m.accountNumber||'---')}</div></div>
<div><label>مدت عضویت:</label><div style="font-weight:700">${dur}</div></div>
<div><label>تعداد تراکنش:</label><div style="font-weight:700">${txns.length}</div></div>
<div><label>وضعیت حساب:</label><div style="font-weight:700;color:${m.statusActive!==false?'#48bb78':'#e53e3e'}">${m.statusActive!==false?'✅ فعال':'❌ غیرفعال'}</div></div>
<div><label>مقرری ماهانه مصوب:</label><div style="font-weight:700">${U.fmtNum(monthlySalaryApproved)}</div></div>
<div><label>موجودی تا این ماه:</label><div style="font-weight:700">${U.fmtNum(currentMonthBalance)}</div></div>
</div>`;
if(m.statusActive===false) h+=`<div class="warning-box"><i class="fas fa-exclamation-triangle"></i><div><strong>حساب غیرفعال</strong>با حسابداری تماس بگیرید</div></div>`;
h+=`</div>`;
h+=`<div class="dashboard-section"><h3><i class="fas fa-wallet"></i> موجودی و پس‌انداز</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px">
<div style="background:rgba(102,126,234,.1);padding:15px;border-radius:12px"><label>موجودی شما:</label><div style="font-size:1.3rem;font-weight:700;color:${balance<0?'#e53e3e':'#2d3748'}">${U.fmtNum(balance)}</div></div>
<div style="background:rgba(72,187,120,.1);padding:15px;border-radius:12px"><label>وضعیت پس‌انداز:</label><div style="font-size:1.3rem;font-weight:700;color:${savingsStatus<0?'#e53e3e':'#48bb78'}">${U.fmtNum(savingsStatus)}</div></div>
<div style="background:rgba(237,137,54,.1);padding:15px;border-radius:12px"><label>مقرری ماهانه:</label><div style="font-size:1.3rem;font-weight:700">${U.fmtNum(monthlySalary)}</div></div>

msgs(type){
const dm=this.app.dm,ia=this.app.auth.isAdmin(),isp=this.app.auth.isSpecial(),isv=this.app.auth.isSupervisor(),cm=dm.gMember(this.app.auth.user?.memberId),cp=cm?.phone1||'',uid=this.app.auth.user?.id;
const hasPrivilege = ia || isp || isv;
let fl=[];
if(type==='member_to_admin'){
if(hasPrivilege) fl=dm.messages.filter(m=>m.type==='member_to_admin');
else{
const myMessages = dm.messages.filter(m=>m.type==='member_to_admin' && m.senderId===uid);
const myMessageIds = new Set(myMessages.map(m=>m.id));
const repliesToMe = dm.messages.filter(m=>m.type==='member_to_admin' && m.parentId && myMessageIds.has(m.parentId));
fl = [...myMessages, ...repliesToMe];
}
}
else if(type==='member_to_member'){
if(hasPrivilege) fl=dm.messages.filter(m=>m.type==='member_to_member');
else fl=dm.messages.filter(m=>m.type==='member_to_member'&&(m.senderPhone===cp||m.receiverPhone===cp));
}
fl.sort((a,b)=>(a.timestamp||'').localeCompare(b.timestamp||''));
if(!fl.length)return'<div style="color:#a0aec0;padding:15px;text-align:center">هیچ پیامی نیست</div>';
const msgClass = type==='member_to_admin' ? 'msg-to-admin' : 'msg-member';
return fl.map(msg=>{
const canDel = ia || (msg.senderId === uid);
let dn=msg.senderName||'کاربر';
let h=`<div class="msg-item ${msg.parentId?'msg-reply':msgClass}"><div class="msg-header"><span>${U.esc(dn)}</span><span>${U.esc(msg.timestamp||'---')}</span></div><div style="line-height:1.6">${U.esc(msg.message)}</div><div style="display:flex;gap:8px;margin-top:8px">`;
if((type==='member_to_admin' && hasPrivilege) || (type==='member_to_member' && !msg.parentId && msg.senderPhone !== cp)) h+=`<button class="reply-btn" data-p="${msg.id}" data-t="${type}" style="background:none;border:none;color:#4299e1;cursor:pointer"><i class="fas fa-reply"></i> پاسخ</button>`;
if(canDel) h+=`<button class="delete-btn" data-mid="${msg.id}" style="background:none;border:none;color:#e53e3e;cursor:pointer"><i class="fas fa-trash"></i></button>`;
h+=`</div><div id="rf_${msg.id}" style="display:none;margin-top:8px"></div></div>`;
return h;
}).join('');
}

class App{
constructor(){this.dm=new DM();this.auth=new Auth(this.dm);this.ui=new UI(this);this.init();}

async init(){
this.loadTheme();
// بارگذاری داده‌ها از GitHub و JSONBin
const githubOk = await this.dm.loadFromGitHub();
if(githubOk) await this.dm.syncAllFromJSONBin();
this.dm.loaded=true;
this.ui.render();
// همگام‌سازی خودکار هر ۳۰ ثانیه
setInterval(()=>{
if(this.auth.isLoggedIn()){
this.dm.syncAllFromJSONBin().then(()=>{this.ui.render();});
}
},30000);
}

loadTheme(){this.setTheme(localStorage.getItem('theme')||'auto');}

setTheme(t){
document.body.classList.remove('theme-day','theme-night');
let effectiveTheme = t;
if(t === 'auto'){const hour = new Date().getHours();effectiveTheme = (hour >= 6 && hour < 18) ? 'day' : 'night';}
if(effectiveTheme==='day')document.body.classList.add('theme-day');
else if(effectiveTheme==='night')document.body.classList.add('theme-night');
localStorage.setItem('theme',t);
$$('.theme-btn').forEach(b=>b.classList.remove('active'));
$(`.theme-btn[data-theme="${t}"]`)?.classList.add('active');
}

doLogin(){const un=$('#loginUsername').value.trim(),pw=$('#loginPassword').value.trim(),ed=$('#loginError');ed.textContent='';if(!un||!pw){ed.innerHTML='<i class="fas fa-exclamation-circle"></i> نام کاربری و رمز را وارد کنید';return;}const r=this.auth.login(un,pw);if(!r.s){ed.innerHTML=`<i class="fas fa-exclamation-circle"></i> ${r.m}`;return;}if(r.fc){this.ui.render();return;}this.ui.render();}

doForgot(){const un=$('#loginUsername').value.trim(),ed=$('#loginError'),sd=$('#forgotSuccess');ed.textContent='';sd.textContent='';if(!un){ed.innerHTML='نام کاربری را وارد کنید';return;}const u=this.dm.users.find(x=>U.norm(x.username)===U.norm(un)&&x.role!=='admin');if(!u){ed.innerHTML='نام کاربری یافت نشد';return;}u.password='1234';sd.innerHTML=`رمز عبور ${un} به 1234 تغییر یافت`;setTimeout(()=>sd.textContent='',8000);}

doForceChange(){const np=$('#newPasswordForce').value.trim(),cp=$('#confirmPasswordForce').value.trim(),ed=$('#forceError');ed.textContent='';if(!np){ed.innerHTML='رمز جدید را وارد کنید';return;}if(np!==cp){ed.innerHTML='رمز و تکرار آن مطابقت ندارند';return;}const r=this.auth.changeForced(np);if(!r.s){ed.innerHTML=r.m;return;}this.ui.render();}

doLogout(){this.auth.logout();localStorage.removeItem('activeTab');this.ui.render();}

addCoin(){const s=$('#cms'),a=$('#cai');if(!s||!a)return;const mid=parseInt(s.value),amt=parseInt(a.value);if(isNaN(amt)||amt<=0){alert('تعداد معتبر وارد کنید');return;}const m=this.dm.gMember(mid);if(!m){alert('عضو یافت نشد');return;}this.dm.addCoin(mid,amt,'افزودن توسط مدیر',`افزودن ${amt} سکه`);alert(`✅ اضافه شد`);this.ui.switchTab('coins');}

resetCoins(mid){if(!confirm('ریست سکه‌ها؟'))return;const m=this.dm.gMember(mid);if(!m)return;m.coins=m.usedCoins=0;m.coinHistory=[];this.dm.syncCoins();alert('ریست شد');this.ui.switchTab('coins');}

resetAllCoinsAdmin(){
if(!confirm('⚠️ آیا مطمئن هستید؟\nاین عمل قابل بازگشت نیست!')) return;
if(!confirm('تأیید نهایی؟')) return;
this.dm.resetAllCoins();
alert('✅ سکه‌های همه اعضا ریست شد');
this.ui.switchTab('coins');
}

addCoinAdmin(mid){const a=prompt('تعداد سکه:','5');if(!a)return;const n=parseInt(a);if(isNaN(n)||n<=0){alert('عدد معتبر وارد کنید');return;}const m=this.dm.gMember(mid);if(!m){alert('عضو یافت نشد');return;}this.dm.addCoin(mid,n,'افزودن توسط مدیر',`افزودن ${n} سکه`);alert('✅ اضافه شد');this.ui.switchTab('members');}

spinWheel(){const wh=$('#wheel'),btn=$('#spinBtn'),res=$('#wheelResult');if(!wh||!btn)return;const today=new Date().toDateString();if(localStorage.getItem('lastSpinDate')===today){if(res)res.innerHTML='امروز انجام شده';return;}btn.disabled=true;const prize=[1,2,3,4,5][Math.floor(Math.random()*5)],angle=Math.floor(Math.random()*5)*60+30+Math.random()*360+720;this.ui.sa+=angle;wh.style.transition='transform 4s cubic-bezier(.17,.67,.12,.99)';wh.style.transform=`rotate(${this.ui.sa}deg)`;setTimeout(()=>{if(res)res.innerHTML=`${prize} سکه`;if(prize>0){const m=this.dm.gMember(this.auth.user.memberId);if(m)this.dm.addCoin(m.id,prize,'چرخش گردونه','گردونه شانس');}localStorage.setItem('lastSpinDate',today);btn.disabled=true;btn.innerHTML='امروز انجام شد';btn.style.opacity='.6';this.ui.updCoinBadge();},4000);}

buyReward(rewardId){
const reward = this.dm.coinRewards.find(r=>r.id===rewardId);
if(!reward){alert('جایزه یافت نشد');return;}
const m = this.dm.gMember(this.auth.user.memberId);
if(!m){alert('اطلاعات یافت نشد');return;}
if((m.coins||0) < reward.cost){alert(`سکه کافی نیست`);return;}
if(reward.type === 'username_edit' && m.usernameEditUnlocked){alert('قبلاً فعال شده');return;}
if(!confirm(`آیا ${U.fmtNum(reward.cost)} سکه برای "${reward.title}" پرداخت می‌کنید؟`)) return;
const spendResult = this.dm.spendCoin(m.id, reward.cost, 'خرید جایزه: '+reward.title, reward.description||'');
if(!spendResult.s){alert(spendResult.m);return;}
m.usedCoins = (m.usedCoins||0) + reward.cost;
const details = {};
if(reward.type === 'username_edit'){details['وضعیت'] = 'قابل ویرایش';}
else if(reward.type === 'loan_no_fee'){details['نوع وام'] = 'وام بدون کارمزد';}
else if(reward.type === 'loan_priority'){details['نوع وام'] = 'وام خارج از نوبت';}
this.dm.addCoinRequest({
memberId: m.id,
memberName: `${m.firstName||''} ${m.lastName||''}`,
memberPhone: m.phone1||'',
memberAccount: m.accountNumber||'',
rewardId: reward.id,
rewardTitle: reward.title,
rewardType: reward.type,
rewardDescription: reward.description||'',
cost: reward.cost,
details: details
});
alert(`✅ درخواست ثبت شد. ${U.fmtNum(reward.cost)} سکه کسر شد.`);
this.ui.updCoinBadge();
this.ui.switchTab('coins');
}

approveCoinRequest(reqId){
const req = this.dm.coinRequests.find(r=>r.id===reqId);
if(!req){alert('درخواست یافت نشد');return;}
const note = prompt('یادداشت مدیر (اختیاری):','') || '';
this.dm.updateRequestStatus(reqId, 'approved', note);
const member = this.dm.gMember(req.memberId);
if(member){
if(req.rewardType === 'username_edit'){member.usernameEditUnlocked = true;this.dm.syncCoins();}
if(req.rewardType === 'loan_no_fee'){if(!member.coinBenefits) member.coinBenefits = {};member.coinBenefits.loanNoFee = (member.coinBenefits.loanNoFee||0) + 1;this.dm.syncCoins();}
if(req.rewardType === 'loan_priority'){if(!member.coinBenefits) member.coinBenefits = {};member.coinBenefits.loanPriority = (member.coinBenefits.loanPriority||0) + 1;this.dm.syncCoins();}
this.dm.addMsg({
id:'m_'+Date.now()+Math.random().toString(36).slice(2,6),
senderId:1,senderName:'مدیر سیستم',senderRole:'admin',senderPhone:'',
receiverId:member.id,receiverPhone:member.phone1||'',
message:`درخواست شما برای "${req.rewardTitle}" تأیید شد.${note?'\nیادداشت: '+note:''}`,
timestamp:U.now(),type:'admin_to_members',parentId:null,replyLabel:''
});
}
alert('✅ درخواست تأیید شد');
this.ui._loadMessenger($('#dynamicContent'));
}

rejectCoinRequest(reqId){
const req = this.dm.coinRequests.find(r=>r.id===reqId);
if(!req){alert('درخواست یافت نشد');return;}
const note = prompt('دلیل رد (اختیاری):','') || '';
this.dm.updateRequestStatus(reqId, 'rejected', note);
const member = this.dm.gMember(req.memberId);
if(member){
this.dm.addCoin(member.id, req.cost, 'بازگشت سکه', `بازگشت برای: ${req.rewardTitle}`);
member.usedCoins = Math.max(0, (member.usedCoins||0) - req.cost);
this.dm.addMsg({
id:'m_'+Date.now()+Math.random().toString(36).slice(2,6),
senderId:1,senderName:'مدیر سیستم',senderRole:'admin',senderPhone:'',
receiverId:member.id,receiverPhone:member.phone1||'',
message:`درخواست "${req.rewardTitle}" رد شد.${note?'\nدلیل: '+note:''}\n\n${U.fmtNum(req.cost)} سکه بازگردانده شد.`,
timestamp:U.now(),type:'admin_to_members',parentId:null,replyLabel:''

async function fetchBin(name){
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BINS[name]}/latest`,{headers:{'X-Master-Key':JSONBIN_API_KEY}});
    if(!r.ok) return null;
    const d=await r.json();
    return d.record;
  }catch(e){console.error('خطا در خواندن '+name,e);return null;}
}

async function saveBin(name,data){

      body:JSON.stringify(data)
    });

// بارگذاری اولیه داده‌ها از JSONBin
async function loadFromJSONBin(){
  const app=window.app;
  if(!app||!app.dm) return;
  const [coinsData, messagesData, announcementsData, pollsData, requestsData, supportData, rewardsData] = await Promise.all([
    fetchBin('coins'),fetchBin('messages'),fetchBin('announcements'),fetchBin('polls'),fetchBin('requests'),fetchBin('support'),fetchBin('rewards')
  ]);
  
  if(coinsData){
    const coins=coinsData.coins||{};
    const coinHistory=coinsData.coinHistory||{};
    app.dm.members.forEach(m=>{
      if(coins[m.id]!==undefined) m.coins=coins[m.id];
      if(coinHistory[m.id]) m.coinHistory=coinHistory[m.id];
    });
  }
  if(messagesData) app.dm.messages=messagesData.messages||[];
  if(announcementsData) app.dm.announcements=announcementsData.announcements||[];
  if(pollsData) app.dm.polls=pollsData.polls||[];
  if(requestsData) app.dm.coinRequests=requestsData.coinRequests||[];
  if(supportData && supportData.support) app.dm.support=supportData.support;
  if(rewardsData && rewardsData.coinRewards && rewardsData.coinRewards.length>0) app.dm.coinRewards=rewardsData.coinRewards;
  
  console.log('✅ داده‌ها از JSONBin بارگذاری شدند');
  if(app.ui) app.ui.render();
}
