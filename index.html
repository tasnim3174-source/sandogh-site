<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سیستم حسابداری صندوق اتحاد</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma,sans-serif}
    body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
    .container{max-width:1400px;margin:0 auto;background:white;border-radius:20px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
    .login-box{max-width:400px;margin:100px auto;padding:40px;background:white;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
    .login-box h1{text-align:center;color:#667eea;margin-bottom:30px}
    input{width:100%;padding:12px;margin:10px 0;border:2px solid #e2e8f0;border-radius:10px;font-size:16px}
    button{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px}
    button:hover{opacity:0.9}
    .menu{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
    .menu button{width:auto;padding:10px 20px;font-size:14px}
    .content{padding:20px;background:#f8f9fa;border-radius:10px}
    table{width:100%;border-collapse:collapse;margin-top:20px;background:white}
    th,td{padding:12px;border:1px solid #ddd;text-align:right}
    th{background:#667eea;color:white}
    .error{color:red;padding:10px;background:#fee;border-radius:8px;margin:10px 0}
    .success{color:green;padding:10px;background:#efe;border-radius:8px;margin:10px 0}
    .hidden{display:none}
    .card{background:white;padding:20px;border-radius:10px;margin:10px 0;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
    .stat-box{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:20px;border-radius:10px;text-align:center}
    .stat-box h3{font-size:14px;margin-bottom:10px}
    .stat-box .value{font-size:28px;font-weight:bold}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/tasnim31/sandogh-data/main/data.json';

let DATA = {
  users: [{id:1,username:'admin',password:'admin123',role:'admin',memberId:null}],
  members: [],
  messages: [],
  support: {phone:'',accountNumber:'',address:''},
  announcements: [],
  polls: [],
  logo: ''
};

let currentUser = null;

async function loadData(){
  try{
    const res = await fetch(GITHUB_JSON_URL + '?t=' + Date.now());
    if(res.ok){
      DATA = await res.json();
      console.log('✅ داده‌ها بارگذاری شدند');
    }
  }catch(e){
    console.error('خطا:', e);
  }
  if(!DATA.users.find(u=>u.username==='admin')){
    DATA.users.push({id:1,username:'admin',password:'admin123',role:'admin',memberId:null});
  }
  render();
}

function saveData(){
  // داده‌ها فقط در مرورگر ذخیره می‌شوند
  // برای ذخیره دائمی، باید JSON را در GitHub آپدیت کنید
}

function render(){
  const app = document.getElementById('app');
  if(!currentUser){
    app.innerHTML = `
      <div class="login-box">
        <h1><i class="fas fa-university"></i> صندوق اتحاد</h1>
        <input type="text" id="username" placeholder="نام کاربری">
        <input type="password" id="password" placeholder="رمز عبور">
        <button onclick="login()">ورود</button>
        <div id="msg"></div>
      </div>
    `;
  }else{
    app.innerHTML = `
      <h1 style="color:#667eea;margin-bottom:20px"><i class="fas fa-university"></i> صندوق اتحاد</h1>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h3>خوش آمدید: ${currentUser.username}</h3>
        <button onclick="logout()" style="width:auto;background:#e53e3e">خروج</button>
      </div>
      <div class="menu">
        <button onclick="showPage('profile')"><i class="fas fa-user"></i> پروفایل</button>
        ${currentUser.role==='admin'?'<button onclick="showPage(\'members\')"><i class="fas fa-users"></i> اعضا</button>':''}
        ${currentUser.role==='admin'?'<button onclick="showPage(\'messages\')"><i class="fas fa-envelope"></i> پیام‌ها</button>':''}
        <button onclick="showPage('support')"><i class="fas fa-headset"></i> پشتیبانی</button>
      </div>
      <div id="pageContent" class="content"></div>
    `;
    showPage('profile');
  }
}

function login(){
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  const user = DATA.users.find(x=>x.username===u && x.password===p);
  if(user){
    currentUser = user;
    render();
  }else{
    document.getElementById('msg').innerHTML = '<div class="error">نام کاربری یا رمز اشتباه است</div>';
  }
}

function logout(){
  currentUser = null;
  render();
}

function showPage(page){
  const content = document.getElementById('pageContent');
  if(page==='profile'){
    if(currentUser.role==='admin'){
      content.innerHTML = `
        <div class="stats">
          <div class="stat-box"><h3>تعداد اعضا</h3><div class="value">${DATA.members.length}</div></div>
          <div class="stat-box"><h3>تعداد پیام‌ها</h3><div class="value">${DATA.messages.length}</div></div>
          <div class="stat-box"><h3>تعداد اطلاعیه‌ها</h3><div class="value">${DATA.announcements.length}</div></div>
        </div>
        <div class="card">
          <h3><i class="fas fa-crown"></i> پنل مدیریت</h3>
          <p>شما به عنوان مدیر وارد شده‌اید.</p>
        </div>
      `;
    }else{
      const m = DATA.members.find(x=>x.id===currentUser.memberId);
      content.innerHTML = `
        <div class="card">
          <h3><i class="fas fa-user"></i> پروفایل شما</h3>
          <p><strong>نام:</strong> ${m?.firstName||'---'} ${m?.lastName||''}</p>
          <p><strong>شماره حساب:</strong> ${m?.accountNumber||'---'}</p>
          <p><strong>تلفن:</strong> ${m?.phone1||'---'}</p>
          <p><strong>موجودی:</strong> ${m?.balance||0}</p>
        </div>
      `;
    }
  }else if(page==='members' && currentUser.role==='admin'){
    content.innerHTML = `
      <h3><i class="fas fa-users"></i> لیست اعضا (${DATA.members.length})</h3>
      <table>
        <thead><tr><th>نام</th><th>نام خانوادگی</th><th>شماره حساب</th><th>تلفن</th><th>موجودی</th></tr></thead>
        <tbody>
          ${DATA.members.map(m=>`<tr><td>${m.firstName||'-'}</td><td>${m.lastName||'-'}</td><td>${m.accountNumber||'-'}</td><td>${m.phone1||'-'}</td><td>${m.balance||0}</td></tr>`).join('')}
        </tbody>
      </table>
    `;
  }else if(page==='messages' && currentUser.role==='admin'){
    content.innerHTML = `
      <h3><i class="fas fa-envelope"></i> پیام‌ها (${DATA.messages.length})</h3>
      ${DATA.messages.length?DATA.messages.map(m=>`<div class="card"><strong>${m.senderName||'کاربر'}</strong><p>${m.message}</p><small>${m.timestamp||''}</small></div>`).join(''):'<p>پیامی نیست</p>'}
    `;
  }else if(page==='support'){
    const s = DATA.support;
    content.innerHTML = `
      <div class="card">
        <h3><i class="fas fa-headset"></i> اطلاعات پشتیبانی</h3>
        <p><strong>تلفن:</strong> ${s.phone||'---'}</p>
        <p><strong>شماره حساب:</strong> ${s.accountNumber||'---'}</p>
        <p><strong>آدرس:</strong> ${s.address||'---'}</p>
      </div>
    `;
  }
}

// شروع برنامه
loadData();
</script>
</body>
</html>
