<body>
<div class="container" id="appContainer">
    <div style="background:rgba(255,255,255,.95);border-radius:32px;padding:60px 40px;box-shadow:0 25px 50px rgba(0,0,0,.25);max-width:500px;margin:100px auto;text-align:center">
        <i class="fas fa-spinner fa-spin" style="font-size:4rem;color:#667eea"></i>
        <h2 style="color:#667eea;margin-top:20px">در حال بارگذاری...</h2>
        <p style="color:#718096;margin-top:10px">لطفاً صبر کنید</p>
    </div>
</div>
<div id="syncStatus" class="sync-status hidden"><i class="fas fa-sync fa-spin"></i> <span id="syncText">در حال همگام‌سازی...</span></div>

<script>
window.onerror = function(msg, url, line, col, error) {
    console.error('خطای سراسری:', msg, 'در خط:', line, error);
    return false;
};

try {
(function(){"use strict";
const $=(s,p=document)=>p.querySelector(s);
const $$=(s,p=document)=>p.querySelectorAll(s);

// ⚙️ تنظیمات اصلی - Google Sheets
const CONFIG = {
    // 🔴 مهم: URL Apps Script خود را اینجا قرار دهید
    APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzsHK6-WhzntVL30iNdEtihjb0kZpcv--AOahGdMzoGKQJ2GIwdRGP73OeqA8XEqsEw/exec',
    SYNC_INTERVAL: 30000
};

function findInRaw(raw, keys) {
    if (!raw) return undefined;
    for (const key of keys) {
        const k = String(key).toLowerCase().replace(/[\s\-_]/g, '');
        for (const rKey in raw) {
            const rk = String(rKey).toLowerCase().replace(/[\s\-_]/g, '');
            if (rk === k) return raw[rKey];
        }
    }
    return undefined;
}

const U={
norm(s){if(!s)return'';return s.toLowerCase().replace(/[\s\-_]/g,'');},
fmtNum(n){return new Intl.NumberFormat('fa-IR').format(n);},
toJalali(g){const d=new Date(g),gy=d.getFullYear(),gm=d.getMonth()+1,gd=d.getDate(),gdm=[0,31,59,90,120,151,181,212,243,273,304,334];let gy2=gm>2?gy+1:gy,days=355666+365*gy+~~((gy2+3)/4)-~~((gy2+99)/100)+~~((gy2+399)/400)+gd+gdm[gm-1],jy=-1595+33*~~(days/12053);days%=12053;jy+=4*~~(days/1461);days%=1461;if(days>365){jy+=~~((days-1)/365);days=(days-1)%365;}const jm=days<186?1+~~(days/31):7+~~((days-186)/30),jd=1+(days<186?days%31:(days-186)%30);return`${jy}/${String(jm).padStart(2,'0')}/${String(jd).padStart(2,'0')}`;},
now(){const n=new Date();return`${this.toJalali(n)} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;},
parseNum(v){if(v==null||v==='')return 0;if(typeof v==='number')return v;let s=String(v).replace(/[,\s]/g,'');return isNaN(parseFloat(s))?0:parseFloat(s);},
fmtDate(s){if(!s)return'---';const c=s.replace(/\D/g,'');return c.length===8?`${c.slice(0,4)}/${c.slice(4,6)}/${c.slice(6,8)}`:s;},
esc(s){if(s===null||s===undefined)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;},
strength(p){let s=0;if(p.length>=6)s++;if(p.length>=8)s++;if(/[a-z]/.test(p))s++;if(/[A-Z]/.test(p))s++;if(/\d/.test(p))s++;if(/[^a-zA-Z\d]/.test(p))s++;return s<=2?'ضعیف':s<=4?'متوسط':'قوی';},
parseBool(v){if(v==null)return false;return['true','1','yes','فعال','بله'].includes(String(v).trim().toLowerCase());},
parseSmsCode(v){if(v==null||v==='')return false;const s=String(v).trim().toLowerCase();return['true','1','yes','فعال','بله','✓','✅'].includes(s);},
findCol(names,headers){for(const n of names){const nn=n.toLowerCase().replace(/[_\s\-]/g,'');for(const h of headers)if(h.toLowerCase().replace(/[_\s\-]/g,'')===nn)return h;}return null;},
getMembershipDuration(openDate){if(!openDate)return'---';return openDate;}
};

function showSyncStatus(text, type='syncing') {
    const el = $('#syncStatus');
    const txt = $('#syncText');
    if (!el || !txt) return;
    el.classList.remove('hidden', 'syncing', 'success', 'error');
    el.classList.add(type);
    txt.textContent = text;
    const icon = el.querySelector('i');
    if (type === 'syncing') icon.className = 'fas fa-sync fa-spin';
    else if (type === 'success') {
        icon.className = 'fas fa-check';
        setTimeout(() => el.classList.add('hidden'), 3000);
    } else if (type === 'error') {
        icon.className = 'fas fa-exclamation-triangle';
        setTimeout(() => el.classList.add('hidden'), 5000);
    }
}

// 📖 خواندن داده‌ها از Google Sheets
async function loadDataFromSheets() {
    try {
        showSyncStatus('در حال بارگذاری از Google Sheets...', 'syncing');
        const response = await fetch(CONFIG.APPS_SCRIPT_URL, {
            method: 'GET',
            redirect: 'follow'
        });
        if (response.ok) {
            const result = await response.json();
            if (result.success && result.data) {
                console.log('✅ داده‌ها از Google Sheets بارگذاری شدند');
                showSyncStatus('✅ داده‌ها بارگذاری شدند', 'success');
                return result.data;
            }
        }
        console.warn('⚠️ خطا در بارگذاری:', response.status);
        showSyncStatus('⚠️ خطا در بارگذاری', 'error');
        return null;
    } catch (error) {
        console.warn('خطا در بارگذاری از Google Sheets:', error);
        showSyncStatus('⚠️ خطا در اتصال', 'error');
        return null;
    }
}

// ✍️ ذخیره داده‌ها در Google Sheets
async function saveDataToSheets(data) {
    try {
        showSyncStatus('در حال ذخیره در Google Sheets...', 'syncing');
        const response = await fetch(CONFIG.APPS_SCRIPT_URL + '?action=save', {
            method: 'POST',
            body: JSON.stringify(data),
            redirect: 'follow'
        });
        if (response.ok) {
            const result = await response.json();
            if (result.success) {
                console.log('✅ داده‌ها در Google Sheets ذخیره شدند');
                showSyncStatus('✅ داده‌ها ذخیره شدند', 'success');
                return true;
            }
        }
        console.error('❌ خطا در ذخیره:', response.status);

    } catch (error) {

}

let lastSyncTime = 0;
let isSyncing = false;
let initialLoadDone = false;

async function autoSync() {
    try {
        if (isSyncing) return;
        const now = Date.now();
        if (now - lastSyncTime < CONFIG.SYNC_INTERVAL) return;
        if (!window.app) return;
        isSyncing = true;
        
        const data = await loadDataFromSheets();
        if (data) {
            window.app.dm.members = (data.members || []).map(m => ({
                ...m,
                id: parseInt(m.id) || m.id,
                balance: U.parseNum(m.balance),
                savings: U.parseNum(m.savings),
                savingsStatus: U.parseNum(m.savings),
                loan: U.parseNum(m.loan),
                loanBalance: U.parseNum(m.loan),
                coins: parseInt(m.coins) || 0,
                usedCoins: parseInt(m.usedCoins) || 0,
                coinHistory: [],
                loginCount: parseInt(m.loginCount) || 0,
                smsStatus: m.smsStatus || {},
                transactions: []
            }));
            window.app.dm.users = (data.users || []).map(u => ({
                ...u,
                id: parseInt(u.id) || u.id,
                memberId: u.memberId ? (parseInt(u.memberId) || null) : null
            }));
            window.app.dm.messages = data.messages || [];
            window.app.dm.announcements = data.announcements || [];
            window.app.dm.support = (data.support && data.support[0]) || {phone:'',accountNumber:'',address:''};
            window.app.dm.shopItems = data.shopitems || [];
            window.app.dm.logo = (data.settings && data.settings[0] && data.settings[0].value) || '';
            
            ['members','users','messages','announcements','support','shopItems','logo'].forEach(k => window.app.dm.sv(k));
            
            if (window.app.ui && initialLoadDone) window.app.ui.render();
        }
        
        lastSyncTime = now;
        isSyncing = false;
        initialLoadDone = true;
    } catch (error) {
        console.error('خطا در همگام‌سازی:', error);
        isSyncing = false;
    }
}

    const m=this.gMember(mid);
    if(!m)return {success:false,msg:'عضو یافت نشد'};

applyCoinRules(m){if(!m)return;const t=new Date(),ts=t.toDateString(),mk=`${t.getFullYear()}-${t.getMonth()}`;let ch=false;const add=(a,r,d)=>{this.addCoin(m.id,a,r,d);ch=true;};if(m.coinDailyLogin!==ts){add(2,'ورود روزانه','ورود به برنامه');m.coinDailyLogin=ts;}if(m.birthDate&&!m.birthdaySetCoinsClaimed){add(2,'ثبت تاریخ تولد','ثبت تاریخ تولد');m.birthdaySetCoinsClaimed=true;}if(m.birthDate){const p=m.birthDate.split('/');if(p.length===3){const bm=parseInt(p[1]),bd=parseInt(p[2]);if(t.getMonth()+1===bm&&t.getDate()===bd&&m.lastBirthdayCoinYear!==t.getFullYear()){add(5,'تولد','تولد مبارک!');m.lastBirthdayCoinYear=t.getFullYear();}}}if(m.coinDashboardVisit!==ts){add(2,'بازدید صورتحساب','مشاهده صورتحساب');m.coinDashboardVisit=ts;}if(m.coinMessageToAdmin!==ts){add(1,'ارسال پیام به مدیر','ارسال پیام به مدیر');m.coinMessageToAdmin=ts;}if(m.coinPollParticipation!==ts){add(3,'شرکت در نظرسنجی','پاسخ به نظرسنجی');m.coinPollParticipation=ts;}if(m.coinMonthly!==mk){let e=false;if((m.loanBalance||0)<=0&&(m.overdueInstallments||0)<=0){add(1,'بدون بدهی','بدون بدهی و اقساط معوقه');e=true;}if((m.balance||0)>=0&&(m.savingsStatus||0)>=0){add(1,'بدون کسری','بدون کسری موجودی');e=true;}if(e)m.coinMonthly=mk;}if(m.openDate){const p=m.openDate.split('/');if(p.length===3){const om=parseInt(p[1]),od=parseInt(p[2]);if(t.getMonth()+1===om&&t.getDate()===od&&m.lastOpeningCoinYear!==t.getFullYear()){add(5,'سالروز افتتاح حساب',`سالروز ${t.getFullYear()}`);m.lastOpeningCoinYear=t.getFullYear();}}}if(ch)this.sv('members');return ch;}

uploadBulk(file, cb) {
    if (typeof XLSX === 'undefined') {
        cb('کتابخانه XLSX بارگذاری نشد', 0, 0, 0, 0);
        return;
    }
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['xlsx', 'xls', 'csv'].includes(ext)) {
        cb('فرمت پشتیبانی نمی‌شود', 0, 0, 0, 0);
        return;
    }
    
    const reader = new FileReader();
    const self = this;
    
    const process = (data, isCsv) => {
        try {
            let wb;
            if (isCsv) wb = XLSX.read(data, { type: 'string', raw: true });
            else wb = XLSX.read(new Uint8Array(data), { type: 'array', raw: true });
            
            const sh = wb.Sheets[wb.SheetNames[0]];
            if (!sh) { cb('شیت خالی است', 0, 0, 0, 0); return; }
            
            const rows = XLSX.utils.sheet_to_json(sh, { defval: '', raw: false });
            if (!rows.length) { cb('فایل خالی است', 0, 0, 0, 0); return; }
            
            const headers = Object.keys(rows[0]);
            const colMap = {
                firstName: U.findCol(['نام', 'firstname', 'first_name', 'نام عضو'], headers),
                lastName: U.findCol(['نام خانوادگی', 'lastname', 'last_name', 'فامیلی'], headers),
                accountNumber: U.findCol(['شماره حساب', 'accountnumber', 'account_number', 'کدعضو', 'شماره', 'کد'], headers),
                openDate: U.findCol(['تاریخ افتتاح', 'opendate', 'open_date'], headers),
                birthDate: U.findCol(['تاریخ تولد', 'birthdate', 'birth_date'], headers),
                phone1: U.findCol(['تلفن', 'تلفن1', 'phone1', 'phone', 'موبایل', 'mobile'], headers),
                phone2: U.findCol(['تلفن2', 'phone2', 'تلفن 2'], headers),
                balance: U.findCol(['موجودی', 'balance', 'مانده'], headers),
                savings: U.findCol(['پس انداز', 'savings', 'پس‌انداز'], headers),
                loan: U.findCol(['وام', 'loan', 'تسهیلات'], headers)
            };
            
            if (!colMap.accountNumber) {
                cb('ستون "شماره حساب" در فایل یافت نشد.', 0, 0, 0, 0);
                return;
            }
            
            const members = [];
            const users = [];
            let userId = 1;
            
            users.push({
                id: userId++,
                username: 'admin',
                password: 'admin123',
                role: 'admin',
                memberId: null
            });
            
            rows.forEach((row) => {
                const accNum = String(row[colMap.accountNumber] || '').trim();
                if (!accNum) return;
                
                const memberId = members.length + 1;
                
                const member = {
                    id: memberId,
                    firstName: colMap.firstName ? String(row[colMap.firstName] || '').trim() : '',
                    lastName: colMap.lastName ? String(row[colMap.lastName] || '').trim() : '',
                    accountNumber: accNum,
                    openDate: colMap.openDate ? String(row[colMap.openDate] || '').trim() : '',
                    birthDate: colMap.birthDate ? String(row[colMap.birthDate] || '').trim() : '',
                    phone1: colMap.phone1 ? String(row[colMap.phone1] || '').trim() : '',
                    phone2: colMap.phone2 ? String(row[colMap.phone2] || '').trim() : '',
                    balance: colMap.balance ? U.parseNum(row[colMap.balance]) : 0,
                    savings: colMap.savings ? U.parseNum(row[colMap.savings]) : 0,
                    savingsStatus: colMap.savings ? U.parseNum(row[colMap.savings]) : 0,
                    loan: colMap.loan ? U.parseNum(row[colMap.loan]) : 0,
                    loanBalance: colMap.loan ? U.parseNum(row[colMap.loan]) : 0,
                    coins: 0,
                    usedCoins: 0,
                    coinHistory: [],
                    loginCount: 0,
                    smsStatus: {},
                    transactions: []
                };
                
                member.fullName = (member.firstName || '') + ' ' + (member.lastName || '');
                members.push(member);
                
                users.push({
                    id: userId++,
                    username: accNum,
                    password: accNum,
                    role: 'member',
                    memberId: memberId
                });
            });
            
            const dataToSave = {
                members: members,
                users: users,
                messages: self.messages || [],
                announcements: self.announcements || [],
                support: [self.support || { phone: '', accountNumber: '', address: '' }],
                shopItems: self.shopItems || [],
                settings: [{ key: 'logo', value: self.logo || '' }]
            };
            
            saveDataToSheets(dataToSave).then(success => {
                if (success) {
                    self.members = members;
                    self.users = users;
                    self.sv('members');
                    self.sv('users');
                    cb(null, rows.length, 0, members.length, 0);
                } else {
                    cb('خطا در ذخیره در Google Sheets', 0, 0, 0, 0);
                }
            });
            
        } catch (e) {
            console.error(e);
            cb('خطا در پردازش: ' + e.message, 0, 0, 0, 0);
        }
    };
    
    reader.onload = (e) => {
        if (ext === 'csv') {
            const arr = new Uint8Array(e.target.result);
            let txt = new TextDecoder('utf-8').decode(arr);
            process(txt, true);
        } else {
            process(e.target.result, false);
        }
    };
    reader.onerror = () => cb('خطا در خواندن فایل', 0, 0, 0, 0);
    
    if (ext === 'csv') {
        reader.readAsText(file);
    } else {
        reader.readAsArrayBuffer(file);
    }
}

class Auth{constructor(dm){this.dm=dm;this.user=null;this.pending=null;}
login(un,pw){
    const u=this.dm.users.find(x=>U.norm(x.username)===U.norm(un));
    if(!u)return{s:false,m:'نام کاربری یا رمز عبور اشتباه است'};
    if(u.password!==pw)return{s:false,m:'نام کاربری یا رمز عبور اشتباه است'};
    if(U.norm(u.password)===U.norm(u.username) && u.role!=='admin'){
        this.pending=u;
        return{s:true,fc:true};
    }
    this.user=u;
    if((u.role==='member'||u.role==='special')&&u.memberId){
        this.dm.incLogin(u.memberId);
        const m=this.dm.gMember(u.memberId);
        if(m)this.dm.applyCoinRules(m);
    }
    return{s:true,fc:false};
}
changeForced(np){
    const u=this.pending;
    if(!u)return{s:false,m:'خطا در احراز هویت'};
    if(U.norm(np)===U.norm(u.username))return{s:false,m:'رمز عبور نمی‌تواند با نام کاربری یکسان باشد'};
    if(U.strength(np)==='ضعیف')return{s:false,m:'رمز عبور بسیار ضعیف است'};
    u.password=np;
    this.dm.sv('users');
    this.user=u;
    this.pending=null;
    return{s:true};
}
logout(){this.user=null;this.pending=null;}
isAdmin(){return this.user?.role==='admin';}
isSpecial(){return this.user?.role==='special';}
isSupervisor(){
    if(this.isAdmin()) return true;
    if(this.user?.role==='member' && this.user.memberId){
        const m = this.dm.gMember(this.user.memberId);
        return m && (m.sessionActive || (m.smsStatus && m.smsStatus.council));
    }
    return false;
}
isLoggedIn(){return!!this.user;}
}

bindLogin(){$('#loginBtn').onclick=()=>this.app.doLogin();$('#forgotBtn').onclick=()=>this.app.doForgot();$('#loginPassword').onkeydown=e=>{if(e.key==='Enter')this.app.doLogin();};$('#loginUsername').onkeydown=e=>{if(e.key==='Enter')this.app.doLogin();};$('#toggleLoginPass').onclick=()=>{const i=$('#loginPassword'),icon=$('#toggleLoginPass i');if(i.type==='password'){i.type='text';icon.className='fas fa-eye-slash';}else{i.type='password';icon.className='fas fa-eye';}};}
bindFC(){$('#forceChangeBtn').onclick=()=>this.app.doForceChange();$('#newPasswordForce').oninput=e=>{$('#passwordStrength').textContent=`قدرت رمز: ${U.strength(e.target.value)}`;$('#passwordStrength').style.color=U.strength(e.target.value)==='قوی'?'#38a169':U.strength(e.target.value)==='متوسط'?'#ed8936':'#e53e3e';};$('#toggleForcePass').onclick=()=>{const i=$('#newPasswordForce'),icon=$('#toggleForcePass i');if(i.type==='password'){i.type='text';icon.className='fas fa-eye-slash';}else{i.type='password';icon.className='fas fa-eye';}};$('#toggleForceConfirm').onclick=()=>{const i=$('#confirmPasswordForce'),icon=$('#toggleForceConfirm i');if(i.type==='password'){i.type='text';icon.className='fas fa-eye-slash';}else{i.type='password';icon.className='fas fa-eye';}};}
bindApp(){$$('.menu-item[data-tab]').forEach(el=>el.onclick=()=>{this.tab=el.dataset.tab;localStorage.setItem('activeTab', this.tab);$$('.menu-item').forEach(e=>e.classList.remove('active'));el.classList.add('active');this.switchTab(this.tab);});$('#logoutBtn').onclick=()=>this.app.doLogout();$$('.theme-btn').forEach(b=>b.onclick=()=>this.app.setTheme(b.dataset.theme));}
switchTab(t){const c=$('#dynamicContent');if(!c)return;c.innerHTML='';const fn='render_'+t;if(typeof this[fn]==='function')this[fn](c);}

render_dashboard(c){
    if(this.app.auth.isAdmin()){
        let h=`<div class="info-box"><i class="fas fa-chart-line"></i> صورتحساب اعضا</div><div class="dashboard-section"><div style="display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap"><label style="font-weight:700;color:#4a5568">انتخاب عضو:</label><select id="dashboardMemberSelect" style="flex:1;min-width:200px;padding:10px;border:2px solid #e2e8f0;border-radius:12px">${this.app.dm.members.map(mem=>`<option value="${mem.id}">${U.esc(mem.firstName||'')} ${U.esc(mem.lastName||'')} - ${U.esc(mem.accountNumber||'')}</option>`).join('')}</select><button class="btn-small info-btn" id="loadDashboardBtn"><i class="fas fa-sync"></i> بارگذاری</button></div><div id="dashboardContent"></div></div>`;
        c.innerHTML=h;
        $('#loadDashboardBtn',c).onclick=()=>{const mid=parseInt($('#dashboardMemberSelect',c).value);this.renderDashboardForMember(mid,$('#dashboardContent',c));};
        if(this.app.dm.members.length>0)this.renderDashboardForMember(this.app.dm.members[0].id,$('#dashboardContent',c));
        return;
    }

renderDashboardForMember(mid, c){
    const m=this.app.dm.gMember(mid);
    if(!m){c.innerHTML='<div style="text-align:center;padding:40px"><i class="fas fa-exclamation-circle" style="font-size:3rem;color:#e53e3e"></i><p style="margin-top:15px">اطلاعات یافت نشد</p></div>';return;}
    this.app.dm.applyCoinRules(m);
    const balance=m.balance||0, savingsStatus=m.savingsStatus||0, monthlySalary=0, monthlySalaryApproved=0, currentMonthBalance=0;
    const dur=U.getMembershipDuration(m.openDate);
    const overdueInstallments=m.overdueInstallments||0, loanBalance=m.loanBalance||0;
    let h=`<div class="dashboard-section"><h3><i class="fas fa-info-circle"></i> اطلاعات حساب</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px"><div style="display:flex;align-items:center;gap:10px"><i class="fas fa-hashtag" style="color:#667eea"></i><div><label style="font-weight:600;color:#718096;font-size:.85rem">شماره حساب:</label><div style="font-weight:700">${U.esc(m.accountNumber||'---')}</div></div></div><div style="display:flex;align-items:center;gap:10px"><i class="fas fa-clock" style="color:#667eea"></i><div><label style="font-weight:600;color:#718096;font-size:.85rem">مدت عضویت:</label><div style="font-weight:700">${dur}</div></div></div></div></div>`;
    h+=`<div class="dashboard-section"><h3><i class="fas fa-wallet"></i> اطلاعات موجودی و پس‌انداز</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px"><div style="background:linear-gradient(135deg,rgba(102,126,234,.1),rgba(118,75,162,.1));padding:15px;border-radius:12px"><label style="font-weight:600;color:#718096;font-size:.85rem">موجودی شما:</label><div style="font-size:1.3rem;font-weight:700;color:${balance<0?'#e53e3e':'#2d3748'};margin-top:5px">${U.fmtNum(balance)}</div></div><div style="background:linear-gradient(135deg,rgba(72,187,120,.1),rgba(56,161,105,.1));padding:15px;border-radius:12px"><label style="font-weight:600;color:#718096;font-size:.85rem">وضعیت پس‌انداز:</label><div style="font-size:1.3rem;font-weight:700;color:${savingsStatus<0?'#e53e3e':'#48bb78'};margin-top:5px">${U.fmtNum(savingsStatus)}</div></div></div></div>`;
    h+=`<div class="dashboard-section"><h3><i class="fas fa-hand-holding-usd"></i> اطلاعات وام و بدهی</h3><div class="loan-info"><div class="loan-info-item"><div class="loan-info-label">مانده وام (بدهی)</div><div class="loan-info-value">${U.fmtNum(loanBalance)}</div></div><div class="loan-info-item"><div class="loan-info-label">اقساط معوقه</div><div class="loan-info-value">${overdueInstallments||0}</div></div></div></div>`;
    c.innerHTML=h;
}

render_shop(c){
    const m=this.app.dm.gMember(this.app.auth.user?.memberId);
    if(!m){c.innerHTML='<div style="text-align:center;padding:40px"><i class="fas fa-exclamation-circle" style="font-size:3rem;color:#e53e3e"></i><p style="margin-top:15px">خطا</p></div>';return;}
    const available=(m.coins||0)-(m.usedCoins||0);
    let h=`<div class="info-box"><i class="fas fa-shopping-cart"></i> فروشگاه - خرج کردن سکه‌ها</div>`;
    h+=`<div class="dashboard-section"><h3><i class="fas fa-coins"></i> موجودی سکه شما</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px"><div style="background:linear-gradient(135deg,rgba(236,201,75,.2),rgba(214,158,46,.2));padding:20px;border-radius:16px;text-align:center"><i class="fas fa-coins" style="font-size:2rem;color:#d69e2e;margin-bottom:10px"></i><div style="font-size:.9rem;color:#718096;margin-bottom:5px">جمع کل</div><div style="font-size:1.8rem;font-weight:700;color:#d69e2e">${m.coins||0}</div></div><div style="background:linear-gradient(135deg,rgba(72,187,120,.2),rgba(56,161,105,.2));padding:20px;border-radius:16px;text-align:center"><i class="fas fa-wallet" style="font-size:2rem;color:#48bb78;margin-bottom:10px"></i><div style="font-size:.9rem;color:#718096;margin-bottom:5px">قابل مصرف</div><div style="font-size:1.8rem;font-weight:700;color:#48bb78">${U.fmtNum(available)}</div></div></div></div>`;
    h+=`<div class="dashboard-section"><h3><i class="fas fa-store"></i> کالاها و خدمات</h3>`;
    const items=this.app.dm.shopItems||[];
    if(!items.length)h+=`<div style="text-align:center;padding:30px;color:#a0aec0"><i class="fas fa-box-open" style="font-size:3rem;margin-bottom:10px"></i><p>هیچ کالایی موجود نیست</p></div>`;
    else items.forEach(item=>{const canBuy=available>=item.price;h+=`<div class="shop-item"><div class="shop-item-info"><div class="shop-item-title">${U.esc(item.name)}</div><div class="shop-item-desc">${U.esc(item.description||'')}</div><div class="shop-item-price"><i class="fas fa-coins"></i> ${item.price} سکه</div></div><button class="btn-small ${canBuy?'success-btn':'danger-btn'}" ${canBuy?'':'disabled'} data-item-id="${item.id}" style="${canBuy?'':'opacity:.5;cursor:not-allowed'}"><i class="fas fa-shopping-cart"></i> خرید</button></div>`;});
    h+=`</div>`;
    c.innerHTML=h;
    c.querySelectorAll('[data-item-id]').forEach(btn=>{btn.onclick=()=>{const itemId=btn.dataset.itemId;const item=items.find(i=>i.id===itemId);if(!item)return;if(confirm(`آیا از خرید "${item.name}" با ${item.price} سکه مطمئن هستید؟`))this.app.spendCoinOnItem(itemId);};});
}

msgs(type){
    const dm=this.app.dm,ia=this.app.auth.isAdmin(),isp=this.app.auth.isSpecial(),isv=this.app.auth.isSupervisor(),cm=dm.gMember(this.app.auth.user?.memberId),cp=cm?.phone1||'',uid=this.app.auth.user?.id;
    const hasPrivilege = ia || isp || isv;
    let fl=[];
    if(type==='member_to_admin'){
        if(hasPrivilege)fl=dm.messages.filter(m=>m.type==='member_to_admin');
        else{const myMessages = dm.messages.filter(m=>m.type==='member_to_admin' && m.senderId===uid);const myMessageIds = new Set(myMessages.map(m=>m.id));const repliesToMe = dm.messages.filter(m=>m.type==='member_to_admin' && m.parentId && myMessageIds.has(m.parentId));fl = [...myMessages, ...repliesToMe];}
    } else if(type==='member_to_member'){
        if(hasPrivilege)fl=dm.messages.filter(m=>m.type==='member_to_member');
        else fl=dm.messages.filter(m=>m.type==='member_to_member'&&(m.senderPhone===cp||m.receiverPhone===cp));
    }
    fl.sort((a,b)=>(a.timestamp||'').localeCompare(b.timestamp||''));
    if(!fl.length)return'<div style="color:#a0aec0;padding:15px;text-align:center"><i class="fas fa-inbox" style="font-size:2rem;margin-bottom:10px"></i><p>هیچ پیامی نیست</p></div>';
    const msgClass = type==='member_to_admin' ? 'msg-to-admin' : 'msg-member';
    return fl.map(msg=>{
        const canDel = ia || (msg.senderId === uid);
        let dn=msg.senderName||'کاربر';
        const finalClass = msg.parentId ? 'msg-reply' : msgClass;
        let h=`<div class="msg-item ${finalClass}"><div class="msg-header"><span><i class="fas fa-user-circle"></i> ${U.esc(dn)}</span><span><i class="fas fa-clock"></i> ${U.esc(msg.timestamp||'---')}</span></div>`;
        h+=`<div style="line-height:1.6;font-size:.92rem">${U.esc(msg.message)}</div><div style="display:flex;gap:8px;margin-top:8px">`;
        if(canDel)h+=`<button class="delete-btn" data-mid="${msg.id}" style="background:none;border:none;color:#e53e3e;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:600;font-size:.82rem"><i class="fas fa-trash"></i> حذف</button>`;
        h+=`</div></div>`;
        return h;
    }).join('');
}

search(inputId,tableSelector,container=document){
    const input=$(inputId,container);
    if(!input)return;
    const clearBtn=$(inputId+'_cl',container);
    const filter=()=>{const q=input.value.trim().toLowerCase(),tb=container.querySelector(tableSelector);if(!tb?.querySelector('tbody'))return;tb.querySelector('tbody').querySelectorAll('tr').forEach(r=>{if(!q||r.textContent.trim().toLowerCase().includes(q))r.style.display='';else r.style.display='none';});};
    input.oninput=filter;
    if(clearBtn)clearBtn.onclick=()=>{input.value='';filter();input.focus();};
    setTimeout(filter,50);
}

class App{constructor(){this.dm=new DM();this.auth=new Auth(this.dm);this.ui=new UI(this);this.init();}
async init(){
    if (!initialLoadDone) {
        console.log('🔄 بارگذاری اولیه از Google Sheets...');
        const data = await loadDataFromSheets();
        if (data) {
            this.dm.members = (data.members || []).map(m => ({
                ...m,
                id: parseInt(m.id) || m.id,
                balance: U.parseNum(m.balance),
                savingsStatus: U.parseNum(m.savings),
                loanBalance: U.parseNum(m.loan),
                coins: parseInt(m.coins) || 0,
                usedCoins: parseInt(m.usedCoins) || 0,
                coinHistory: [],
                loginCount: parseInt(m.loginCount) || 0,
                smsStatus: m.smsStatus || {},
                transactions: []
            }));
            this.dm.users = (data.users || []).map(u => ({
                ...u,
                id: parseInt(u.id) || u.id,
                memberId: u.memberId ? (parseInt(u.memberId) || null) : null
            }));
            this.dm.messages = data.messages || [];
            this.dm.announcements = data.announcements || [];
            this.dm.support = (data.support && data.support[0]) || {phone:'',accountNumber:'',address:''};
            this.dm.shopItems = data.shopitems || [];
            
            ['members','users','messages','announcements','support','shopItems'].forEach(k => this.dm.sv(k));
            console.log(`✅ ${this.dm.members.length} عضو از Google Sheets بارگذاری شد`);
        }
        initialLoadDone = true;
    }
    this.ui.render();
}
setTheme(t){localStorage.setItem('theme',t);$$('.theme-btn').forEach(b=>b.classList.remove('active'));$(`.theme-btn[data-theme="${t}"]`)?.classList.add('active');}
doLogin(){const un=$('#loginUsername').value.trim(),pw=$('#loginPassword').value.trim(),ed=$('#loginError');ed.textContent='';if(!un||!pw){ed.innerHTML='<i class="fas fa-exclamation-circle"></i> نام کاربری و رمز عبور را وارد کنید';return;}const r=this.auth.login(un,pw);if(!r.s){ed.innerHTML=`<i class="fas fa-exclamation-circle"></i> ${r.m}`;return;}if(r.fc){this.ui.render();return;}this.ui.render();}
doForgot(){
    const un=$('#loginUsername').value.trim(),ed=$('#loginError'),sd=$('#forgotSuccess');
    ed.textContent='';sd.textContent='';
    if(!un){ed.innerHTML='<i class="fas fa-exclamation-circle"></i> نام کاربری را وارد کنید';return;}
    const u=this.dm.users.find(x=>U.norm(x.username)===U.norm(un)&&x.role!=='admin');

    u.password=u.username;
    this.dm.sv('users');
    sd.innerHTML=`<i class="fas fa-check-circle"></i> رمز عبور به شماره حساب تغییر یافت.`;
}

    const m=this.dm.gMember(this.auth.user.memberId);
    if(!m){alert('اطلاعات یافت نشد');return;}
    const result=this.dm.spendCoin(m.id,item.price,`خرید ${item.name}`,`خرید کالا از فروشگاه`);
    if(result.success){alert(`✅ ${result.msg}`);}
    else{alert(`❌ ${result.msg}`);}
}
spinWheel(){const wh=$('#wheel'),btn=$('#spinBtn'),res=$('#wheelResult');if(!wh||!btn)return;const today=new Date().toDateString();if(localStorage.getItem('lastSpinDate')===today){return;}btn.disabled=true;const prize=[1,2,3,4,5][Math.floor(Math.random()*5)],angle=Math.floor(Math.random()*5)*60+30+Math.random()*360+720;this.ui.sa+=angle;wh.style.transition='transform 4s cubic-bezier(.17,.67,.12,.99)';wh.style.transform=`rotate(${this.ui.sa}deg)`;setTimeout(()=>{if(res)res.innerHTML=`<i class="fas fa-trophy"></i> ${prize} سکه`;if(prize>0){const m=this.dm.gMember(this.auth.user.memberId);if(m)this.dm.addCoin(m.id,prize,'چرخش گردونه','گردونه شانس');}localStorage.setItem('lastSpinDate',today);btn.disabled=true;btn.innerHTML='<i class="fas fa-check"></i> امروز انجام شد';btn.style.opacity='.6';this.ui.updCoinBadge();},4000);}
sendToAdmin(){const i=$('#mtai');if(!i?.value.trim()){alert('متن را وارد کنید');return;}const m=this.dm.gMember(this.auth.user.memberId);if(!m){alert('اطلاعات یافت نشد');return;}this.dm.addMsg({id:'m_'+Date.now()+Math.random().toString(36).slice(2,6),senderId:this.auth.user.id,senderName:`${m.firstName||''} ${m.lastName||''}`,senderRole:'member',senderPhone:m.phone1||'',receiverId:1,receiverPhone:'',message:i.value.trim(),timestamp:U.now(),type:'member_to_admin',parentId:null,replyLabel:''});i.value='';this.dm.applyCoinRules(m);this.ui.switchTab('messenger');}
sendToMember(){
    const pi=$('#mpi'),mi=$('#mtmi');
    if(!pi||!mi)return;
    const p=pi.value.trim(),t=mi.value.trim();
    if(!p||!t){alert('شماره و متن را وارد کنید');return;}

    const cm=this.dm.gMember(this.auth.user.memberId);

    pi.value='';mi.value='';
    this.ui.switchTab('messenger');
}
sendReply(){}
delMsg(id){if(confirm('حذف پیام؟')){this.dm.delMsg(id);this.ui.render();}}

saveBirth(mid){const v=$('#nbd')?.value.trim();if(!v){alert('تاریخ تولد را وارد کنید');return;}const m=this.dm.gMember(mid);if(!m)return;m.birthDate=v;this.dm.sv('members');alert('✅ ذخیره شد');this.ui.render();}
savePass(mid){const np=$('#npi')?.value.trim(),cp=$('#cpi')?.value.trim();if(!np||!cp){alert('رمز و تکرار آن را وارد کنید');return;}if(np!==cp){alert('رمز و تکرار آن مطابقت ندارند');return;}if(U.strength(np)==='ضعیف'){alert('رمز عبور بسیار ضعیف است');return;}const u=this.dm.gUserByMid(mid);if(!u)return;u.password=np;this.dm.sv('users');alert('✅ رمز عبور تغییر یافت');this.ui.render();}
uploadBulk(file){
