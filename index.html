<body>
<div class="container" id="appContainer">
  <div class="loading-screen" id="loadingScreen">
    <i class="fas fa-spinner"></i>
    <h2>در حال بارگذاری داده‌ها از سرور...</h2>
    <p>لطفاً چند لحظه صبر کنید</p>
  </div>
</div>

<script>
// ========== تنظیمات ==========
const EXCEL_URL = 'https://raw.githubusercontent.com/tasnim3174-source/sandogh-data/main/data.xlsx';
const ADMIN_USERNAME = 'admin';
const ADMIN_PASSWORD = 'admin123';

(function(){"use strict";
const $=(s,p=document)=>p.querySelector(s);
const $$=(s,p=document)=>p.querySelectorAll(s);

const U={
  norm(s){if(!s)return'';const m={'ا':'a','آ':'a','ب':'b','پ':'p','ت':'t','ث':'s','ج':'j','چ':'ch','ح':'h','خ':'kh','د':'d','ذ':'z','ر':'r','ز':'z','ژ':'zh','س':'s','ش':'sh','ص':'s','ض':'z','ط':'t','ظ':'z','ع':'a','غ':'gh','ف':'f','ق':'gh','ک':'k','گ':'g','ل':'l','م':'m','ن':'n','و':'v','ه':'h','ی':'y','ئ':'y'};return[...s].map(c=>m[c]||c).join('').toLowerCase();},
  fmtNum(n){return new Intl.NumberFormat('fa-IR').format(n);},
  toJalali(g){const d=new Date(g),gy=d.getFullYear(),gm=d.getMonth()+1,gd=d.getDate(),gdm=[0,31,59,90,120,151,181,212,243,273,304,334];let gy2=gm>2?gy+1:gy,days=355666+365*gy+~~((gy2+3)/4)-~~((gy2+99)/100)+~~((gy2+399)/400)+gd+gdm[gm-1],jy=-1595+33*~~(days/12053);days%=12053;jy+=4*~~(days/1461);days%=1461;if(days>365){jy+=~~((days-1)/365);days=(days-1)%365;}const jm=days<186?1+~~(days/31):7+~~((days-186)/30),jd=1+(days<186?days%31:(days-186)%30);return`${jy}/${String(jm).padStart(2,'0')}/${String(jd).padStart(2,'0')}`;},
  now(){const n=new Date();return`${this.toJalali(n)} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;},
  parseNum(v){if(v==null||v==='')return 0;if(typeof v==='number')return v;let s=String(v).replace(/[,\u066C\u200C\s]/g,'');const p='۰۱۲۳۴۵۶۷۸۹',e='0123456789';for(let i=0;i<10;i++)s=s.replaceAll(p[i],e[i]);return isNaN(parseFloat(s))?0:parseFloat(s);},
  fmtDate(s){if(!s)return'---';const c=s.replace(/\D/g,'');return c.length===8?`${c.slice(0,4)}/${c.slice(4,6)}/${c.slice(6,8)}`:s;},
  esc(s){if(s===null||s===undefined)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;},
  strength(p){let s=0;if(p.length>=6)s++;if(p.length>=8)s++;if(/[a-z]/.test(p))s++;if(/[A-Z]/.test(p))s++;if(/\d/.test(p))s++;if(/[^a-zA-Z\d]/.test(p))s++;return s<=2?'ضعیف':s<=4?'متوسط':'قوی';},
  parseBool(v){if(v==null)return false;return['true','1','yes','فعال','بله'].includes(String(v).trim().toLowerCase());},
  findCol(names,headers){for(const n of names){const nn=n.toLowerCase().replace(/[_\s\-]/g,'');for(const h of headers)if(h.toLowerCase().replace(/[_\s\-]/g,'')===nn)return h;}return null;},
  isValidDate(s){if(!s)return false;const p=s.split('/');if(p.length!==3)return false;const[y,m,d]=p.map(Number);if(isNaN(y)||isNaN(m)||isNaN(d))return false;if(m<1||m>12||d<1||d>31)return false;return true;}
};

// ========== متغیرهای سراسری ==========
let APP_DATA = {
  users: [],
  members: [],
  messages: [],
  support: {phone:'',accountNumber:'',address:''},
  announcements: [],
  polls: [],
  logo: ''
};
let currentUser = null;
let activeTab = 'profile';

// ========== خواندن اکسل از GitHub ==========
async function loadExcelFromGitHub(){
  try{
    const response = await fetch(EXCEL_URL + '?t=' + Date.now());
    if(!response.ok) throw new Error('فایل اکسل یافت نشد');
    const buffer = await response.arrayBuffer();
    const workbook = XLSX.read(buffer, {type:'array'});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, {defval:'', raw:false});
    
    if(!rows.length){
      throw new Error('فایل اکسل خالی است');
    }
    
    // پردازش داده‌ها
    const headers = Object.keys(rows[0]);
    const fc = (...names) => U.findCol(names, headers);
    
    const accCol = fc('شماره حساب','account','accountnumber');
    const nameCol = fc('نام','name','firstname');
    const lastNameCol = fc('نام خانوادگی','lastname','family');
    const phone1Col = fc('تلفن','phone','phone1','تلفن1');
    const phone2Col = fc('تلفن2','phone2','تلفن 2');
    const openDateCol = fc('تاریخ افتتاح','تاریخ عضویت','date','تاریخ');
    const birthDateCol = fc('تاریخ تولد','birth','تولد');
    const balanceCol = fc('موجودی','balance','موجودی فعلی');
    const dateCol = fc('تاریخ تراکنش','تاریخ','transaction date');
    const amtCol = fc('مبلغ تراکنش','مبلغ','amount');
    const statusCol = fc('وضعیت حساب','active','status');
    const sessionCol = fc('کد جلسات','session','jalasat');
    
    if(!accCol){
      throw new Error('ستون "شماره حساب" در فایل اکسل یافت نشد');
    }
    
    // ساختار داده‌ها
    const members = [];
    const users = [{id:1, username:ADMIN_USERNAME, password:ADMIN_PASSWORD, role:'admin', memberId:null}];
    const transactionsByAcc = {};
    let memberId = 1;
    
    // جمع‌آوری تراکنش‌ها بر اساس شماره حساب
    for(const row of rows){
      const acc = String(row[accCol]||'').trim();
      if(!acc) continue;
      
      if(dateCol && amtCol){
        const date = String(row[dateCol]||'').trim();
        const amt = U.parseNum(row[amtCol]);
        if(date && amt){
          if(!transactionsByAcc[acc]) transactionsByAcc[acc] = [];
          transactionsByAcc[acc].push({
            id: Date.now() + Math.random(),
            transactionId: String(row[fc('id','شناسه','ردیف')]||'').trim() || `TRX-${Date.now()}`,
            accountNumber: acc,
            transactionDate: date,
            amount: amt,
            monthlySalary: String(row[fc('مقرری ماهانه','مقرری')]||'').trim(),
            fishNumber: String(row[fc('شماره فیش')]||'').trim(),
            transactionName: String(row[fc('نام تراکنش کننده')]||'').trim(),
            installmentAmount: U.parseNum(row[fc('مبلغ قسط واریزی','قسط')]),
            installmentDate: String(row[fc('تاریخ قسط واریزی')]||'').trim(),
            totalDeposit: U.parseNum(row[fc('جمع واریزی','جمع')]),
            balance: U.parseNum(row[fc('موجودی','balance')]),
            total: U.parseNum(row[fc('جمع')]),
            paidInstallments: U.parseNum(row[fc('تعداد قسط پرداخت شده')]),
            remainingInstallments: U.parseNum(row[fc('تعداد قسط مانده')]),
            savingsStatus: String(row[fc('وضعیت پس انداز','وضعیت پس‌انداز')]||'').trim(),
            rawData: {...row},
            allHeaders: [...headers]
          });
        }
      }
    }
    
    // ساخت اعضا از تراکنش‌ها
    for(const acc of Object.keys(transactionsByAcc)){
      const txs = transactionsByAcc[acc];
      // پیدا کردن آخرین تراکنش برای اطلاعات عضو
      const latestTx = txs.sort((a,b) => (parseInt(b.transactionId)||0) - (parseInt(a.transactionId)||0))[0];
      
      const firstName = latestTx.rawData[nameCol] ? String(latestTx.rawData[nameCol]).trim() : '';
      const lastName = latestTx.rawData[lastNameCol] ? String(latestTx.rawData[lastNameCol]).trim() : '';
      const phone1 = latestTx.rawData[phone1Col] ? String(latestTx.rawData[phone1Col]).trim() : '';
      const phone2 = latestTx.rawData[phone2Col] ? String(latestTx.rawData[phone2Col]).trim() : '';
      const openDate = latestTx.rawData[openDateCol] ? String(latestTx.rawData[openDateCol]).trim() : '';
      const birthDate = latestTx.rawData[birthDateCol] ? String(latestTx.rawData[birthDateCol]).trim() : '';
      const balance = U.parseNum(latestTx.rawData[balanceCol]);
      const statusActive = statusCol && latestTx.rawData[statusCol] !== undefined ? U.parseBool(latestTx.rawData[statusCol]) : true;
      const sessionActive = sessionCol && latestTx.rawData[sessionCol] !== undefined ? U.parseBool(latestTx.rawData[sessionCol]) : false;
      
      const member = {
        id: memberId,

        installmentAmount: U.parseNum(latestTx.rawData[fc('مبلغ اقساط وام','مبلغ قسط')]),
        feeAmount: U.parseNum(latestTx.rawData[fc('مبلغ کارمزد')]),

        loanRequestDate: String(latestTx.rawData[fc('تاریخ درخواست وام')]||'').trim(),
        loanReceiveDate: String(latestTx.rawData[fc('تاریخ دریافت وام')]||'').trim(),

        statusActive: statusActive,

        usedCoins: 0,
        coinHistory: [],
        smsStatus: {
          general: true,
          supervisors: false,
          council: false,
          overdue: true,
          birthday: true,
          newsletter: true,
          poll: true,
          occasions: true
        },
        transactions: txs,
        isSpecial: false,
        usernameEditUnlocked: false
      };
      
      members.push(member);
      users.push({
        id: users.length + 1,
        username: acc,
        password: acc,
        role: 'member',
        memberId: memberId
      });
      
      memberId++;
    }
    
    APP_DATA = {
      users: users,
      members: members,
      messages: [],
      support: {phone:'',accountNumber:'',address:''},
      announcements: [],
      polls: [],
      logo: ''
    };
    
    console.log(`✅ ${members.length} عضو از فایل اکسل بارگذاری شد`);
    return true;
    
  }catch(e){
    console.error('❌ خطا در بارگذاری اکسل:', e);
    // استفاده از localStorage به عنوان fallback
    try{
      const saved = localStorage.getItem('appData');
      if(saved){
        APP_DATA = JSON.parse(saved);
        console.log('⚠️ استفاده از داده‌های ذخیره شده در مرورگر');
        return true;
      }
    }catch(err){}
    return false;
  }
}

// ========== ذخیره در localStorage ==========
function saveToLocalStorage(){
  try{
    localStorage.setItem('appData', JSON.stringify(APP_DATA));
  }catch(e){}
}

// ========== کلاس‌های اصلی ==========
class Auth{
  constructor(){this.user=null;this.pending=null;}
  login(un,pw){
    const u = APP_DATA.users.find(x => U.norm(x.username) === U.norm(un));
    if(!u) return {s:false, m:'نام کاربری یا رمز عبور اشتباه است'};
    if(u.password !== pw) return {s:false, m:'نام کاربری یا رمز عبور اشتباه است'};
    if(pw === '1234' && u.role !== 'admin'){
      this.pending = u;
      return {s:true, fc:true};
    }
    this.user = u;
    if(u.memberId){
      const m = APP_DATA.members.find(x => x.id === u.memberId);
      if(m){
        m.loginCount = (m.loginCount||0) + 1;
        m.lastLoginDate = U.now();
      }
    }
    return {s:true, fc:false};
  }
  changeForced(np){
    const u = this.pending;
    if(!u) return {s:false, m:'خطا'};
    if(np === '1234') return {s:false, m:'رمز نمی‌تواند 1234 باشد'};
    if(U.strength(np) === 'ضعیف') return {s:false, m:'رمز ضعیف است'};
    u.password = np;
    saveToLocalStorage();
    this.user = u;
    this.pending = null;
    return {s:true};
  }
  logout(){this.user=null;this.pending=null;}
  isAdmin(){return this.user?.role==='admin';}
  isSpecial(){return this.user?.role==='special';}
  isSupervisor(){
    if(this.isAdmin()) return true;
    if(this.user?.memberId){
      const m = APP_DATA.members.find(x => x.id === this.user.memberId);
      return m && (m.sessionActive || (m.smsStatus && m.smsStatus.council));
    }
    return false;
  }
  isLoggedIn(){return !!this.user;}
}

  render_coins(c){
    const m=auth.isAdmin()?null:APP_DATA.members.find(x=>x.id===auth.user.memberId);
    if(auth.isAdmin()){
      let h=`<div class="info-box"><i class="fas fa-coins"></i> مدیریت سکه‌ها</div><div class="dashboard-section"><div style="display:flex;gap:12px;flex-wrap:wrap"><select id="cms" style="flex:1;padding:10px;border:2px solid #e2e8f0;border-radius:12px">${APP_DATA.members.map(m=>`<option value="${m.id}">${U.esc(m.firstName||'')} ${U.esc(m.lastName||'')}</option>`).join('')}</select><input type="number" id="cai" value="5" min="1" style="width:100px;padding:10px;border:2px solid #e2e8f0;border-radius:12px"><button class="btn-small success-btn" id="acb"><i class="fas fa-plus"></i> افزودن</button></div></div>`;
      c.innerHTML=h;
      $('#acb',c).onclick=()=>{
        const mid=parseInt($('#cms').value), amt=parseInt($('#cai').value);
        if(isNaN(amt)||amt<=0){alert('تعداد معتبر وارد کنید');return;}
        const m=APP_DATA.members.find(x=>x.id===mid);
        if(!m){alert('عضو یافت نشد');return;}
        m.coins=(m.coins||0)+amt;
        if(!m.coinHistory)m.coinHistory=[];
        m.coinHistory.push({date:U.now(),amount:amt,reason:'افزودن توسط مدیر'});
        saveToLocalStorage();
        alert('✅ اضافه شد');
        this.render();
      };
    }else{
      if(!m){c.innerHTML='<div style="text-align:center;padding:40px">خطا</div>';return;}
      let h=`<div class="dashboard-section"><h3><i class="fas fa-coins"></i> سکه‌های شما</h3><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px"><div style="background:rgba(236,201,75,.2);padding:20px;border-radius:16px;text-align:center"><i class="fas fa-coins" style="font-size:2rem;color:#d69e2e"></i><div style="font-size:.9rem;color:#718096">جمع کل</div><div style="font-size:1.8rem;font-weight:700;color:#d69e2e">${m.coins||0}</div></div><div style="background:rgba(229,62,62,.2);padding:20px;border-radius:16px;text-align:center"><i class="fas fa-shopping-cart" style="font-size:2rem;color:#e53e3e"></i><div style="font-size:.9rem;color:#718096">مصرف شده</div><div style="font-size:1.8rem;font-weight:700;color:#e53e3e">${m.usedCoins||0}</div></div><div style="background:rgba(72,187,120,.2);padding:20px;border-radius:16px;text-align:center"><i class="fas fa-wallet" style="font-size:2rem;color:#48bb78"></i><div style="font-size:.9rem;color:#718096">مانده</div><div style="font-size:1.8rem;font-weight:700;color:#48bb78">${U.fmtNum((m.coins||0)-(m.usedCoins||0))}</div></div></div></div>`;
      if(m.coinHistory?.length){
        h+=`<div class="dashboard-section"><h3><i class="fas fa-history"></i> تاریخچه</h3><div class="table-wrapper"><table><thead><tr><th>تاریخ</th><th>تعداد</th><th>دلیل</th></tr></thead><tbody>${[...m.coinHistory].reverse().map(x=>`<tr><td>${U.esc(x.date||'')}</td><td style="color:${x.amount>0?'#48bb78':'#e53e3e'};font-weight:700">${x.amount>0?'+':''}${x.amount}</td><td>${U.esc(x.reason||'')}</td></tr>`).join('')}</tbody></table></div></div>`;
      }
      h+=`<div class="dashboard-section" style="text-align:center"><h3><i class="fas fa-dharmachakra"></i> گردونه شانس</h3><div class="wheel"></div><button id="spinBtn" style="padding:14px 35px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:28px;cursor:pointer;font-size:1.1rem;font-weight:700"><i class="fas fa-sync-alt"></i> چرخش</button><div id="wheelResult" style="margin-top:15px;font-size:1.2rem;font-weight:700;color:#667eea"></div></div>`;
      c.innerHTML=h;
      $('#spinBtn',c).onclick=()=>{
        const prize=[1,2,3,4,5][Math.floor(Math.random()*5)];
        $('#wheelResult',c).innerHTML=`<i class="fas fa-trophy"></i> ${prize} سکه`;
        m.coins=(m.coins||0)+prize;
        if(!m.coinHistory)m.coinHistory=[];
        m.coinHistory.push({date:U.now(),amount:prize,reason:'گردونه شانس'});
        saveToLocalStorage();
        this.render();
      };
    }
  }
  
  render_messenger(c){
    const ia=auth.isAdmin(), uid=auth.user?.id;
    let h=`<div class="info-box"><i class="fas fa-envelope"></i> پیامرسان</div>`;
    if(ia){
      h+=`<div class="msg-actions-bar"><button class="btn-small danger-btn" id="clrAllMsgsBtn"><i class="fas fa-trash"></i> حذف همه پیام‌ها</button></div>`;
    }
    h+=`<div class="dashboard-section"><h3><i class="fas fa-envelope-open-text"></i> پیام به مدیر</h3>`;
    if(!ia){
      h+=`<div style="display:flex;gap:10px;flex-wrap:wrap"><textarea id="mtai" placeholder="پیام به مدیر..." style="flex:2;min-width:220px;padding:10px;border:2px solid #e2e8f0;border-radius:10px;min-height:60px"></textarea><button class="btn-small success-btn" id="sta"><i class="fas fa-paper-plane"></i> ارسال</button></div>`;
    }
    const myMsgs = ia ? APP_DATA.messages.filter(m=>m.type==='member_to_admin') : APP_DATA.messages.filter(m=>m.type==='member_to_admin'&&(m.senderId===uid||m.parentId));
    h+=`<div style="margin-top:15px">${myMsgs.length?myMsgs.map(msg=>`<div class="msg-item ${msg.parentId?'msg-reply':'msg-to-admin'}"><div class="msg-header"><span>${U.esc(msg.senderName||'کاربر')}</span><span>${U.esc(msg.timestamp||'')}</span></div><div>${U.esc(msg.message)}</div></div>`).join(''):'<div style="color:#a0aec0;text-align:center;padding:15px">پیامی نیست</div>'}</div></div>`;
    h+=`<div class="dashboard-section"><h3><i class="fas fa-comments"></i> پیام به عضو دیگر</h3><div style="display:flex;gap:10px;flex-wrap:wrap"><input type="text" id="mpi" placeholder="شماره تلفن مقصد..." style="flex:1;min-width:140px;padding:10px;border:2px solid #e2e8f0;border-radius:10px"><textarea id="mtmi" placeholder="پیام..." style="flex:2;min-width:220px;padding:10px;border:2px solid #e2e8f0;border-radius:10px;min-height:60px"></textarea><button class="btn-small success-btn" id="stm"><i class="fas fa-paper-plane"></i> ارسال</button></div></div>`;
    c.innerHTML=h;
    $('#sta',c)&&($('#sta',c).onclick=()=>{
      const txt=$('#mtai',c).value.trim();
      if(!txt){alert('متن را وارد کنید');return;}
      const m=APP_DATA.members.find(x=>x.id===auth.user.memberId);
      APP_DATA.messages.push({id:'m_'+Date.now(),senderId:uid,senderName:`${m?.firstName||''} ${m?.lastName||''}`,senderPhone:m?.phone1||'',message:txt,timestamp:U.now(),type:'member_to_admin'});
      saveToLocalStorage();
      this.render();
    });
    $('#stm',c)&&($('#stm',c).onclick=()=>{
      const p=$('#mpi',c).value.trim(), t=$('#mtmi',c).value.trim();
      if(!p||!t){alert('شماره و متن را وارد کنید');return;}
      const tg=APP_DATA.members.find(x=>x.phone1===p);
      if(!tg){alert('شماره در سیستم نیست');return;}
      const cm=APP_DATA.members.find(x=>x.id===auth.user.memberId);
      APP_DATA.messages.push({id:'m_'+Date.now(),senderId:uid,senderName:`${cm?.firstName||''} ${cm?.lastName||''}`,senderPhone:cm?.phone1||'',receiverPhone:p,message:t,timestamp:U.now(),type:'member_to_member'});
      saveToLocalStorage();
      this.render();
    });
    $('#clrAllMsgsBtn',c)&&($('#clrAllMsgsBtn',c).onclick=()=>{
      if(confirm('حذف همه پیام‌ها؟')){APP_DATA.messages=[];saveToLocalStorage();this.render();}
    });
  }
  
  render_cultural(c){
    const ia=auth.isAdmin();
    let h=`<div class="info-box"><i class="fas fa-theater-masks"></i> برنامه‌های فرهنگی</div>`;
    h+=`<div class="dashboard-section"><h3><i class="fas fa-bullhorn"></i> اطلاعیه‌ها</h3>`;
    if(ia)h+=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:15px"><input type="text" id="ant" placeholder="عنوان..." style="flex:1;padding:10px;border:2px solid #e2e8f0;border-radius:10px"><textarea id="anc" placeholder="متن..." style="flex:2;padding:10px;border:2px solid #e2e8f0;border-radius:10px;min-height:60px"></textarea><button class="btn-small success-btn" id="sanb"><i class="fas fa-paper-plane"></i> ارسال</button></div>`;
    h+=`<div>${APP_DATA.announcements.length?APP_DATA.announcements.slice().reverse().map(a=>`<div class="msg-item"><div class="msg-header"><span>${U.esc(a.sender||'مدیر')}</span><span>${U.esc(a.timestamp||'')}</span></div><strong>${U.esc(a.title||'')}</strong><div style="margin-top:8px">${U.esc(a.content||'')}</div></div>`).join(''):'<div style="color:#a0aec0;text-align:center;padding:15px">اطلاعیه‌ای نیست</div>'}</div></div>`;
    h+=`<div class="dashboard-section"><h3><i class="fas fa-poll"></i> نظرسنجی</h3>`;
    if(ia)h+=`<div style="margin-bottom:15px"><input type="text" id="pq" placeholder="سوال..." style="width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:10px;margin-bottom:10px"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px">${[1,2,3,4].map(i=>`<input type="text" id="po${i}" placeholder="گزینه ${i}" style="padding:10px;border:2px solid #e2e8f0;border-radius:10px">`).join('')}</div><button class="btn-small success-btn" id="cpoll" style="margin-top:10px"><i class="fas fa-plus-circle"></i> ایجاد</button></div>`;
    h+=`<div>${APP_DATA.polls.length?APP_DATA.polls.map(p=>`<div class="poll-item"><div class="msg-header"><span style="font-weight:700">${U.esc(p.question)}</span></div><div class="poll-options">${p.options.map((o,i)=>`<button class="option-btn" data-poll="${p.id}" data-opt="${i}">${U.esc(o.text)}</button>`).join('')}</div></div>`).join(''):'<div style="color:#a0aec0;text-align:center;padding:15px">نظرسنجی نیست</div>'}</div></div>`;
    c.innerHTML=h;
    $('#sanb',c)&&($('#sanb',c).onclick=()=>{
      const t=$('#ant',c).value.trim(), ct=$('#anc',c).value.trim();
      if(!t||!ct){alert('عنوان و متن را وارد کنید');return;}
      APP_DATA.announcements.push({id:'a_'+Date.now(),title:t,content:ct,timestamp:U.now(),sender:auth.user.username||'مدیر'});
      saveToLocalStorage();
      this.render();
    });
    $('#cpoll',c)&&($('#cpoll',c).onclick=()=>{
      const q=$('#pq',c).value.trim(), o=[$('#po1',c).value.trim(),$('#po2',c).value.trim(),$('#po3',c).value.trim(),$('#po4',c).value.trim()].filter(x=>x);
      if(!q){alert('سوال را وارد کنید');return;}
      if(o.length<2){alert('حداقل دو گزینه');return;}
      APP_DATA.polls.push({id:'p_'+Date.now(),question:q,options:o.map(t=>({text:t,votes:0})),voters:[],timestamp:U.now()});
      saveToLocalStorage();
      this.render();
    });
  }
  
  render_sms(c){
    const ia=auth.isAdmin();
    if(ia){
      const keys=['general','supervisors','council','overdue','birthday','newsletter','poll','occasions'];
      c.innerHTML=`<div class="info-box"><i class="fas fa-sms"></i> وضعیت پیامکی</div><div class="table-wrapper"><table><thead><tr><th>نام</th><th>شماره حساب</th>${keys.map(k=>`<th>${k}</th>`).join('')}</tr></thead><tbody>${APP_DATA.members.map(m=>{const s=m.smsStatus||{};return`<tr><td>${U.esc(m.firstName||'---')}</td><td>${U.esc(m.accountNumber||'---')}</td>${keys.map(k=>`<td>${s[k]?'<span style="color:#48bb78">✅</span>':'<span style="color:#e53e3e">❌</span>'}</td>`).join('')}</tr>`;}).join('')}</tbody></table></div>`;
    }else{
      const m=APP_DATA.members.find(x=>x.id===auth.user.memberId);
      if(!m)return;
      const s=m.smsStatus||{}, items=[{k:'general',l:'سیستم کلی'},{k:'supervisors',l:'ویژه سرپرستان'},{k:'council',l:'ویژه شورا'},{k:'overdue',l:'معوقات'},{k:'birthday',l:'تبریک تولد'},{k:'newsletter',l:'خبرنامه'},{k:'poll',l:'مسابقه'},{k:'occasions',l:'مناسبات'}];
      c.innerHTML=`<div class="info-box"><i class="fas fa-sms"></i> وضعیت پیامکی شما</div><div class="sms-status-grid">${items.map(i=>`<div class="sms-status-item"><span style="font-weight:600">${i.l}</span><span class="${s[i.k]?'status-active':'status-inactive'}">${s[i.k]?'فعال':'غیرفعال'}</span></div>`).join('')}</div>`;
    }
  }
  
  render_support(c){
    const s=APP_DATA.support, ia=auth.isAdmin();
    let h=`<div class="info-box"><i class="fas fa-headset"></i> پشتیبانی</div>`;
    if(ia)h+=`<div class="dashboard-section"><h3>ویرایش اطلاعات</h3><div style="display:grid;gap:15px"><div><label>شماره تماس:</label><input type="text" id="spp" value="${U.esc(s.phone||'')}" style="width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:12px"></div><div><label>شماره حساب:</label><input type="text" id="spa" value="${U.esc(s.accountNumber||'')}" style="width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:12px"></div><div><label>آدرس:</label><input type="text" id="spad" value="${U.esc(s.address||'')}" style="width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:12px"></div><button class="btn-small success-btn" id="ssb"><i class="fas fa-save"></i> ذخیره</button></div></div>`;
    h+=`<div class="dashboard-section"><h3>اطلاعات تماس</h3><div style="display:grid;gap:15px"><div style="padding:15px;background:rgba(102,126,234,.1);border-radius:12px"><label style="font-weight:600">تلفن:</label><div style="font-weight:700;font-size:1.1rem">${U.esc(s.phone||'---')}</div></div><div style="padding:15px;background:rgba(72,187,120,.1);border-radius:12px"><label style="font-weight:600">حساب:</label><div style="font-weight:700;font-size:1.1rem">${U.esc(s.accountNumber||'---')}</div></div><div style="padding:15px;background:rgba(237,137,54,.1);border-radius:12px"><label style="font-weight:600">آدرس:</label><div style="font-weight:700;font-size:1.1rem">${U.esc(s.address||'---')}</div></div></div></div>`;
    c.innerHTML=h;
    $('#ssb',c)&&($('#ssb',c).onclick=()=>{
      APP_DATA.support={phone:$('#spp',c).value.trim(),accountNumber:$('#spa',c).value.trim(),address:$('#spad',c).value.trim()};
      saveToLocalStorage();
      alert('ذخیره شد');
    });
  }
  
  render_members(c){
    const ia=auth.isAdmin();
    if(!ia){c.innerHTML='<div style="text-align:center;padding:40px">دسترسی غیرمجاز</div>';return;}
    let h=`<div class="info-box"><i class="fas fa-users"></i> مدیریت اعضا</div>`;
    h+=`<div class="info-box" style="background:rgba(236,201,75,.1);border-right-color:#ecc94b"><i class="fas fa-info-circle"></i> داده‌ها از فایل اکسل در GitHub بارگذاری می‌شوند. برای آپدیت، فایل <strong>data.xlsx</strong> را در Repository <strong>sandogh-data</strong> جایگزین کنید.</div>`;
    h+=`<div class="table-wrapper"><table><thead><tr><th>نام</th><th>نام خانوادگی</th><th>شماره حساب</th><th>تلفن</th><th>موجودی</th><th>سکه</th><th>تراکنش</th></tr></thead><tbody>${APP_DATA.members.map(m=>`<tr><td>${U.esc(m.firstName||'---')}</td><td>${U.esc(m.lastName||'---')}</td><td>${U.esc(m.accountNumber||'---')}</td><td>${U.esc(m.phone1||'---')}</td><td>${U.fmtNum(m.balance||0)}</td><td>${m.coins||0}</td><td>${(m.transactions||[]).length}</td></tr>`).join('')}</tbody></table></div>`;
    c.innerHTML=h;
  }
  
  render_supervisor(c){
    const self=this;
    c.innerHTML=`<div class="info-box"><i class="fas fa-user-shield"></i> مدیریت ویژه</div><div class="supervisor-tabs"><button class="supervisor-tab-btn active" data-subtab="members"><i class="fas fa-users"></i> اعضا</button><button class="supervisor-tab-btn" data-subtab="support"><i class="fas fa-headset"></i> پشتیبانی</button><button class="supervisor-tab-btn" data-subtab="cultural"><i class="fas fa-theater-masks"></i> فرهنگی</button></div><div id="supervisorContent"></div>`;
    const subC=$('#supervisorContent',c);
    const loadSub=(subtab)=>{
      subC.innerHTML='';
      c.querySelectorAll('.supervisor-tab-btn').forEach(b=>b.classList.remove('active'));
      c.querySelector(`.supervisor-tab-btn[data-subtab="${subtab}"]`)?.classList.add('active');
      if(subtab==='members')self.render_members(subC);
      else if(subtab==='support')self.render_support(subC);
      else if(subtab==='cultural')self.render_cultural(subC);
    };
    loadSub('members');
    c.querySelectorAll('.supervisor-tab-btn').forEach(b=>b.onclick=()=>loadSub(b.dataset.subtab));
  }
  
  render_settings(c){
    if(!auth.isAdmin()){c.innerHTML='<div style="text-align:center;padding:40px">دسترسی غیرمجاز</div>';return;}
    c.innerHTML=`<div class="info-box"><i class="fas fa-cog"></i> تنظیمات</div><div class="dashboard-section"><h3>اطلاعات سیستم</h3><p>تعداد اعضا: <strong>${APP_DATA.members.length}</strong></p><p>تعداد کاربران: <strong>${APP_DATA.users.length}</strong></p><p>تعداد پیام‌ها: <strong>${APP_DATA.messages.length}</strong></p><p style="margin-top:15px;color:#718096">داده‌ها از فایل اکسل در GitHub بارگذاری می‌شوند.</p></div>`;
  }
  
  startClock(){
    if(this.ci)clearInterval(this.ci);
    const tick=()=>{
      const n=new Date(), h=String(n.getHours()).padStart(2,'0'), m=String(n.getMinutes()).padStart(2,'0'), s=String(n.getSeconds()).padStart(2,'0');
      const cl=$('#clockDisplay');
      if(cl)cl.innerHTML=`${h}:${m}<span style="opacity:.8">:${s}</span>`;
      const pd=$('#persianDate');
      if(pd)pd.textContent=U.toJalali(n);
      const gd=$('#gregorianDate');
      if(gd)gd.textContent=`${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')}`;
    };
    tick();
    this.ci=setInterval(tick,1000);
  }
  
  updNotif(){
    const badge=$('#notifBadge');
    if(!badge)return;
    let n=0;
    if(auth.isLoggedIn()){
      if(auth.isAdmin()){
        n=APP_DATA.messages.filter(m=>m.type==='member_to_admin').length;
      }else{
        const uid=auth.user.id;
        n=APP_DATA.messages.filter(m=>m.type==='admin_to_members'&&m.senderId!==uid).length;
      }
    }
    if(n){badge.classList.remove('hidden');badge.textContent=n>9?'9+':n;}
    else badge.classList.add('hidden');
  }
}

// ========== شروع برنامه ==========
const auth = new Auth();
const ui = new UI();

async function init(){
  const success = await loadExcelFromGitHub();
  if(!success){
    $('#loadingScreen').innerHTML = `<div class="error-screen"><i class="fas fa-exclamation-triangle"></i><h2>خطا در بارگذاری داده‌ها</h2><p style="color:#718096;margin-top:10px">فایل اکسل یافت نشد. لطفاً فایل <strong>data.xlsx</strong> را در Repository <strong>sandogh-data</strong> آپلود کنید.</p><button class="retry-btn" onclick="location.reload()"><i class="fas fa-redo"></i> تلاش مجدد</button></div>`;
    return;
  }
  ui.render();
}

init();

})();
</script>
