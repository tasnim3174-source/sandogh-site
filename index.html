<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سیستم حسابداری صندوق اتحاد</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
<style>
:root{--bg-gradient:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);--card-bg:rgba(255,255,255,.95);--text-primary:#2d3748;--text-secondary:#4a5568;--text-muted:#718096;--text-light:#a0aec0;--border-color:rgba(226,232,240,.5);--input-bg:#fff;--input-border:#e2e8f0;--hover-bg:rgba(102,126,234,.05);--section-bg:linear-gradient(135deg,rgba(247,250,252,.8),rgba(237,242,247,.8));--info-bg:linear-gradient(135deg,rgba(66,153,225,.1),rgba(66,153,225,.05));--shadow:0 25px 50px rgba(0,0,0,.25);--clock-bg:linear-gradient(135deg,#667eea,#764ba2);--clock-text:#fff;--datetime-bg:rgba(102,126,234,.1);--datetime-text:#2d3748;--datetime-label:#718096;--welcome-text:#667eea;--menu-text:#4a5568;--menu-hover:rgba(102,126,234,.1);--table-header:linear-gradient(135deg,#2d3748,#1a202c);--table-text:#2d3748;--table-hover:rgba(102,126,234,.05);--weather-bg:linear-gradient(135deg,#4facfe,#00f2fe);--keyboard-bg:linear-gradient(135deg,rgba(236,201,75,.1),rgba(214,158,46,.05));--keyboard-border:#ecc94b}
[data-theme="dark"]{--bg-gradient:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);--card-bg:rgba(26,26,46,.95);--text-primary:#fbbf24;--text-secondary:#f59e0b;--text-muted:#d97706;--text-light:#b45309;--border-color:rgba(251,191,36,.2);--input-bg:#1e1e3f;--input-border:#fbbf24;--hover-bg:rgba(251,191,36,.1);--section-bg:linear-gradient(135deg,rgba(30,30,63,.8),rgba(26,26,46,.8));--info-bg:linear-gradient(135deg,rgba(251,191,36,.15),rgba(245,158,11,.1));--shadow:0 25px 50px rgba(0,0,0,.5);--clock-bg:linear-gradient(135deg,#f59e0b,#d97706);--clock-text:#fff;--datetime-bg:rgba(251,191,36,.15);--datetime-text:#fbbf24;--datetime-label:#f59e0b;--welcome-text:#fbbf24;--menu-text:#fbbf24;--menu-hover:rgba(251,191,36,.15);--table-header:linear-gradient(135deg,#1e1e3f,#16213e);--table-text:#fbbf24;--table-hover:rgba(251,191,36,.1);--weather-bg:linear-gradient(135deg,#f59e0b,#d97706);--keyboard-bg:linear-gradient(135deg,rgba(251,191,36,.1),rgba(245,158,11,.05));--keyboard-border:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Vazirmatn',Tahoma,system-ui,sans-serif}
body{background:var(--bg-gradient);min-height:100vh;padding:20px;transition:background .3s ease;color:var(--text-primary)}
.container{max-width:1600px;margin:0 auto}
.login-page,.app-page{background:var(--card-bg);border-radius:32px;padding:40px;box-shadow:var(--shadow);transition:all .3s ease}
.hidden{display:none!important}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:16px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Vazirmatn',Tahoma,sans-serif;transition:all .3s}
[data-theme="dark"] .btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(0,0,0,.2)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-small{padding:8px 16px;font-size:.85rem;border-radius:20px;border:none;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px;font-family:'Vazirmatn',Tahoma,sans-serif;transition:all .3s}
.btn-small:hover{transform:translateY(-1px)}
.success-btn{background:linear-gradient(135deg,#48bb78,#38a169);color:#fff}
.danger-btn{background:linear-gradient(135deg,#f56565,#e53e3e);color:#fff}
.edit-btn{background:linear-gradient(135deg,#ed8936,#dd6b20);color:#fff}
.info-btn{background:linear-gradient(135deg,#4299e1,#3182ce);color:#fff}
[data-theme="dark"] .success-btn,[data-theme="dark"] .info-btn{background:linear-gradient(135deg,#fbbf24,#d97706);color:#1a1a2e}
.app-layout{display:flex;gap:25px;margin-top:25px}
.vertical-menu{width:240px;background:var(--card-bg);border-radius:24px;padding:25px 15px;flex-shrink:0;max-height:calc(100vh - 200px);overflow-y:auto;transition:all .3s}
.vertical-menu .menu-item{display:flex;align-items:center;gap:12px;padding:14px 18px;margin:6px 0;border-radius:16px;color:var(--menu-text);font-weight:600;cursor:pointer;transition:all .2s}
.vertical-menu .menu-item:hover{background:var(--menu-hover)}
.vertical-menu .menu-item.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
[data-theme="dark"] .vertical-menu .menu-item.active{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e}
.admin-badge{background:rgba(255,255,255,.25);padding:2px 8px;border-radius:8px;font-size:.7rem;margin-right:auto;font-weight:700;letter-spacing:.5px}
[data-theme="dark"] .admin-badge{background:rgba(26,26,46,.4);color:#fbbf24}
.council-badge{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a2e;padding:2px 8px;border-radius:8px;font-size:.7rem;margin-right:auto;font-weight:700;letter-spacing:.5px;box-shadow:0 2px 8px rgba(251,191,36,.3)}
.content-area{flex:1;background:var(--card-bg);border-radius:24px;padding:30px;min-height:600px;overflow-y:auto;transition:all .3s}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:.9rem}
th,td{padding:12px 15px;text-align:right;border-bottom:1px solid var(--border-color);color:var(--table-text)}
th{background:var(--table-header);font-weight:700;color:#fff;position:sticky;top:0;z-index:10}
tbody tr:hover{background:var(--table-hover)}
.input-group{margin-bottom:25px;position:relative}
.input-group label{display:block;margin-bottom:8px;font-weight:600;color:var(--text-secondary)}
.input-group input,.input-group select,.input-group textarea{width:100%;padding:14px;border:2px solid var(--input-border);border-radius:16px;font-size:1rem;background:var(--input-bg);color:var(--text-primary);font-family:'Vazirmatn',Tahoma,sans-serif;transition:all .3s}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
[data-theme="dark"] .input-group input:focus,[data-theme="dark"] .input-group select:focus,[data-theme="dark"] .input-group textarea:focus{border-color:#fbbf24;box-shadow:0 0 0 3px rgba(251,191,36,.2)}
.toggle-password{position:absolute;left:14px;top:42px;background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--text-muted);transition:color .3s}
.toggle-password:hover{color:#667eea}
[data-theme="dark"] .toggle-password:hover{color:#fbbf24}
.error-msg{color:#e53e3e;text-align:center;margin-top:20px;padding:12px;background:rgba(229,62,62,.1);border-radius:12px}
.info-box{background:var(--info-bg);border-right:5px solid #4299e1;padding:16px 20px;margin-bottom:25px;border-radius:16px;font-weight:600;display:flex;align-items:center;gap:10px;color:var(--text-primary);transition:all .3s}
[data-theme="dark"] .info-box{border-right-color:#fbbf24}
.dashboard-section{background:var(--section-bg);border-radius:20px;padding:25px;margin-bottom:25px;border-right:5px solid #667eea;color:var(--text-primary);transition:all .3s}
[data-theme="dark"] .dashboard-section{border-right-color:#fbbf24}
.dashboard-section h3{color:var(--text-primary);margin-bottom:15px;display:flex;align-items:center;gap:10px}
.filter-bar,.shop-filter-bar{display:flex;gap:12px;margin-bottom:25px;flex-wrap:wrap;background:var(--section-bg);padding:15px;border-radius:16px}
.filter-bar input,.filter-bar select,.shop-filter-bar input,.shop-filter-bar select{padding:10px 15px;border:2px solid var(--input-border);border-radius:12px;background:var(--input-bg);color:var(--text-primary);font-family:'Vazirmatn',Tahoma,sans-serif}
.filter-bar input,.shop-filter-bar input{flex:1}
.header-bar{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;padding:20px 30px;border-radius:24px;margin-bottom:25px;background:var(--card-bg);transition:all .3s}
.datetime-display{display:flex;gap:15px;flex-wrap:wrap;align-items:center}
.date-combined-box{background:var(--datetime-bg);border-radius:16px;padding:15px 20px;display:flex;flex-direction:column;gap:8px;min-width:200px;transition:all .3s}
.date-combined-box .date-row{display:flex;align-items:center;gap:10px;font-size:.95rem;color:var(--datetime-text)}
.date-combined-box .date-row i{color:#667eea;width:20px}
[data-theme="dark"] .date-combined-box .date-row i{color:#fbbf24}
.date-combined-box .date-row.day-name{font-weight:700;font-size:1rem;color:#667eea;border-top:1px dashed var(--border-color);padding-top:8px;margin-top:4px}
[data-theme="dark"] .date-combined-box .date-row.day-name{color:#fbbf24}
.date-combined-box .date-row.time-row{display:flex;align-items:center;gap:10px;font-size:1.1rem;font-weight:700;color:#667eea;border-top:1px dashed var(--border-color);padding-top:8px;margin-top:4px}
[data-theme="dark"] .date-combined-box .date-row.time-row{color:#fbbf24}
.date-combined-box .date-row.time-row .time-value{font-family:'Vazirmatn',monospace;letter-spacing:1px}

/* ساعت آنالوگ */
.analog-clock-container{display:flex;align-items:center;gap:15px}
.analog-clock{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);box-shadow:0 4px 15px rgba(102,126,234,.3);position:relative;transition:all .3s}
[data-theme="dark"] .analog-clock{background:linear-gradient(135deg,#f59e0b,#d97706);box-shadow:0 4px 15px rgba(251,191,36,.3)}
.analog-clock::before{content:'';position:absolute;top:50%;left:50%;width:8px;height:8px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);z-index:10}
.clock-hand{position:absolute;top:50%;left:50%;transform-origin:bottom center;background:#fff;border-radius:4px}
.clock-hand.hour{width:3px;height:20px;margin-left:-1.5px;margin-top:-20px}
.clock-hand.minute{width:2px;height:28px;margin-left:-1px;margin-top:-28px}
.clock-hand.second{width:1px;height:32px;margin-left:-.5px;margin-top:-32px;background:#e53e3e}
.clock-mark{position:absolute;width:2px;height:6px;background:rgba(255,255,255,.6);top:4px;left:50%;margin-left:-1px;transform-origin:bottom center}

.system-message-box{background:linear-gradient(135deg,rgba(236,201,75,.1),rgba(214,158,46,.05));border:2px solid #ecc94b;border-radius:12px;padding:10px 15px;font-size:.9rem;color:var(--text-primary);max-width:400px;line-height:1.6;transition:all .3s}
[data-theme="dark"] .system-message-box{background:linear-gradient(135deg,rgba(251,191,36,.1),rgba(245,158,11,.05));border-color:#fbbf24}
.system-message-box .message-icon{color:#ecc94b;margin-left:8px}
[data-theme="dark"] .system-message-box .message-icon{color:#fbbf24}
.welcome-with-greeting{display:flex;align-items:center;gap:15px;flex-wrap:wrap}
.welcome-with-greeting .welcome-text{font-size:1.3rem;font-weight:700;color:var(--welcome-text);display:flex;align-items:center;gap:8px}
.welcome-with-greeting .greeting-text{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:6px 14px;border-radius:10px;font-size:.85rem;font-weight:600;transition:all .3s}
[data-theme="dark"] .welcome-with-greeting .greeting-text{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e}
.header-actions{display:flex;gap:15px;align-items:center;flex-wrap:wrap}
.coin-badge{display:flex;align-items:center;gap:8px;padding:10px 18px;background:linear-gradient(135deg,#ecc94b,#d69e2e);color:#fff;border-radius:20px;font-weight:700}
.search-box{margin-bottom:20px;display:flex;gap:12px;align-items:center;background:var(--section-bg);padding:12px 18px;border-radius:16px}
.search-box input{flex:1;padding:10px 15px;border:2px solid var(--input-border);border-radius:12px;background:var(--input-bg);color:var(--text-primary);font-family:'Vazirmatn',Tahoma,sans-serif}
.table-wrapper{overflow-x:auto;max-height:600px;overflow-y:auto;border:2px solid var(--border-color);border-radius:16px;background:var(--input-bg)}
.warning-box{background:#fff5f5;border:2px solid #feb2b2;border-radius:16px;padding:18px 20px;color:#c53030;display:flex;align-items:center;gap:12px;margin-top:15px;transition:all .3s}
.warning-box.inactive{background:var(--warning-bg);border-color:#e53e3e}
.warning-box.savings{background:#fffff0;border-color:#d69e2e;color:#975a16}
[data-theme="dark"] .warning-box.savings{background:rgba(251,191,36,.1);color:#fbbf24;border-color:#fbbf24}
.warning-box.loan{background:var(--warning-bg);border-color:#e53e3e;color:var(--text-primary)}
.warning-box.loan-critical{background:#fed7d7;border-color:#c53030;color:#742a2a}
[data-theme="dark"] .warning-box.loan-critical{background:rgba(239,68,68,.15);color:#fca5a5;border-color:#ef4444}
.loan-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.loan-info-item{background:var(--input-bg);padding:12px 15px;border-radius:12px;border:2px solid var(--input-border);transition:all .3s}
.loan-info-label{font-size:.8rem;color:var(--text-muted);margin-bottom:5px}
.loan-info-value{font-size:1rem;font-weight:700;color:var(--text-primary)}
.coin-display{background:linear-gradient(135deg,#ecc94b,#d69e2e);color:#fff;padding:12px 20px;border-radius:14px;text-align:center;margin-bottom:20px;box-shadow:0 3px 12px rgba(236,201,75,.3);display:inline-flex;align-items:center;gap:10px;transition:all .3s}
.coin-display .coin-amount{font-size:1.4rem;font-weight:700}
.coin-display .coin-label{font-size:.85rem;opacity:.95}
.coin-history-item{background:var(--input-bg);border-radius:12px;padding:15px;margin-bottom:10px;border-right:4px solid #667eea;display:flex;justify-content:space-between;align-items:center;transition:all .3s}
[data-theme="dark"] .coin-history-item{border-right-color:#fbbf24}
.coin-history-item.positive{border-right-color:#48bb78}
.coin-history-item.negative{border-right-color:#e53e3e}
[data-theme="dark"] .coin-history-item.positive{border-right-color:#fbbf24}
.coin-amount-badge{background:linear-gradient(135deg,#ecc94b,#d69e2e);color:#fff;padding:6px 14px;border-radius:20px;font-weight:700}
.coin-rules-box{background:var(--info-bg);border-radius:16px;padding:20px;margin-bottom:20px;transition:all .3s}
.coin-rule-item{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:var(--input-bg);border-radius:12px;margin-bottom:8px;color:var(--text-primary);transition:all .3s}
.coin-rule-item.achieved{background:rgba(72,187,120,.1);border-right:3px solid #48bb78}
[data-theme="dark"] .coin-rule-item.achieved{background:rgba(251,191,36,.15);border-right-color:#fbbf24}
.coin-rule-item.not-achieved{background:rgba(229,62,62,.05);border-right:3px solid #e53e3e}
.coin-rule-item.locked{background:rgba(160,174,192,.1);border-right:3px solid #a0aec0;opacity:.6}
.profile-info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:18px;padding:10px}
.profile-info-item{display:flex;align-items:center;gap:12px;background:var(--input-bg);padding:14px 16px;border-radius:14px;border:1px solid var(--input-border);transition:all .3s}
.profile-info-item i{font-size:1.4rem;color:#667eea;width:30px;text-align:center}
[data-theme="dark"] .profile-info-item i{color:#fbbf24}
.profile-info-item .info-content{flex:1}
.profile-info-item .info-label{font-weight:600;color:var(--text-muted);font-size:.8rem;margin-bottom:3px}
.profile-info-item .info-value{font-weight:700;color:var(--text-primary);font-size:1rem}
.last-login-box{background:var(--info-bg);border-right:4px solid #4299e1;padding:14px 18px;border-radius:14px;margin-top:15px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;transition:all .3s}
[data-theme="dark"] .last-login-box{border-right-color:#fbbf24}
.last-login-box i{font-size:1.3rem;color:#4299e1}
[data-theme="dark"] .last-login-box i{color:#fbbf24}
.last-login-box .ll-label{font-size:.8rem;color:var(--text-muted)}
.last-login-box .ll-value{font-weight:700;color:var(--text-primary);font-size:1rem}
.last-tx-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.last-tx-item{background:var(--input-bg);padding:12px 15px;border-radius:12px;border:2px solid var(--input-border);transition:all .3s}
.last-tx-label{font-size:.8rem;color:var(--text-muted);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.last-tx-value{font-size:1rem;font-weight:700;color:var(--text-primary)}
.sms-status-icon{font-size:1.3rem;font-weight:700}
.account-status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-weight:700;font-size:.9rem}
.account-status-badge.active{background:rgba(72,187,120,.15);color:#22543d}
[data-theme="dark"] .account-status-badge.active{background:rgba(251,191,36,.2);color:#fbbf24}
.account-status-badge.inactive{background:rgba(229,62,62,.15);color:#9b2c2c}
[data-theme="dark"] .account-status-badge.inactive{background:rgba(239,68,68,.2);color:#fca5a5}
.coming-soon-box{background:var(--info-bg);border:2px dashed #667eea;border-radius:24px;padding:60px 40px;text-align:center;margin:40px auto;max-width:500px;transition:all .3s}
[data-theme="dark"] .coming-soon-box{border-color:#fbbf24}
.coming-soon-box i{font-size:5rem;color:#667eea;margin-bottom:20px}
[data-theme="dark"] .coming-soon-box i{color:#fbbf24}
.coming-soon-box h2{color:var(--text-primary);margin-bottom:15px;font-size:1.8rem}
.coming-soon-box p{color:var(--text-muted);font-size:1.1rem;line-height:1.8}
.calendar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
.calendar-event{background:var(--input-bg);border-radius:14px;padding:15px;border-right:4px solid #667eea;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:all .3s}
[data-theme="dark"] .calendar-event{border-right-color:#fbbf24}
.calendar-event.birthday{border-right-color:#ecc94b}
.calendar-event.installment{border-right-color:#48bb78}
[data-theme="dark"] .calendar-event.installment{border-right-color:#fbbf24}
.calendar-event.occasion{border-right-color:#ed8936}
.calendar-event .event-date{font-size:.85rem;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.calendar-event .event-title{font-weight:700;color:var(--text-primary);margin-bottom:5px}
.calendar-event .event-desc{font-size:.9rem;color:var(--text-secondary)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:25px}
.stat-card{background:var(--input-bg);border-radius:16px;padding:20px;border:2px solid var(--input-border);text-align:center;transition:all .3s}
.stat-card .stat-icon{font-size:2rem;margin-bottom:10px}
.stat-card .stat-value{font-size:1.8rem;font-weight:700;color:var(--text-primary)}
.stat-card .stat-label{font-size:.85rem;color:var(--text-muted);margin-top:5px}
.stat-card.blue{border-color:#4299e1}.stat-card.blue .stat-icon{color:#4299e1}
[data-theme="dark"] .stat-card.blue{border-color:#fbbf24}
[data-theme="dark"] .stat-card.blue .stat-icon{color:#fbbf24}
.stat-card.green{border-color:#48bb78}.stat-card.green .stat-icon{color:#48bb78}
[data-theme="dark"] .stat-card.green{border-color:#fbbf24}
[data-theme="dark"] .stat-card.green .stat-icon{color:#fbbf24}
.stat-card.red{border-color:#e53e3e}.stat-card.red .stat-icon{color:#e53e3e}
[data-theme="dark"] .stat-card.red{border-color:#ef4444}
[data-theme="dark"] .stat-card.red .stat-icon{color:#ef4444}
.stat-card.yellow{border-color:#ecc94b}.stat-card.yellow .stat-icon{color:#d69e2e}
[data-theme="dark"] .stat-card.yellow{border-color:#fbbf24}
[data-theme="dark"] .stat-card.yellow .stat-icon{color:#fbbf24}
.stat-card.purple{border-color:#9f7aea}.stat-card.purple .stat-icon{color:#9f7aea}
[data-theme="dark"] .stat-card.purple{border-color:#fbbf24}
[data-theme="dark"] .stat-card.purple .stat-icon{color:#fbbf24}
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:200px;padding:20px;background:var(--input-bg);border-radius:16px;border:2px solid var(--input-border);transition:all .3s}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.bar{width:100%;background:linear-gradient(180deg,#667eea,#764ba2);border-radius:8px 8px 0 0;min-height:5px}
[data-theme="dark"] .bar{background:linear-gradient(180deg,#fbbf24,#d97706)}
.bar-label{font-size:.75rem;color:var(--text-muted);text-align:center}

.loading-container{text-align:center;padding:60px 20px;animation:fadeIn .6s ease-out;background:linear-gradient(135deg,#1a1a2e 0%,#0f3460 50%,#16213e 100%);min-height:100vh;position:fixed;top:0;left:0;right:0;bottom:0;z-index:9998;transition:opacity .5s ease}

@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.loading-spinner{position:relative;width:140px;height:140px;margin:0 auto 30px}
.spinner-ring{position:absolute;border:3px solid transparent;border-radius:50%;animation:spin 1.5s linear infinite}
.spinner-ring:nth-child(1){top:0;left:0;right:0;bottom:0;border-top-color:#48bb78;border-right-color:#48bb78;animation-duration:1.5s}
.spinner-ring:nth-child(2){top:12px;left:12px;right:12px;bottom:12px;border-bottom-color:#38a169;border-left-color:#38a169;animation-duration:2s;animation-direction:reverse}
.spinner-ring:nth-child(3){top:24px;left:24px;right:24px;bottom:24px;border-top-color:#68d391;border-right-color:#68d391;animation-duration:2.5s}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.8rem;color:#48bb78;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.15);opacity:.7}}

const U={

toJalali(g){const d=new Date(g),gy=d.getFullYear(),gm=d.getMonth()+1,gd=d.getDate(),gdm=[0,31,59,90,120,151,181,212,243,273,304,334];let gy2=gm>2?gy+1:gy,days=355666+365*gy+~~((gy2+3)/4)-~~((gy2+99)/100)+~~((gy2+399)/400)+gd+gdm[gm-1],jy=-1595+33*~~(days/12053);days%=12053;jy+=4*~~(days/1461);days%=1461;if(days>365){jy+=~~((days-1)/365);days=(days-1)%365;}const jm=days<186?1+~~(days/31):7+~~((days-186)/30),jd=1+(days<186?days%31:(days-186)%30);return`${jy}/${String(jm).padStart(2,'0')}/${String(jd).padStart(2,'0')}`;},
toJalaliParts(g){const d=new Date(g),gy=d.getFullYear(),gm=d.getMonth()+1,gd=d.getDate(),gdm=[0,31,59,90,120,151,181,212,243,273,304,334];let gy2=gm>2?gy+1:gy,days=355666+365*gy+~~((gy2+3)/4)-~~((gy2+99)/100)+~~((gy2+399)/400)+gd+gdm[gm-1],jy=-1595+33*~~(days/12053);days%=12053;jy+=4*~~(days/1461);days%=1461;if(days>365){jy+=~~((days-1)/365);days=(days-1)%365;}const jm=days<186?1+~~(days/31):7+~~((days-186)/30),jd=1+(days<186?days%31:(days-186)%30);return{year:jy,month:jm,day:jd};},

parseNum(v){if(v==null||v==='')return 0;if(typeof v==='number')return v;let s=String(v).replace(/[,\s]/g,'');return isNaN(parseFloat(s))?0:parseFloat(s);},
fmtDate(s){if(!s)return'---';const str=String(s).trim();if(str.includes('/')&&str.length===10)return str;if(str.includes('-')&&str.length===10)return str.replace(/-/g,'/');const c=str.replace(/\D/g,'');if(c.length===8)return`${c.slice(0,4)}/${c.slice(4,6)}/${c.slice(6,8)}`;if(c.length===6)return`${c.slice(0,4)}/${c.slice(4,6)}`;return str;},

calcMembershipDuration(openDate){if(!openDate)return'---';const parts=openDate.split('/');if(parts.length!==3)return openDate;const openYear=parseInt(parts[0]);const openMonth=parseInt(parts[1]);const openDay=parseInt(parts[2]);const today=U.toJalaliParts(new Date());let years=today.year-openYear;let months=today.month-openMonth;let days=today.day-openDay;if(days<0){months--;const prevMonth=today.month-1;const daysInPrevMonth=prevMonth<=6?31:(prevMonth<=11?30:29);days+=daysInPrevMonth;}if(months<0){years--;months+=12;}let result='';if(years>0)result+=`${years} سال`;if(months>0)result+=(result?' و ':'')+`${months} ماه`;if(days>0)result+=(result?' و ':'')+`${days} روز`;return result||'کمتر از یک روز';},

function calculateMemberScore(member,ddm,allTransactions){
let score=0;
const details={};
const totalInstallments=member.totalInstallments||0;
const paidInstallments=member.paidInstallments||0;
const overdueInstallments=Math.abs(member.overdueInstallments||0);
let installmentScore=0;
if(totalInstallments>0){
installmentScore=(paidInstallments/totalInstallments)*40;
installmentScore=Math.max(0,installmentScore-(overdueInstallments*5));
}else{
installmentScore=40;
}
installmentScore=Math.max(0,Math.min(40,installmentScore));
details.installment={score:Math.round(installmentScore),max:40};
const savings=member.savingsStatus||0;
let savingsScore=0;
if(savings>=0){
savingsScore=25;
}else{
const monthlySalary=member.monthlySalary||1;
const ratio=Math.abs(savings)/monthlySalary;
savingsScore=Math.max(0,25-(ratio*25));
}
savingsScore=Math.max(0,Math.min(25,savingsScore));
details.savings={score:Math.round(savingsScore),max:25};
const coins=ddm?ddm.getTotalCoins(member.id):0;
let coinsScore=Math.min(coins/50,1)*20;
coinsScore=Math.max(0,Math.min(20,coinsScore));
details.coins={score:Math.round(coinsScore),max:20,value:coins};
const txCount=allTransactions?allTransactions.filter(t=>String(t._memberId)===String(member.id)).length:0;
let activityScore=Math.min(txCount/10,1)*15;
activityScore=Math.max(0,Math.min(15,activityScore));
details.activity={score:Math.round(activityScore),max:15,value:txCount};
score=installmentScore+savingsScore+coinsScore+activityScore;
score=Math.max(0,Math.min(100,score));
score=Math.round(score);
let tier,tierName,tierEmoji,tierColor,tierMessage;
if(score>=80){
tier='gold';tierName='طلایی';tierEmoji='⭐';tierColor='#FFD700';
tierMessage='🌟 عالی! شما عضو طلایی صندوق هستید. به همین خوبی ادامه دهید!';
}else if(score>=50){
tier='silver';tierName='نقره‌ای';tierEmoji='🥈';tierColor='#C0C0C0';
tierMessage='💪 خوب! کمی دیگر تا طلایی شدن فاصله دارید. ادامه دهید!';
}else{
tier='black';tierName='سیاه';tierEmoji='⚫';tierColor='#4A5568';
tierMessage='⚠️ توجه! وضعیت حساب شما نیاز به بهبود دارد. لطفاً اقساط خود را پرداخت کنید.';
}
return{score,tier,tierName,tierEmoji,tierColor,tierMessage,details};
}

function renderGaugeChart(score,size='large'){
const sizes={
small:{width:70,height:70,strokeWidth:7,fontSize:14,textSize:8,cy:45},
medium:{width:110,height:110,strokeWidth:9,fontSize:22,textSize:10,cy:68},
large:{width:180,height:180,strokeWidth:13,fontSize:36,textSize:14,cy:110}
};
const s=sizes[size];
let gradientId,startColor,endColor,tierName,tierEmoji;
if(score>=80){
gradientId='goldGrad';startColor='#FFD700';endColor='#FFA500';tierName='طلایی';tierEmoji='⭐';
}else if(score>=50){
gradientId='silverGrad';startColor='#E8E8E8';endColor='#A8A8A8';tierName='نقره‌ای';tierEmoji='🥈';
}else{
gradientId='blackGrad';startColor='#6B7280';endColor='#374151';tierName='سیاه';tierEmoji='⚫';
}
const radius=(s.width-s.strokeWidth)/2;
const circumference=Math.PI*radius;
const progress=(score/100)*circumference;
const cx=s.width/2;
const cy=s.cy;
const uid='g_'+Math.random().toString(36).substr(2,9);
return`<svg width="${s.width}" height="${s.height}" class="gauge-chart" viewBox="0 0 ${s.width} ${s.height}">
<defs>
<linearGradient id="${uid}" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:${startColor};stop-opacity:1"/>
<stop offset="100%" style="stop-color:${endColor};stop-opacity:1"/>
</linearGradient>
</defs>
<path d="M ${cx-radius} ${cy} A ${radius} ${radius} 0 0 1 ${cx+radius} ${cy}" fill="none" stroke="rgba(128,128,128,0.2)" stroke-width="${s.strokeWidth}" stroke-linecap="round"/>
<path d="M ${cx-radius} ${cy} A ${radius} ${radius} 0 0 1 ${cx+radius} ${cy}" fill="none" stroke="url(#${uid})" stroke-width="${s.strokeWidth}" stroke-linecap="round" stroke-dasharray="${progress} ${circumference}" class="gauge-progress"/>
<text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="${s.fontSize}" font-weight="700" fill="currentColor">${Math.round(score)}</text>
<text x="${cx}" y="${cy+s.textSize+4}" text-anchor="middle" font-size="${s.textSize}" fill="currentColor" opacity="0.7">${tierEmoji} ${tierName}</text>
</svg>`;
}

class DynamicDataManager{
constructor(){
this.coins=this.load('coins',{});
this.coinHistory=this.load('coinHistory',{});
this.calculatedTxIds=this.load('calculatedTxIds',[]);
this.monthlyCalculated=this.load('monthlyCalculated','');
this.shopPurchases=this.load('shopPurchases',[]);
}
load(key,defaultVal){try{return JSON.parse(localStorage.getItem('sandogh_'+key))||defaultVal;}catch{return defaultVal;}}
save(key,data){localStorage.setItem('sandogh_'+key,JSON.stringify(data));}
addCoins(memberId,amount,reason,detail){
if(!this.coins[memberId])this.coins[memberId]=0;
if(!this.coinHistory[memberId])this.coinHistory[memberId]=[];
this.coins[memberId]+=amount;
this.coinHistory[memberId].push({date:U.now(),amount:amount,reason:reason,detail:detail||''});
this.save('coins',this.coins);
this.save('coinHistory',this.coinHistory);
}
deductCoins(memberId,amount,reason,detail){
if(!this.coins[memberId])this.coins[memberId]=0;
if(!this.coinHistory[memberId])this.coinHistory[memberId]=[];
this.coins[memberId]-=amount;
this.coinHistory[memberId].push({date:U.now(),amount:-amount,reason:reason,detail:detail||''});
this.save('coins',this.coins);
this.save('coinHistory',this.coinHistory);
}
getTotalCoins(memberId){return this.coins[memberId]||0;}
getHistory(memberId){return this.coinHistory[memberId]||[];}
isTxCalculated(txId){return this.calculatedTxIds.includes(String(txId));}

function calculateCoins(member,transactions,ddm){
const jalali=U.getJalaliMonth();
if(!ddm.isMonthlyCalculated()){
if(U.parseNum(member.loanBalance)!==0&&U.parseNum(member.paidInstallments)>0){
ddm.addCoins(member.id,2,'پرداخت به موقع قسط',`ماه ${jalali.month}/${jalali.year} - پرداخت ${U.parseNum(member.paidInstallments)} قسط`);
}
if(U.parseNum(member.overdueInstallments)===0&&U.parseNum(member.loanBalance)!==0){
ddm.addCoins(member.id,3,'بدون قسط معوقه',`ماه ${jalali.month}/${jalali.year} - تمام اقساط به موقع پرداخت شده`);
}
if(U.parseNum(member.balance)>U.parseNum(member.monthlySalary)){
ddm.addCoins(member.id,2,'موجودی بالاتر از مقرری',`ماه ${jalali.month}/${jalali.year} - موجودی: ${U.fmtNum(member.balance)} ریال`);
}
const savings=U.parseNum(member.savingsStatus);
const mojodi=U.parseNum(member.currentMonthBalance);
const extraSavings=savings-mojodi;
if(extraSavings>3000000){
const bonusCoins=Math.floor(extraSavings/3000000)*2;
ddm.addCoins(member.id,bonusCoins,'پس‌انداز بالا',`${U.fmtNum(extraSavings)} ریال اضافه پس‌انداز`);
}
ddm.markMonthlyCalculated();
}
if(member.active&&member.birthDateShamsi){
const birthParts=member.birthDateShamsi.split('/');
if(birthParts.length===3){
const birthMonth=parseInt(birthParts[1]);
const birthDay=parseInt(birthParts[2]);
if(birthMonth===jalali.month&&birthDay===jalali.day){
if(!ddm.coinHistory[member.id]?.find(h=>h.reason==='تولد مبارک'&&h.detail.includes(jalali.year))){
ddm.addCoins(member.id,5,'تولد مبارک',`سال ${jalali.year} - تولدتان مبارک!`);
}
}
}
}
if(member.openDate){
const openParts=member.openDate.split('/');
if(openParts.length===3){
const openMonth=parseInt(openParts[1]);
const openDay=parseInt(openParts[2]);
if(openMonth===jalali.month&&openDay===jalali.day){
const alreadyGiven=ddm.coinHistory[member.id]?.find(h=>h.reason==='هدیه سالانه حساب فعال'&&h.detail.includes(jalali.year));
if(!alreadyGiven){
if(member.active){
ddm.addCoins(member.id,5,'هدیه سالانه حساب فعال',`سال ${jalali.year} - به دلیل فعال بودن حساب`);
}else{
ddm.addCoins(member.id,0,'محرومیت - حساب غیرفعال',`سال ${jalali.year} - به دلیل غیرفعال بودن حساب`);
}
}
}
}
}
const memberTxns=transactions.filter(t=>String(t._memberId)===String(member.id)||String(t['شماره حساب'])===String(member.accountNumber));
memberTxns.forEach(tx=>{
if(ddm.isTxCalculated(tx._transactionId))return;
const txDate=tx['تاریخ تراکنش']||'';
const txParts=txDate.split('/');
let isCurrentMonth=false;
if(txParts.length===3){
const txYear=parseInt(txParts[0]);
const txMonth=parseInt(txParts[1]);
if(txYear===jalali.year&&txMonth===jalali.month){
isCurrentMonth=true;
}
}
if(isCurrentMonth){
if(tx.smsStatus&&tx.smsStatus.general){
ddm.addCoins(member.id,3,'پیامک واریز فعال',`فیش ${tx['شماره فیش']||tx['ID']} - تاریخ ${txDate}`);
}
if(tx.smsStatus&&!tx.smsStatus.overdue){
ddm.addCoins(member.id,2,'بدون پیامک اخطار',`فیش ${tx['شماره فیش']||tx['ID']} - تاریخ ${txDate}`);
}
ddm.markTxCalculated(tx._transactionId);
}
});
}

function updateAnalogClock(){
const now=new Date();
const hours=now.getHours()%12;
const minutes=now.getMinutes();
const seconds=now.getSeconds();
const hourDeg=(hours*30)+(minutes*0.5);
const minuteDeg=minutes*6;
const secondDeg=seconds*6;
const hourHand=document.querySelector('.clock-hand.hour');
const minuteHand=document.querySelector('.clock-hand.minute');
const secondHand=document.querySelector('.clock-hand.second');
if(hourHand)hourHand.style.transform=`rotate(${hourDeg}deg)`;
if(minuteHand)minuteHand.style.transform=`rotate(${minuteDeg}deg)`;
if(secondHand)secondHand.style.transform=`rotate(${secondDeg}deg)`;
}

this.dm.members.forEach(m=>{
this.memberScores[m.id]=calculateMemberScore(m,this.ddm,this.allTransactions);
});

doLogin(){
if(!this.dataReady){
const waitingOverlay=document.createElement('div');
waitingOverlay.className='login-waiting-overlay';
waitingOverlay.id='loginWaitingOverlay';
waitingOverlay.innerHTML=`<div class="login-waiting-box">

<p class="login-waiting-subtext">لطفاً صبور باشید<br>در حال دریافت داده‌ها از سرور</p>
</div>`;
document.body.appendChild(waitingOverlay);
const checkReady=setInterval(()=>{
if(this.dataReady){
clearInterval(checkReady);
const overlay=$('#loginWaitingOverlay');
if(overlay){
overlay.style.opacity='0';
overlay.style.transition='opacity 0.3s';
setTimeout(()=>{
document.body.removeChild(overlay);
this.doLogin();
},300);
}
}
},500);
return;
}
const un=$('#loginUsername').value.trim();
const pw=$('#loginPassword').value.trim();
const user=this.dm.users.find(u=>u.username===un&&u.password===pw);
if(user){
this.currentUser=user;
const loginOverlay=document.createElement('div');
loginOverlay.className='login-waiting-overlay';
loginOverlay.id='loginSuccessOverlay';
loginOverlay.innerHTML=`<div class="login-waiting-box">

</div>`;
document.body.appendChild(loginOverlay);
setTimeout(()=>{
if(user.memberId){
localStorage.setItem('sandogh_lastLogin_'+user.memberId,U.now());
const currentCount=parseInt(localStorage.getItem('sandogh_loginCount_'+user.memberId)||'0');
localStorage.setItem('sandogh_loginCount_'+user.memberId,String(currentCount+1));
}
this.render();
const successOverlay=$('#loginSuccessOverlay');
if(successOverlay)document.body.removeChild(successOverlay);
if(user.memberId&&user.role!=='admin'){
const scoreData=this.memberScores[user.memberId];
if(scoreData){
setTimeout(()=>{renderWelcomeTierModal(scoreData);},300);
}
}
},800);
}else{

errorBox.style.animation='none';
errorBox.offsetHeight;
errorBox.style.animation='shake 0.5s';
}
}

bindMenu(){
$$('.menu-item[data-tab]').forEach(el=>{
el.onclick=()=>{
this.tab=el.dataset.tab;
localStorage.setItem('activeTab',this.tab);
$$('.menu-item').forEach(e=>e.classList.remove('active'));
el.classList.add('active');
this.switchTab(this.tab);
if(window.innerWidth<=768){
this.mobileMenuOpen=false;
const menu=$('#verticalMenu');
const overlay=$('#menuOverlay');
const toggleBtn=$('#mobileMenuToggle');
if(menu)menu.classList.add('collapsed');
if(overlay)overlay.classList.remove('active');
if(toggleBtn)toggleBtn.innerHTML='<i class="fas fa-bars"></i> منو';
}
};
});
$('#logoutBtn').onclick=()=>this.doLogout();
const toggleBtn=$('#mobileMenuToggle');
const overlay=$('#menuOverlay');
if(toggleBtn){
toggleBtn.onclick=()=>{
this.mobileMenuOpen=!this.mobileMenuOpen;
const menu=$('#verticalMenu');
if(menu){
if(this.mobileMenuOpen){
menu.classList.remove('collapsed');
if(overlay)overlay.classList.add('active');
toggleBtn.innerHTML='<i class="fas fa-times"></i> بستن';
}else{
menu.classList.add('collapsed');
if(overlay)overlay.classList.remove('active');
toggleBtn.innerHTML='<i class="fas fa-bars"></i> منو';
}
}
};
}
if(overlay){
overlay.onclick=()=>{
this.mobileMenuOpen=false;
const menu=$('#verticalMenu');
if(menu)menu.classList.add('collapsed');
overlay.classList.remove('active');
if(toggleBtn)toggleBtn.innerHTML='<i class="fas fa-bars"></i> منو';
};
}
}
switchTab(tab){const c=$('#contentArea');if(!c)return;c.innerHTML='';const fn='render_'+tab;if(typeof this[fn]==='function')this[fn](c);}

buyProduct(shenaseh){
const product=SHOP_PRODUCTS.find(p=>p.shenaseh===shenaseh);
if(!product){alert('❌ محصول یافت نشد');return;}
const member=this.dm.members.find(m=>m.id===this.currentUser.memberId);
if(!member){alert('❌ خطا در شناسایی کاربر');return;}
const userCoins=this.ddm.getTotalCoins(member.id);
if(userCoins<product.price){
alert(`❌ سکه کافی ندارید!
سکه‌های شما: ${userCoins}
قیمت محصول: ${product.price}
سکه مورد نیاز: ${product.price-userCoins}`);
return;
}
if(product.stock<=0){alert('❌ این محصول ناموجود است');return;}
if(!confirm(`آیا از خرید "${product.name}" با ${product.price} سکه مطمئن هستید?
سکه‌های فعلی شما: ${userCoins}
سکه‌های پس از خرید: ${userCoins-product.price}`)){return;}
const orderCode=U.generateOrderCode(member.accountNumber);
this.ddm.deductCoins(member.id,product.price,'خرید از فروشگاه',`محصول: ${product.name} | کد سفارش: ${orderCode} | دسته‌بندی: ${product.category||'نامشخص'}`);
const purchase={orderCode:orderCode,productId:product.shenaseh,productName:product.name,productDescription:product.description,price:product.price,memberId:member.id,memberName:`${member.firstName} ${member.lastName||''}`.trim(),accountNumber:member.accountNumber,date:U.now(),delivered:false};
this.ddm.addShopPurchase(purchase);
this.showPurchaseReceipt(purchase);
}

h+=`<div class="shop-filter-bar"><input type="text" id="coinSearch" placeholder="جستجو بر اساس نام یا شماره حساب..."><select id="coinSortFilter"><option value="default">مرتب‌سازی: پیش‌فرض</option><option value="coins-desc">سکه: زیاد به کم</option><option value="coins-asc">سکه: کم به زیاد</option></select></div>`;
h+=`<div class="dashboard-section"><h3><i class="fas fa-list"></i> سکه‌های همه اعضا</h3><div class="table-wrapper"><table id="coinsTable"><thead><tr><th>نام</th><th>شماره حساب</th><th>سکه کل</th><th>تعداد تراکنش سکه</th><th>عملیات</th></tr></thead><tbody>`;
this.dm.members.forEach(mem=>{
const history=this.ddm.getHistory(mem.id);
const coins=this.ddm.getTotalCoins(mem.id);
h+=`<tr data-name="${U.esc(mem.firstName)}" data-account="${U.esc(mem.accountNumber)}" data-coins="${coins}"><td>${U.esc(mem.firstName)} ${U.esc(mem.lastName)}</td><td>${U.esc(mem.accountNumber)}</td><td><span class="coin-amount-badge">${coins}</span></td><td>${history.length}</td><td><button class="btn-small info-btn" onclick="window.app.showMemberCoinHistory('${mem.id}')"><i class="fas fa-history"></i> تاریخچه</button></td></tr>`;
});
h+=`</tbody></table></div></div>`;
h+=`<div id="coinHistorySection"></div>`;
c.innerHTML=h;
setTimeout(()=>{
const filterAndSort=()=>{
const search=$('#coinSearch',c)?.value.trim().toLowerCase()||'';
const sort=$('#coinSortFilter',c)?.value||'default';
const table=$('#coinsTable',c);
if(!table)return;
const tbody=table.querySelector('tbody');
const rows=Array.from(tbody.querySelectorAll('tr'));
rows.forEach(row=>{
const name=row.dataset.name.toLowerCase();
const account=row.dataset.account.toLowerCase();
if(!search||name.includes(search)||account.includes(search)){
row.style.display='';
}else{
row.style.display='none';
}
});
if(sort==='coins-desc'){
rows.sort((a,b)=>parseInt(b.dataset.coins)-parseInt(a.dataset.coins));
}else if(sort==='coins-asc'){
rows.sort((a,b)=>parseInt(a.dataset.coins)-parseInt(b.dataset.coins));
}
rows.forEach(row=>tbody.appendChild(row));
};
$('#coinSearch',c).oninput=filterAndSort;
$('#coinSortFilter',c).onchange=filterAndSort;
},50);
}else{
const member=this.dm.members.find(m=>m.id===this.currentUser.memberId);
if(!member){c.innerHTML='<div style="text-align:center;padding:40px">خطا</div>';return;}
const totalCoins=this.ddm.getTotalCoins(member.id);
const history=this.ddm.getHistory(member.id);
const positiveCount=history.filter(h=>h.amount>0).length;
const negativeCount=history.filter(h=>h.amount<0).length;
let h=`<div class="info-box"><i class="fas fa-coins"></i> سکه‌های من و تاریخچه</div>`;
h+=`<div class="coin-display"><i class="fas fa-coins" style="font-size:1.3rem"></i><div><div class="coin-label">سکه‌های شما</div><div class="coin-amount">${totalCoins}</div></div></div>`;
h+=`<div class="stats-grid"><div class="stat-card yellow"><div class="stat-icon"><i class="fas fa-coins"></i></div><div class="stat-value">${U.fmtNum(totalCoins)}</div><div class="stat-label">سکه‌های فعلی</div></div><div class="stat-card green"><div class="stat-icon"><i class="fas fa-arrow-up"></i></div><div class="stat-value">${U.fmtNum(positiveCount)}</div><div class="stat-label">تراکنش‌های مثبت</div></div><div class="stat-card red"><div class="stat-icon"><i class="fas fa-arrow-down"></i></div><div class="stat-value">${U.fmtNum(negativeCount)}</div><div class="stat-label">تراکنش‌های منفی</div></div></div>`;
h+=`<div class="dashboard-section"><h3><i class="fas fa-history"></i> تاریخچه سکه‌ها</h3>`;
if(history.length===0){
h+=`<p style="text-align:center;color:var(--text-light);padding:20px">هنوز سکه‌ای دریافت نکرده‌اید</p>`;
}else{
history.slice().reverse().forEach(item=>{
const isPositive=item.amount>0;
const isZero=item.amount===0;
const isNegative=item.amount<0;
const displayAmount=isZero?'محروم':(isNegative?item.amount:'+'+item.amount);
const color=isZero?'#e53e3e':(isNegative?'#e53e3e':'#48bb78');
const cls=isNegative?'negative':(isPositive?'positive':'negative');
h+=`<div class="coin-history-item ${cls}"><div><div style="font-weight:700;color:var(--text-primary)">${U.esc(item.reason)}</div><div style="font-size:.85rem;color:var(--text-secondary)">${U.esc(item.detail)}</div><div style="font-size:.75rem;color:var(--text-light);margin-top:3px">${U.esc(item.date)}</div></div><div style="color:${color};font-weight:700;font-size:1.2rem">${displayAmount}</div></div>`;
});
}
h+=`</div>`;
c.innerHTML=h;
}
}
showMemberCoinHistory(memberId){

renderRuleItem(name,coins,achieved){

else{icon='<i class="fas fa-info-circle" style="color:#4299e1"></i>';}
return`<div class="${cls}"><div style="display:flex;align-items:center;gap:10px">${icon}<span style="color:var(--text-primary)">${name}</span></div><span class="coin-amount-badge">+${coins}</span></div>`;
}
isBirthdayToday(birthDate){const jalali=U.getJalaliMonth();const parts=birthDate.split('/');if(parts.length!==3)return false;return parseInt(parts[1])===jalali.month&&parseInt(parts[2])===jalali.day;}
isOpeningDayToday(openDate){const jalali=U.getJalaliMonth();const parts=openDate.split('/');if(parts.length!==3)return false;return parseInt(parts[1])===jalali.month&&parseInt(parts[2])===jalali.day;}

search(inputId,tableSelector,container){
container=container||document;
const input=$(inputId,container);
if(!input)return;
const clearBtn=$(inputId+'_cl',container);
const filter=function(){
const q=input.value.trim().toLowerCase();
const tb=container.querySelector(tableSelector);
if(!tb||!tb.querySelector('tbody'))return;
tb.querySelector('tbody').querySelectorAll('tr').forEach(function(r){
if(!q||r.textContent.trim().toLowerCase().includes(q))r.style.display='';
else r.style.display='none';
});
};
input.oninput=filter;
if(clearBtn)clearBtn.onclick=function(){input.value='';filter();input.focus();};
setTimeout(filter,50);
}
startClock(){
if(this.ci)clearInterval(this.ci);
const tick=()=>{
const n=new Date();
const h=String(n.getHours()).padStart(2,'0');
const m=String(n.getMinutes()).padStart(2,'0');
const s=String(n.getSeconds()).padStart(2,'0');
const cl=$('#clockDisplay');
if(cl)cl.innerHTML=`${h}:${m}<span style="font-size:1rem;opacity:.8">:${s}</span>`;
const inlineClock=$('#inlineClock');
if(inlineClock)inlineClock.textContent=`${h}:${m}:${s}`;
updateAnalogClock();
};
tick();
this.ci=setInterval(tick,1000);
}
doLogout(){this.currentUser=null;this.render();}
saveProfile(mid){
const m=this.dm.members.find(mem=>mem.id===mid);
if(!m)return;
const ui=this.dm.users.find(u=>u.memberId===mid);
const data={

birthDateShamsi:$(`#pf_birthDateShamsi_${mid}`)?$(`#pf_birthDateShamsi_${mid}`).value.trim():'',
phone1:$(`#pf_phone1_${mid}`)?$(`#pf_phone1_${mid}`).value.trim():'',
phone2:$(`#pf_phone2_${mid}`)?$(`#pf_phone2_${mid}`).value.trim():''
};
if(!data.firstName||!data.accountNumber){alert('نام و شماره حساب الزامی هستند');return;}

Object.assign(m,data);
alert('✅ اطلاعات ذخیره شد');
this.render();
}
