<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Vazirmatn',system-ui,-apple-system,sans-serif}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(102,126,234,.5)}50%{box-shadow:0 0 40px rgba(102,126,234,.8)}}
@keyframes clockTick{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes dateSlide{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes coinBounce{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-5px) rotate(-5deg)}75%{transform:translateY(-5px) rotate(5deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes progressAnim{0%{width:0%}50%{width:100%}100%{width:0%}}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);min-height:100vh;padding:20px;transition:all .5s ease;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800"><defs><radialGradient id="g1"><stop offset="0%" stop-color="%23ffffff" stop-opacity="0.05"/><stop offset="100%" stop-color="%23ffffff" stop-opacity="0"/></radialGradient></defs><circle cx="200" cy="150" r="300" fill="url(%23g1)"/><circle cx="1000" cy="600" r="400" fill="url(%23g1)"/></svg>');pointer-events:none;z-index:0}
.container{max-width:1600px;margin:0 auto;position:relative;z-index:1}
.login-page,.app-page,.force-change-page{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-radius:32px;padding:40px;box-shadow:0 25px 50px rgba(0,0,0,.25);animation:fadeIn .6s ease;border:1px solid rgba(255,255,255,.3)}
.hidden{display:none!important}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:16px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,.3);transform:translate(-50%,-50%);transition:width .6s,height .6s}
.btn:hover::before{width:300px;height:300px}
.btn:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(102,126,234,.4)}
.btn:active{transform:translateY(-1px)}
.btn-small{width:auto;padding:8px 16px;font-size:.85rem;border-radius:20px;border:none;cursor:pointer;transition:all .3s ease;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.btn-small:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,0,0,.2)}
.success-btn{background:linear-gradient(135deg,#48bb78,#38a169);color:#fff}
.danger-btn{background:linear-gradient(135deg,#f56565,#e53e3e);color:#fff}
.edit-btn{background:linear-gradient(135deg,#ed8936,#dd6b20);color:#fff}
.info-btn{background:linear-gradient(135deg,#4299e1,#3182ce);color:#fff}
.purple-btn{background:linear-gradient(135deg,#805ad5,#6b46c1);color:#fff}
.app-layout{display:flex;gap:25px;margin-top:25px;animation:fadeIn .8s ease}
.vertical-menu{width:240px;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-radius:24px;padding:25px 15px;flex-shrink:0;box-shadow:0 10px 30px rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.3);animation:slideIn .6s ease}
.vertical-menu .menu-item{display:flex;align-items:center;gap:12px;padding:14px 18px;margin:6px 0;border-radius:16px;color:#4a5568;font-weight:600;cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden}
.vertical-menu .menu-item::before{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;background:linear-gradient(135deg,#667eea,#764ba2);transform:scaleY(0);transition:transform .3s ease}
.vertical-menu .menu-item:hover{background:rgba(102,126,234,.1);transform:translateX(-5px)}
.vertical-menu .menu-item:hover::before{transform:scaleY(1)}
.vertical-menu .menu-item.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 5px 15px rgba(102,126,234,.4)}
.vertical-menu .menu-item.active::before{background:#fff}
.content-area{flex:1;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-radius:24px;padding:30px;min-height:600px;overflow-y:auto;box-shadow:0 10px 30px rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.3);animation:fadeIn .8s ease}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:.9rem}
th,td{padding:12px 15px;text-align:right;border-bottom:1px solid rgba(226,232,240,.5)}
th{background:linear-gradient(135deg,#2d3748,#1a202c);font-weight:700;color:#fff;position:sticky;top:0;z-index:10;box-shadow:0 2px 10px rgba(0,0,0,.1)}
tbody tr{transition:all .3s ease}
tbody tr:hover{background:rgba(102,126,234,.05);transform:scale(1.01)}
.input-group{margin-bottom:25px;position:relative}
.input-group label{display:block;margin-bottom:8px;font-weight:600;color:#4a5568}
.input-group input{width:100%;padding:14px 50px 14px 14px;border:2px solid #e2e8f0;border-radius:16px;font-size:1rem;transition:all .3s ease;background:rgba(255,255,255,.8)}
.input-group input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 4px rgba(102,126,234,.1);background:#fff}
.toggle-password{position:absolute;left:14px;bottom:14px;background:none;border:none;cursor:pointer;font-size:1.3rem;color:#667eea;transition:transform .3s ease}
.toggle-password:hover{transform:scale(1.2)}
.error-msg{color:#e53e3e;text-align:center;margin-top:20px;padding:12px;background:rgba(229,62,62,.1);border-radius:12px;border-right:4px solid #e53e3e;animation:fadeIn .3s ease}
.success-msg{color:#38a169;text-align:center;margin-top:20px;padding:12px;background:rgba(56,161,105,.1);border-radius:12px;border-right:4px solid #38a169;animation:fadeIn .3s ease}
.info-box{background:linear-gradient(135deg,rgba(66,153,225,.1),rgba(66,153,225,.05));border-right:5px solid #4299e1;padding:16px 20px;margin-bottom:25px;border-radius:16px;font-weight:600;display:flex;align-items:center;gap:10px;animation:fadeIn .5s ease}
.dashboard-section{background:linear-gradient(135deg,rgba(247,250,252,.8),rgba(237,242,247,.8));border-radius:20px;padding:25px;margin-bottom:25px;border-right:5px solid #667eea;box-shadow:0 5px 15px rgba(0,0,0,.08);transition:all .3s ease;animation:fadeIn .6s ease}

.dashboard-section h3{color:#2d3748;margin-bottom:15px;display:flex;align-items:center;gap:10px;font-size:1.2rem}
.filter-bar{display:flex;gap:12px;margin-bottom:25px;flex-wrap:wrap;align-items:center;background:rgba(247,250,252,.8);padding:15px;border-radius:16px}
.filter-bar input{flex:1;padding:10px 15px;border:2px solid #e2e8f0;border-radius:12px;min-width:200px;transition:all .3s ease}
.filter-bar input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
.msg-item{background:linear-gradient(135deg,#fff,rgba(255,255,255,.9));border-radius:12px;padding:12px 15px;margin-bottom:10px;box-shadow:0 2px 6px rgba(0,0,0,.06);transition:all .3s ease;animation:fadeIn .5s ease}
.msg-item:hover{transform:translateX(-3px);box-shadow:0 3px 10px rgba(0,0,0,.1)}
.msg-item.msg-admin{border-right:4px solid #48bb78;background:linear-gradient(135deg,rgba(72,187,120,.06),rgba(255,255,255,.95))}
.msg-item.msg-to-admin{border-right:4px solid #4299e1;background:linear-gradient(135deg,rgba(66,153,225,.05),rgba(255,255,255,.95))}
.msg-item.msg-member{border-right:4px solid #ed8936;background:linear-gradient(135deg,rgba(237,137,54,.06),rgba(255,255,255,.95))}
.msg-item.msg-reply{border-right:4px solid #9f7aea;background:linear-gradient(135deg,rgba(159,122,234,.06),rgba(255,255,255,.95))}
.msg-item.msg-coin-request{border-right:4px solid #d69e2e;background:linear-gradient(135deg,rgba(214,158,46,.08),rgba(255,255,255,.95))}
.msg-header{display:flex;justify-content:space-between;font-size:.8rem;color:#718096;margin-bottom:6px;font-weight:600}
.msg-phone-info{font-size:.75rem;color:#4a5568;margin:6px 0;padding:8px 10px;background:rgba(102,126,234,.06);border-radius:8px;display:flex;flex-wrap:wrap;gap:10px;border:1px dashed rgba(102,126,234,.25)}
.msg-phone-info div{display:flex;align-items:center;gap:5px}
.msg-sender-badge{display:inline-block;font-size:.7rem;padding:3px 8px;border-radius:10px;font-weight:700;margin-bottom:5px}
.msg-sender-badge.badge-admin{background:linear-gradient(135deg,#48bb78,#38a169);color:#fff}
.msg-sender-badge.badge-council{background:linear-gradient(135deg,#38b2ac,#319795);color:#fff}
.msg-sender-badge.badge-supervisor{background:linear-gradient(135deg,#ed8936,#dd6b20);color:#fff}
.msg-sender-badge.badge-coin{background:linear-gradient(135deg,#ecc94b,#d69e2e);color:#fff}
.messenger-section-title{display:flex;align-items:center;gap:10px;font-size:1.1rem;font-weight:700;color:#2d3748;margin:15px 0 12px;padding:10px 15px;background:linear-gradient(135deg,rgba(102,126,234,.08),rgba(118,75,162,.05));border-radius:12px;border-right:4px solid #667eea}
.messenger-section-title.title-to-admin{border-right-color:#4299e1;color:#2b6cb0}
.messenger-section-title.title-to-member{border-right-color:#ed8936;color:#c05621}
.messenger-section-title.title-coin-requests{border-right-color:#d69e2e;color:#975a16}
.public-messages-section{margin-bottom:15px;padding:12px 15px !important}
.public-messages-section h3{color:#2f855a;margin-bottom:8px !important;font-size:1rem !important;display:flex;align-items:center;gap:8px}
.public-messages-section .msg-item{padding:8px 12px !important;margin-bottom:6px !important;border-radius:10px !important}
.public-messages-section .msg-item .msg-sender-badge{font-size:.65rem;padding:2px 7px;margin-bottom:3px}
.public-messages-section .msg-item div[style*="line-height"]{font-size:.85rem !important;line-height:1.4 !important;margin-top:4px !important}
.public-messages-section .msg-item div[style*="font-size:.78rem"],
.public-messages-section .msg-item div[style*="font-size:.75rem"]{font-size:.72rem !important;padding:4px 8px !important;margin:2px 0 !important}
.poll-item{background:linear-gradient(135deg,#fff,rgba(255,255,255,.9));border-radius:16px;padding:20px;margin-bottom:15px;border-right:4px solid #667eea;box-shadow:0 3px 10px rgba(0,0,0,.08);transition:all .3s ease}
.poll-item:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.12)}
.poll-options{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px}
.option-btn{padding:8px 18px;border:2px solid #e2e8f0;border-radius:24px;background:#fff;cursor:pointer;transition:all .3s ease;font-weight:600}
.option-btn:hover:not(:disabled){border-color:#667eea;background:rgba(102,126,234,.1);transform:translateY(-2px)}
.option-btn:disabled{cursor:not-allowed;opacity:.7}
.header-bar{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;padding:20px 30px;border-radius:24px;margin-bottom:25px;background:linear-gradient(135deg,rgba(255,255,255,.9),rgba(255,255,255,.7));backdrop-filter:blur(15px);box-shadow:0 8px 25px rgba(0,0,0,.1)}
.datetime-display{display:flex;gap:15px;align-items:center;flex-wrap:wrap}
.datetime-card{display:flex;align-items:center;gap:12px;padding:12px 20px;border-radius:16px;background:linear-gradient(135deg,rgba(102,126,234,.1),rgba(118,75,162,.05));border:2px solid rgba(102,126,234,.2);transition:all .3s ease;animation:dateSlide .6s ease}
.datetime-card:hover{transform:translateY(-3px);box-shadow:0 5px 15px rgba(102,126,234,.2);border-color:rgba(102,126,234,.4)}
.datetime-card i{font-size:1.5rem;color:#667eea}
.datetime-card .dt-label{font-size:.75rem;color:#718096;font-weight:600}
.datetime-card .dt-value{font-size:1.1rem;font-weight:700;color:#2d3748;font-family:'Vazirmatn',monospace}
.clock-card{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:15px 25px;border-radius:20px;display:flex;align-items:center;gap:15px;box-shadow:0 5px 20px rgba(102,126,234,.3);animation:glow 3s ease-in-out infinite}
.clock-card i{font-size:1.8rem;animation:spin 10s linear infinite}
.clock-card .clock-time{font-size:1.5rem;font-weight:700;font-family:'Courier New',monospace;letter-spacing:2px;text-shadow:0 2px 4px rgba(0,0,0,.2)}
.clock-card .clock-seconds{font-size:1rem;opacity:.8;animation:clockTick 1s ease-in-out infinite}
.header-actions{display:flex;gap:15px;align-items:center}
.coin-badge{display:flex;align-items:center;gap:8px;padding:10px 18px;background:linear-gradient(135deg,#ecc94b,#d69e2e);color:#fff;border-radius:20px;font-weight:700;font-size:1rem;box-shadow:0 4px 12px rgba(236,201,75,.4);transition:all .3s ease;cursor:default}
.coin-badge:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(236,201,75,.5)}
.coin-badge i{font-size:1.3rem;animation:coinBounce 2s ease-in-out infinite}
.notification-bell{position:relative;font-size:1.8rem;cursor:pointer;background:none;border:none;color:#667eea;transition:transform .3s ease}
.notification-bell:hover{transform:scale(1.2) rotate(15deg)}
.badge{position:absolute;top:-8px;right:-10px;background:linear-gradient(135deg,#f56565,#e53e3e);color:#fff;border-radius:50%;font-size:.7rem;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 2px 8px rgba(229,62,62,.4);animation:pulse 2s infinite}
.notification-dropdown{position:absolute;top:60px;right:0;background:rgba(255,255,255,.98);backdrop-filter:blur(20px);border-radius:20px;box-shadow:0 15px 50px rgba(0,0,0,.2);padding:15px 0;min-width:320px;max-height:400px;overflow-y:auto;z-index:1000;display:none;animation:fadeIn .3s ease;border:1px solid rgba(226,232,240,.5)}
.notification-dropdown.show{display:block}
.wheel{width:220px;height:220px;border-radius:50%;border:8px solid #667eea;margin:0 auto 25px;position:relative;overflow:hidden;background:conic-gradient(#f56565 0deg 60deg,#ed8936 60deg 120deg,#ecc94b 120deg 180deg,#48bb78 180deg 240deg,#4299e1 240deg 300deg,#9f7aea 300deg 360deg);transition:transform 4s cubic-bezier(.17,.67,.12,.99);box-shadow:0 10px 30px rgba(102,126,234,.3)}
.wheel .pointer{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:2.5rem;color:#e53e3e;filter:drop-shadow(0 3px 6px rgba(0,0,0,.3));z-index:10}
.wheel .center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#667eea;box-shadow:0 5px 15px rgba(0,0,0,.2);font-size:1.2rem}
.sms-status-grid{display:flex;flex-direction:column;gap:12px}
.sms-status-item{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#fff,rgba(255,255,255,.9));border-radius:16px;padding:15px 20px;border-right:5px solid #667eea;box-shadow:0 3px 10px rgba(0,0,0,.08);transition:all .3s ease}
.sms-status-item:hover{transform:translateX(-5px);box-shadow:0 5px 15px rgba(0,0,0,.12)}
.status-active{background:linear-gradient(135deg,#c6f6d5,#9ae6b4);color:#22543d;padding:6px 18px;border-radius:24px;font-weight:700;box-shadow:0 2px 8px rgba(72,187,120,.3)}
.status-inactive{background:linear-gradient(135deg,#fed7d7,#feb2b2);color:#9b2c2c;padding:6px 18px;border-radius:24px;font-weight:700;box-shadow:0 2px 8px rgba(229,62,62,.3)}
.search-box{margin-bottom:20px;display:flex;gap:12px;align-items:center;background:linear-gradient(135deg,rgba(247,250,252,.8),rgba(237,242,247,.8));padding:12px 18px;border-radius:16px;border:2px solid rgba(226,232,240,.5);transition:all .3s ease}
.search-box:focus-within{border-color:#667eea;box-shadow:0 0 0 4px rgba(102,126,234,.1)}

.search-box .search-label{font-weight:700;color:#4a5568;font-size:.9rem;white-space:nowrap;display:flex;align-items:center;gap:8px}
.clear-search{background:none;border:none;color:#a0aec0;cursor:pointer;font-size:1.3rem;padding:0 8px;transition:all .3s ease}
.clear-search:hover{color:#e53e3e;transform:scale(1.2)}
.table-wrapper{overflow-x:auto;max-height:600px;overflow-y:auto;border:2px solid rgba(226,232,240,.5);border-radius:16px;background:#fff;box-shadow:0 5px 15px rgba(0,0,0,.08)}
.excel-header{background:linear-gradient(135deg,#2d3748,#1a202c)!important;color:#fff!important}
.excel-header th{padding:14px 16px;font-weight:700;white-space:nowrap}
.delete-all-btn{background:linear-gradient(135deg,#f56565,#e53e3e);color:#fff;padding:12px 24px;border:none;border-radius:24px;cursor:pointer;font-weight:700;transition:all .3s ease;box-shadow:0 5px 15px rgba(229,62,62,.3)}
.delete-all-btn:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(229,62,62,.4)}
.password-dots{font-family:monospace;font-size:1.2rem;letter-spacing:3px;cursor:pointer;background:linear-gradient(135deg,#edf2f7,#e2e8f0);padding:6px 12px;border-radius:12px;transition:all .3s ease}

.warning-box{background:linear-gradient(135deg,#fff5f5,#fed7d7);border:2px solid #feb2b2;border-radius:16px;padding:18px 20px;color:#c53030;display:flex;align-items:center;gap:12px;margin-top:15px;animation:fadeIn .5s ease;box-shadow:0 3px 10px rgba(229,62,62,.15)}
.warning-box i{font-size:1.8rem;animation:pulse 2s infinite}
.warning-box strong{display:block;font-size:1.05rem;margin-bottom:5px}
.loan-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}

.loan-info-label{font-size:.8rem;color:#718096;font-weight:600;margin-bottom:5px}

.logo-preview{width:100px;height:100px;border-radius:50%;object-fit:cover;margin:15px auto;display:block;box-shadow:0 5px 15px rgba(0,0,0,.15)}

.coin-shop-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;margin-top:15px}

applyCoinRules(m){

startClock(){if(this.ci)clearInterval(this.ci);const tick=()=>{const n=new Date(),h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');const cl=$('#clockDisplay');if(cl)cl.innerHTML=`${h}:${m}<span class="clock-seconds">:${s}</span>`;const pd=$('#persianDate');if(pd)pd.textContent=U.toJalali(n);const gd=$('#gregorianDate');if(gd)gd.textContent=`${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')}`;};tick();this.ci=setInterval(tick,1000);}

if(!badge)return;
const dm=this.app.dm,cm=dm.gMember(this.app.auth.user?.memberId),cp=cm?.phone1||'',uid=this.app.auth.user?.id;

if(this.app.auth.isLoggedIn()){

if(ia){
n += dm.getPendingRequestsCount();
}
}else{

}
n += rel.length;
}
if(n){badge.classList.remove('hidden');badge.textContent=n>9?'9+':n;}else badge.classList.add('hidden');
}
}
class App{

async init(){

this.ui.render();
if(this.ui.themeInterval) clearInterval(this.ui.themeInterval);
this.ui.themeInterval = setInterval(()=>{
const currentTheme = localStorage.getItem('theme');
if(currentTheme === 'auto'){
this.setTheme('auto');
}
}, 60000);
}
loadTheme(){this.setTheme(localStorage.getItem('theme')||'auto');}
setTheme(t){
document.body.classList.remove('theme-day','theme-night');
let effectiveTheme = t;
if(t === 'auto'){
const hour = new Date().getHours();
effectiveTheme = (hour >= 6 && hour < 18) ? 'day' : 'night';
}
if(effectiveTheme==='day')document.body.classList.add('theme-day');
else if(effectiveTheme==='night')document.body.classList.add('theme-night');
localStorage.setItem('theme',t);
$$('.theme-btn').forEach(b=>b.classList.remove('active'));
$(`.theme-btn[data-theme="${t}"]`)?.classList.add('active');
}

buyReward(rewardId){
const reward = this.dm.coinRewards.find(r=>r.id===rewardId);
if(!reward){alert('جایزه یافت نشد');return;}
const m = this.dm.gMember(this.auth.user.memberId);
if(!m){alert('اطلاعات یافت نشد');return;}
if((m.coins||0) < reward.cost){
alert(`❌ سکه کافی نیست. شما ${m.coins||0} سکه دارید ولی ${reward.cost} سکه نیاز است.`);
return;
}
if(reward.type === 'username_edit' && m.usernameEditUnlocked){
alert('شما قبلاً امکان ویرایش نام کاربری را فعال کرده‌اید');
return;
}
const confirmMsg = `آیا مطمئن هستید که می‌خواهید ${U.fmtNum(reward.cost)} سکه برای "${reward.title}" پرداخت کنید؟\n\nپس از تأیید، درخواست شما برای مدیر ارسال می‌شود.`;
if(!confirm(confirmMsg)) return;
const spendResult = this.dm.spendCoin(m.id, reward.cost, 'خرید جایزه: '+reward.title, reward.description||'');
if(!spendResult.s){
alert('❌ '+spendResult.m);
return;
}
m.usedCoins = (m.usedCoins||0) + reward.cost;
this.dm.sv('members');
const details = {};
if(reward.type === 'username_edit'){
details['وضعیت فعلی'] = 'قفل';
details['وضعیت پس از تأیید'] = 'قابل ویرایش برای همیشه';
} else if(reward.type === 'loan_no_fee'){
details['نوع وام'] = 'وام بدون کارمزد';
} else if(reward.type === 'loan_priority'){
details['نوع وام'] = 'وام خارج از نوبت (اولویت‌دار)';
}
this.dm.addCoinRequest({
memberId: m.id,
memberName: `${m.firstName||''} ${m.lastName||''}`,
memberPhone: m.phone1||'',
memberAccount: m.accountNumber||'',
rewardId: reward.id,
rewardTitle: reward.title,
rewardType: reward.type,
rewardDescription: reward.description||'',
cost: reward.cost,
details: details
});
alert(`✅ درخواست شما با موفقیت ثبت شد.\n${U.fmtNum(reward.cost)} سکه از حساب شما کسر شد.\nمدیر به زودی درخواست شما را بررسی خواهد کرد.`);
this.ui.updCoinBadge();
this.ui.switchTab('coins');
}
approveCoinRequest(reqId){
const req = this.dm.coinRequests.find(r=>r.id===reqId);
if(!req){alert('درخواست یافت نشد');return;}
const note = prompt('یادداشت مدیر (اختیاری):','') || '';
this.dm.updateRequestStatus(reqId, 'approved', note);
const member = this.dm.gMember(req.memberId);
if(member){
if(req.rewardType === 'username_edit'){
member.usernameEditUnlocked = true;
this.dm.sv('members');
}

if(!member.coinBenefits) member.coinBenefits = {};
member.coinBenefits.loanNoFee = (member.coinBenefits.loanNoFee||0) + 1;

}

if(!member.coinBenefits) member.coinBenefits = {};
member.coinBenefits.loanPriority = (member.coinBenefits.loanPriority||0) + 1;
this.dm.sv('members');
}
}

try{
