<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>سیستم حسابداری صندوق اتحاد</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
<style>
:root{--bg-gradient:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);--card-bg:rgba(255,255,255,.95);--text-primary:#2d3748;--text-secondary:#4a5568;--text-muted:#718096;--text-light:#a0aec0;--border-color:rgba(226,232,240,.5);--input-bg:#fff;--input-border:#e2e8f0;--hover-bg:rgba(102,126,234,.05);--section-bg:linear-gradient(135deg,rgba(247,250,252,.8),rgba(237,242,247,.8));--info-bg:linear-gradient(135deg,rgba(66,153,225,.1),rgba(66,153,225,.05));--shadow:0 25px 50px rgba(0,0,0,.25);--welcome-text:#667eea;--menu-text:#4a5568;--menu-hover:rgba(102,126,234,.1);--table-header:linear-gradient(135deg,#2d3748,#1a202c);--table-text:#2d3748;--table-hover:rgba(102,126,234,.05);--keyboard-border:#ecc94b;--header-gradient:linear-gradient(135deg,rgba(102,126,234,.15),rgba(118,75,162,.1));--clock-bg:#e8f4f8;--clock-bg2:#d0e8f0;--clock-border:#00d4ff;--clock-tick:#88ccff;--clock-tick-major:#00d4ff;--clock-number:#2d3748;--clock-hand-hour:#2d3748;--clock-hand-minute:#00d4ff;--clock-center:#00ff41}
[data-theme="dark"]{--bg-gradient:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);--card-bg:rgba(26,26,46,.95);--text-primary:#fbbf24;--text-secondary:#f59e0b;--text-muted:#d97706;--text-light:#b45309;--border-color:rgba(251,191,36,.2);--input-bg:#1e1e3f;--input-border:#fbbf24;--hover-bg:rgba(251,191,36,.1);--section-bg:linear-gradient(135deg,rgba(30,30,63,.8),rgba(26,26,46,.8));--info-bg:linear-gradient(135deg,rgba(251,191,36,.15),rgba(245,158,11,.1));--shadow:0 25px 50px rgba(0,0,0,.5);--welcome-text:#fbbf24;--menu-text:#fbbf24;--menu-hover:rgba(251,191,36,.15);--table-header:linear-gradient(135deg,#1e1e3f,#16213e);--table-text:#fbbf24;--table-hover:rgba(251,191,36,.1);--keyboard-border:#fbbf24;--header-gradient:linear-gradient(135deg,rgba(251,191,36,.15),rgba(245,158,11,.08));--clock-bg:#1e4876;--clock-bg2:#0a1520;--clock-border:#00d4ff;--clock-tick:#88ccff;--clock-tick-major:#00d4ff;--clock-number:#ffffff;--clock-hand-hour:#ffffff;--clock-hand-minute:#00d4ff;--clock-center:#00ff41}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Vazirmatn',Tahoma,system-ui,sans-serif}
body{background:var(--bg-gradient);min-height:100vh;padding:20px;transition:background .3s ease;color:var(--text-primary)}
.container{max-width:1600px;margin:0 auto}
.login-page,.app-page{background:var(--card-bg);border-radius:32px;padding:40px;box-shadow:var(--shadow);transition:all .3s ease}
.hidden{display:none!important}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:16px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s}
[data-theme="dark"] .btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(0,0,0,.2)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-small{padding:8px 16px;font-size:.85rem;border-radius:20px;border:none;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .3s}
.btn-small:hover{transform:translateY(-1px)}
.success-btn{background:linear-gradient(135deg,#48bb78,#38a169);color:#fff}
.danger-btn{background:linear-gradient(135deg,#f56565,#e53e3e);color:#fff}
.edit-btn{background:linear-gradient(135deg,#ed8936,#dd6b20);color:#fff}
.info-btn{background:linear-gradient(135deg,#4299e1,#3182ce);color:#fff}
.biometric-btn{background:linear-gradient(135deg,#9f7aea,#805ad5);color:#fff;font-size:1rem;padding:14px 20px;margin-bottom:20px}
[data-theme="dark"] .success-btn,[data-theme="dark"] .info-btn{background:linear-gradient(135deg,#fbbf24,#d97706);color:#1a1a2e}
[data-theme="dark"] .biometric-btn{background:linear-gradient(135deg,#fbbf24,#d97706);color:#1a1a2e}
.app-layout{display:flex;gap:25px;margin-top:25px}
.vertical-menu{width:240px;background:var(--card-bg);border-radius:24px;padding:25px 15px;flex-shrink:0;max-height:calc(100vh - 200px);overflow-y:auto;transition:all .3s}
.vertical-menu .menu-item{display:flex;align-items:center;gap:12px;padding:14px 18px;margin:6px 0;border-radius:16px;color:var(--menu-text);font-weight:600;cursor:pointer;transition:all .2s}
.vertical-menu .menu-item:hover{background:var(--menu-hover)}
.vertical-menu .menu-item.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
[data-theme="dark"] .vertical-menu .menu-item.active{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e}
.admin-badge{background:rgba(255,255,255,.25);padding:2px 8px;border-radius:8px;font-size:.7rem;margin-right:auto;font-weight:700}
[data-theme="dark"] .admin-badge{background:rgba(26,26,46,.4);color:#fbbf24}
.council-badge{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1a1a2e;padding:2px 8px;border-radius:8px;font-size:.7rem;margin-right:auto;font-weight:700}
.content-area{flex:1;background:var(--card-bg);border-radius:24px;padding:30px;min-height:600px;overflow-y:auto;transition:all .3s}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:.9rem}
th,td{padding:12px 15px;text-align:right;border-bottom:1px solid var(--border-color);color:var(--table-text)}
th{background:var(--table-header);font-weight:700;color:#fff;position:sticky;top:0;z-index:10}
tbody tr:hover{background:var(--table-hover)}
.input-group{margin-bottom:25px;position:relative}
.input-group label{display:block;margin-bottom:8px;font-weight:600;color:var(--text-secondary)}
.input-group input,.input-group select,.input-group textarea{width:100%;padding:14px;border:2px solid var(--input-border);border-radius:16px;font-size:1rem;background:var(--input-bg);color:var(--text-primary);transition:all .3s}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
[data-theme="dark"] .input-group input:focus,[data-theme="dark"] .input-group select:focus,[data-theme="dark"] .input-group textarea:focus{border-color:#fbbf24;box-shadow:0 0 0 3px rgba(251,191,36,.2)}
.toggle-password{position:absolute;left:14px;top:42px;background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--text-muted)}
.error-msg{color:#e53e3e;text-align:center;margin-top:20px;padding:12px;background:rgba(229,62,62,.1);border-radius:12px}
.info-box{background:var(--info-bg);border-right:5px solid #4299e1;padding:16px 20px;margin-bottom:25px;border-radius:16px;font-weight:600;display:flex;align-items:center;gap:10px;color:var(--text-primary)}
[data-theme="dark"] .info-box{border-right-color:#fbbf24}
.dashboard-section{background:var(--section-bg);border-radius:20px;padding:25px;margin-bottom:25px;border-right:5px solid #667eea;color:var(--text-primary)}
[data-theme="dark"] .dashboard-section{border-right-color:#fbbf24}
.dashboard-section h3{color:var(--text-primary);margin-bottom:15px;display:flex;align-items:center;gap:10px}
.filter-bar,.shop-filter-bar{display:flex;gap:12px;margin-bottom:25px;flex-wrap:wrap;background:var(--section-bg);padding:15px;border-radius:16px}
.filter-bar input,.filter-bar select,.shop-filter-bar input,.shop-filter-bar select{padding:10px 15px;border:2px solid var(--input-border);border-radius:12px;background:var(--input-bg);color:var(--text-primary)}
.filter-bar input,.shop-filter-bar input{flex:1}
.header-bar{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;padding:20px 30px;border-radius:24px;margin-bottom:25px;background:var(--header-gradient);border:2px solid rgba(102,126,234,.2)}
[data-theme="dark"] .header-bar{border-color:rgba(251,191,36,.2)}
.datetime-display{display:flex;gap:15px;flex-wrap:wrap;align-items:center}
.date-combined-box{background:var(--info-bg);border-radius:16px;padding:15px 20px;display:flex;flex-direction:column;gap:8px;min-width:200px}
.date-combined-box .date-row{display:flex;align-items:center;gap:10px;font-size:.95rem;color:var(--text-primary)}
.date-combined-box .date-row i{color:#667eea;width:20px}
[data-theme="dark"] .date-combined-box .date-row i{color:#fbbf24}
.date-combined-box .date-row.day-name{font-weight:700;font-size:1rem;color:#667eea;border-top:1px dashed var(--border-color);padding-top:8px;margin-top:4px}
[data-theme="dark"] .date-combined-box .date-row.day-name{color:#fbbf24}
.analog-clock-container{display:flex;align-items:center;gap:20px}
.analog-clock{width:110px;height:110px;position:relative;border-radius:50%;overflow:visible}
.analog-clock svg{width:100%;height:100%;filter:drop-shadow(0 0 10px rgba(0,212,255,.3))}
[data-theme="dark"] .analog-clock svg{filter:drop-shadow(0 0 10px rgba(0,212,255,.5))}
.system-message-box{background:linear-gradient(135deg,rgba(236,201,75,.15),rgba(214,158,46,.08));border:2px solid #ecc94b;border-radius:14px;padding:14px 20px;font-size:.92rem;color:var(--text-primary);line-height:1.7;margin-top:15px;margin-bottom:20px;display:flex;align-items:flex-start;gap:12px}
[data-theme="dark"] .system-message-box{border-color:#fbbf24}
.system-message-box .message-icon{color:#ecc94b;font-size:1.3rem;flex-shrink:0;margin-top:2px}
[data-theme="dark"] .system-message-box .message-icon{color:#fbbf24}
.system-message-box .message-text{flex:1;font-weight:600}
.welcome-with-greeting{display:flex;align-items:center;gap:15px;flex-wrap:wrap}
.welcome-with-greeting .welcome-text{font-size:1.3rem;font-weight:700;color:var(--welcome-text);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.welcome-with-greeting .greeting-text{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:6px 14px;border-radius:10px;font-size:.85rem;font-weight:600}
[data-theme="dark"] .welcome-with-greeting .greeting-text{background:linear-gradient(135deg,#f59e0b,#d97706);color:#1a1a2e}
.welcome-with-greeting .household-code{background:rgba(159,122,234,.15);color:#805ad5;padding:5px 12px;border-radius:10px;font-size:.85rem;font-weight:600;border:1px solid rgba(159,122,234,.3)}
[data-theme="dark"] .welcome-with-greeting .household-code{background:rgba(251,191,36,.15);color:#fbbf24;border-color:rgba(251,191,36,.3)}
.header-actions{display:flex;gap:15px;align-items:center;flex-wrap:wrap}
.coin-badge{display:flex;align-items:center;gap:8px;padding:10px 18px;background:linear-gradient(135deg,#ecc94b,#d69e2e);color:#fff;border-radius:20px;font-weight:700}
.search-box{margin-bottom:20px;display:flex;gap:12px;align-items:center;background:var(--section-bg);padding:12px 18px;border-radius:16px}
.search-box input{flex:1;padding:10px 15px;border:2px solid var(--input-border);border-radius:12px;background:var(--input-bg);color:var(--text-primary)}
.table-wrapper{overflow-x:auto;max-height:600px;overflow-y:auto;border:2px solid var(--border-color);border-radius:16px;background:var(--input-bg);-webkit-overflow-scrolling:touch}
/* جدول صورتحساب کامل - همیشه ستونی حتی در موبایل */
.table-wrapper.statement-table{overflow-x:auto;overflow-y:auto}
.table-wrapper.statement-table table{min-width:1200px}
.warning-box{background:#fff5f5;border:2px solid #feb2b2;border-radius:16px;padding:18px 20px;color:#c53030;display:flex;align-items:center;gap:12px;margin-top:15px}
.warning-box.inactive{background:var(--info-bg);border-color:#e53e3e}
.warning-box.savings{background:#fffff0;border-color:#d69e2e;color:#975a16}
[data-theme="dark"] .warning-box.savings{background:rgba(251,191,36,.1);color:#fbbf24;border-color:#fbbf24}
.warning-box.loan{background:var(--info-bg);border-color:#e53e3e;color:var(--text-primary)}
.warning-box.loan-critical{background:#fed7d7;border-color:#c53030;color:#742a2a}
[data-theme="dark"] .warning-box.loan-critical{background:rgba(239,68,68,.15);color:#fca5a5;border-color:#ef4444}
.profile-info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:10px}
.profile-info-item{display:flex;align-items:center;gap:12px;background:var(--input-bg);padding:14px 16px;border-radius:14px;border:2px solid var(--input-border);position:relative;overflow:hidden}
.profile-info-item::before{content:'';position:absolute;top:0;right:0;width:4px;height:100%;background:linear-gradient(180deg,#667eea,#764ba2);border-radius:0 0 0 4px}
.profile-info-item i{font-size:1.4rem;color:#667eea;width:30px;text-align:center}
[data-theme="dark"] .profile-info-item i{color:#fbbf24}
.profile-info-item .info-content{flex:1}
.profile-info-item .info-label{font-weight:600;color:var(--text-muted);font-size:.8rem;margin-bottom:3px}
.profile-info-item .info-value{font-weight:700;color:var(--text-primary);font-size:1rem}
.last-tx-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.last-tx-item{background:var(--input-bg);padding:14px 16px;border-radius:12px;border:2px solid var(--input-border)}
.last-tx-label{font-size:.82rem;color:var(--text-muted);margin-bottom:5px;display:flex;align-items:center;gap:6px;font-weight:600}
.last-tx-label i{color:#38b2ac}
.last-tx-value{font-size:1rem;font-weight:700;color:var(--text-primary);word-break:break-word}
.loan-info{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:10px}
.loan-info-item{background:var(--input-bg);padding:16px;border-radius:14px;border:2px solid var(--input-border);display:flex;flex-direction:column;gap:8px}
.loan-info-label{font-size:.82rem;color:var(--text-muted);margin-bottom:2px;display:flex;align-items:center;gap:8px;font-weight:600}
.loan-info-label i{color:#9f7aea;font-size:.9rem}
.loan-info-value{font-size:1.08rem;font-weight:700;color:var(--text-primary);word-break:break-word}
.coming-soon-box{background:var(--info-bg);border:2px dashed #667eea;border-radius:24px;padding:60px 40px;text-align:center;margin:40px auto;max-width:500px}
[data-theme="dark"] .coming-soon-box{border-color:#fbbf24}
.coming-soon-box i{font-size:5rem;color:#667eea;margin-bottom:20px}
[data-theme="dark"] .coming-soon-box i{color:#fbbf24}
.coming-soon-box h2{color:var(--text-primary);margin-bottom:15px;font-size:1.8rem}
.coming-soon-box p{color:var(--text-muted);font-size:1.1rem;line-height:1.8}
.calendar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px}
.calendar-event{background:var(--input-bg);border-radius:14px;padding:15px;border-right:4px solid #667eea}
[data-theme="dark"] .calendar-event{border-right-color:#fbbf24}
.calendar-event.birthday{border-right-color:#ecc94b}
.calendar-event.installment{border-right-color:#48bb78}
[data-theme="dark"] .calendar-event.installment{border-right-color:#fbbf24}
.calendar-event .event-date{font-size:.85rem;color:var(--text-muted);margin-bottom:8px}
.calendar-event .event-title{font-weight:700;color:var(--text-primary);margin-bottom:5px}
.calendar-event .event-desc{font-size:.9rem;color:var(--text-secondary)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:25px}
.stat-card{background:var(--input-bg);border-radius:16px;padding:20px;border:2px solid var(--input-border);text-align:center}
.stat-card .stat-icon{font-size:2rem;margin-bottom:10px}
.stat-card .stat-value{font-size:1.8rem;font-weight:700;color:var(--text-primary)}
.stat-card .stat-label{font-size:.85rem;color:var(--text-muted);margin-top:5px}
.stat-card.blue{border-color:#4299e1}.stat-card.blue .stat-icon{color:#4299e1}
[data-theme="dark"] .stat-card.blue{border-color:#fbbf24}
[data-theme="dark"] .stat-card.blue .stat-icon{color:#fbbf24}
.stat-card.green{border-color:#48bb78}.stat-card.green .stat-icon{color:#48bb78}
[data-theme="dark"] .stat-card.green{border-color:#fbbf24}
[data-theme="dark"] .stat-card.green .stat-icon{color:#fbbf24}
.stat-card.red{border-color:#e53e3e}.stat-card.red .stat-icon{color:#e53e3e}
[data-theme="dark"] .stat-card.red{border-color:#ef4444}
[data-theme="dark"] .stat-card.red .stat-icon{color:#ef4444}
.stat-card.yellow{border-color:#ecc94b}.stat-card.yellow .stat-icon{color:#d69e2e}
[data-theme="dark"] .stat-card.yellow{border-color:#fbbf24}
[data-theme="dark"] .stat-card.yellow .stat-icon{color:#fbbf24}
.stat-card.purple{border-color:#9f7aea}.stat-card.purple .stat-icon{color:#9f7aea}
[data-theme="dark"] .stat-card.purple{border-color:#fbbf24}
[data-theme="dark"] .stat-card.purple .stat-icon{color:#fbbf24}
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:200px;padding:20px;background:var(--input-bg);border-radius:16px;border:2px solid var(--input-border)}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.bar{width:100%;background:linear-gradient(180deg,#667eea,#764ba2);border-radius:8px 8px 0 0;min-height:5px}
[data-theme="dark"] .bar{background:linear-gradient(180deg,#fbbf24,#d97706)}
.bar-label{font-size:.75rem;color:var(--text-muted);text-align:center}
.bar-value{font-size:.8rem;font-weight:700;color:var(--text-primary)}
.help-section{background:var(--input-bg);border-radius:16px;padding:20px;margin-bottom:15px;border:1px solid var(--input-border)}
.help-section h4{color:#667eea;margin-bottom:10px;display:flex;align-items:center;gap:8px}
[data-theme="dark"] .help-section h4{color:#fbbf24}
.help-section p,.help-section li{color:var(--text-secondary);line-height:1.8;font-size:.95rem}
.help-section ul{padding-right:20px}
.support-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
.support-card{background:var(--input-bg);border-radius:16px;padding:20px;border:2px solid var(--input-border);display:flex;align-items:center;gap:15px}
.support-card .support-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;flex-shrink:0}
.support-card .support-icon.phone{background:linear-gradient(135deg,#48bb78,#38a169)}
.support-card .support-icon.account{background:linear-gradient(135deg,#4299e1,#3182ce)}
.support-card .support-icon.card{background:linear-gradient(135deg,#9f7aea,#805ad5)}
.support-card .support-icon.sheba{background:linear-gradient(135deg,#ed8936,#dd6b20)}
.support-card .support-icon.itaa{background:linear-gradient(135deg,#38b2ac,#319795)}
.support-card .support-icon.web{background:linear-gradient(135deg,#f56565,#e53e3e)}
[data-theme="dark"] .support-card .support-icon.phone,[data-theme="dark"] .support-card .support-icon.account,[data-theme="dark"] .support-card .support-icon.card,[data-theme="dark"] .support-card .support-icon.sheba,[data-theme="dark"] .support-card .support-icon.itaa,[data-theme="dark"] .support-card .support-icon.web{background:linear-gradient(135deg,#fbbf24,#d97706);color:#1a1a2e}
.support-card .support-content{flex:1}
.support-card .support-label{font-size:.85rem;color:var(--text-muted);margin-bottom:5px}
.support-card .support-value{font-weight:700;color:var(--text-primary);font-size:1rem;word-break:break-all;direction:ltr;text-align:right}
.support-card .support-value.fa{direction:rtl;text-align:right}
.copy-btn{background:rgba(102,126,234,.1);border:none;color:#667eea;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600;margin-right:10px;display:inline-flex;align-items:center;gap:4px}
[data-theme="dark"] .copy-btn{background:rgba(251,191,36,.2);color:#fbbf24}
.copy-btn.copied{background:rgba(72,187,120,.15);color:#48bb78}
[data-theme="dark"] .copy-btn.copied{background:rgba(251,191,36,.2);color:#fbbf24}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.shop-card{background:var(--input-bg);border-radius:20px;padding:25px;border:2px solid var(--input-border);display:flex;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.shop-card:hover{border-color:#667eea;transform:translateY(-4px)}
[data-theme="dark"] .shop-card:hover{border-color:#fbbf24}
.shop-card.out-of-stock{opacity:.6}
.shop-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:15px}
.shop-card-title{font-size:1.2rem;font-weight:700;color:var(--text-primary);flex:1}
.shop-card-category{background:var(--info-bg);color:#667eea;padding:4px 12px;border-radius:12px;font-size:.75rem;font-weight:600}

getDeviceName(){
const ua=navigator.userAgent;
let device='دستگاه ناشناس';
if(/iPhone/.test(ua))device='iPhone';
else if(/iPad/.test(ua))device='iPad';
else if(/Android/.test(ua)){
const match=ua.match(/Android.*?;\s*([^)]+)/);
device=match?match[1].trim():'Android';
}
else if(/Windows/.test(ua))device='Windows';
else if(/Mac/.test(ua))device='Mac';
else if(/Linux/.test(ua))device='Linux';
let browser='مرورگر';
if(/Chrome/.test(ua)&&!/Edge/.test(ua))browser='Chrome';
else if(/Firefox/.test(ua))browser='Firefox';
else if(/Safari/.test(ua)&&!/Chrome/.test(ua))browser='Safari';
else if(/Edge/.test(ua))browser='Edge';
return `${device} - ${browser}`;
}
};

function calculateMemberScore(member,ddm,allTransactions){
let score=0;
const details={};
const totalInstallments=member.totalInstallments||0;
const paidInstallments=member.paidInstallments||0;
const overdueInstallments=Math.abs(member.overdueInstallments||0);
let installmentScore=0;
if(totalInstallments>0){
installmentScore=(paidInstallments/totalInstallments)*40;
installmentScore=Math.max(0,installmentScore-(overdueInstallments*5));
}else{
installmentScore=40;
}
installmentScore=Math.max(0,Math.min(40,installmentScore));
details.installment={score:Math.round(installmentScore),max:40};
const savings=member.savingsStatus||0;
let savingsScore=0;
if(savings>=0){
savingsScore=25;
}else{
const monthlySalary=member.monthlySalary||1;
const ratio=Math.abs(savings)/monthlySalary;
savingsScore=Math.max(0,25-(ratio*25));
}
savingsScore=Math.max(0,Math.min(25,savingsScore));
details.savings={score:Math.round(savingsScore),max:25};
const coins=ddm?ddm.getTotalCoins(member.id):0;
let coinsScore=Math.min(coins/50,1)*20;
coinsScore=Math.max(0,Math.min(20,coinsScore));
details.coins={score:Math.round(coinsScore),max:20,value:coins};
const txCount=allTransactions?allTransactions.filter(t=>String(t._memberId)===String(member.id)).length:0;
let activityScore=Math.min(txCount/10,1)*15;
activityScore=Math.max(0,Math.min(15,activityScore));
details.activity={score:Math.round(activityScore),max:15,value:txCount};
score=installmentScore+savingsScore+coinsScore+activityScore;
score=Math.max(0,Math.min(100,score));
score=Math.round(score);
let tier,tierName,tierEmoji,tierColor,tierMessage;
if(score>=80){
tier='gold';tierName='طلایی';tierEmoji='⭐';tierColor='#FFD700';
tierMessage='🌟 عالی! شما عضو طلایی صندوق هستید. به همین خوبی ادامه دهید!';
}else if(score>=50){
tier='silver';tierName='نقره‌ای';tierEmoji='🥈';tierColor='#C0C0C0';
tierMessage='💪 خوب! کمی دیگر تا طلایی شدن فاصله دارید. ادامه دهید!';
}else{
tier='black';tierName='سیاه';tierEmoji='⚫';tierColor='#4A5568';
tierMessage='⚠️ توجه! وضعیت حساب شما نیاز به بهبود دارد. لطفاً اقساط خود را پرداخت کنید.';
}
return{score,tier,tierName,tierEmoji,tierColor,tierMessage,details};
}

function renderGaugeChart(score,size='large'){
const sizes={
small:{width:70,height:70,strokeWidth:7,fontSize:14,textSize:8,cy:45},
medium:{width:110,height:110,strokeWidth:9,fontSize:22,textSize:10,cy:68},
large:{width:180,height:180,strokeWidth:13,fontSize:36,textSize:14,cy:110}
};
const s=sizes[size];
let startColor,endColor,tierName,tierEmoji;
if(score>=80){
startColor='#FFD700';endColor='#FFA500';tierName='طلایی';tierEmoji='⭐';
}else if(score>=50){
startColor='#E8E8E8';endColor='#A8A8A8';tierName='نقره‌ای';tierEmoji='🥈';
}else{
startColor='#6B7280';endColor='#374151';tierName='سیاه';tierEmoji='⚫';
}
const radius=(s.width-s.strokeWidth)/2;
const circumference=Math.PI*radius;
const progress=(score/100)*circumference;
const cx=s.width/2;
const cy=s.cy;
const uid='g_'+Math.random().toString(36).substr(2,9);
return`<svg width="${s.width}" height="${s.height}" class="gauge-chart" viewBox="0 0 ${s.width} ${s.height}">
<defs>
<linearGradient id="${uid}" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:${startColor};stop-opacity:1"/>
<stop offset="100%" style="stop-color:${endColor};stop-opacity:1"/>
</linearGradient>
</defs>
<path d="M ${cx-radius} ${cy} A ${radius} ${radius} 0 0 1 ${cx+radius} ${cy}" fill="none" stroke="rgba(128,128,128,0.2)" stroke-width="${s.strokeWidth}" stroke-linecap="round"/>
<path d="M ${cx-radius} ${cy} A ${radius} ${radius} 0 0 1 ${cx+radius} ${cy}" fill="none" stroke="url(#${uid})" stroke-width="${s.strokeWidth}" stroke-linecap="round" stroke-dasharray="${progress} ${circumference}"/>
<text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="${s.fontSize}" font-weight="700" fill="currentColor">${Math.round(score)}</text>
<text x="${cx}" y="${cy+s.textSize+4}" text-anchor="middle" font-size="${s.textSize}" fill="currentColor" opacity="0.7">${tierEmoji} ${tierName}</text>
</svg>`;
}

class DynamicDataManager{

}
load(key,defaultVal){try{return JSON.parse(localStorage.getItem('sandogh_'+key))||defaultVal;}catch{return defaultVal;}}
save(key,data){localStorage.setItem('sandogh_'+key,JSON.stringify(data));}
addCoins(memberId,amount,reason,detail){
if(!this.coins[memberId])this.coins[memberId]=0;
if(!this.coinHistory[memberId])this.coinHistory[memberId]=[];
this.coins[memberId]+=amount;
this.coinHistory[memberId].push({date:U.now(),amount:amount,reason:reason,detail:detail||''});
this.save('coins',this.coins);
this.save('coinHistory',this.coinHistory);
}
deductCoins(memberId,amount,reason,detail){
if(!this.coins[memberId])this.coins[memberId]=0;
if(!this.coinHistory[memberId])this.coinHistory[memberId]=[];
this.coins[memberId]-=amount;
this.coinHistory[memberId].push({date:U.now(),amount:-amount,reason:reason,detail:detail||''});
this.save('coins',this.coins);
this.save('coinHistory',this.coinHistory);
}
getTotalCoins(memberId){return this.coins[memberId]||0;}
getHistory(memberId){return this.coinHistory[memberId]||[];}
isTxCalculated(txId){return this.calculatedTxIds.includes(String(txId));}
markTxCalculated(txId){if(!this.calculatedTxIds.includes(String(txId))){this.calculatedTxIds.push(String(txId));this.save('calculatedTxIds',this.calculatedTxIds);}}
isMonthlyCalculated(){const jalali=U.getJalaliMonth();return this.monthlyCalculated===`${jalali.year}-${jalali.month}`;}

addShopPurchase(purchase){this.shopPurchases.push(purchase);this.save('shopPurchases',this.shopPurchases);}

function calculateCoins(member,transactions,ddm){
const jalali=U.getJalaliMonth();
if(!ddm.isMonthlyCalculated()){
if(U.parseNum(member.loanBalance)!==0&&U.parseNum(member.paidInstallments)>0){
ddm.addCoins(member.id,2,'پرداخت به موقع قسط',`ماه ${jalali.month}/${jalali.year}`);
}
if(U.parseNum(member.overdueInstallments)===0&&U.parseNum(member.loanBalance)!==0){
ddm.addCoins(member.id,3,'بدون قسط معوقه',`ماه ${jalali.month}/${jalali.year}`);
}
if(U.parseNum(member.balance)>U.parseNum(member.monthlySalary)){
ddm.addCoins(member.id,2,'موجودی بالاتر از مقرری',`ماه ${jalali.month}/${jalali.year}`);
}
const savings=U.parseNum(member.savingsStatus);
const mojodi=U.parseNum(member.currentMonthBalance);
const extraSavings=savings-mojodi;
if(extraSavings>3000000){
const bonusCoins=Math.floor(extraSavings/3000000)*2;
ddm.addCoins(member.id,bonusCoins,'پس‌انداز بالا',`${U.fmtNum(extraSavings)} ریال`);
}
ddm.markMonthlyCalculated();
}
if(member.active&&member.birthDateShamsi){
const birthParts=member.birthDateShamsi.split('/');
if(birthParts.length===3){
const birthMonth=parseInt(birthParts[1]);
const birthDay=parseInt(birthParts[2]);
if(birthMonth===jalali.month&&birthDay===jalali.day){
if(!ddm.coinHistory[member.id]?.find(h=>h.reason==='تولد مبارک'&&h.detail.includes(jalali.year))){
ddm.addCoins(member.id,5,'تولد مبارک',`سال ${jalali.year}`);
}
}
}
}
if(member.openDate){
const openParts=member.openDate.split('/');
if(openParts.length===3){
const openMonth=parseInt(openParts[1]);
const openDay=parseInt(openParts[2]);
if(openMonth===jalali.month&&openDay===jalali.day){
const alreadyGiven=ddm.coinHistory[member.id]?.find(h=>h.reason==='هدیه سالانه حساب فعال'&&h.detail.includes(jalali.year));
if(!alreadyGiven){
if(member.active){
ddm.addCoins(member.id,5,'هدیه سالانه حساب فعال',`سال ${jalali.year}`);
}else{
ddm.addCoins(member.id,0,'محرومیت - حساب غیرفعال',`سال ${jalali.year}`);
}
}
}
}
}
const memberTxns=transactions.filter(t=>String(t._memberId)===String(member.id)||String(t['شماره حساب'])===String(member.accountNumber));
memberTxns.forEach(tx=>{
if(ddm.isTxCalculated(tx._transactionId))return;
const txDate=tx['تاریخ تراکنش']||'';
const txParts=txDate.split('/');
let isCurrentMonth=false;
if(txParts.length===3){
const txYear=parseInt(txParts[0]);
const txMonth=parseInt(txParts[1]);
if(txYear===jalali.year&&txMonth===jalali.month){
isCurrentMonth=true;
}
}
if(isCurrentMonth){
if(tx.smsStatus&&tx.smsStatus.general){
ddm.addCoins(member.id,3,'پیامک واریز فعال',`فیش ${tx['شماره فیش']||tx['ID']} - ${txDate}`);
}
if(tx.smsStatus&&!tx.smsStatus.overdue){
ddm.addCoins(member.id,2,'بدون پیامک اخطار',`فیش ${tx['شماره فیش']||tx['ID']} - ${txDate}`);
}
ddm.markTxCalculated(tx._transactionId);
}
});
}

function renderAnalogClockSVG(){
const now=new Date();
const hours=now.getHours()%12;
const minutes=now.getMinutes();
const seconds=now.getSeconds();
const ms=now.getMilliseconds();
const secondDeg=seconds*6+ms*0.006;
const minuteDeg=minutes*6+seconds*0.1;
const hourDeg=hours*30+minutes*0.5;
const isDark=document.documentElement.getAttribute('data-theme')==='dark';
const bgColor1=isDark?'#1e4876':'#e8f4f8';
const bgColor2=isDark?'#0a1520':'#d0e8f0';
const borderColor=isDark?'#00d4ff':'#00d4ff';
const tickColor=isDark?'#88ccff':'#6699aa';
const tickMajorColor=isDark?'#00d4ff':'#0099cc';
const numberColor=isDark?'#ffffff':'#2d3748';
const hourHandColor=isDark?'#ffffff':'#2d3748';
const minuteHandColor=isDark?'#00d4ff':'#0099cc';
const centerColor=isDark?'#00ff41':'#00cc33';
let ticks='';
for(let i=0;i<60;i++){
const angle=i*6;
const isMajor=i%5===0;
const r1=isMajor?42:45;
const r2=50;
const rad=(angle-90)*Math.PI/180;
const x1=55+r1*Math.cos(rad);
const y1=55+r1*Math.sin(rad);
const x2=55+r2*Math.cos(rad);
const y2=55+r2*Math.sin(rad);
const color=isMajor?tickMajorColor:tickColor;
const width=isMajor?2.5:1.5;
ticks+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="${width}" stroke-linecap="round"/>`;
}
let numbers='';
for(let i=1;i<=12;i++){
const angle=(i*30-90)*Math.PI/180;
const x=55+35*Math.cos(angle);
const y=55+35*Math.sin(angle);
numbers+=`<text x="${x}" y="${y}" fill="${numberColor}" font-family="Vazirmatn,sans-serif" font-weight="900" font-size="14" text-anchor="middle" dominant-baseline="central">${i}</text>`;
}
return`<svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
<defs>
<radialGradient id="clockGradient" cx="30%" cy="30%">
<stop offset="0%" style="stop-color:${bgColor1};stop-opacity:1"/>
<stop offset="100%" style="stop-color:${bgColor2};stop-opacity:1"/>
</radialGradient>
</defs>
<circle cx="55" cy="55" r="52" fill="url(#clockGradient)" stroke="${borderColor}" stroke-width="3"/>
${ticks}
${numbers}
<line x1="55" y1="55" x2="55" y2="35" stroke="${hourHandColor}" stroke-width="4" stroke-linecap="round" transform="rotate(${hourDeg},55,55)"/>
<line x1="55" y1="55" x2="55" y2="22" stroke="${minuteHandColor}" stroke-width="3" stroke-linecap="round" transform="rotate(${minuteDeg},55,55)"/>
<line x1="55" y1="55" x2="55" y2="18" stroke="#ff4444" stroke-width="1.5" stroke-linecap="round" transform="rotate(${secondDeg},55,55)"/>
<circle cx="55" cy="55" r="3" fill="${centerColor}"/>
</svg>`;
}

class NotificationManager {
  constructor(memberId) {
    this.memberId = memberId;
    this.storageKey = 'sandogh_notifications_' + memberId;
    this.settingsKey = 'sandogh_notification_settings_' + memberId;
    this.maxNotifications = 50;
    this.toastDuration = 5000;
    this.maxToasts = 3;
    this.currentToasts = [];
    this.currentFilter = 'all';
    this.initPanelEvents();
  }
  getSettings() {
    try {
      const saved = localStorage.getItem(this.settingsKey);
      return saved ? JSON.parse(saved) : { enableReturnReminder: true, returnReminderDays: 7, enableSystem: true, enableFinancial: true, enableGeneral: true };
    } catch { return { enableReturnReminder: true, returnReminderDays: 7, enableSystem: true, enableFinancial: true, enableGeneral: true }; }
  }
  saveSettings(settings) { localStorage.setItem(this.settingsKey, JSON.stringify(settings)); }
  getNotifications(filter = 'all') {
    try {
      const saved = localStorage.getItem(this.storageKey);
      let notifications = saved ? JSON.parse(saved) : [];
      const thirtyDaysAgo = Date.now() - (30 * 24 * 60 * 60 * 1000);
      notifications = notifications.filter(n => n.timestamp > thirtyDaysAgo);
      if (filter !== 'all') notifications = notifications.filter(n => n.category === filter);
      return notifications.sort((a, b) => b.timestamp - a.timestamp);
    } catch { return []; }
  }
  saveNotifications(notifications) {
    if (notifications.length > this.maxNotifications) notifications = notifications.slice(0, this.maxNotifications);
    localStorage.setItem(this.storageKey, JSON.stringify(notifications));
  }
  addNotification(type, title, message, category, action = null) {
    const notification = { id: 'notif_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9), type, title, message, timestamp: Date.now(), read: false, category, action };
    const notifications = this.getNotifications();
    notifications.unshift(notification);
    this.saveNotifications(notifications);
    this.showToast(notification);
    this.updateBadge();
    return notification;
  }
  markAsRead(id) {
    const notifications = this.getNotifications();
    const notification = notifications.find(n => n.id === id);
    if (notification) { notification.read = true; this.saveNotifications(notifications); this.updateBadge(); }
  }
  markAllAsRead() {
    const notifications = this.getNotifications();
    notifications.forEach(n => n.read = true);
    this.saveNotifications(notifications);
    this.updateBadge();
    this.renderNotificationList(this.currentFilter);
  }
  deleteNotification(id) {
    let notifications = this.getNotifications();
    notifications = notifications.filter(n => n.id !== id);
    this.saveNotifications(notifications);
    this.updateBadge();
  }
  getUnreadCount() { return this.getNotifications().filter(n => !n.read).length; }
  updateBadge() {
    const count = this.getUnreadCount();
    document.querySelectorAll('.notification-badge').forEach(badge => {
      if (count > 0) { badge.textContent = count > 99 ? '99+' : count; badge.style.display = 'flex'; }
      else { badge.style.display = 'none'; }
    });
  }
  showToast(notification) {
    if (this.currentToasts.length >= this.maxToasts) {
      const oldestToast = this.currentToasts.shift();
      if (oldestToast && oldestToast.element) oldestToast.element.remove();
    }
    const toast = document.createElement('div');
    toast.className = `toast toast-${notification.type}`;
    toast.innerHTML = `<div class="toast-icon"><i class="fas ${this.getIcon(notification.type)}"></i></div><div class="toast-content"><div class="toast-title">${U.esc(notification.title)}</div><div class="toast-message">${U.esc(notification.message)}</div></div><button class="toast-close"><i class="fas fa-times"></i></button>`;
    const container = document.getElementById('toastContainer');
    if (container) container.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    const toastObj = { element: toast, id: notification.id };
    this.currentToasts.push(toastObj);
    const closeBtn = toast.querySelector('.toast-close');
    closeBtn.onclick = (e) => { e.stopPropagation(); this.removeToast(toastObj); };
    toast.onclick = (e) => {
      if (e.target !== closeBtn && !closeBtn.contains(e.target)) {
        this.markAsRead(notification.id);
        if (notification.action) this.executeAction(notification.action);
        this.removeToast(toastObj);
      }
    };
    setTimeout(() => this.removeToast(toastObj), this.toastDuration);
  }
  removeToast(toastObj) {
    if (!toastObj.element) return;
    toastObj.element.classList.remove('show');
    setTimeout(() => {
      if (toastObj.element && toastObj.element.parentNode) toastObj.element.remove();
      this.currentToasts = this.currentToasts.filter(t => t !== toastObj);
    }, 300);
  }
  getIcon(type) {
    const icons = { info: 'fa-info-circle', warning: 'fa-exclamation-triangle', success: 'fa-check-circle', critical: 'fa-exclamation-circle' };
    return icons[type] || 'fa-bell';
  }
  executeAction(action) { if (action && action.tab && window.app) { window.app.tab = action.tab; window.app.switchTab(action.tab); } }
  initPanelEvents() {
    setTimeout(() => {
      const closeBtn = document.getElementById('closeNotifPanelBtn');
      const markAllBtn = document.getElementById('markAllReadBtn');
      const filters = document.getElementById('notifFilters');
      const panel = document.getElementById('notificationPanel');
      if (closeBtn) closeBtn.onclick = () => this.hideNotificationPanel();
      if (markAllBtn) markAllBtn.onclick = () => this.markAllAsRead();
      if (filters) {
        filters.querySelectorAll('.notification-filter-btn').forEach(btn => {
          btn.onclick = () => {
            filters.querySelectorAll('.notification-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            this.currentFilter = btn.dataset.filter;
            this.renderNotificationList(this.currentFilter);
          };
        });
      }
      if (panel) panel.onclick = (e) => { if (e.target === panel) this.hideNotificationPanel(); };
    }, 500);
  }
  checkAutoNotifications(member) {
    const settings = this.getSettings();
    const jalali = U.getJalaliMonth();
    if (settings.enableSystem && member.birthDateShamsi) {
      const birthParts = member.birthDateShamsi.split('/');
      if (birthParts.length === 3) {
        const birthMonth = parseInt(birthParts[1]);
        const birthDay = parseInt(birthParts[2]);
        if (birthMonth === jalali.month && birthDay === jalali.day) {
          const notifications = this.getNotifications();
          const alreadyWished = notifications.find(n => n.category === 'system' && n.title.includes('تولد') && n.timestamp > (Date.now() - 24 * 60 * 60 * 1000));
          if (!alreadyWished) this.addNotification('success', '🎂 تولدتان مبارک!', `${member.firstName} عزیز، تولدتان مبارک! ۵ سکه هدیه به حساب شما اضافه شد.`, 'system', { tab: 'coins' });
        }
      }
    }
    if (settings.enableFinancial && member.overdueInstallments < -1) {
      const notifications = this.getNotifications();
      const alreadyWarned = notifications.find(n => n.category === 'financial' && n.title.includes('اقساط معوقه') && n.timestamp > (Date.now() - 24 * 60 * 60 * 1000));
      if (!alreadyWarned) this.addNotification('critical', '⚠️ اقساط معوقه', `شما ${Math.abs(member.overdueInstallments)} قسط معوقه دارید.`, 'financial', { tab: 'dashboard' });
    }
    if (settings.enableFinancial && member.savingsStatus < 0) {
      const notifications = this.getNotifications();
      const alreadyWarned = notifications.find(n => n.category === 'financial' && n.title.includes('کسری موجودی') && n.timestamp > (Date.now() - 24 * 60 * 60 * 1000));
      if (!alreadyWarned) this.addNotification('warning', '💸 کسری موجودی', 'موجودی حساب شما منفی است.', 'financial', { tab: 'dashboard' });
    }
  }
  parseJalaliDate(jalaliStr) {
    try {
      const parts = jalaliStr.split(' ')[0].split('/');
      if (parts.length !== 3) return null;
      const jy = parseInt(parts[0]); const jm = parseInt(parts[1]); const jd = parseInt(parts[2]);
      const gy = jy <= 1358 ? jy + 621 : jy - 1358 + 621;
      const gm = jm <= 6 ? jm + 3 : jm - 3;
      return new Date(gy, gm - 1, jd);
    } catch { return null; }
  }
  showNotificationPanel() {
    const panel = document.getElementById('notificationPanel');
    if (panel) { panel.classList.add('show'); this.renderNotificationList(this.currentFilter); }
  }
  hideNotificationPanel() {
    const panel = document.getElementById('notificationPanel');
    if (panel) panel.classList.remove('show');
  }
  renderNotificationList(filter = 'all') {
    const list = document.getElementById('notificationList');
    if (!list) return;
    this.currentFilter = filter;
    const notifications = this.getNotifications(filter);
    if (notifications.length === 0) {
      list.innerHTML = `<div class="notification-empty"><i class="fas fa-bell-slash"></i><p>هیچ اعلانی وجود ندارد</p></div>`;
      return;
    }
    list.innerHTML = notifications.map(n => `
      <div class="notification-item ${n.read ? 'read' : 'unread'} notification-${n.type}" data-id="${n.id}">
        <div class="notification-icon"><i class="fas ${this.getIcon(n.type)}"></i></div>
        <div class="notification-content">
          <div class="notification-title">${U.esc(n.title)}</div>
          <div class="notification-message">${U.esc(n.message)}</div>
          <div class="notification-time">${this.getTimeAgo(n.timestamp)}</div>
        </div>
        <button class="notification-delete" data-id="${n.id}"><i class="fas fa-trash"></i></button>
      </div>`).join('');
    list.querySelectorAll('.notification-item').forEach(item => {
      item.onclick = (e) => {
        if (!e.target.closest('.notification-delete')) {
          this.markAsRead(item.dataset.id);
          item.classList.remove('unread');
          item.classList.add('read');
          const notification = notifications.find(n => n.id === item.dataset.id);
          if (notification && notification.action) { this.executeAction(notification.action); this.hideNotificationPanel(); }
        }
      };
    });
    list.querySelectorAll('.notification-delete').forEach(btn => {
      btn.onclick = (e) => { e.stopPropagation(); this.deleteNotification(btn.dataset.id); this.renderNotificationList(this.currentFilter); };
    });
  }
  getTimeAgo(timestamp) {
    const diff = Date.now() - timestamp;
    const seconds = Math.floor(diff / 1000);
    const minutes = Math.floor(seconds / 60);
    const hours = Math.floor(minutes / 60);
    const days = Math.floor(hours / 24);
    if (seconds < 60) return 'لحظاتی پیش';
    if (minutes < 60) return `${minutes} دقیقه پیش`;
    if (hours < 24) return `${hours} ساعت پیش`;
    if (days < 7) return `${days} روز پیش`;
    if (days < 30) return `${Math.floor(days / 7)} هفته پیش`;
    return `${Math.floor(days / 30)} ماه پیش`;
  }
}

class BiometricManager {
  constructor(memberId) {
    this.memberId = memberId;
    this.storageKey = 'sandogh_biometric_' + memberId;
    this.settingsKey = 'sandogh_biometric_settings_' + memberId;
  }
  isWebView(){
    const ua=navigator.userAgent.toLowerCase();
    if(/android/.test(ua)){
      if(/wv|webview/.test(ua))return true;
      if(/version\/[\d\.]+/.test(ua)&&!/chrome/.test(ua))return true;
    }
    if(/iphone|ipad|ipod/.test(ua)){
      if(/(iphone|ipad|ipod).*applewebkit(?!.*chrome)/.test(ua))return true;
    }
    return false;
  }
  isSupported() {
    if(this.isWebView()) return false;
    return !!(window.PublicKeyCredential && navigator.credentials && navigator.credentials.create && navigator.credentials.get);
  }
  isAvailable() {
    if (!this.isSupported()) return Promise.resolve(false);
    return PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(available => available).catch(() => false);
  }
  getSettings() { try { const saved = localStorage.getItem(this.settingsKey); return saved ? JSON.parse(saved) : { enabled: true }; } catch { return { enabled: true }; } }
  saveSettings(settings) { localStorage.setItem(this.settingsKey, JSON.stringify(settings)); }
  isEnabled() { return this.getSettings().enabled && this.isRegistered(); }
  getRegisteredDevices() { try { const saved = localStorage.getItem(this.storageKey); return saved ? JSON.parse(saved) : []; } catch { return []; } }
  saveRegisteredDevices(devices) { localStorage.setItem(this.storageKey, JSON.stringify(devices)); }
  isRegistered() { return this.getRegisteredDevices().length > 0; }
  getCurrentDevice() { return this.getRegisteredDevices().find(d => d.deviceName === U.getDeviceName()); }
  async register() {
    if(this.isWebView()) return { success: false, error: 'اثر انگشت فقط در نسخه مرورگر پشتیبانی می‌شود.' };
    if (!this.isSupported()) return { success: false, error: 'مرورگر شما از اثر انگشت پشتیبانی نمی‌کند' };
    try {
      const available = await this.isAvailable();
      if (!available) return { success: false, error: 'اثر انگشت در دسترس نیست' };
      const challenge = crypto.getRandomValues(new Uint8Array(32));
      const userId = crypto.getRandomValues(new Uint8Array(16));
      const hostname = window.location.hostname || 'localhost';
      const deviceName = U.getDeviceName();
      const devices = this.getRegisteredDevices();
      if (devices.find(d => d.deviceName === deviceName)) return { success: false, error: 'اثر انگشت قبلاً ثبت شده' };
      const credential = await navigator.credentials.create({
        publicKey: {
          challenge, rp: { name: 'صندوق اتحاد', id: hostname },
          user: { id: userId, name: 'member_' + this.memberId + '_' + Date.now(), displayName: 'عضو صندوق' },
          pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
          timeout: 60000, attestation: 'none'
        }
      });
      if (!credential) return { success: false, error: 'ثبت لغو شد' };
      devices.push({ credentialId: U.bufferToBase64(credential.rawId), deviceName, registeredAt: U.now(), enabled: true });
      this.saveRegisteredDevices(devices);
      return { success: true, message: 'اثر انگشت ثبت شد' };
    } catch (error) {
      if (error.name === 'NotAllowedError') return { success: false, error: 'لغو شد' };
      return { success: false, error: 'خطا: ' + error.message };
    }
  }
  async authenticate() {
    if(this.isWebView()) return { success: false, error: 'اثر انگشت در APK پشتیبانی نمی‌شود. با رمز وارد شوید.' };
    if (!this.isSupported()) return { success: false, error: 'پشتیبانی نمی‌شود' };
    try {
      const devices = this.getRegisteredDevices();
      if (devices.length === 0) return { success: false, error: 'ثبت نشده' };
      const challenge = crypto.getRandomValues(new Uint8Array(32));
      const assertion = await navigator.credentials.get({
        publicKey: { challenge, allowCredentials: devices.map(d => ({ type: 'public-key', id: U.base64ToBuffer(d.credentialId) })).filter(c => c.id !== null), timeout: 60000 }
      });
      if (!assertion) return { success: false, error: 'لغو شد' };
      return { success: true, message: 'موفق' };
    } catch (error) {
      if (error.name === 'NotAllowedError') return { success: false, error: 'لغو شد' };
      return { success: false, error: 'خطا: ' + error.message };
    }
  }
  removeDevice(deviceName) {
    let devices = this.getRegisteredDevices();
    devices = devices.filter(d => d.deviceName !== deviceName);
    this.saveRegisteredDevices(devices);
    return { success: true, message: 'حذف شد' };
  }
  toggleEnabled() { const settings = this.getSettings(); settings.enabled = !settings.enabled; this.saveSettings(settings); return settings.enabled; }
  clearAll() { localStorage.removeItem(this.storageKey); localStorage.removeItem(this.settingsKey); }
}

bindMenu(){
$$('.menu-item[data-tab]').forEach(el=>{
el.onclick=(e)=>{
if(el.id==='notifMenuItem'&&this.notificationManager){
e.preventDefault();e.stopPropagation();
this.notificationManager.showNotificationPanel();
return;
}
this.tab=el.dataset.tab;
localStorage.setItem('activeTab',this.tab);
$$('.menu-item').forEach(e=>e.classList.remove('active'));
el.classList.add('active');
this.switchTab(this.tab);
if(window.innerWidth<=768){
this.mobileMenuOpen=false;
const menu=$('#verticalMenu');
const overlay=$('#menuOverlay');
const toggleBtn=$('#mobileMenuToggle');
if(menu)menu.classList.add('collapsed');
if(overlay)overlay.style.display='none';
if(toggleBtn)toggleBtn.innerHTML='<i class="fas fa-bars"></i> منو';
}
};
});
$('#logoutBtn').onclick=()=>this.doLogout();
const toggleBtn=$('#mobileMenuToggle');
const overlay=$('#menuOverlay');
if(toggleBtn){
toggleBtn.onclick=()=>{
this.mobileMenuOpen=!this.mobileMenuOpen;
const menu=$('#verticalMenu');
if(menu){
if(this.mobileMenuOpen){
menu.classList.remove('collapsed');
if(overlay)overlay.style.display='block';
toggleBtn.innerHTML='<i class="fas fa-times"></i> بستن';
}else{
menu.classList.add('collapsed');
if(overlay)overlay.style.display='none';
toggleBtn.innerHTML='<i class="fas fa-bars"></i> منو';
}
}
};
}
if(overlay){
overlay.onclick=()=>{
this.mobileMenuOpen=false;
const menu=$('#verticalMenu');
if(menu)menu.classList.add('collapsed');
overlay.style.display='none';
if(toggleBtn)toggleBtn.innerHTML='<i class="fas fa-bars"></i> منو';
};
}
}
switchTab(tab){const c=$('#contentArea');if(!c)return;c.innerHTML='';const fn='render_'+tab;if(typeof this[fn]==='function')this[fn](c);}

buyProduct(shenaseh){
const product=SHOP_PRODUCTS.find(p=>p.shenaseh===shenaseh);
if(!product){alert('محصول یافت نشد');return;}
const member=this.dm.members.find(m=>m.id===this.getActiveMemberId());
if(!member){alert('خطا');return;}
const headMemberId=this.currentUser.memberId;
const userCoins=this.ddm.getTotalCoins(headMemberId);
if(userCoins<product.price){alert(`سکه کافی ندارید! سکه‌های شما: ${userCoins}`);return;}
if(product.stock<=0){alert('ناموجود');return;}
const isViewing=!!this.viewingAsMemberId;
const buyerName=isViewing?`${member.firstName} ${member.lastName||''}`.trim():'شما';
if(!confirm(`خرید "${product.name}" با ${product.price} سکه برای ${buyerName}؟`))return;
const orderCode=U.generateOrderCode(member.accountNumber);
this.ddm.deductCoins(headMemberId,product.price,'خرید از فروشگاه',`محصول: ${product.name} | خرید برای: ${member.firstName}`);
const purchase={orderCode,productId:product.shenaseh,productName:product.name,productDescription:product.description,price:product.price,memberId:member.id,memberName:`${member.firstName} ${member.lastName||''}`.trim(),accountNumber:member.accountNumber,date:U.now(),delivered:false};
this.ddm.addShopPurchase(purchase);
if(this.notificationManager)this.notificationManager.addNotification('success','🛒 خرید موفق','سفارش ثبت شد','financial',{tab:'shopHistory'});
this.showPurchaseReceipt(purchase);
}
showPurchaseReceipt(purchase){

const modal=document.createElement('div');
modal.className='modal-overlay';
modal.innerHTML=`<div class="modal-content"><div class="modal-header"><div class="modal-title"><i class="fas fa-check-circle" style="color:#48bb78"></i> خرید موفق</div><button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button></div><div class="receipt-box"><div class="receipt-title">🧾 رسید خرید</div><div class="receipt-line"></div><div class="receipt-row"><span class="receipt-label">کد سفارش:</span><span class="receipt-value">${purchase.orderCode}</span></div><div class="receipt-row"><span class="receipt-label">نام:</span><span class="receipt-value">${purchase.memberName}</span></div><div class="receipt-row"><span class="receipt-label">شماره حساب:</span><span class="receipt-value">${purchase.accountNumber}</span></div><div class="receipt-row"><span class="receipt-label">محصول:</span><span class="receipt-value">${purchase.productName}</span></div><div class="receipt-row"><span class="receipt-label">سکه:</span><span class="receipt-value">${purchase.price}</span></div><div class="receipt-row"><span class="receipt-label">تاریخ:</span><span class="receipt-value">${purchase.date}</span></div><div class="receipt-line"></div><div style="text-align:center;color:#48bb78;font-weight:700">✅ پرداخت شده</div></div><div style="background:var(--info-bg);border:2px solid #4299e1;border-radius:12px;padding:15px;margin:15px 0"><h4 style="color:#2c5282;margin-bottom:10px"><i class="fas fa-paper-plane"></i> پیام برای مدیر</h4><div style="background:var(--input-bg);border-radius:8px;padding:12px;font-family:monospace;font-size:.85rem;white-space:pre-wrap;direction:rtl">${U.esc(messageText)}</div></div><div class="modal-actions"><button class="btn-small success-btn" id="copyMsgBtn"><i class="fas fa-copy"></i> کپی</button><button class="btn-small danger-btn" id="closeModalBtn"><i class="fas fa-times"></i> بستن</button></div></div>`;
document.body.appendChild(modal);
setTimeout(()=>{
const closeModal=()=>{document.body.removeChild(modal);this.render();};
$('#closeModal',modal).onclick=closeModal;
$('#closeModalBtn',modal).onclick=closeModal;
$('#copyMsgBtn',modal).onclick=()=>{
const textarea=document.createElement('textarea');textarea.value=messageText;textarea.style.position='fixed';textarea.style.opacity='0';document.body.appendChild(textarea);textarea.select();
try{document.execCommand('copy');const btn=$('#copyMsgBtn',modal);btn.innerHTML='<i class="fas fa-check"></i> کپی شد';setTimeout(()=>{btn.innerHTML='<i class="fas fa-copy"></i> کپی';},2000);}catch(err){alert('خطا');}
document.body.removeChild(textarea);
};
},100);
}
render_shopHistory(c){
const member=this.dm.members.find(m=>m.id===this.getActiveMemberId());
if(!member){c.innerHTML='<div style="text-align:center;padding:40px">خطا</div>';return;}
const purchases=this.ddm.getMemberPurchases(member.id);
let h=`<div class="info-box"><i class="fas fa-receipt"></i> خریدهای من</div>`;
if(purchases.length===0){h+=`<div class="dashboard-section" style="text-align:center;padding:40px"><i class="fas fa-shopping-bag" style="font-size:4rem;color:var(--text-light)"></i><p>هنوز خریدی نکرده‌اید</p></div>`;c.innerHTML=h;return;}
const totalSpent=purchases.reduce((sum,p)=>sum+p.price,0);
h+=`<div class="dashboard-section"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px"><div><i class="fas fa-shopping-cart"></i> تعداد: ${purchases.length}</div><div><i class="fas fa-coins"></i> مجموع: ${U.fmtNum(totalSpent)} سکه</div></div></div><div class="dashboard-section"><h3><i class="fas fa-list"></i> لیست خریدها</h3>`;

h+=`<div class="shop-history-item ${statusClass}"><div class="history-info"><div class="history-product">${U.esc(p.productName)}</div><div class="history-date"><i class="fas fa-calendar"></i> ${p.date}</div><div class="history-code"><i class="fas fa-barcode"></i> ${p.orderCode}</div><div style="font-size:.85rem;margin-top:5px">${statusText}</div></div><div class="history-price">${U.fmtNum(p.price)} سکه</div></div>`;

render_shopAdmin(c){

const allPurchases=this.ddm.getAllPurchases();
let h=`<div class="info-box"><i class="fas fa-clipboard-check"></i> سفارشات فروشگاه</div>`;
if(allPurchases.length===0){h+=`<div class="dashboard-section" style="text-align:center;padding:40px"><i class="fas fa-inbox" style="font-size:4rem;color:var(--text-light)"></i><p>هنوز سفارشی ثبت نشده</p></div>`;c.innerHTML=h;return;}
const pendingCount=allPurchases.filter(p=>!p.delivered).length;
const deliveredCount=allPurchases.filter(p=>p.delivered).length;

h+=`<div class="shop-filter-bar"><input type="text" id="adminSearch" placeholder="جستجو..."><select id="adminStatusFilter"><option value="">همه</option><option value="pending">در انتظار</option><option value="delivered">تحویل شده</option></select></div><div id="adminOrdersList"></div>`;
c.innerHTML=h;
const renderOrders=()=>{
const search=$('#adminSearch',c)?.value.trim().toLowerCase()||'';
const status=$('#adminStatusFilter',c)?.value||'';
let orders=[...allPurchases].reverse();
if(search)orders=orders.filter(o=>o.memberName.toLowerCase().includes(search)||o.accountNumber.toLowerCase().includes(search)||o.orderCode.toLowerCase().includes(search));
if(status==='pending')orders=orders.filter(o=>!o.delivered);
else if(status==='delivered')orders=orders.filter(o=>o.delivered);
const list=$('#adminOrdersList',c);
if(!list)return;
if(orders.length===0){list.innerHTML='<div style="text-align:center;padding:40px">سفارشی یافت نشد</div>';return;}
const canToggle=this.currentUser.role==='admin';
list.innerHTML=`<div class="dashboard-section"><div class="table-wrapper"><table><thead><tr><th>کد</th><th>نام</th><th>حساب</th><th>محصول</th><th>سکه</th><th>تاریخ</th><th>وضعیت</th>${canToggle?'<th>عملیات</th>':''}</tr></thead><tbody>${orders.map(o=>{
const statusBadge=o.delivered?`<span class="account-status-badge active">تحویل</span>`:`<span class="account-status-badge inactive">انتظار</span>`;
return`<tr><td style="font-family:monospace;font-size:.8rem">${U.esc(o.orderCode)}</td><td>${U.esc(o.memberName)}</td><td>${U.esc(o.accountNumber)}</td><td>${U.esc(o.productName)}</td><td style="font-weight:700;color:#d69e2e">${U.fmtNum(o.price)}</td><td style="font-size:.85rem">${U.esc(o.date)}</td><td>${statusBadge}</td>${canToggle?`<td>${o.delivered?`<button class="btn-small edit-btn" onclick="window.app.toggleDelivery('${o.orderCode}')">بازگردانی</button>`:`<button class="btn-small success-btn" onclick="window.app.toggleDelivery('${o.orderCode}')">تحویل</button>`}</td>`:''}</tr>`;
}).join('')}</tbody></table></div></div>`;
};
setTimeout(()=>{$('#adminSearch',c).oninput=renderOrders;$('#adminStatusFilter',c).onchange=renderOrders;renderOrders();},50);
}
toggleDelivery(orderCode){
if(this.currentUser.role!=='admin'){alert('فقط مدیر');return;}
const purchase=this.ddm.shopPurchases.find(p=>p.orderCode===orderCode);
if(!purchase)return;
purchase.delivered=!purchase.delivered;
this.ddm.save('shopPurchases',this.ddm.shopPurchases);
alert(purchase.delivered?'✅ تحویل ثبت شد':'↩️ بازگردانی شد');
this.render_shopAdmin($('#contentArea'));
}

let h=`<div class="info-box"><i class="fas fa-coins"></i> سکه‌های من</div>`;
h+=`<div class="coin-display"><i class="fas fa-coins" style="font-size:1.5rem;color:#d69e2e"></i><div><div class="coin-label">سکه‌های شما</div><div class="coin-amount">${totalCoins}</div></div></div>`;
h+=`<div class="dashboard-section"><h3><i class="fas fa-history"></i> تاریخچه</h3>`;

else{
history.slice().reverse().forEach(item=>{
const isPositive=item.amount>0;
const isZero=item.amount===0;
const displayAmount=isZero?'محروم':(item.amount<0?item.amount:'+'+item.amount);
const color=isZero||item.amount<0?'#e53e3e':'#48bb78';
const cls=item.amount<0?'negative':'positive';
h+=`<div class="coin-history-item ${cls}"><div><div style="font-weight:700">${U.esc(item.reason)}</div><div style="font-size:.85rem">${U.esc(item.detail)}</div><div style="font-size:.75rem;margin-top:3px">${U.esc(item.date)}</div></div><div style="color:${color};font-weight:700;font-size:1.2rem">${displayAmount}</div></div>`;
});
}
h+=`</div>`;
c.innerHTML=h;
}
}
showMemberCoinHistory(memberId){
const member=this.dm.members.find(m=>String(m.id)===String(memberId));
if(!member)return;
const history=this.ddm.getHistory(member.id);
const section=$('#coinHistorySection');
if(!section)return;
let h=`<div class="dashboard-section"><h3><i class="fas fa-history"></i> تاریخچه ${U.esc(member.firstName)} ${U.esc(member.lastName)}</h3>`;

renderRuleItem(name,coins,achieved){

search(inputId,tableSelector,container){
container=container||document;
const input=$(inputId,container);
if(!input)return;
const clearBtn=$(inputId+'_cl',container);
const filter=function(){
const q=input.value.trim().toLowerCase();
const tb=container.querySelector(tableSelector);
if(!tb||!tb.querySelector('tbody'))return;
tb.querySelector('tbody').querySelectorAll('tr').forEach(function(r){
if(!q||r.textContent.trim().toLowerCase().includes(q))r.style.display='';
else r.style.display='none';
});
};
input.oninput=filter;
if(clearBtn)clearBtn.onclick=function(){input.value='';filter();input.focus();};
setTimeout(filter,50);
}
startClock(){
if(this.ci)clearInterval(this.ci);
const tick=()=>{
const n=new Date();
const h=String(n.getHours()).padStart(2,'0');
const m=String(n.getMinutes()).padStart(2,'0');
const s=String(n.getSeconds()).padStart(2,'0');
const cl=$('#clockDisplay');
if(cl)cl.innerHTML=`${h}:${m}<span style="font-size:1rem;opacity:.8">:${s}</span>`;
const inlineClock=$('#inlineClock');
if(inlineClock)inlineClock.textContent=`${h}:${m}:${s}`;
updateAnalogClock();
};
tick();
this.ci=setInterval(tick,1000);
}
doLogout(){this.currentUser=null;this.viewingAsMemberId=null;this.notificationManager=null;this.biometricManager=null;this.render();}
saveProfile(mid){
const m=this.dm.members.find(mem=>mem.id===mid);
if(!m)return;
const ui=this.dm.users.find(u=>u.memberId===mid);
const data={
firstName:$(`#pf_firstName_${mid}`)?$(`#pf_firstName_${mid}`).value.trim():'',
accountNumber:$(`#pf_accountNumber_${mid}`)?$(`#pf_accountNumber_${mid}`).value.trim():'',
openDate:$(`#pf_openDate_${mid}`)?$(`#pf_openDate_${mid}`).value.trim():'',
birthDateShamsi:$(`#pf_birthDateShamsi_${mid}`)?$(`#pf_birthDateShamsi_${mid}`).value.trim():'',
phone1:$(`#pf_phone1_${mid}`)?$(`#pf_phone1_${mid}`).value.trim():'',
phone2:$(`#pf_phone2_${mid}`)?$(`#pf_phone2_${mid}`).value.trim():''
};
if(!data.firstName||!data.accountNumber){alert('نام و شماره حساب الزامی هستند');return;}
if(ui){ui.username=$(`#pfu_${mid}`)?$(`#pfu_${mid}`).value.trim():'';ui.password=$(`#pfp_${mid}`)?$(`#pfp_${mid}`).value.trim():'';}
Object.assign(m,data);
alert('✅ ذخیره شد');
this.render();
}

});
}
