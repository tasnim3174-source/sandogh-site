<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صندوق</title>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma}
body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:10px}
.container{max-width:1200px;margin:0 auto;background:#fff;border-radius:15px;overflow:hidden}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px;text-align:center}
.login-box{max-width:400px;margin:50px auto;padding:30px;background:#fff;border-radius:15px}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:5px;font-weight:bold}
.form-group input,.form-group textarea{width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:14px}
.btn{padding:12px 20px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;color:#fff}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2)}
.btn-success{background:#27ae60}
.btn-warning{background:#f39c12}
.btn-danger{background:#e74c3c}
.nav{display:flex;background:#f8f9fa;border-bottom:2px solid #e9ecef;overflow-x:auto}
.nav button{flex:1;padding:12px;border:none;background:transparent;cursor:pointer;font-weight:bold;color:#555;white-space:nowrap}
.nav button.active{background:#fff;color:#667eea;border-bottom:3px solid #667eea}
.content{padding:20px;min-height:400px}
.section{display:none}
.section.active{display:block}
.card{background:#f8f9fa;padding:15px;border-radius:10px;margin-bottom:10px;border-right:4px solid #667eea}
.card h3{margin-bottom:8px}
.alert{padding:10px;border-radius:8px;margin-bottom:10px}
.alert-success{background:#d4edda;color:#155724}
.alert-error{background:#f8d7da;color:#721c24}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:15px}
.stat-card{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:15px;border-radius:10px;text-align:center}
.stat-card .num{font-size:28px;font-weight:bold}
.empty{text-align:center;padding:30px;color:#999}
.coin-display{background:#f39c12;color:#fff;padding:4px 10px;border-radius:20px;font-weight:bold;font-size:13px}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>💰 صندوق</h1></div>

<div id="loginPage" class="login-box">
<h2 style="text-align:center;margin-bottom:20px"> ورود</h2>
<div id="loginAlert"></div>
<div class="form-group"><label>نام کاربری</label><input type="text" id="username"></div>
<div class="form-group"><label>رمز عبور</label><input type="password" id="password"></div>
<button class="btn btn-primary" style="width:100%" onclick="login()">ورود</button>
</div>

<div id="dashboard" style="display:none">
<div style="padding:15px;background:#f8f9fa;display:flex;justify-content:space-between;align-items:center">
<div><strong id="currentUser"></strong> <span class="coin-display" id="userCoins">0 🪙</span></div>
<button class="btn btn-danger" onclick="logout()">خروج</button>
</div>

<div class="nav">
<button class="active" onclick="showSection('home',this)"> خانه</button>
<button onclick="showSection('announcements',this)">📢 اطلاعیه</button>
<button onclick="showSection('messages',this)">💬 پیام</button>
<button onclick="showSection('polls',this)">📊 نظرسنجی</button>
<button onclick="showSection('requests',this)">📝 درخواست</button>
<button onclick="showSection('support',this)"> پشتیبانی</button>
<button onclick="showSection('rewards',this)">🎁 پاداش</button>
<button id="adminTab" style="display:none" onclick="showSection('admin',this)">⚙️ مدیریت</button>
</div>

<div class="content">

<div id="home" class="section active">
<div class="stats">
<div class="stat-card"><div>موجودی</div><div class="num" id="myCoins">0</div><div>سکه 🪙</div></div>
<div class="stat-card"><div>اطلاعیه‌ها</div><div class="num" id="annCount">0</div></div>
<div class="stat-card"><div>پیام‌ها</div><div class="num" id="msgCount">0</div></div>
<div class="stat-card"><div>درخواست‌ها</div><div class="num" id="reqCount">0</div></div>
</div>
<h2>📌 آخرین اطلاعیه‌ها</h2>
<div id="homeAnnouncements"></div>
</div>

<div id="announcements" class="section"><h2>📢 اطلاعیه‌ها</h2><div id="announcementsList"></div></div>

<div id="messages" class="section">
<h2>💬 پیام‌ها</h2>
<div class="form-group"><textarea id="newMessage" rows="3" placeholder="پیام خود را بنویسید..."></textarea></div>
<button class="btn btn-primary" onclick="sendMessage()">ارسال پیام</button>
<div id="messagesList" style="margin-top:15px"></div>
</div>

<div id="polls" class="section"><h2>📊 نظرسنجی‌ها</h2><div id="pollsList"></div></div>

<div id="requests" class="section">
<h2>📝 درخواست‌ها</h2>
<div class="form-group"><input type="text" id="reqTitle" placeholder="عنوان درخواست"></div>
<div class="form-group"><textarea id="reqDesc" rows="3" placeholder="توضیحات..."></textarea></div>
<button class="btn btn-primary" onclick="sendRequest()">ثبت درخواست</button>
<div id="requestsList" style="margin-top:15px"></div>
</div>

<div id="support" class="section">
<h2>🎧 پشتیبانی</h2>
<div class="form-group"><input type="text" id="supTitle" placeholder="موضوع"></div>
<div class="form-group"><textarea id="supMsg" rows="3" placeholder="پیام شما..."></textarea></div>
<button class="btn btn-primary" onclick="sendSupport()">ارسال تیکت</button>
<div id="supportList" style="margin-top:15px"></div>
</div>

<div id="rewards" class="section"><h2>🎁 پاداش‌ها</h2><div id="rewardsList"></div></div>

<div id="admin" class="section">
<h2>⚙️ پنل مدیریت</h2>
<div id="adminAlert"></div>

<div class="card" style="background:#fff">
<h3>📢 افزودن اطلاعیه</h3>
<div class="form-group"><input type="text" id="annTitle" placeholder="عنوان"></div>
<div class="form-group"><textarea id="annBody" rows="3" placeholder="متن اطلاعیه"></textarea></div>
<button class="btn btn-success" onclick="addAnnouncement()">افزودن</button>
</div>

<div class="card" style="background:#fff;margin-top:15px">
<h3> افزودن نظرسنجی</h3>
<div class="form-group"><input type="text" id="pollQ" placeholder="سوال"></div>
<div class="form-group"><input type="text" id="pollOpts" placeholder="گزینه‌ها (با , جدا کنید)"></div>
<button class="btn btn-success" onclick="addPoll()">افزودن</button>
</div>

<div class="card" style="background:#fff;margin-top:15px
