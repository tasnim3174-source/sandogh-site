<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سیستم حسابداری صندوق اتحاد</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Vazirmatn',system-ui,-apple-system,sans-serif}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);min-height:100vh;padding:20px}
.container{max-width:1600px;margin:0 auto}
.login-page{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-radius:32px;padding:40px;box-shadow:0 25px 50px rgba(0,0,0,.25);max-width:500px;margin:50px auto}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:16px;font-size:1rem;font-weight:700;cursor:pointer}
.input-group{margin-bottom:25px}
.input-group label{display:block;margin-bottom:8px;font-weight:600;color:#4a5568}
.input-group input{width:100%;padding:14px;border:2px solid #e2e8f0;border-radius:16px;font-size:1rem}
.error-msg{color:#e53e3e;text-align:center;margin-top:20px;padding:12px;background:rgba(229,62,62,.1);border-radius:12px}
.success-msg{color:#38a169;text-align:center;margin-top:20px;padding:12px;background:rgba(56,161,105,.1);border-radius:12px}
</style>
</head>
<body>
<div class="container" id="appContainer"></div>
<script>
// ⚙️ تنظیمات GitHub
const GITHUB_OWNER = 'Tasnim3174';
const GITHUB_REPO = 'sandogh-site';
const GITHUB_TOKEN = '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';

// تست اولیه - اگر این کار کند یعنی HTML درست است
console.log('✅ برنامه شروع به کار کرد');

// نمایش صفحه لاگین ساده برای تست
document.getElementById('appContainer').innerHTML = `
<div class="login-page">
    <div style="text-align:center;margin-bottom:30px">
        <i class="fas fa-university" style="font-size:4rem;color:#667eea;margin-bottom:15px"></i>
        <h1 style="color:#2d3748;margin-bottom:10px">سیستم حسابداری صندوق اتحاد</h1>
        <p style="color:#718096">ورود با رمز اختصاصی</p>
    </div>
    <div class="input-group">
        <label><i class="fas fa-user"></i> نام کاربری</label>
        <input type="text" id="loginUsername" placeholder="نام کاربری">
    </div>
    <div class="input-group">
        <label><i class="fas fa-lock"></i> رمز عبور</label>
        <input type="password" id="loginPassword" placeholder="رمز عبور">
    </div>
    <button class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> ورود</button>
    <div id="loginError" class="error-msg" style="display:none"></div>
</div>
`;

// اطلاعات ورود پیش‌فرض
const users = [
    {id: 1, username: 'admin', password: 'admin123', role: 'admin'}
];

// تابع ورود
document.getElementById('loginBtn').onclick = function() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const errorDiv = document.getElementById('loginError');
    
    console.log('تلاش برای ورود:', username);
    
    const user = users.find(u => u.username === username && u.password === password);
    
    if (user) {
        console.log('✅ ورود موفق');
        errorDiv.style.display = 'none';
        alert('✅ ورود موفق! (این یک تست است)');
    } else {
        console.log('❌ نام کاربری یا رمز اشتباه');
        errorDiv.textContent = '❌ نام کاربری یا رمز عبور اشتباه است';
        errorDiv.style.display = 'block';
    }
};

console.log('✅ صفحه لاگین نمایش داده شد');
</script>
</body>
</html>
